# 🏗️ プレビュービルド（本番には反映されません）
#
# main に push があったとき、または手動実行で、
# JSXの事前コンパイル版（dist/index.html）をビルドして
# ダウンロード可能な「成果物（artifact）」として保管する。
#
# 動作確認手順:
#   1. このワークフローが緑になっていることを確認
#   2. GitHub の Actions タブ → "Preview Build" → 最新の run
#   3. 下にスクロール → "Artifacts" の "hikari-prebuilt" を押してダウンロード
#   4. ZIP を解凍して中の index.html をブラウザで開く
#   5. 今と同じように動けば Step C（本番デプロイ切替）に進める

name: Preview Build

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'tools/**'
      - 'package.json'
      - '.github/workflows/preview-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Show build output info
        run: |
          ls -lh dist/
          echo "--- 先頭200文字 ---"
          head -c 500 dist/index.html
          echo ""
          echo "--- バージョン文字列 ---"
          grep -o '"2026-[^"]*"' dist/index.html | head -1

      - name: Upload built file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hikari-prebuilt
          path: dist/index.html
          retention-days: 30
