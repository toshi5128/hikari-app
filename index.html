                <span style={{ color: C.text, textAlign: "right", maxWidth: "65%" }}>{v}</span>
              </div>
            ))}
          </div>

          {/* アクションボタン群 */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
            <a href={navUrl(selected.item.address)} target="_blank" rel="noopener noreferrer"
              style={{ ...btnStyle(), textDecoration: "none", textAlign: "center", padding: "13px", background: C.success, borderColor: C.success, fontSize: 15 }}>
              🚗 物件にナビ
            </a>
            <a href={selected.item.ownerAddress ? navUrl(selected.item.ownerAddress) : navUrl(selected.item.address)} target="_blank" rel="noopener noreferrer"
              style={{ ...btnStyle("ghost"), textDecoration: "none", textAlign: "center", padding: "13px", fontSize: 15 }}>
              🚗 所有者にナビ
            </a>
            {selected.item.ownerAddress && (
              <a href={navUrl(selected.item.ownerAddress)} target="_blank" rel="noopener noreferrer"
                style={{ ...btnStyle("ghost"), textDecoration: "none", textAlign: "center", padding: "13px", fontSize: 13, gridColumn: "1 / -1", borderColor: C.purple, color: C.purple }}>
                🚗 所有者住所にナビ
              </a>
            )}
          </div>

          {/* ステータス・次回日変更 */}
          <Field label="ステータス変更">
            <select style={inp} value={selected.item.status} onChange={e => updateStatus(selected.item, e.target.value)}>
              {(selected.item.type === "jiage" ? ATTACK_STATUSES : OWNER_STATUSES).map(s => <option key={s}>{s}</option>)}
            </select>
          </Field>
          <Field label="次回訪問日">
            <input type="date" style={inp} value={selected.item.nextDate || ""} onChange={e => updateNextDate(selected.item, e.target.value)} />
          </Field>

          {/* 所有者アタックの履歴 */}
          {selected.item.type === "owner" && (
            <div style={{ borderTop: `1px solid #1a2535`, paddingTop: 14, marginTop: 4 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>
                アタック履歴 ({selected.item.history.length}件)
              </div>
              {selected.item.history.length === 0 && <div style={{ color: C.muted, fontSize: 13, marginBottom: 12 }}>まだ履歴がありません</div>}
              {[...selected.item.history].reverse().map((h, i) => (
                <div key={i} style={{ borderLeft: `3px solid ${C.accent}`, paddingLeft: 12, marginBottom: 14 }}>
                  <div style={{ fontSize: 12, color: C.muted, marginBottom: 4 }}>{h.date} · {h.method} · {h.member}</div>
                  <div style={{ fontSize: 14, color: C.text }}>{h.note}</div>
                </div>
              ))}
              <div style={{ borderTop: `1px solid #1a2535`, paddingTop: 14 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 10 }}>履歴を追加</div>
                <Field label="日付"><input type="date" style={inp} value={histForm.date} onChange={e => setHistForm(h => ({ ...h, date: e.target.value }))} /></Field>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <Field label="方法"><select style={inp} value={histForm.method} onChange={e => setHistForm(h => ({ ...h, method: e.target.value }))}>{["手紙", "電話", "訪問", "その他"].map(m => <option key={m}>{m}</option>)}</select></Field>
                  <Field label="担当"><select style={inp} value={histForm.member} onChange={e => setHistForm(h => ({ ...h, member: e.target.value }))}>{MEMBERS.map(m => <option key={m}>{m}</option>)}</select></Field>
                </div>
                <Field label="内容・結果"><textarea style={{ ...inp, height: 80, resize: "vertical" }} value={histForm.note} onChange={e => setHistForm(h => ({ ...h, note: e.target.value }))} placeholder="電話にて対応。売却検討中とのこと。" /></Field>
                <button style={{ ...btnStyle(), width: "100%" }} onClick={addHistory}>履歴を追加する</button>
              </div>
            </div>
          )}

          {/* ワークフロー昇格ボタン（誰でも実行可） */}
          <div style={{ borderTop: `1px solid #1a2535`, paddingTop: 14, marginTop: 14, marginBottom: 14 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.muted, marginBottom: 8, letterSpacing: "0.05em" }}>🔄 ワークフロー</div>
            {selected.item.type === "jiage" ? (
              <button onClick={() => promoteToOwner(selected.item)} style={{
                width: "100%", padding: "13px", background: C.purple + "22", border: `1px solid ${C.purple}66`,
                color: C.purple, borderRadius: 10, cursor: "pointer", fontSize: 14, fontWeight: 700, fontFamily: "inherit",
              }}>👤 所有者アタックに昇格する</button>
            ) : (
              <button onClick={() => promoteToSekisan(selected.item)} style={{
                width: "100%", padding: "13px", background: C.warn + "22", border: `1px solid ${C.warn}66`,
                color: C.warn, borderRadius: 10, cursor: "pointer", fontSize: 14, fontWeight: 700, fontFamily: "inherit",
              }}>🧮 仕入検討積算表を作成する</button>
            )}
            <div style={{ fontSize: 10, color: C.muted, marginTop: 6, lineHeight: 1.5 }}>
              {selected.item.type === "jiage"
                ? "住所・所有者情報を引き継いで「所有者アタック」に追加します"
                : "住所・担当者を引き継いで「仕入検討積算表」を新規作成します"}
            </div>
          </div>

          {/* 編集・削除（誰でも可） */}
          <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
            <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={() => openEdit(selected.item)}>編集する</button>
            <button style={{ ...btnStyle("danger"), flex: 1 }} onClick={() => handleDelete(selected.item)}>削除する</button>
          </div>
        </BottomSheet>
      )}

      {/* 新規登録フォーム */}
      {showAdd && (
        <BottomSheet title={`${editItem ? "編集" : "新規"} — ${addType === "jiage" ? "📍地上げ物件" : "👤所有者アタック"}`} onClose={() => { setShowAdd(false); setEditItem(null); }}>
          <Field label="物件住所"><input style={inp} value={form.address} onChange={f("address")} placeholder="埼玉県熊谷市〇〇" /></Field>
          <Field label={addType === "jiage" ? "所有者名" : "所有者名"}><input style={inp} value={addType === "jiage" ? form.owner || "" : form.ownerName || ""} onChange={e => setForm(p => ({ ...p, [addType === "jiage" ? "owner" : "ownerName"]: e.target.value }))} /></Field>

// Excelインポートモーダル（エリア選択）
function ImportModal({ onClose, onImport, importing, currentCount }) {
  const [selectedAreas, setSelectedAreas] = useState([...JIAGE_AREAS]);
  const [loaded, setLoaded] = useState(false);
  const [counts, setCounts] = useState({});

  // インポートデータをlocalStorageに保存（初回のみ）
  useEffect(() => {
    const existing = localStorage.getItem("hikari_jiage_import");
    if (existing) {
      const d = JSON.parse(existing);
      const c = {};
      JIAGE_AREAS.forEach(area => { c[area] = (d[area] || []).length; });
      setCounts(c);
      setLoaded(true);
    } else {
      // データをlocalStorageに保存
      const importData = JIAGE_EXCEL_DATA;
      localStorage.setItem("hikari_jiage_import", JSON.stringify(importData));
      const c = {};
      JIAGE_AREAS.forEach(area => { c[area] = (importData[area] || []).length; });
      setCounts(c);
      setLoaded(true);
    }
  }, []);

  const totalSelected = selectedAreas.reduce((a, area) => a + (counts[area] || 0), 0);
  const hasData = Object.values(counts).some(c => c > 0);

  const toggle = area => setSelectedAreas(s => s.includes(area) ? s.filter(a => a !== area) : [...s, area]);

  return (
    <BottomSheet title="📥 Excelデータをインポート" onClose={onClose}>
      <div style={{ background: hasData ? "#0a1a0a" : "#1a1000", border: `1px solid ${hasData ? C.success : C.warn}44`, borderRadius: 12, padding: 14, marginBottom: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: hasData ? C.success : C.warn, marginBottom: 6 }}>
          {hasData ? "取り込みデータについて" : "⚠ インポート用データが未設定です"}
        </div>
        <div style={{ fontSize: 12, color: C.muted, lineHeight: 1.6 }}>
          {hasData ? (
            <>
              地上げExcelファイルから<span style={{ color: C.text }}> {Object.values(counts).reduce((a,b)=>a+b,0)}件</span>のデータを取り込めます。<br />
              エリアを選択してインポートしてください。<br />
              現在の登録数: <span style={{ color: C.accent }}>{currentCount}件</span>
            </>
          ) : (
            <>
              インポート用のExcelデータがコードに登録されていません。<br />
              Excelデータの登録方法を相談したい場合はクロードに聞いてください。<br />
              現在の登録数: <span style={{ color: C.accent }}>{currentCount}件</span>
            </>
          )}
        </div>
      </div>

      <Field label="インポートするエリアを選択">
        <div style={{ display: "grid", gap: 8 }}>
          <button onClick={() => setSelectedAreas(selectedAreas.length === JIAGE_AREAS.length ? [] : [...JIAGE_AREAS])} style={{ ...btnStyle("ghost"), width: "100%", fontSize: 13 }}>
            {selectedAreas.length === JIAGE_AREAS.length ? "全解除" : "全選択"}
          </button>
          {JIAGE_AREAS.map(area => {
            const isSelected = selectedAreas.includes(area);
            const count = counts[area] || 0;
            return (
              <button key={area} onClick={() => toggle(area)} style={{
                display: "flex", justifyContent: "space-between", alignItems: "center",
                background: isSelected ? C.purple + "22" : C.bg,
                border: `2px solid ${isSelected ? C.purple : "#1a2535"}`,
                borderRadius: 10, padding: "12px 16px", cursor: "pointer", fontFamily: "inherit",
              }}>
                <span style={{ color: isSelected ? C.purple : C.text, fontWeight: 700, fontSize: 15 }}>
                  {isSelected ? "✅" : "⬜"} {area}
                </span>
                <span style={{ color: C.muted, fontSize: 13 }}>{count}件</span>
              </button>
            );
          })}
        </div>
      </Field>

      <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 10, padding: "10px 14px", marginBottom: 16, display: "flex", justifyContent: "space-between" }}>
        <span style={{ color: C.muted, fontSize: 13 }}>インポート件数</span>
        <span style={{ color: C.success, fontWeight: 700, fontSize: 16 }}>{totalSelected}件</span>
      </div>

      <div style={{ display: "flex", gap: 10 }}>
        <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={onClose}>キャンセル</button>
        <button
          style={{ ...btnStyle(), flex: 2, background: C.success, borderColor: C.success, opacity: importing || selectedAreas.length === 0 || totalSelected === 0 ? 0.6 : 1 }}
          onClick={() => onImport(selectedAreas)}
          disabled={importing || selectedAreas.length === 0 || totalSelected === 0}
        >
          {importing ? "インポート中..." : `📥 ${totalSelected}件をインポート`}
        </button>
      </div>
    </BottomSheet>
  );
}

// ===================== Web Push 購読セクション =====================
function WebPushSection({ currentUser }) {
  const [pushStatus, setPushStatus] = useState("checking"); // "checking"|"unsubscribed"|"subscribed"|"unsupported"
  const [busy, setBusy] = useState(false);
  const [lastError, setLastError] = useState("");

  // 初期状態チェック
  useEffect(() => {
    (async () => {
      if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
        setPushStatus("unsupported");
        return;
      }
      try {
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.getSubscription();
        setPushStatus(sub ? "subscribed" : "unsubscribed");
      } catch (e) {
        setPushStatus("unsubscribed");
      }
    })();
  }, []);

  const enable = async () => {
    if (!currentUser) {
      alert("先に「現在のユーザー」を設定してください");
      return;
    }
    setBusy(true);
    setLastError("");
    try {
      const sub = await ensurePushSubscription();
      await savePushSubscriptionToSupabase(currentUser, sub);
      setPushStatus("subscribed");
      alert(`✅ Web Push 有効化完了！\n${currentUser}さん宛の予定が、アプリ閉じてても通知されます。`);
    } catch (e) {
      console.error(e);
      setLastError(e.message);
      alert(`エラー: ${e.message}`);
    }
    setBusy(false);
  };

  const disable = async () => {
    if (!window.confirm("Web Push を解除しますか？以降、アプリ閉じてる時の通知が届かなくなります。")) return;
    setBusy(true);
    try {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (sub) await sub.unsubscribe();
      // Supabase からも削除
      if (currentUser) {
        await fetch(`${SUPABASE_URL}/rest/v1/push_subscriptions?member=eq.${encodeURIComponent(currentUser)}`, {
          method: "DELETE",
          headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
        });
      }
      setPushStatus("unsubscribed");
      alert("Web Push を解除しました");
    } catch (e) { alert(`エラー: ${e.message}`); }
    setBusy(false);
  };

  const test = async () => {
    if (!currentUser) { alert("現在のユーザーを設定してください"); return; }
    setBusy(true);
    try {
      const ok = await sendPushNotification([currentUser], "🎉 Web Push テスト", `${currentUser}さんに届いてればOK！\nアプリ閉じてても通知される設定です。`, { tag: "test-push" });
      if (ok) {
        alert("✅ テスト送信完了！\nアプリを閉じてしばらく待ってみてください。\n通知が届いたらOK。");
      } else {
        alert("❌ 送信失敗。Supabase Edge Function の設定を確認してください。\n（その他タブの手順書参照）");
      }
    } catch (e) { alert(`エラー: ${e.message}`); }
    setBusy(false);
  };

  if (pushStatus === "unsupported") {
    return (
      <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
        <div style={{ color: C.danger, fontSize: 13, fontWeight: 700 }}>❌ このブラウザはWeb Pushに非対応</div>
        <div style={{ fontSize: 11, color: C.muted, marginTop: 8 }}>Chrome / Safari (iOS 16.4+, macOS) / Firefox / Edge をご利用ください。</div>
      </div>
    );
  }

  return (
    <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 12, lineHeight: 1.6 }}>
        {pushStatus === "subscribed"
          ? <>✅ <span style={{ color: C.success, fontWeight: 700 }}>{currentUser}</span> として購読中。<br />予定が追加されると、アプリ閉じてても即通知が届きます。</>
          : pushStatus === "checking"
            ? "⌛ 確認中..."
            : "⚠️ Web Push 未設定。下のボタンで有効化してください。"}
      </div>

      {pushStatus === "unsubscribed" && (
        <button onClick={enable} disabled={busy || !currentUser} style={{
          ...btnStyle(), width: "100%", padding: "14px", fontSize: 14,
          background: "linear-gradient(135deg, #0ea5e9, #06b6d4)",
          borderColor: "#0ea5e9", opacity: (busy || !currentUser) ? 0.6 : 1,
        }}>{busy ? "⌛ 設定中..." : "🚀 Web Push を有効化する"}</button>
      )}

      {pushStatus === "subscribed" && (
        <>
          <button onClick={test} disabled={busy} style={{
            ...btnStyle(), width: "100%", padding: "12px", fontSize: 13,
            background: C.success, borderColor: C.success, marginBottom: 8,
          }}>{busy ? "送信中..." : "🧪 自分宛に Web Push テスト送信"}</button>
          <button onClick={disable} disabled={busy} style={{
            ...btnStyle("ghost"), width: "100%", padding: "10px", fontSize: 12,
            color: C.danger, borderColor: C.danger + "55",
          }}>🛑 Web Push を解除</button>
        </>
      )}

      {!currentUser && (
        <div style={{ marginTop: 10, padding: 10, background: C.warn + "22", border: `1px solid ${C.warn}55`, borderRadius: 8, fontSize: 11, color: C.warn }}>
          ⚠️ 先に「現在のユーザー」を設定してください
        </div>
      )}

      <div style={{ marginTop: 14, padding: 12, background: C.bg, border: `1px solid #1a2535`, borderRadius: 8, fontSize: 10, color: C.muted, lineHeight: 1.7 }}>
        <div style={{ color: C.accent, fontWeight: 700, marginBottom: 6 }}>💡 仕組み</div>
        ① 自分の端末で購読 → Supabaseに登録<br />
        ② 別の人が予定を作って自分を担当者に指定<br />
        ③ Supabase Edge Function が自分の端末にプッシュ送信<br />
        ④ アプリ閉じてても通知が届く<br /><br />
        <span style={{ color: C.warn }}>※ 初回セットアップで Supabase 側の設定が必要です（手順は別途）</span>
      </div>
    </div>
  );
}

// ===================== MORE PAGE (役所・積算) =====================
function MorePage({ data, setData, onLock, onSwitchUser }) {
  const [subPage, setSubPage] = useState(null);
  const [currentUser, setCurrentUserState] = useState(getCurrentUser());
  const [showActivityAll, setShowActivityAll] = useState(false);

  // パスワード認証ダイアログの状態
  const [pwdAuth, setPwdAuth] = useState(null); // { member, action: "switch"|"setOwn"|"setOther", onSuccess: fn }
  const [pwdInput, setPwdInput] = useState("");
  const [pwdInput2, setPwdInput2] = useState("");
  const [pwdOldInput, setPwdOldInput] = useState("");
  const [pwdError, setPwdError] = useState("");

  if (subPage === "yakusho") return <YakushoPage data={data} setData={setData} onBack={() => setSubPage(null)} />;
  if (subPage === "sekisan") return <SekisanPage data={data} setData={setData} onBack={() => setSubPage(null)} />;
  if (subPage === "investors") return <InvestorListPage data={data} setData={setData} onBack={() => setSubPage(null)} />;
  const hasPin = !!getPin();
  const activityLog = data.activityLog || [];
  const notifPermission = typeof Notification !== "undefined" ? Notification.permission : "unsupported";
  const isStandalone = typeof window !== "undefined" && (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true);

  // 管理者判定
  const adminMember = data.adminMember || "下田";
  const isAdmin = currentUser === adminMember;
  const memberPasswords = data.memberPasswords || {};

  // ユーザー切替試行（パスワード必要なら認証ダイアログを開く）
  const tryChangeUser = (newUser) => {
    if (!newUser) {
      if (window.confirm("「現在のユーザー」を未設定に戻しますか？")) {
        setCurrentUserState("");
        setCurrentUser("");
      }
      return;
    }
    if (newUser === currentUser) return;

    const targetPwd = memberPasswords[newUser];
    // 管理者で切替先がパスワード未設定 → そのまま切替
    // 一般ユーザーで切替先がパスワード未設定 → そのまま切替
    if (!targetPwd) {
      setCurrentUserState(newUser);
      setCurrentUser(newUser);
      return;
    }
    // 管理者が自分以外に切替 → 切替先のパスワードを入力
    // 一般ユーザーが切替 → 切替先のパスワードを入力
    setPwdInput(""); setPwdError("");
    setPwdAuth({ member: newUser, action: "switch" });
  };

  // 切替認証
  const confirmSwitch = () => {
    const target = pwdAuth.member;
    if (pwdInput === memberPasswords[target]) {
      setCurrentUserState(target);
      setCurrentUser(target);
      setPwdAuth(null);
      setPwdInput("");
      setPwdError("");
    } else {
      setPwdError("パスワードが違います");
      setPwdInput("");
    }
  };

  // パスワード設定試行
  const tryOpenPwdSetting = (member) => {
    // 管理者は誰でも設定可能（旧パスワード不要）
    if (isAdmin) {
      setPwdInput(""); setPwdInput2(""); setPwdOldInput(""); setPwdError("");
      setPwdAuth({ member, action: "setOther" });
      return;
    }
    // 一般ユーザーは自分のだけ設定可能
    if (member !== currentUser) {
      alert("⚠️ 他のメンバーのパスワードは管理者だけが変更できます");
      return;
    }
    setPwdInput(""); setPwdInput2(""); setPwdOldInput(""); setPwdError("");
    setPwdAuth({ member, action: "setOwn" });
  };

  // パスワード保存（新規 or 変更）
  const savePwd = () => {
    const member = pwdAuth.member;
    const existingPwd = memberPasswords[member];

    // 一般ユーザーが自分のパスワードを変更：旧パスワード確認必要（既に設定済みの場合）
    if (pwdAuth.action === "setOwn" && existingPwd && pwdOldInput !== existingPwd) {
      setPwdError("旧パスワードが違います");
      setPwdOldInput("");
      return;
    }
    // 新パスワード4桁チェック
    if (pwdInput.length !== 4) {
      setPwdError("4桁の数字で入力してください");
      return;
    }
    // 確認入力との一致チェック
    if (pwdInput !== pwdInput2) {
      setPwdError("確認用パスワードが一致しません");
      setPwdInput2("");
      return;
    }
    setData(d => ({
      ...d,
      memberPasswords: { ...(d.memberPasswords || {}), [member]: pwdInput }
    }));
    alert(`✅ ${member} のパスワードを設定しました`);
    setPwdAuth(null);
    setPwdInput(""); setPwdInput2(""); setPwdOldInput(""); setPwdError("");
  };

  // パスワード削除
  const deletePwd = (member) => {
    if (!window.confirm(`${member} のパスワードを削除しますか？\n削除後はパスワードなしで切替可能になります。`)) return;
    setData(d => {
      const updated = { ...(d.memberPasswords || {}) };
      delete updated[member];
      return { ...d, memberPasswords: updated };
    });
    alert(`${member} のパスワードを削除しました`);
  };

  return (
    <div>
      <div style={{ fontSize: 20, fontWeight: 800, color: C.text, marginBottom: 20 }}>その他の機能</div>
      {[
        { key: "yakusho", icon: "🏛", title: "役所調査シート", desc: "用途地域・建ぺい率・ライフライン・ハザードを記録", count: data.yakusho.length },
        { key: "sekisan", icon: "🧮", title: "仕入検討積算表", desc: "仕入コスト・利益・利回りを自動計算", count: data.sekisan.length },
        { key: "investors", icon: "💎", title: "投資家リスト", desc: "反響で「投資家」を選択した顧客を自動集約", count: (data.stocks || []).reduce((a, s) => a + (s.viewings || []).filter(v => v.purpose === "投資家").length, 0) },
      ].map(item => (
        <button key={item.key} onClick={() => setSubPage(item.key)} style={{ width: "100%", background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 20, marginBottom: 12, textAlign: "left", cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 16, touchAction: "manipulation" }}>
          <span style={{ fontSize: 32 }}>{item.icon}</span>
          <div style={{ flex: 1 }}>
            <div style={{ color: C.text, fontWeight: 700, fontSize: 16, marginBottom: 4 }}>{item.title}</div>
            <div style={{ color: C.muted, fontSize: 13 }}>{item.desc}</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ color: C.accent, fontWeight: 700, fontSize: 18 }}>{item.count}</div>
            <div style={{ color: C.muted, fontSize: 11 }}>件</div>
          </div>
        </button>
      ))}

      {/* 👤 現在のユーザー（起動時認証済み） */}
      <div style={{ marginTop: 24, marginBottom: 12, fontSize: 14, fontWeight: 700, color: C.muted, letterSpacing: "0.05em" }}>👤 現在のユーザー</div>
      <div style={{ background: "#0d1422", border: `2px solid ${currentUser ? (MEMBER_COLORS[currentUser] || C.accent) + "55" : C.warn + "55"}`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 4 }}>
              {currentUser ? "✅ 認証済み" : "⚠️ 未認証"}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <span style={{ fontSize: 22, fontWeight: 800, color: MEMBER_COLORS[currentUser] || C.text }}>{currentUser || "未設定"}</span>
              {isAdmin && <Tag label="👑 管理者" color="#FCD34D" />}
              {memberPasswords[currentUser] && <Tag label="🔒 認証済み" color={C.success} />}
            </div>
          </div>
          <button onClick={() => {
            if (window.confirm("一旦ログアウトして別のメンバーとして再ログインしますか？\n（再認証画面に戻ります）")) {
              onSwitchUser && onSwitchUser();
            }
          }} style={{
            background: C.accent + "22", border: `1.5px solid ${C.accent}`, color: C.accent,
            borderRadius: 10, padding: "10px 14px", cursor: "pointer", fontSize: 12,
            fontFamily: "inherit", fontWeight: 700, flexShrink: 0,
          }}>🔄 ユーザー切替</button>
        </div>
        <div style={{ marginTop: 10, fontSize: 10, color: C.muted, lineHeight: 1.5 }}>
          ※ 起動時に認証されたユーザーで全ての操作が記録されます。<br />
          別のメンバーとして作業する場合は「ユーザー切替」ボタンから再ログインしてください。
        </div>
      </div>

      {/* 🔐 メンバーパスワード管理 */}
      <div style={{ marginTop: 24, marginBottom: 12, fontSize: 14, fontWeight: 700, color: C.muted, letterSpacing: "0.05em" }}>🔐 メンバーパスワード管理</div>
      <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
        <div style={{ fontSize: 12, color: C.muted, marginBottom: 14, lineHeight: 1.6 }}>
          {isAdmin
            ? <>👑 <span style={{ color: "#FCD34D", fontWeight: 700 }}>管理者モード</span>：全員のパスワードを設定・変更できます</>
            : <>👤 一般モード：自分（<span style={{ color: C.text, fontWeight: 700 }}>{currentUser || "未設定"}</span>）のパスワードのみ変更できます</>
          }
        </div>
        {MEMBERS.map(m => {
          const hasPwd = !!memberPasswords[m];
          const canEdit = isAdmin || m === currentUser;
          const isMe = m === currentUser;
          const isAdminRow = m === adminMember;
          return (
            <div key={m} style={{
              display: "flex", alignItems: "center", gap: 10,
              padding: "10px 12px", marginBottom: 6,
              background: isMe ? C.accent + "11" : C.bg,
              border: `1px solid ${isMe ? C.accent + "44" : "#1a2535"}`,
              borderRadius: 10,
            }}>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <MemberTag name={m} />
                  {isAdminRow && <Tag label="👑 管理者" color="#FCD34D" />}
                  {isMe && <Tag label="自分" color={C.accent} />}
                </div>
                <div style={{ fontSize: 11, color: hasPwd ? C.success : C.muted, marginTop: 4 }}>
                  {hasPwd ? "🔒 パスワード設定済み" : "🔓 未設定（誰でも切替可能）"}
                </div>
              </div>
              {canEdit ? (
                <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                  <button onClick={() => tryOpenPwdSetting(m)} style={{
                    background: C.accent + "22", border: `1.5px solid ${C.accent}`, color: C.accent,
                    borderRadius: 8, padding: "8px 12px", cursor: "pointer", fontSize: 12,
                    fontFamily: "inherit", fontWeight: 700,
                  }}>{hasPwd ? "変更" : "設定"}</button>
                  {hasPwd && isAdmin && (
                    <button onClick={() => deletePwd(m)} style={{
                      background: C.danger + "22", border: `1.5px solid ${C.danger}`, color: C.danger,
                      borderRadius: 8, padding: "8px 10px", cursor: "pointer", fontSize: 12,
                      fontFamily: "inherit", fontWeight: 700,
                    }}>削除</button>
                  )}
                </div>
              ) : (
                <span style={{ color: C.muted, fontSize: 11, flexShrink: 0 }}>🚫 編集不可</span>
              )}
            </div>
          );
        })}
        {/* 管理者変更（管理者だけ可能） */}
        {isAdmin && (
          <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid #1a2535` }}>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>👑 管理者を変更（管理者操作）</div>
            <select style={inp} value={adminMember} onChange={e => {
              if (!window.confirm(`管理者を「${e.target.value}」に変更します。\n以降、あなたは一般メンバーになります。よろしいですか？`)) return;
              setData(d => ({ ...d, adminMember: e.target.value }));
            }}>
              {MEMBERS.map(m => <option key={m} value={m}>{m}</option>)}
            </select>
            <div style={{ fontSize: 10, color: C.warn, marginTop: 4, lineHeight: 1.5 }}>
              ⚠️ 管理者を変更すると、自分は一般メンバーになります
            </div>
          </div>
        )}
      </div>

      {/* パスワード認証 BottomSheet */}
      {pwdAuth && pwdAuth.action === "switch" && (
        <BottomSheet title={`🔒 ${pwdAuth.member} のパスワード認証`} onClose={() => { setPwdAuth(null); setPwdInput(""); setPwdError(""); }}>
          <div style={{ color: C.muted, fontSize: 13, marginBottom: 14, lineHeight: 1.6 }}>
            <span style={{ color: C.text, fontWeight: 700 }}>{pwdAuth.member}</span> として作業するには、パスワードの入力が必要です。
          </div>
          <Field label="🔑 パスワード（4桁）">
            <input type="password" inputMode="numeric" maxLength={4}
              value={pwdInput} onChange={e => { setPwdInput(e.target.value.replace(/[^0-9]/g, "")); setPwdError(""); }}
              onKeyDown={e => { if (e.key === "Enter") confirmSwitch(); }}
              autoFocus placeholder="••••"
              style={{ ...inp, fontSize: 28, textAlign: "center", letterSpacing: "0.5em", padding: "14px" }}
            />
          </Field>
          {pwdError && <div style={{ color: C.danger, fontSize: 13, textAlign: "center", marginBottom: 10 }}>{pwdError}</div>}
          <div style={{ display: "flex", gap: 10 }}>
            <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={() => { setPwdAuth(null); setPwdInput(""); setPwdError(""); }}>キャンセル</button>
            <button style={{ ...btnStyle(), flex: 2 }} onClick={confirmSwitch}>🔓 認証して切替</button>
          </div>
        </BottomSheet>
      )}

      {pwdAuth && (pwdAuth.action === "setOwn" || pwdAuth.action === "setOther") && (
        <BottomSheet title={`🔐 ${pwdAuth.member} のパスワード${memberPasswords[pwdAuth.member] ? "変更" : "設定"}`} onClose={() => { setPwdAuth(null); setPwdInput(""); setPwdInput2(""); setPwdOldInput(""); setPwdError(""); }}>
          <div style={{ color: C.muted, fontSize: 13, marginBottom: 14, lineHeight: 1.6 }}>
            {pwdAuth.action === "setOther" ? (
              <>👑 管理者として、<span style={{ color: C.text, fontWeight: 700 }}>{pwdAuth.member}</span> のパスワードを設定します。</>
            ) : memberPasswords[pwdAuth.member] ? (
              <>自分のパスワードを変更します。旧パスワードの入力が必要です。</>
            ) : (
              <>自分のパスワードを初めて設定します。</>
            )}
          </div>
          {pwdAuth.action === "setOwn" && memberPasswords[pwdAuth.member] && (
            <Field label="🔑 現在のパスワード（4桁）">
              <input type="password" inputMode="numeric" maxLength={4}
                value={pwdOldInput} onChange={e => { setPwdOldInput(e.target.value.replace(/[^0-9]/g, "")); setPwdError(""); }}
                placeholder="••••"
                style={{ ...inp, fontSize: 22, textAlign: "center", letterSpacing: "0.5em", padding: "12px" }}
              />
            </Field>
          )}
          <Field label="🆕 新しいパスワード（4桁）">
            <input type="password" inputMode="numeric" maxLength={4}
              value={pwdInput} onChange={e => { setPwdInput(e.target.value.replace(/[^0-9]/g, "")); setPwdError(""); }}
              autoFocus={pwdAuth.action === "setOther" || !memberPasswords[pwdAuth.member]}
              placeholder="••••"
              style={{ ...inp, fontSize: 22, textAlign: "center", letterSpacing: "0.5em", padding: "12px" }}
            />
          </Field>
          <Field label="🔁 確認のため再入力">
            <input type="password" inputMode="numeric" maxLength={4}
              value={pwdInput2} onChange={e => { setPwdInput2(e.target.value.replace(/[^0-9]/g, "")); setPwdError(""); }}
              onKeyDown={e => { if (e.key === "Enter") savePwd(); }}
              placeholder="••••"
              style={{ ...inp, fontSize: 22, textAlign: "center", letterSpacing: "0.5em", padding: "12px" }}
            />
          </Field>
          {pwdError && <div style={{ color: C.danger, fontSize: 13, textAlign: "center", marginBottom: 10 }}>{pwdError}</div>}
          <div style={{ display: "flex", gap: 10 }}>
            <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={() => { setPwdAuth(null); setPwdInput(""); setPwdInput2(""); setPwdOldInput(""); setPwdError(""); }}>キャンセル</button>
            <button style={{ ...btnStyle(), flex: 2 }} onClick={savePwd}>💾 保存</button>
          </div>
        </BottomSheet>
      )}

      {/* セキュリティ設定 */}
      <div style={{ marginTop: 24, marginBottom: 12, fontSize: 14, fontWeight: 700, color: C.muted, letterSpacing: "0.05em" }}>🔐 セキュリティ</div>
      <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div>
            <div style={{ color: C.text, fontWeight: 700, fontSize: 15 }}>PINロック</div>
            <div style={{ color: C.muted, fontSize: 12, marginTop: 4 }}>
              {hasPin ? "✅ 設定済み（24時間ごとに再認証）" : "⚠️ 未設定（誰でもアクセス可能）"}
            </div>
          </div>
          <Tag label={hasPin ? "ON" : "OFF"} color={hasPin ? C.success : C.muted} />
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {hasPin ? (
            <>
              <button onClick={() => {
                if (window.confirm("PINロックを解除しますか？")) {
                  clearPin();
                  alert("PINロックを解除しました");
                }
              }} style={{ ...btnStyle("ghost"), flex: 1, padding: "10px", fontSize: 13 }}>PINを解除</button>
              <button onClick={() => {
                if (window.confirm("ロック画面に戻ります。再認証が必要になりますがよろしいですか？")) {
                  onLock();
                }
              }} style={{ ...btnStyle(), flex: 1, padding: "10px", fontSize: 13 }}>今すぐロック</button>
            </>
          ) : (
            <button onClick={() => {
              if (window.confirm("PINロックを有効にしますか？\n一度ロック画面に戻り、新しい4桁PINを設定します。")) {
                onLock();
              }
            }} style={{ ...btnStyle(), width: "100%", padding: "12px", fontSize: 14 }}>PINロックを設定</button>
          )}
        </div>
      </div>

      {/* 🔄 強制更新（キャッシュクリア） */}
      <div style={{ marginTop: 24, marginBottom: 12, fontSize: 14, fontWeight: 700, color: C.muted, letterSpacing: "0.05em" }}>🔄 アプリ更新</div>
      <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
        <div style={{ fontSize: 12, color: C.muted, marginBottom: 12, lineHeight: 1.6 }}>
          アプリが古いままで表示される場合や、共有メンバーが「読込中」で進まない場合は、強制更新を実行してください。<br />
          <span style={{ fontSize: 11 }}>※ データはSupabaseに保存されているため失われません</span>
        </div>
        <button onClick={async () => {
          if (!window.confirm("キャッシュをクリアして最新版を再読み込みします。\n（未保存の変更があれば失われます）\n\n実行しますか？")) return;
          try {
            // 1. localStorage のキャッシュをクリア
            try {
              localStorage.removeItem("hikari_v4_cache");
              localStorage.removeItem("hikari_v3_cache");
              localStorage.removeItem("hikari_v2_cache");
            } catch (e) {}

            // 2. Service Worker のキャッシュ削除
            if ("caches" in window) {
              const names = await caches.keys();
              await Promise.all(names.map(n => caches.delete(n)));
            }

            // 3. Service Worker をアンレジスター（次回の登録で更新される）
            if ("serviceWorker" in navigator) {
              const regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(r => r.unregister()));
            }

            // 4. ハードリロード
            window.location.reload(true);
          } catch (err) {
            alert("更新エラー: " + err.message + "\n手動でブラウザを再読み込みしてください。");
          }
        }} style={{
          width: "100%", background: C.warn + "22", border: `2px solid ${C.warn}`,
          color: C.warn, borderRadius: 10, padding: "14px", cursor: "pointer",
          fontSize: 15, fontFamily: "inherit", fontWeight: 800,
        }}>🔄 強制更新（キャッシュクリア＆最新版取得）</button>
      </div>

      {/* 🔔 プッシュ通知設定（PWA） */}
      <div style={{ marginTop: 24, marginBottom: 12, fontSize: 14, fontWeight: 700, color: C.muted, letterSpacing: "0.05em" }}>🔔 プッシュ通知</div>
      <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
        <div style={{ fontSize: 12, color: C.muted, marginBottom: 12, lineHeight: 1.6 }}>
          {notifPermission === "granted" ? "✅ 通知許可済み。リマインダー時刻に通知が届きます。" : notifPermission === "denied" ? "❌ 通知ブロック中。ブラウザ設定から許可してください。" : "⚠️ 通知が未許可です。下のボタンで許可を取ってください。"}
          <br />
          <span style={{ fontSize: 11 }}>
            {isStandalone ? "📱 PWAモード起動中（ホーム画面から起動）" : "🌐 ブラウザモード起動中"}
          </span>
        </div>
        {notifPermission !== "granted" && notifPermission !== "denied" && notifPermission !== "unsupported" && (
          <button onClick={async () => {
            try {
              const result = await Notification.requestPermission();
              if (result === "granted") {
                alert("✅ 通知を許可しました！\nリマインダー付き予定の時刻にお知らせします。");
                // テスト通知
                if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                  navigator.serviceWorker.controller.postMessage({
                    type: 'SHOW_NOTIFICATION',
                    title: '🎉 通知テスト',
                    body: '通知の動作確認です。ひかり不動産から届きました！',
                    tag: 'test',
                  });
                } else {
                  try { new Notification("🎉 通知テスト", { body: "通知が動作しています" }); } catch (e) {}
                }
              } else {
                alert("通知が許可されませんでした。ブラウザの設定から後でも変更できます。");
              }
            } catch (err) { alert("通知許可エラー: " + err.message); }
          }} style={{ ...btnStyle(), width: "100%", padding: "12px", fontSize: 14 }}>🔔 通知を許可する</button>
        )}
        {notifPermission === "granted" && (
          <button onClick={() => {
            if (navigator.serviceWorker && navigator.serviceWorker.controller) {
              navigator.serviceWorker.controller.postMessage({
                type: 'SHOW_NOTIFICATION',
                title: '🎉 通知テスト',
                body: '通知の動作確認です。ひかり不動産から届きました！',
                tag: 'test',
              });
            } else {
              try { new Notification("🎉 通知テスト", { body: "通知が動作しています" }); } catch (e) { alert("通知エラー: " + e.message); }
            }
          }} style={{ ...btnStyle("ghost"), width: "100%", padding: "10px", fontSize: 13 }}>🧪 テスト通知を出す</button>
        )}
        {!isStandalone && (
          <div style={{ marginTop: 12, padding: 12, background: C.accent + "11", border: `1px solid ${C.accent}33`, borderRadius: 8, fontSize: 11, color: C.muted, lineHeight: 1.7 }}>
            <div style={{ color: C.accent, fontWeight: 700, marginBottom: 4 }}>💡 ホーム画面に追加しよう</div>
            <strong style={{ color: C.text }}>iPhone（Safari）：</strong><br />
            ① 共有ボタン（□↑）→ ② 「ホーム画面に追加」→ ③ 「追加」<br />
            <strong style={{ color: C.text }}>Android（Chrome）：</strong><br />
            ① メニュー（⋮）→ ② 「ホーム画面に追加」→ ③ 「インストール」<br /><br />
            ホーム画面のアイコンから起動すれば、ブラウザ閉じてても通知が届きやすくなります。
          </div>
        )}
      </div>

      {/* 🚀 Web Push（アプリ閉じてても届くリアルタイム通知） */}
      <div style={{ marginTop: 24, marginBottom: 12, fontSize: 14, fontWeight: 700, color: C.muted, letterSpacing: "0.05em" }}>🚀 Web Push（アプリ閉じててもOK）</div>
      <WebPushSection currentUser={currentUser} />

      {/* 📋 操作履歴 */}
      <div style={{ marginTop: 24, marginBottom: 12, fontSize: 14, fontWeight: 700, color: C.muted, letterSpacing: "0.05em" }}>📋 操作履歴</div>
      <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
        <div style={{ fontSize: 12, color: C.muted, marginBottom: 12 }}>
          全 {activityLog.length} 件 / 最新200件を保持
        </div>
        {activityLog.length === 0 ? (
          <div style={{ color: C.muted, fontSize: 13, textAlign: "center", padding: 20 }}>まだ履歴がありません</div>
        ) : (
          <>
            <div style={{ maxHeight: showActivityAll ? "none" : 400, overflowY: "auto" }}>
              {(showActivityAll ? activityLog : activityLog.slice(0, 30)).map(log => {
                const ACTION_COLOR = { add: C.success, update: C.accent, delete: C.danger, promote: C.purple };
                const ACTION_LABEL = { add: "追加", update: "編集", delete: "削除", promote: "昇格" };
                const TARGET_LABEL = { stock: "在庫", jiage: "地上げ", owner: "所有者", sekisan: "積算", yakusho: "役所", goal: "目標" };
                const d = new Date(log.timestamp);
                const dateStr = `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
                return (
                  <div key={log.id} style={{ display: "flex", gap: 10, alignItems: "center", padding: "8px 0", borderBottom: `1px solid #1a2535`, fontSize: 12 }}>
                    <span style={{ color: C.muted, fontSize: 11, width: 70, flexShrink: 0 }}>{dateStr}</span>
                    <Tag label={log.user} color={MEMBER_COLORS[log.user] || C.muted} />
                    <Tag label={`${TARGET_LABEL[log.target] || log.target}・${ACTION_LABEL[log.action] || log.action}`} color={ACTION_COLOR[log.action] || C.muted} />
                    <span style={{ color: C.text, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{log.description}</span>
                  </div>
                );
              })}
            </div>
            {activityLog.length > 30 && (
              <button onClick={() => setShowActivityAll(v => !v)} style={{ ...btnStyle("ghost"), width: "100%", marginTop: 10, padding: "8px", fontSize: 12 }}>
                {showActivityAll ? "▲ 最新30件のみ表示" : `▼ 全${activityLog.length}件を表示`}
              </button>
            )}
          </>
        )}
        {activityLog.length > 0 && (
          <button onClick={() => {
            if (window.confirm(`操作履歴（${activityLog.length}件）を全て削除しますか？\nこの操作は取り消せません。`)) {
              setData(d => ({ ...d, activityLog: [] }));
            }
          }} style={{ ...btnStyle("danger"), width: "100%", marginTop: 10, padding: "8px", fontSize: 12 }}>履歴を全削除</button>
        )}
      </div>
    </div>
  );
}

function InvestorListPage({ data, setData, onBack, onJumpToStock }) {
  const [search, setSearch] = useState("");
  const [filterProspect, setFilterProspect] = useState([]);
  const [filterResult, setFilterResult] = useState([]);
  const [expandedRows, setExpandedRows] = useState({}); // {key: bool}

  // 全在庫の反響から「投資家」のみ抽出
  const investors = useMemo(() => {
    const list = [];
    (data.stocks || []).forEach(s => {
      (s.viewings || []).forEach((v, vi) => {
        if (v.purpose !== "投資家") return;
        list.push({
          key: `${s.id}_${vi}`,
          stockId: s.id,
          stockName: s.name || "(無題)",
          stockAssignee: s.assignee,
          ...v,
        });
      });
    });
    // 新しい案内が上
    list.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
    return list;
  }, [data.stocks]);

  // フィルター適用
  const filtered = useMemo(() => investors.filter(v => {
    if (search) {
      const q = search.toLowerCase();
      const text = [v.customer, v.investArea, v.investBudget, v.investType, v.stockName, v.note, v.contact, v.email].join(" ").toLowerCase();
      if (!text.includes(q)) return false;
    }
    if (filterProspect.length && !filterProspect.includes(v.prospect || "")) return false;
    if (filterResult.length && !filterResult.includes(v.result || "")) return false;
    return true;
  }), [investors, search, filterProspect, filterResult]);

  // KPI
  const kpi = useMemo(() => {
    const total = investors.length;
    const hot = investors.filter(v => v.prospect === "熱い").length;
    const active = investors.filter(v => !["NG", "ご縁なし"].includes(v.nextAction)).length;
    const closed = investors.filter(v => v.nextAction === "成約").length;
    return { total, hot, active, closed };
  }, [investors]);

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
        <button onClick={onBack} style={{ background: "none", border: "none", color: C.accent, fontSize: 24, cursor: "pointer", padding: 0 }}>←</button>
        <div style={{ fontSize: 20, fontWeight: 800, color: C.text }}>💎 投資家リスト</div>
      </div>

      {/* KPI */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
        {[
          { label: "総投資家数", count: kpi.total, color: "#a855f7", icon: "💎" },
          { label: "🔥熱い", count: kpi.hot, color: C.danger, icon: "🔥" },
          { label: "アクティブ", count: kpi.active, color: C.success, icon: "✅" },
          { label: "成約済", count: kpi.closed, color: C.accent, icon: "🎉" },
        ].map(k => (
          <div key={k.label} style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 10, padding: "10px 6px", textAlign: "center" }}>
            <div style={{ fontSize: 16 }}>{k.icon}</div>
            <div style={{ color: k.color, fontWeight: 800, fontSize: 18, lineHeight: 1 }}>{k.count}</div>
            <div style={{ color: C.muted, fontSize: 9, marginTop: 4 }}>{k.label}</div>
          </div>
        ))}
      </div>

      <SearchBar value={search} onChange={setSearch} placeholder="名前・エリア・予算・物件で検索..." />

// ===================== SEKISAN PAGE (v2 - 利回り計算・根拠・判断タブ付き) =====================
const SEKISAN_EMPTY = {
  address: "", assignee: MEMBERS[0], createdAt: new Date().toISOString().split("T")[0],
  age: "", structure: "", layout: "", landArea: "", buildingArea: "", stationDist: "",
  buyPrice: "", brokerFeeIn: "", registration: "", acquisitionTax: "", stamp: "",
  leftover: "", reform: "", demolition: "", brokerFeeOut: "", other: "",
  sellPrice: "",
  similarRent: "", similarArea: "", targetBuildingArea: "",
  yieldRate: "15", investorRegistration: "50", investorReform: "150",
  targetProfitMin: "100", targetProfitMax: "200",
  rainzPriceMin: "", rainzPriceMax: "", rainzMemo: "",
  atHomeMemo: "", competitorCount: "",
  rentMin: "", rentMax: "", rentMemo: "",
  yieldBase: "", yieldMemo: "",
  judgment: "検討中", judgmentMemo: "",
};

function SekisanForm({ initial, onSave, onClose, onTransfer, canEditThis = true }) {
  const _currentUser = getCurrentUser();
  const [form, setForm] = useState(initial || { ...SEKISAN_EMPTY, assignee: _currentUser || MEMBERS[0] });
  const [tab, setTab] = useState("cost");
  const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));
  const nv = v => parseFloat(v) || 0;

  const expenses = nv(form.brokerFeeIn) + nv(form.registration) + nv(form.acquisitionTax) +
    nv(form.stamp) + nv(form.leftover) + nv(form.reform) + nv(form.demolition) +
    nv(form.brokerFeeOut) + nv(form.other);
  const totalCost = nv(form.buyPrice) + expenses;
  const profit = nv(form.sellPrice) - totalCost;
  const profitRate = nv(form.sellPrice) > 0 ? profit / nv(form.sellPrice) * 100 : 0;

  const yieldCalc = useMemo(() => {
    const simRent = nv(form.similarRent) * 10000;
    const simArea = nv(form.similarArea);
    const tgtArea = nv(form.targetBuildingArea) || nv(form.buildingArea);
    const yr = nv(form.yieldRate) / 100;
    const invCost = (nv(form.investorRegistration) + nv(form.investorReform)) * 10000;
    if (!simRent || !simArea || !tgtArea || !yr) return null;
    const sqmRent = simRent / simArea;
    const estRent = sqmRent * tgtArea;
    const annual = estRent * 12;
    const invBuy = annual / yr;
    const ourSell = invBuy - invCost;
    return {
      sqmRent: Math.round(sqmRent),
      estRent: Math.round(estRent / 10000 * 10) / 10,
      annual: Math.round(annual / 10000),
      invBuy: Math.round(invBuy / 10000),
      ourSell: Math.round(ourSell / 10000),
      buyMax: Math.round(ourSell / 10000 - nv(form.targetProfitMin)),
      buyMin: Math.round(ourSell / 10000 - nv(form.targetProfitMax)),
    };
  }, [form]);

  const rainzMid = (nv(form.rainzPriceMin) + nv(form.rainzPriceMax)) / 2;

  const TABS = [
    { key: "cost", label: "💴 費用" },
    { key: "yield", label: "📐 利回り" },
    { key: "evidence", label: "📋 根拠" },
    { key: "summary", label: "🔥 判断" },
  ];

  return (
    <div style={{ position: "fixed", inset: 0, background: C.bg, zIndex: 500, overflowY: "auto", fontFamily: "inherit" }}>
      {/* ヘッダー */}
      <div style={{ background: "#0d1422", borderBottom: `1px solid #1a2535`, padding: "13px 16px", position: "sticky", top: 0, zIndex: 10, display: "flex", alignItems: "center", gap: 12 }}>
        <button onClick={onClose} style={{ background: "none", border: "none", color: C.accent, fontSize: 24, cursor: "pointer", padding: 0 }}>←</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 15, fontWeight: 800, color: C.text }}>仕入検討積算表</div>
          <div style={{ fontSize: 11, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{form.address || "物件住所を入力"}</div>
        </div>
        {canEditThis ? (
          <button onClick={() => onSave(form)} style={{ ...btnStyle(), padding: "10px 16px", fontSize: 14 }}>保存</button>
        ) : (
          <span style={{ background: C.warn + "22", color: C.warn, padding: "8px 12px", borderRadius: 8, fontSize: 11, fontWeight: 700, border: `1px solid ${C.warn}55` }}>👁 閲覧</span>
        )}
      </div>

      <div style={{ padding: "14px 16px 40px" }}>
        {/* 基本情報 */}
        <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 16, marginBottom: 14 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.accent, marginBottom: 12 }}>📍 基本情報</div>
          <Field label="担当者"><select style={inp} value={form.assignee} onChange={f("assignee")}>{MEMBERS.map(m => <option key={m}>{m}</option>)}</select></Field>
          <Field label="物件住所"><input style={inp} value={form.address} onChange={f("address")} placeholder="埼玉県熊谷市〇〇" /></Field>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Field label="土地面積(㎡)"><SekisanNInp form={form} setForm={setForm} fkey="landArea" placeholder="100" suffix="㎡" /></Field>
            <Field label="延床面積(㎡)"><SekisanNInp form={form} setForm={setForm} fkey="buildingArea" placeholder="80" suffix="㎡" /></Field>
            <Field label="築年数"><SekisanNInp form={form} setForm={setForm} fkey="age" placeholder="40" suffix="年" /></Field>
            <Field label="間取"><input style={inp} value={form.layout} onChange={f("layout")} placeholder="3DK" /></Field>
          </div>
        </div>

        {/* タブ切替 */}
        <div style={{ display: "flex", background: "#0d1422", borderRadius: 12, padding: 4, marginBottom: 14, border: `1px solid #1a2535` }}>
          {TABS.map(t => (
            <button key={t.key} onClick={() => setTab(t.key)} style={{
              flex: 1, background: tab === t.key ? C.accent : "none", border: "none",
              color: tab === t.key ? "#fff" : C.muted, borderRadius: 9, padding: "10px 2px",
              cursor: "pointer", fontSize: 11, fontWeight: tab === t.key ? 700 : 400, fontFamily: "inherit",
            }}>{t.label}</button>
          ))}
        </div>

        {/* 費用タブ */}
        {tab === "cost" && (
          <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.danger, marginBottom: 12 }}>💴 仕入コスト</div>
            <Field label="仕入額（円）"><SekisanNInp form={form} setForm={setForm} fkey="buyPrice" placeholder="3000000" /></Field>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <Field label="仲介手数料・仕"><SekisanNInp form={form} setForm={setForm} fkey="brokerFeeIn" placeholder="0" /></Field>
              <Field label="登記費用"><SekisanNInp form={form} setForm={setForm} fkey="registration" placeholder="0" /></Field>
              <Field label="不動産取得税"><SekisanNInp form={form} setForm={setForm} fkey="acquisitionTax" placeholder="0" /></Field>
              <Field label="印紙代"><SekisanNInp form={form} setForm={setForm} fkey="stamp" placeholder="0" /></Field>
              <Field label="残置物撤去"><SekisanNInp form={form} setForm={setForm} fkey="leftover" placeholder="0" /></Field>
              <Field label="リフォーム費"><SekisanNInp form={form} setForm={setForm} fkey="reform" placeholder="0" /></Field>
              <Field label="解体費"><SekisanNInp form={form} setForm={setForm} fkey="demolition" placeholder="0" /></Field>
              <Field label="仲介手数料・売"><SekisanNInp form={form} setForm={setForm} fkey="brokerFeeOut" placeholder="0" /></Field>
              <Field label="その他"><SekisanNInp form={form} setForm={setForm} fkey="other" placeholder="0" /></Field>
            </div>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.success, margin: "16px 0 12px" }}>💰 売却想定</div>
            <Field label="売却想定額（円）"><SekisanNInp form={form} setForm={setForm} fkey="sellPrice" placeholder="5000000" /></Field>

            {(nv(form.buyPrice) > 0 || nv(form.sellPrice) > 0) && (
              <div style={{ background: C.bg, border: `1px solid #1a2535`, borderRadius: 12, padding: 14, marginTop: 8 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.warn, marginBottom: 10 }}>📊 計算結果</div>
                {[
                  ["諸費用合計", (expenses / 10000).toFixed(0) + "万", C.muted],
                  ["仕入原価合計", (totalCost / 10000).toFixed(0) + "万", C.danger],
                  ["想定利益", (profit / 10000).toFixed(0) + "万", profit > 0 ? C.success : C.danger],
                  ["利益率", profitRate.toFixed(1) + "%", profitRate > 20 ? C.success : C.warn],
                  ["歩合目安(20%)", (profit * 0.2 / 10000).toFixed(0) + "万", C.purple],
                ].map(([l, v, c]) => (
                  <div key={l} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid #1a2535` }}>
                    <span style={{ color: C.muted, fontSize: 13 }}>{l}</span>
                    <span style={{ color: c, fontWeight: 700, fontSize: 15 }}>{v}</span>
                  </div>
                ))}
                {nv(form.sellPrice) > 0 && (
                  <div style={{ marginTop: 12 }}>
                    <div style={{ background: "#1a2535", borderRadius: 6, height: 10, overflow: "hidden" }}>
                      <div style={{ width: Math.min(profitRate, 100) + "%", height: "100%", background: profitRate > 30 ? C.success : profitRate > 15 ? C.warn : C.danger, borderRadius: 6, transition: "width 0.4s" }} />
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#334155", marginTop: 3 }}>
                      <span>0%</span><span style={{ color: C.warn }}>15%</span><span style={{ color: C.success }}>30%+</span>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* 利回りタブ */}
        {tab === "yield" && (
          <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.accent, marginBottom: 12 }}>📐 利回りから仕入目線を出す</div>
            <div style={{ background: "#0a1520", border: `1px solid ${C.accent}33`, borderRadius: 10, padding: 12, marginBottom: 16, fontSize: 12, color: C.muted, lineHeight: 1.8 }}>
              ① 類似物件の㎡賃料を算出 → ② 推定賃料 → ③ 年間収入 ÷ 利回り = 投資家買値<br />
              ④ 投資家買値 − 投資家コスト = うちの売値 → ⑤ 売値 − 目標利益 = <span style={{ color: C.danger, fontWeight: 700 }}>仕入上限</span>
            </div>

            <div style={{ fontSize: 13, fontWeight: 700, color: C.muted, marginBottom: 10 }}>🏠 類似物件データ（レインズで確認）</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <Field label="類似物件の月額賃料（万円）"><SekisanNInp form={form} setForm={setForm} fkey="similarRent" placeholder="7" suffix="万" /></Field>
              <Field label="類似物件の延床面積（㎡）"><SekisanNInp form={form} setForm={setForm} fkey="similarArea" placeholder="65" suffix="㎡" /></Field>
            </div>
            <Field label="対象物件の延床面積（㎡）">
              <input type="text" inputMode="numeric" style={{ ...inp, MozAppearance: "textfield", WebkitAppearance: "none" }}
                value={form.targetBuildingArea || form.buildingArea}
                onChange={e => setForm(p => ({ ...p, targetBuildingArea: e.target.value.replace(/[^0-9.]/g, "") }))}
                placeholder={form.buildingArea || "80"} />
            </Field>

            <div style={{ fontSize: 13, fontWeight: 700, color: C.muted, margin: "14px 0 10px" }}>💹 投資家目線（楽待で確認）</div>
            <Field label="投資家想定利回り（%）"><SekisanNInp form={form} setForm={setForm} fkey="yieldRate" placeholder="15" suffix="%" /></Field>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <Field label="投資家 登記費用（万）"><SekisanNInp form={form} setForm={setForm} fkey="investorRegistration" placeholder="50" suffix="万" /></Field>
              <Field label="投資家 リフォーム費（万）"><SekisanNInp form={form} setForm={setForm} fkey="investorReform" placeholder="150" suffix="万" /></Field>
            </div>

            <div style={{ fontSize: 13, fontWeight: 700, color: C.muted, margin: "14px 0 10px" }}>🎯 うちの目標利益</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <Field label="目標利益 下限（万）"><SekisanNInp form={form} setForm={setForm} fkey="targetProfitMin" placeholder="100" suffix="万" /></Field>
              <Field label="目標利益 上限（万）"><SekisanNInp form={form} setForm={setForm} fkey="targetProfitMax" placeholder="200" suffix="万" /></Field>
            </div>

            {yieldCalc ? (
              <div style={{ background: C.bg, border: `1px solid ${C.success}44`, borderRadius: 12, padding: 14, marginTop: 12 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.success, marginBottom: 10 }}>✅ 自動計算結果</div>
                {[
                  ["㎡賃料", yieldCalc.sqmRent.toLocaleString() + "円/㎡", C.muted],
                  ["推定月額賃料", yieldCalc.estRent + "万円", C.text],
                  ["年間収入", yieldCalc.annual + "万円", C.text],
                  [`投資家買値（利回り${form.yieldRate}%）`, yieldCalc.invBuy + "万円", C.accent],
                  ["うちの売値", yieldCalc.ourSell + "万円", C.accent],
                ].map(([l, v, c]) => (
                  <div key={l} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: `1px solid #1a2535` }}>
                    <span style={{ color: C.muted, fontSize: 12 }}>{l}</span>
                    <span style={{ color: c, fontWeight: 700, fontSize: 14 }}>{v}</span>
                  </div>
                ))}
                <div style={{ background: "#1a0000", border: `1px solid ${C.danger}44`, borderRadius: 10, padding: 14, marginTop: 12 }}>
                  <div style={{ fontSize: 12, color: C.danger, fontWeight: 700, marginBottom: 8 }}>🔴 仕入目線（逆算）</div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                    <span style={{ color: C.muted, fontSize: 13 }}>利益{form.targetProfitMin}万想定</span>
                    <span style={{ color: C.danger, fontSize: 22, fontWeight: 800 }}>{yieldCalc.buyMax}万円</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ color: C.muted, fontSize: 13 }}>利益{form.targetProfitMax}万想定</span>
                    <span style={{ color: C.warn, fontSize: 18, fontWeight: 700 }}>{yieldCalc.buyMin}万円</span>
                  </div>
                  <div style={{ marginTop: 10, background: "#2a0000", borderRadius: 8, padding: "8px 12px", fontSize: 12, color: C.danger }}>
                    👆 この価格以下で仕入れれば目標利益が出る
                  </div>
                </div>
                {nv(form.sellPrice) > 0 && (
                  <div style={{ background: "#0a1a0a", border: `1px solid ${C.success}33`, borderRadius: 10, padding: 12, marginTop: 10, fontSize: 12 }}>
                    <div style={{ color: C.success, fontWeight: 700, marginBottom: 6 }}>費用タブとの比較</div>
                    <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: C.muted }}>費用タブ売値</span><span style={{ color: C.text }}>{(nv(form.sellPrice) / 10000).toFixed(0)}万</span></div>
                    <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}><span style={{ color: C.muted }}>利回り計算売値</span><span style={{ color: C.accent }}>{yieldCalc.ourSell}万</span></div>
                    <div style={{ marginTop: 8, color: C.muted }}>
                      {Math.abs((nv(form.sellPrice) / 10000) - yieldCalc.ourSell) < 50 ? "✅ 両方の根拠が近い → 信頼度高い" : "⚠️ 数字に乖離あり → 根拠タブで再確認"}
                    </div>
                  </div>
                )}
              </div>
            ) : (
              <div style={{ background: C.bg, border: `1px solid #1a2535`, borderRadius: 12, padding: 20, marginTop: 12, textAlign: "center", color: C.muted, fontSize: 13 }}>
                類似物件の賃料・面積・対象物件の延床を入力すると<br />仕入目線が自動計算されます
              </div>
            )}
          </div>
        )}

        {/* 根拠タブ */}
        {tab === "evidence" && (
          <div style={{ display: "grid", gap: 12 }}>
            {[
              { icon: "🔴", title: "レインズ成約比較", content: (
                <>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                    <Field label="成約価格 下限（万）"><SekisanNInp form={form} setForm={setForm} fkey="rainzPriceMin" placeholder="400" suffix="万" /></Field>
                    <Field label="成約価格 上限（万）"><SekisanNInp form={form} setForm={setForm} fkey="rainzPriceMax" placeholder="500" suffix="万" /></Field>
                  </div>
                  {rainzMid > 0 && (
                    <div style={{ background: "#0d1422", borderRadius: 8, padding: "8px 12px", marginBottom: 10, display: "flex", justifyContent: "space-between" }}>
                      <span style={{ color: C.muted, fontSize: 13 }}>成約価格幅の中間値</span>
                      <span style={{ color: C.accent, fontWeight: 700, fontSize: 16 }}>{rainzMid}万円</span>
                    </div>
                  )}
                  <Field label="成約事例メモ">
                    <textarea style={{ ...inp, height: 80, resize: "vertical", fontSize: 14 }} value={form.rainzMemo} onChange={f("rainzMemo")} placeholder="例）昭和53年築・延床65㎡・3DKが450万で成約。リフォーム済み。" />
                  </Field>
                </>
              )},
              { icon: "🔴", title: "在庫比較（アットホーム・レインズ）", content: (
                <>
                  <Field label="競合物件数"><SekisanNInp form={form} setForm={setForm} fkey="competitorCount" placeholder="3" suffix="件" /></Field>
                  <Field label="競合状況メモ">
                    <textarea style={{ ...inp, height: 80, resize: "vertical", fontSize: 14 }} value={form.atHomeMemo} onChange={f("atHomeMemo")} placeholder="例）競合3件。400〜500万で掲載中。リフォーム済み多い。" />
                  </Field>
                </>
              )},
              { icon: "🔴", title: "賃料相場（スーモ・アットホーム）", content: (
                <>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                    <Field label="賃料相場 下限（万）"><SekisanNInp form={form} setForm={setForm} fkey="rentMin" placeholder="6" suffix="万" /></Field>
                    <Field label="賃料相場 上限（万）"><SekisanNInp form={form} setForm={setForm} fkey="rentMax" placeholder="8" suffix="万" /></Field>
                  </div>
                  <Field label="調査メモ">
                    <textarea style={{ ...inp, height: 80, resize: "vertical", fontSize: 14 }} value={form.rentMemo} onChange={f("rentMemo")} placeholder="例）スーモで熊谷市の戸建賃貸確認。3DK〜3LDKで6〜8万が相場。" />
                  </Field>
                </>
              )},
              { icon: "🔴", title: "利回り根拠（楽待・レインズ）", content: (
                <>
                  <Field label="エリアの利回り相場（%）"><SekisanNInp form={form} setForm={setForm} fkey="yieldBase" placeholder="15" suffix="%" /></Field>
                  <Field label="利回りメモ">
                    <textarea style={{ ...inp, height: 70, resize: "vertical", fontSize: 14 }} value={form.yieldMemo} onChange={f("yieldMemo")} placeholder="例）楽待で熊谷エリア確認。表面利回り12〜18%が多い。15%で計算。" />
                  </Field>
                </>
              )},
            ].map(({ icon, title, content }) => (
              <div key={title} style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 16 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
                  <span style={{ fontSize: 16 }}>{icon}</span>
                  <span style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{title}</span>
                </div>
                {content}
              </div>
            ))}
          </div>
        )}

        {/* 判断タブ */}
        {tab === "summary" && (
          <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.danger, marginBottom: 14 }}>🔥 総合判断</div>

            <Field label="この物件の判断">
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {JUDGMENTS.map(j => (
                  <button key={j.value} onClick={() => setForm(p => ({ ...p, judgment: j.value }))} style={{
                    background: form.judgment === j.value ? j.color + "33" : C.bg,
                    border: `2px solid ${form.judgment === j.value ? j.color : "#1a2535"}`,
                    borderRadius: 10, padding: "14px", cursor: "pointer", fontFamily: "inherit",
                    color: form.judgment === j.value ? j.color : C.muted,
                    fontSize: 15, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                  }}>{j.emoji} {j.value}</button>
                ))}
              </div>
            </Field>

            {/* 数字サマリー */}
            <div style={{ background: C.bg, border: `1px solid #1a2535`, borderRadius: 12, padding: 14, marginBottom: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.warn, marginBottom: 10 }}>数字サマリー</div>
              {[
                ["レインズ成約価格幅", form.rainzPriceMin && form.rainzPriceMax ? `${form.rainzPriceMin}〜${form.rainzPriceMax}万` : "未入力"],
                ["賃料相場", form.rentMin && form.rentMax ? `${form.rentMin}〜${form.rentMax}万` : "未入力"],
                ["費用タブ 売却想定", nv(form.sellPrice) > 0 ? (nv(form.sellPrice) / 10000).toFixed(0) + "万" : "未入力", C.accent],
                ["利回り計算 売値", yieldCalc ? yieldCalc.ourSell + "万" : "未計算", C.accent],
                ["仕入目線（利回り逆算）", yieldCalc ? `${yieldCalc.buyMin}〜${yieldCalc.buyMax}万` : "未計算", C.danger],
                ["費用タブ 想定利益", nv(form.sellPrice) > 0 && nv(form.buyPrice) > 0 ? (profit / 10000).toFixed(0) + "万" : "未入力", profit > 0 ? C.success : C.muted],
              ].map(([l, v, c]) => (
                <div key={l} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid #1a2535` }}>
                  <span style={{ color: C.muted, fontSize: 12 }}>{l}</span>
                  <span style={{ color: c || C.text, fontWeight: 700, fontSize: 13 }}>{v}</span>
                </div>
              ))}
            </div>

            <Field label="根拠・判断コメント（熱い案件は詳しく）">
              <textarea style={{ ...inp, height: 160, resize: "vertical", fontSize: 14, lineHeight: 1.7 }}
                value={form.judgmentMemo} onChange={f("judgmentMemo")}
                placeholder={`例）\nレインズ成約：400〜500万（中間450万）\n競合：3件あり、450万中心\n賃料相場：7〜8万 → 利回り計算で仕入上限330万\n→ 仕入300万以内なら利益150万以上確保\n→ 熱い案件と判断`} />
            </Field>
            {canEditThis ? (
              <button onClick={() => onSave(form)} style={{ ...btnStyle(), width: "100%", padding: "15px", fontSize: 16, marginTop: 8 }}>💾 保存する</button>
            ) : (
              <div style={{ marginTop: 8, padding: 14, background: C.warn + "11", border: `1px solid ${C.warn}55`, borderRadius: 12, fontSize: 13, color: C.warn, textAlign: "center", fontWeight: 700 }}>
                👁 閲覧モード（編集権限なし）
              </div>
            )}

            {/* 仕入れ確定ボタン（編集権限あるときのみ） */}
            {canEditThis && nv(form.buyPrice) > 0 && (
              <div style={{ marginTop: 12, background: "#0a1a0a", border: `1px solid ${C.success}55`, borderRadius: 14, padding: 16 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.success, marginBottom: 8 }}>🏠 仕入れ確定したら</div>
                <div style={{ fontSize: 12, color: C.muted, marginBottom: 12, lineHeight: 1.6 }}>
                  以下の内容で在庫管理に自動転記されます：<br />
                  <span style={{ color: C.text }}>物件名：{form.address || "未入力"}</span><br />
                  <span style={{ color: C.text }}>仕入原価：{nv(form.buyPrice) > 0 ? (nv(form.buyPrice)).toLocaleString() + "円" : "未入力"}</span><br />
                  <span style={{ color: C.text }}>売却想定：{nv(form.sellPrice) > 0 ? (nv(form.sellPrice)).toLocaleString() + "円" : "未入力"}</span><br />
                  <span style={{ color: C.text }}>担当者：{form.assignee}</span>
                </div>
                <button
                  onClick={() => {
                    if (!form.address) { alert("物件住所を入力してください"); return; }
                    if (window.confirm(`「${form.address}」を在庫管理に転記しますか？`)) {
                      onSave(form);
                      onTransfer(form);
                    }
                  }}
                  style={{
                    width: "100%", background: C.success, border: "none", color: "#fff",
                    borderRadius: 12, padding: "15px", cursor: "pointer", fontSize: 16,
                    fontWeight: 800, fontFamily: "inherit", letterSpacing: "0.02em",
                  }}
                >
                  ✅ 仕入れ確定 → 在庫管理に転記
                </button>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function SekisanPage({ data, setData, onBack }) {
  const currentUser = getCurrentUser();
  const adminMember = data.adminMember || "下田";
  const canEdit = (item) => canEditItem(item, currentUser, adminMember);
  const [showForm, setShowForm] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [search, setSearch] = useState("");
  const [filterMember, setFilterMember] = useState("すべて");
  const [filterJudgment, setFilterJudgment] = useState("すべて");

  const JCOLOR = { "熱い": C.danger, "検討中": C.warn, "普通": C.muted, "見送り": "#334155" };
  const JEMOJI = { "熱い": "🔥", "検討中": "🟡", "普通": "⚪", "見送り": "❌" };

  const filtered = useMemo(() => data.sekisan.filter(s => {
    if (filterMember !== "すべて" && s.assignee !== filterMember) return false;
    if (filterJudgment !== "すべて" && s.judgment !== filterJudgment) return false;
    if (search && !(s.address || "").includes(search)) return false;
    return true;
  }), [data.sekisan, filterMember, filterJudgment, search]);

  const handleSave = form => {
    const item = { ...form, id: editItem?.id || Date.now() };
    setData(d => {
      const next = { ...d, sekisan: editItem ? d.sekisan.map(s => s.id === editItem.id ? item : s) : [...d.sekisan, item] };
      return appendLog(next, editItem ? "update" : "add", "sekisan", `${item.address || "(無住所)"}（判定: ${item.judgment}）`);
    });
    setShowForm(false); setEditItem(null);
  };

  const handleTransfer = form => {
    // 積算表から在庫管理に転記
    const nv = v => parseFloat(String(v).replace(/,/g, "")) || 0;
    const newStock = {
      id: Date.now(),
      assignee: form.assignee,
      name: form.address,
      status: "仕入契約済",
      buyDate: new Date().toISOString().split("T")[0],
      sellDate: "",
      buyCost: nv(form.buyPrice),
      sellPrice: nv(form.sellPrice),
      memo: `積算表より転記。${form.judgmentMemo ? "\n" + form.judgmentMemo.slice(0, 100) : ""}`,
      year: new Date().getFullYear(),
      fromSekisanId: form.id || Date.now(),
      photos: [],
    };
    setData(d => {
      const next = { ...d, stocks: [...d.stocks, newStock] };
      return appendLog(next, "promote", "stock", `${form.address}を積算→在庫に転記（仕入${Math.round(nv(form.buyPrice)/10000)}万）`);
    });
    setShowForm(false); setEditItem(null);
    alert(`✅「${form.address}」を在庫管理に転記しました！\nステータス：仕入契約済`);
  };

  const handleDelete = id => {
    const target = data.sekisan.find(s => s.id === id);
    if (window.confirm("削除しますか？")) setData(d => {
      const next = { ...d, sekisan: d.sekisan.filter(s => s.id !== id) };
      return appendLog(next, "delete", "sekisan", `${target?.address || "(無住所)"}を削除`);
    });
  };
  const nv = v => parseFloat(v) || 0;

  if (showForm) return <SekisanForm initial={editItem} onSave={handleSave} onClose={() => { setShowForm(false); setEditItem(null); }} onTransfer={handleTransfer} canEditThis={true} />;

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
        {onBack && <button onClick={onBack} style={{ background: "none", border: "none", color: C.accent, fontSize: 24, cursor: "pointer", padding: 0 }}>←</button>}
        <div style={{ fontSize: 20, fontWeight: 800, color: C.text }}>🧮 仕入検討積算表</div>
        <div style={{ flex: 1 }} />
        <button style={{ ...btnStyle(), padding: "10px 16px", fontSize: 14 }} onClick={() => { setEditItem(null); setShowForm(true); }}>＋ 追加</button>
      </div>
      <SearchBar value={search} onChange={setSearch} placeholder="住所で検索..." />
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
        {["すべて", ...MEMBERS].map(m => (
          <button key={m} onClick={() => setFilterMember(m)} style={{ padding: "6px 12px", borderRadius: 20, cursor: "pointer", fontSize: 12, background: filterMember === m ? C.accent : "#0d1422", color: filterMember === m ? "#fff" : C.muted, border: `1px solid ${filterMember === m ? C.accent : "#1a2535"}`, fontFamily: "inherit" }}>{m}</button>
        ))}
      </div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
        {["すべて", "熱い", "検討中", "普通", "見送り"].map(j => (
          <button key={j} onClick={() => setFilterJudgment(j)} style={{ padding: "6px 12px", borderRadius: 20, cursor: "pointer", fontSize: 12, background: filterJudgment === j ? (JCOLOR[j] || C.accent) : "#0d1422", color: filterJudgment === j ? "#fff" : C.muted, border: `1px solid ${filterJudgment === j ? (JCOLOR[j] || C.accent) : "#1a2535"}`, fontFamily: "inherit" }}>
            {JEMOJI[j] || ""} {j}
          </button>
        ))}
      </div>
      <div style={{ color: C.muted, fontSize: 12, marginBottom: 12 }}>{filtered.length}件表示</div>

      {filtered.length === 0 && (
        <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 32, textAlign: "center", color: C.muted }}>まだ積算表がありません</div>
      )}

      {filtered.map(s => {
        const exp = ["brokerFeeIn","registration","acquisitionTax","stamp","leftover","reform","demolition","brokerFeeOut","other"].reduce((a, k) => a + nv(s[k]), 0);
        const profit = nv(s.sellPrice) - nv(s.buyPrice) - exp;
        const jColor = JCOLOR[s.judgment] || C.muted;
        const jEmoji = JEMOJI[s.judgment] || "";
        // この積算表から在庫管理に転記済みか確認
        const isTransferred = s.id && data.stocks.some(st => st.fromSekisanId === s.id);
        return (
          <div key={s.id} style={{ background: "#0d1422", border: `1px solid ${s.judgment === "熱い" ? C.danger + "55" : isTransferred ? C.success + "55" : "#1a2535"}`, borderRadius: 14, padding: 16, marginBottom: 10 }}>
            <div style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "center", flexWrap: "wrap" }}>
              <MemberTag name={s.assignee} />
              {s.judgment && <Tag label={`${jEmoji} ${s.judgment}`} color={jColor} />}
              {isTransferred && <Tag label="✅ 在庫転記済" color={C.success} />}
              <span style={{ color: C.muted, fontSize: 12, marginLeft: "auto" }}>{s.createdAt}</span>
            </div>
            <div style={{ color: C.text, fontWeight: 700, fontSize: 15, marginBottom: 10 }}>{s.address || "住所未設定"}</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 10 }}>
              {[
                ["仕入額", nv(s.buyPrice) > 0 ? (nv(s.buyPrice) / 10000).toFixed(0) + "万" : "—", C.text],
                ["売却想定", nv(s.sellPrice) > 0 ? (nv(s.sellPrice) / 10000).toFixed(0) + "万" : "—", C.accent],
                ["想定利益", nv(s.buyPrice) > 0 && nv(s.sellPrice) > 0 ? (profit / 10000).toFixed(0) + "万" : "—", profit > 0 ? C.success : C.danger],
              ].map(([l, v, c]) => (
                <div key={l} style={{ background: C.bg, borderRadius: 8, padding: "8px 10px", textAlign: "center" }}>
                  <div style={{ color: C.muted, fontSize: 10 }}>{l}</div>
                  <div style={{ color: c, fontWeight: 700, fontSize: 15 }}>{v}</div>
                </div>
              ))}
            </div>
            {(s.rainzPriceMin || s.rainzPriceMax) && (
              <div style={{ fontSize: 12, color: C.muted, marginBottom: 4 }}>レインズ成約: <span style={{ color: C.text }}>{s.rainzPriceMin}〜{s.rainzPriceMax}万</span></div>
            )}
            {s.judgmentMemo && (
              <div style={{ fontSize: 12, color: C.muted, marginBottom: 10, lineHeight: 1.5 }}>
                {s.judgmentMemo.length > 80 ? s.judgmentMemo.slice(0, 80) + "…" : s.judgmentMemo}
              </div>
            )}
            <div style={{ display: "flex", gap: 8 }}>
              <button style={{ ...btnStyle("ghost"), flex: 1, padding: "11px", fontSize: 14 }} onClick={() => { setEditItem(s); setShowForm(true); }}>編集・詳細</button>
              <button style={{ ...btnStyle("danger"), padding: "11px 14px", fontSize: 14 }} onClick={() => handleDelete(s.id)}>削除</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ===================== APP =====================

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
