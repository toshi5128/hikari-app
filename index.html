      if (!item.nextDate) return false;
      const threeDaysLater = new Date();
      threeDaysLater.setDate(threeDaysLater.getDate() + 3);
      const threeDaysStr = threeDaysLater.toISOString().split("T")[0];
      if (item.nextDate > threeDaysStr) return false;
    }
    // 📞 電話アタック（連絡先あり + 商談見込み）
    if (quickFilter === "phone") {
      const hasContact = !!(item.ownerContact || (item.raw && item.raw.ownerContact));
      if (!hasContact) return false;
      if (!(item.status === "見込" || item.status === "興味あり" || item.status === "検討中" || item.status === "電話済")) return false;
    }
    // 🤝 商談ラウンド（見込み + 訪問予定が決まってる）
    if (quickFilter === "meet") {
      if (!(item.status === "見込" || item.status === "興味あり" || item.status === "検討中" || item.status === "交渉中")) return false;
    }
    // 🚪 居留守攻略ラウンド（居留守記録あり）
    if (quickFilter === "ignore_attack") {
      const log = (item.raw && item.raw.visitLog) || [];
      if (!log.some(v => v.result === "ignore")) return false;
    }
    // ⏰ 今この時間ベスト（現在の曜日×時間帯で過去 不在/居留守 を除外）
    if (quickFilter === "now_best") {
      const log = (item.raw && item.raw.visitLog) || [];
      const now = new Date();
      const nowDow = now.getDay();
      const nowBucket = timeBucket(`${String(now.getHours()).padStart(2, "0")}:00`);
      const sameBucketFail = log.some(v =>
        v.dayOfWeek === nowDow &&
        timeBucket(v.time) === nowBucket &&
        (v.result === "absent" || v.result === "ignore")
      );
      if (sameBucketFail) return false;
    }
    return true;
  }), [allItems, typeFilter, areaFilter, filterStatuses, filterMembers, search, searchTarget, quickFilter, today]);

  const isOverdue = item => item.nextDate && item.nextDate < today && !["NG", "断られた", "仕入れ完了"].includes(item.status);
  
  // ⛔ NGや断られた物件（もう訪問しない）
  const isNoGo = item => ["NG", "断られた", "お断り"].includes(item.status);

  const handleDelete = item => {
    if (!window.confirm("削除しますか？")) return;
    if (item.type === "jiage") setData(d => {
      const next = { ...d, jiage: d.jiage.filter(j => j.id !== item.rawId) };
      return appendLogAndNotify(next, "delete", "jiage", `${item.address || "(無住所)"}を削除`, item);
    });
    else setData(d => {
      const next = { ...d, owners: d.owners.filter(o => o.id !== item.rawId) };
      return appendLogAndNotify(next, "delete", "owner", `${item.address || "(無住所)"}を削除`, item);
    });
    setSelected(null);
  };

  const addHistory = () => {
    if (!histForm.note.trim() || !selected || selected.item.type !== "owner") return;
    const updated = { ...selected.item.raw, history: [...(selected.item.raw.history || []), histForm] };
    setData(d => ({ ...d, owners: d.owners.map(o => o.id === updated.id ? updated : o) }));
    setSelected(s => ({ ...s, item: { ...s.item, history: updated.history, raw: updated } }));
    setHistForm({ date: today, method: "電話", note: "", member: MEMBERS[0] });
  };

  // 訪問記録モーダルを開く
  const openVisitRecord = (item) => {
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    setVisitRecordTarget(item);
    setVisitForm({
      date: today,
      time,
      result: "home",
      signs: [],
      intensityLevel: "mid",
      memo: "",
    });
  };

  // 訪問記録を保存
  const saveVisitRecord = () => {
    if (!visitRecordTarget || !visitForm) return;
    const dow = new Date(visitForm.date).getDay(); // 0=日
    const newEntry = {
      id: Date.now(),
      date: visitForm.date,
      time: visitForm.time,
      dayOfWeek: dow,
      result: visitForm.result,
      signs: visitForm.result === "ignore" ? visitForm.signs : [],
      intensityLevel: visitForm.result === "ignore" ? visitForm.intensityLevel : null,
      memo: visitForm.memo,
      recordedBy: getCurrentUser() || MEMBERS[0],
    };
    const resDef = VISIT_RESULTS.find(r => r.key === visitForm.result);
    const newStatus = resDef ? resDef.autoStatus : null;
    
    const targetType = visitRecordTarget.type;
    const targetId = visitRecordTarget.rawId || visitRecordTarget.id;
    
    setData(d => {
      if (targetType === "jiage") {
        return {
          ...d,
          jiage: d.jiage.map(j => {
            if (j.id !== targetId) return j;
            return {
              ...j,
              visitLog: [...(j.visitLog || []), newEntry],
              status: newStatus || j.status,
            };
          }),
        };
      } else {
        return {
          ...d,
          owners: d.owners.map(o => {
            if (o.id !== targetId) return o;
            return {
              ...o,
              visitLog: [...(o.visitLog || []), newEntry],
              status: newStatus || o.status,
            };
          }),
        };
      }
    });
    setVisitRecordTarget(null);
    setVisitForm(null);
    // selectedも更新
    setSelected(s => {
      if (!s) return s;
      const updated = { ...s.item };
      updated.raw = { ...updated.raw, visitLog: [...((s.item.raw?.visitLog) || []), newEntry], status: newStatus || s.item.status };
      updated.status = newStatus || s.item.status;
      return { item: updated };
    });
  };

  const updateStatus = (item, status) => {
    if (item.type === "jiage") {
      const updated = { ...item.raw, status };
      setData(d => ({ ...d, jiage: d.jiage.map(j => j.id === item.rawId ? updated : j) }));
      setSelected(s => ({ ...s, item: { ...s.item, status, raw: updated } }));
    } else {
      const updated = { ...item.raw, status };
      setData(d => ({ ...d, owners: d.owners.map(o => o.id === item.rawId ? updated : o) }));
      setSelected(s => ({ ...s, item: { ...s.item, status, raw: updated } }));
    }
  };

  const updateNextDate = (item, date) => {
    if (item.type === "jiage") {
      const updated = { ...item.raw, nextVisit: date };
      setData(d => ({ ...d, jiage: d.jiage.map(j => j.id === item.rawId ? updated : j) }));
      setSelected(s => ({ ...s, item: { ...s.item, nextDate: date, raw: updated } }));
    } else {
      const updated = { ...item.raw, nextFollowDate: date };
      setData(d => ({ ...d, owners: d.owners.map(o => o.id === item.rawId ? updated : o) }));
      setSelected(s => ({ ...s, item: { ...s.item, nextDate: date, raw: updated } }));
    }
  };

  // 地上げ → 積算表を作成（誰でも実行可）
  // 🗺️ ジオコーディング一括実行
  const cancelGeocodeRef = React.useRef(false);
  const runGeocoding = async (target) => {
    // target: "address" | "ownerAddr"
    const isOwner = target === "ownerAddr";
    const targetJiage = (data.jiage || []).filter(j => {
      const addr = isOwner ? j.ownerAddr : j.address;
      const lat = isOwner ? j.ownerLat : j.lat;
      return addr && (typeof lat !== "number");
    });
    if (targetJiage.length === 0) {
      alert(`✅ ${isOwner ? "所有者住所" : "物件住所"}の緯度経度はすべて取得済みです`);
      return;
    }
    if (!confirm(`${targetJiage.length}件の${isOwner ? "所有者住所" : "物件住所"}を緯度経度に変換します。\n\n約${Math.ceil(targetJiage.length * 0.3 / 60)}分かかります。\n\n国土地理院の無料APIを使用します。\n\n実行しますか？`)) return;
    
    cancelGeocodeRef.current = false;
    setGeocodeProgress({ current: 0, total: targetJiage.length });
    
    let success = 0, failed = 0;
    for (let i = 0; i < targetJiage.length; i++) {
      if (cancelGeocodeRef.current) break;
      const j = targetJiage[i];
      const addr = isOwner ? j.ownerAddr : j.address;
      const result = await geocodeAddress(addr);
      if (result) {
        success++;
        // 個別に保存（中断しても結果残る）
        setData(d => ({
          ...d,
          jiage: (d.jiage || []).map(item => {
            if (item.id !== j.id) return item;
            return isOwner 
              ? { ...item, ownerLat: result.lat, ownerLng: result.lng }
              : { ...item, lat: result.lat, lng: result.lng };
          })
        }));
      } else {
        failed++;
      }
      setGeocodeProgress({ current: i + 1, total: targetJiage.length });
      // レート制限：300ms（国土地理院APIは厳しくないが念のため）
      if (i < targetJiage.length - 1) await sleep(300);
    }
    setGeocodeProgress(null);
    if (cancelGeocodeRef.current) {
      alert(`⏸️ 中断しました\n成功: ${success}件 / 失敗: ${failed}件\n（処理した分は保存されています）`);
    } else {
      alert(`✅ 完了！\n成功: ${success}件 / 失敗: ${failed}件`);
    }
  };

  const promoteToSekisan = (item) => {
    const j = item.raw;
    const alreadyExists = (data.sekisan || []).some(s => s.address === j.address && s.fromJiageId === j.id);
    if (alreadyExists) { alert("この物件の積算表は既に作成されています"); return; }
    if (!window.confirm(`「${j.address}」の仕入検討積算表を作成しますか？\n\n住所・担当者を自動入力します。「営業」タブから確認できます。`)) return;
    const newSekisan = {
      id: Date.now(),
      address: j.address,
      assignee: j.assignee,
      createdAt: today,
      occurredAt: new Date().toISOString().slice(0, 16), // 🆕 発生日時 = 作成時
      source: "地上げ", // 🆕 出所を自動セット
      vendorName: "", vendorPerson: "", vendorContactType: "", vendorContact: "",
      age: "", structure: "", layout: "", landArea: "", buildingArea: "", stationDist: "",
      buyPrice: "", brokerFeeIn: "", registration: "", acquisitionTax: "", stamp: "",
      leftover: "", reform: "", demolition: "", brokerFeeOut: "", other: "",
      propertyTax: "", cleaning: "", // 🆕 固都税・除草伐採
      sellPrice: "",
      similarRent: "", similarArea: "", targetBuildingArea: "",
      yieldRate: "15", investorRegistration: "50", investorReform: "150",
      realYieldRate: "", // 🆕 投資家実質利回り（参考値）
  realYieldRate: "", // 🆕 投資家実質利回り（参考値）
      targetProfitMin: "100", targetProfitMax: "200",
      rainzPriceMin: "", rainzPriceMax: "", rainzMemo: "",
      atHomeMemo: "", competitorCount: "",
      rentMin: "", rentMax: "", rentMemo: "",
      yieldBase: "", yieldMemo: "",
      judgment: "検討中", judgmentMemo: j.memo || "",
      features: [],
      fromJiageId: j.id,
    };
    setData(d => {
      const next = { ...d, sekisan: [...(d.sekisan || []), newSekisan] };
      return appendLogAndNotify(next, "promote", "sekisan", `${j.address}を地上げ→積算に昇格`, j);
    });
    alert(`✅「${j.address}」の積算表を作成しました！\n「営業」タブから編集できます。`);
    setSelected(null);
  };

  const emptyJiage = { address: "", owner: "", ownerAddr: "", ownerContact: "", dm: "未", visit: "未", status: "未訪問", assignee: currentUser || MEMBERS[0], memo: "", nextVisit: "", date: today, area: areaFilter !== "すべて" ? areaFilter : "" };
  const [form, setForm] = useState(emptyJiage);
  const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));

  const openEdit = item => {
    setAddType(item.type);
    setForm({ ...item.raw });
    setEditItem(item);
    setShowAdd(true);
    setSelected(null);
  };

  const handleSave = () => {
    if (addType === "jiage") {
      const item = { ...form, id: editItem?.rawId || Date.now() };
      setData(d => {
        const next = { ...d, jiage: editItem ? d.jiage.map(j => j.id === item.id ? item : j) : [...d.jiage, item] };
        return appendLogAndNotify(next, editItem ? "update" : "add", "jiage", `${item.address || "(無住所)"}（${item.status}）`, item);
      });
    } else {
      const item = { ...form, id: editItem?.rawId || Date.now() };
      setData(d => {
        const next = { ...d, owners: editItem ? d.owners.map(o => o.id === item.id ? item : o) : [...d.owners, item] };
        return appendLogAndNotify(next, editItem ? "update" : "add", "owner", `${item.address || "(無住所)"}（${item.status}）`, item);
      });
    }
    setShowAdd(false); setEditItem(null);
  };

  // エリア別件数
  const areaCounts = useMemo(() => {
    const counts = {};
    allItems.filter(i => i.type === "jiage").forEach(i => {
      counts[i.area || "その他"] = (counts[i.area || "その他"] || 0) + 1;
    });
    return counts;
  }, [allItems]);

  return (
    <div style={{ display: "flex", flexDirection: "column", margin: "-16px -16px 0", minHeight: "calc(100vh - 130px)" }}>

      {/* ヘッダー（sticky で画面上部に固定） */}
      <div style={{ background: C.cardBg, borderBottom: `1px solid ${C.borderDim}`, padding: "8px 14px", position: "sticky", top: 0, zIndex: 10, flexShrink: 0 }}>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
          <div style={{ fontSize: 16, fontWeight: 800, color: C.text, flex: 1 }}>📍 地上げ・所有者</div>
          <div style={{ display: "flex", background: C.bg, borderRadius: 8, padding: 3, border: `1px solid ${C.borderDim}` }}>
            {[["list", "☰ リスト"], ["map", "🗺 地図"]].map(([key, label]) => (
              <button key={key} onClick={() => setViewMode(key)} style={{
                background: viewMode === key ? C.accent : "none", border: "none",
                color: viewMode === key ? "#fff" : C.muted, borderRadius: 6,
                padding: "6px 10px", cursor: "pointer", fontSize: 11, fontWeight: 700, fontFamily: "inherit",
              }}>{label}</button>
            ))}
          </div>
          <div style={{ position: "relative" }}>
            <button style={{ ...btnStyle(), padding: "8px 12px", fontSize: 13 }} onClick={() => setShowAddMenu(v => !v)}>＋</button>
            {showAddMenu && (
              <div style={{ position: "absolute", right: 0, top: "110%", background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 10, overflow: "hidden", zIndex: 50, minWidth: 180 }}>
                <button onClick={() => { setAddType("jiage"); setForm(emptyJiage); setEditItem(null); setShowAdd(true); setShowAddMenu(false); }} style={{ display: "block", width: "100%", background: "none", border: "none", color: C.text, padding: "14px 16px", cursor: "pointer", fontSize: 14, fontFamily: "inherit", textAlign: "left", borderBottom: `1px solid ${C.borderDim}` }}>📍 物件を追加</button>
                <button onClick={() => { fileInputRef.current?.click(); setShowAddMenu(false); }} style={{ display: "block", width: "100%", background: "none", border: "none", color: C.success, padding: "14px 16px", cursor: "pointer", fontSize: 14, fontFamily: "inherit", textAlign: "left" }}>📥 Excel/CSVをインポート</button>
              </div>
            )}
          </div>
        </div>

        {/* エリアフィルター */}
        <div style={{ display: "flex", gap: 6, marginBottom: 8, overflowX: "auto", paddingBottom: 2 }}>
          {["すべて", ...JIAGE_AREAS, "未設定"].map(area => {
            const count = area === "すべて" 
              ? Object.values(areaCounts).reduce((a, b) => a + b, 0)
              : area === "未設定"
                ? (data.jiage || []).filter(j => !JIAGE_AREAS.includes(j.area)).length
                : (areaCounts[area] || 0);
            return (
              <button key={area} onClick={() => setAreaFilter(area)} style={{
                padding: "5px 12px", borderRadius: 20, cursor: "pointer", fontSize: 12,
                background: areaFilter === area ? C.purple : C.bg,
                color: areaFilter === area ? "#fff" : (area === "未設定" && count > 0 ? C.warn : C.muted),
                border: `1px solid ${areaFilter === area ? C.purple : (area === "未設定" && count > 0 ? C.warn + "66" : C.borderDim)}`,
                fontFamily: "inherit", whiteSpace: "nowrap", flexShrink: 0,
              }}>{area === "未設定" && count > 0 ? "⚠️ " : ""}{area} {count > 0 ? count : ""}</button>
            );
          })}
        </div>

        {/* エリア未設定がある場合の自動補正ボタン */}
        {(() => {
          const unsetItems = (data.jiage || []).filter(j => !JIAGE_AREAS.includes(j.area));
          const fixableCount = unsetItems.filter(j => inferAreaFromAddress(j.address)).length;
          if (fixableCount === 0) return null;
          return (
            <div style={{ background: C.warn + "11", border: `1px solid ${C.warn}55`, borderRadius: 10, padding: "8px 12px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <div style={{ fontSize: 11, color: C.warn, lineHeight: 1.4 }}>
                ⚠️ エリア未設定の物件が <b>{unsetItems.length}件</b> あります<br />
                <span style={{ fontSize: 10, color: C.muted }}>住所から自動で {fixableCount}件 を補正できます</span>
              </div>
              <button onClick={() => {
                if (!confirm(`住所から自動でエリアを判定して、${fixableCount}件のエリアを補正します。よろしいですか？`)) return;
                let fixedCount = 0;
                setData(d => {
                  const next = {
                    ...d,
                    jiage: (d.jiage || []).map(j => {
                      if (JIAGE_AREAS.includes(j.area)) return j;
                      const newArea = inferAreaFromAddress(j.address);
                      if (newArea) {
                        fixedCount++;
                        return { ...j, area: newArea };
                      }
                      return j;
                    })
                  };
                  return appendLogAndNotify(next, "update", "jiage", `エリアを${fixableCount}件自動補正`, null);
                });
                setTimeout(() => alert(`✅ ${fixableCount}件のエリアを補正しました！`), 100);
              }} style={{
                background: C.warn, color: "#fff", border: "none", borderRadius: 8,
                padding: "8px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                whiteSpace: "nowrap", flexShrink: 0,
              }}>🔧 {fixableCount}件を自動補正</button>
            </div>
          );
        })()}

        {/* 🎯 今日の行動モード（折りたたみ式） */}
        {(() => {
          const allModes = [
            { key: "now_best",  label: "⏰ 今この時間ベスト", sub: "現在の曜日・時間で不在/居留守を除外", color: "#fbbf24" },
            { key: "untouched", label: "🚪 未訪問エリア攻め", sub: "未訪問・不在", color: C.purple },
            { key: "dm_un",     label: "📩 DM配る",          sub: "DM未送付", color: C.warn },
            { key: "redo",      label: "🔄 再訪ラウンド",     sub: "前回不在・3日以内", color: C.accent },
            { key: "ignore_attack", label: "🚪 居留守攻略", sub: "居留守記録あり", color: "#f97316" },
            { key: "phone",     label: "📞 電話アタック",     sub: "見込・連絡先あり", color: "#0ea5e9" },
            { key: "meet",      label: "🤝 商談ラウンド",     sub: "見込・交渉中", color: C.success },
            { key: "overdue",   label: "⚠️ 期限切れ",         sub: "再訪日が過去", color: C.danger },
          ];
          const currentMode = allModes.find(m => m.key === quickFilter);
          
          return (
            <div style={{ background: C.cardBg, border: `1px solid ${currentMode ? currentMode.color + "55" : C.borderDim}`, borderRadius: 10, marginBottom: 8, overflow: "hidden" }}>
              {/* ヘッダー（折りたたみトグル） */}
              <button onClick={() => setActionExpanded(v => !v)} style={{
                width: "100%", padding: "9px 12px", background: "transparent", border: "none",
                color: currentMode ? currentMode.color : C.accent,
                fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                display: "flex", justifyContent: "space-between", alignItems: "center",
              }}>
                <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  🎯 今日の行動を選ぶ
                  {currentMode && !actionExpanded && (
                    <span style={{ background: currentMode.color, color: "#fff", padding: "2px 8px", borderRadius: 6, fontSize: 10, fontWeight: 700 }}>
                      {currentMode.label}
                    </span>
                  )}
                </span>
                <span style={{ fontSize: 14, color: C.muted }}>{actionExpanded ? "▲" : "▼"}</span>
              </button>

              {/* 展開時のグリッド */}
              {actionExpanded && (
                <div style={{ padding: "0 10px 10px" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5 }}>
                    {allModes.map(qf => {
                      const isActive = quickFilter === qf.key;
                      return (
                        <button key={qf.key} onClick={() => {
                          setQuickFilter(isActive ? null : qf.key);
                          setActionExpanded(false); // 選択したら自動的に折りたたむ
                        }} style={{
                          padding: "7px 8px", borderRadius: 8, cursor: "pointer",
                          background: isActive ? qf.color : C.bg,
                          color: isActive ? "#fff" : qf.color,
                          border: `1.5px solid ${isActive ? qf.color : qf.color + "55"}`,
                          fontFamily: "inherit", textAlign: "left",
                          display: "flex", flexDirection: "column", gap: 1,
                          transition: "all 0.15s",
                        }}>
                          <span style={{ fontSize: 12, fontWeight: 700 }}>{qf.label}</span>
                          <span style={{ fontSize: 9, opacity: 0.8, fontWeight: 400 }}>{qf.sub}</span>
                        </button>
                      );
                    })}
                  </div>
                  {quickFilter && (
                    <button onClick={() => setQuickFilter(null)} style={{
                      marginTop: 6, background: "transparent", border: "none", color: C.muted,
                      fontSize: 10, cursor: "pointer", padding: 0, fontFamily: "inherit",
                    }}>✕ 行動モード解除</button>
                  )}
                </div>
              )}

              {/* 折りたたみ時に行動モード解除ボタン（モード選択中のみ） */}
              {!actionExpanded && currentMode && (
                <div style={{ padding: "0 12px 8px" }}>
                  <button onClick={() => setQuickFilter(null)} style={{
                    background: "transparent", border: "none", color: C.muted,
                    fontSize: 10, cursor: "pointer", padding: 0, fontFamily: "inherit",
                  }}>✕ 行動モード解除</button>
                </div>
              )}
            </div>
          );
        })()}

        {/* 🚦 状況で絞り込み（折りたたみ式・複数選択可） */}
        {(() => {
          const stColor = (st) => st === "未訪問" ? C.muted
            : st === "訪問済" ? C.success
            : st === "不在" ? C.warn
            : st === "NG" || st === "断られた" ? C.danger
            : st === "見込" || st === "興味あり" || st === "検討中" || st === "交渉中" ? C.accent
            : st === "仕入れ完了" ? "#06b6d4"
            : st === "居住している" ? "#64748b"
            : C.muted;
          const hasSelection = filterStatuses.length > 0;
          
          return (
            <div style={{ background: C.cardBg, border: `1px solid ${hasSelection ? C.accent + "55" : C.borderDim}`, borderRadius: 10, marginBottom: 8, overflow: "hidden" }}>
              {/* ヘッダー（折りたたみトグル） */}
              <button onClick={() => setStatusExpanded(v => !v)} style={{
                width: "100%", padding: "9px 12px", background: "transparent", border: "none",
                color: hasSelection ? C.accent : C.muted,
                fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8,
              }}>
                <span style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                  🚦 状況で絞り込み
                  {hasSelection && !statusExpanded && (
                    <span style={{ display: "flex", gap: 3, flexWrap: "wrap" }}>
                      {filterStatuses.map(st => (
                        <span key={st} style={{ background: stColor(st), color: "#fff", padding: "2px 7px", borderRadius: 6, fontSize: 10, fontWeight: 700 }}>
                          {st}
                        </span>
                      ))}
                    </span>
                  )}
                </span>
                <span style={{ fontSize: 14, color: C.muted, flexShrink: 0 }}>{statusExpanded ? "▲" : "▼"}</span>
              </button>

              {/* 展開時のチップ */}
              {statusExpanded && (
                <div style={{ padding: "0 10px 10px" }}>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {ATTACK_STATUSES.map(st => {
                      const isActive = filterStatuses.includes(st);
                      const count = (data.jiage || []).filter(j => j.status === st).length;
                      const color = stColor(st);
                      return (
                        <button key={st} onClick={() => {
                          setFilterStatuses(prev => prev.includes(st) ? prev.filter(s => s !== st) : [...prev, st]);
                        }} style={{
                          padding: "5px 10px", borderRadius: 16, cursor: "pointer", fontSize: 11,
                          background: isActive ? color : C.bg,
                          color: isActive ? "#fff" : (count > 0 ? color : C.muted),
                          border: `1.5px solid ${isActive ? color : (count > 0 ? color + "55" : C.borderDim)}`,
                          fontFamily: "inherit", whiteSpace: "nowrap", fontWeight: isActive ? 700 : 400,
                        }}>
                          {isActive ? "✓ " : ""}{st} <span style={{ opacity: 0.7, fontSize: 10 }}>{count}</span>
                        </button>
                      );
                    })}
                    {filterStatuses.length > 0 && (
                      <button onClick={() => setFilterStatuses([])} style={{
                        padding: "5px 10px", borderRadius: 16, cursor: "pointer", fontSize: 11,
                        background: "transparent", color: C.muted, border: `1.5px solid ${C.borderDim}`,
                        fontFamily: "inherit",
                      }}>✕ 解除</button>
                    )}
                  </div>
                </div>
              )}

              {/* 折りたたみ時の選択解除リンク */}
              {!statusExpanded && hasSelection && (
                <div style={{ padding: "0 12px 8px" }}>
                  <button onClick={() => setFilterStatuses([])} style={{
                    background: "transparent", border: "none", color: C.muted,
                    fontSize: 10, cursor: "pointer", padding: 0, fontFamily: "inherit",
                  }}>✕ 状況絞り込みを解除</button>
                </div>
              )}
            </div>
          );
        })()}

        {/* 🔍 検索（対象選択 + 入力） */}
        <div style={{ marginBottom: 4 }}>
          <div style={{ display: "flex", gap: 4, marginBottom: 6, flexWrap: "wrap" }}>
            {[
              { key: "address",    label: "🏠 物件住所" },
              { key: "ownerAddr",  label: "📮 所有者住所" },
              { key: "ownerName",  label: "👤 所有者名" },
              { key: "all",        label: "🔍 すべて" },
            ].map(t => {
              const active = searchTarget === t.key;
              return (
                <button key={t.key} onClick={() => setSearchTarget(t.key)} style={{
                  padding: "5px 10px", borderRadius: 6, cursor: "pointer", fontSize: 11, fontWeight: 700,
                  background: active ? C.accent : C.bg,
                  color: active ? "#fff" : C.muted,
                  border: `1.5px solid ${active ? C.accent : C.borderDim}`,
                  fontFamily: "inherit", whiteSpace: "nowrap",
                }}>{t.label}</button>
              );
            })}
          </div>
          <div style={{ position: "relative" }}>
            <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: C.muted, fontSize: 14 }}>🔍</span>
            <input
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder={
                searchTarget === "address" ? "物件住所で検索（例: 熊谷市柿沼）" :
                searchTarget === "ownerAddr" ? "所有者住所で検索（例: 大宮区桜木町）" :
                searchTarget === "ownerName" ? "所有者名で検索（例: 田中太郎）" :
                "全項目から検索..."
              }
              style={{ ...inp, paddingLeft: 36, fontSize: 14, padding: "10px 14px 10px 36px" }} />
            {search && (
              <button onClick={() => setSearch("")} style={{
                position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)",
                background: "transparent", border: "none", color: C.muted, fontSize: 18, cursor: "pointer",
                padding: "4px 8px", fontFamily: "inherit",
              }}>✕</button>
            )}
          </div>
        </div>
        <div style={{ color: C.muted, fontSize: 11, marginTop: 6 }}>{filtered.length}件表示</div>
      </div>

      {/* 地図ビュー */}
      {viewMode === "map" && (
        <div style={{ padding: "12px 14px" }}>

          {/* 📍 ピンを立てる対象を選択 */}
          <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 10, padding: "8px 10px", marginBottom: 10 }}>
            <div style={{ fontSize: 11, color: C.muted, fontWeight: 700, marginBottom: 5 }}>📍 マップに表示する住所</div>
            <div style={{ display: "flex", gap: 6 }}>
              {[
                { key: "address",   label: "🏠 物件住所",   desc: "物件の場所にピン" },
                { key: "ownerAddr", label: "📮 所有者住所", desc: "所有者の自宅にピン" },
              ].map(t => {
                const active = mapPinTarget === t.key;
                const count = filtered.filter(i => {
                  if (t.key === "address") return !!i.address;
                  return !!i.ownerAddress;
                }).length;
                return (
                  <button key={t.key} onClick={() => setMapPinTarget(t.key)} style={{
                    flex: 1, padding: "8px 10px", borderRadius: 8, cursor: "pointer",
                    background: active ? C.accent : C.bg,
                    color: active ? "#fff" : C.text,
                    border: `1.5px solid ${active ? C.accent : C.borderDim}`,
                    fontFamily: "inherit", textAlign: "left",
                    display: "flex", flexDirection: "column", gap: 1,
                  }}>
                    <span style={{ fontSize: 12, fontWeight: 700 }}>{t.label} <span style={{ opacity: 0.8 }}>({count})</span></span>
                    <span style={{ fontSize: 9, opacity: 0.8, fontWeight: 400 }}>{t.desc}</span>
                  </button>
                );
              })}
            </div>
          </div>

          {/* 🗺️ Leaflet地図表示 */}
          {(() => {
            const itemsWithCoord = filtered.filter(i => {
              const lat = mapPinTarget === "ownerAddr" ? i.ownerLat : i.lat;
              const lng = mapPinTarget === "ownerAddr" ? i.ownerLng : i.lng;
              return typeof lat === "number" && typeof lng === "number";
            });
            const itemsNoCoord = filtered.filter(i => {
              const addr = mapPinTarget === "ownerAddr" ? i.ownerAddress : i.address;
              const lat = mapPinTarget === "ownerAddr" ? i.ownerLat : i.lat;
              return !!addr && (typeof lat !== "number");
            });
            
            return (
              <div style={{ marginBottom: 14 }}>
                {/* ジオコーディング進捗・実行 */}
                {geocodeProgress ? (
                  <div style={{ background: C.accentBg, border: `1px solid ${C.accent}66`, borderRadius: 10, padding: "12px 14px", marginBottom: 10 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: C.accent, marginBottom: 6 }}>
                      🛰️ ジオコーディング中... {geocodeProgress.current} / {geocodeProgress.total}件
                    </div>
                    <div style={{ height: 8, background: C.panelBg, borderRadius: 4, overflow: "hidden", marginBottom: 8 }}>
                      <div style={{
                        height: "100%", width: `${(geocodeProgress.current / geocodeProgress.total * 100).toFixed(1)}%`,
                        background: C.accent, transition: "width 0.3s",
                      }} />
                    </div>
                    <button onClick={() => { cancelGeocodeRef.current = true; }} style={{
                      background: "transparent", border: `1px solid ${C.danger}`, color: C.danger,
                      borderRadius: 6, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit",
                    }}>⏸️ 中断</button>
                  </div>
                ) : itemsNoCoord.length > 0 ? (
                  <button onClick={() => runGeocoding(mapPinTarget)} style={{
                    width: "100%", padding: "12px", marginBottom: 10,
                    background: C.warn, color: "#000",
                    border: "none", borderRadius: 10, cursor: "pointer",
                    fontSize: 13, fontWeight: 800, fontFamily: "inherit",
                  }}>
                    🛰️ ジオコーディング実行（未取得 {itemsNoCoord.length}件・約{Math.max(1, Math.ceil(itemsNoCoord.length * 0.3 / 60))}分）
                  </button>
                ) : null}

                {/* ⚠️ 未取得物件の大きな警告バナー（目立つ位置） */}
                {!geocodeProgress && itemsNoCoord.length > 0 && itemsWithCoord.length > 0 && (
                  <button onClick={() => setShowFailedList(true)} style={{
                    width: "100%", padding: "14px", marginBottom: 12,
                    background: "linear-gradient(90deg, #ef4444, #f59e0b)",
                    color: "#fff", border: "none", borderRadius: 12,
                    cursor: "pointer", fontSize: 14, fontWeight: 800,
                    fontFamily: "inherit",
                    display: "flex", justifyContent: "space-between", alignItems: "center",
                    boxShadow: "0 2px 8px rgba(239, 68, 68, 0.3)",
                  }}>
                    <span style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 2 }}>
                      <span>⚠️ 未取得 {itemsNoCoord.length}件あります</span>
                      <span style={{ fontSize: 10, fontWeight: 400, opacity: 0.9 }}>タップして1件ずつ修正できます</span>
                    </span>
                    <span style={{ fontSize: 20 }}>→</span>
                  </button>
                )}

                {/* 地図 */}
                {itemsWithCoord.length > 0 ? (
                  <>
                    <LeafletMap 
                      items={itemsWithCoord}
                      onPinClick={(it) => setSelected({ item: it })}
                      pinTarget={mapPinTarget}
                      height={420}
                    />
                    <div style={{ marginTop: 8, fontSize: 11, color: C.muted, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 6 }}>
                      <span>📍 {itemsWithCoord.length}件のピンを表示中</span>
                      {itemsNoCoord.length > 0 && (
                        <button onClick={() => setShowFailedList(true)} style={{
                          background: C.warn + "22", color: C.warn, border: `1px solid ${C.warn}66`,
                          borderRadius: 6, padding: "4px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                        }}>⚠️ 未取得 {itemsNoCoord.length}件を確認</button>
                      )}
                    </div>

                    {/* ピン色凡例 */}
                    <div style={{ marginTop: 8, background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 8, padding: "8px 10px" }}>
                      <div style={{ fontSize: 10, color: C.muted, marginBottom: 5, fontWeight: 700 }}>🎨 ピン色凡例</div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, fontSize: 10 }}>
                        {[
                          { c: "#94a3b8", l: "未訪問" },
                          { c: "#3b82f6", l: "訪問済" },
                          { c: "#f59e0b", l: "不在" },
                          { c: "#10b981", l: "見込・興味あり" },
                          { c: "#06b6d4", l: "仕入れ完了" },
                          { c: "#64748b", l: "居住" },
                          { c: "#ef4444", l: "NG" },
                        ].map(it => (
                          <span key={it.l} style={{ display: "flex", alignItems: "center", gap: 3 }}>
                            <span style={{ width: 10, height: 10, borderRadius: "50%", background: it.c, border: "1.5px solid white" }} />
                            <span style={{ color: C.muted }}>{it.l}</span>
                          </span>
                        ))}
                      </div>
                    </div>
                  </>
                ) : (
                  <div style={{ background: C.warnBg, border: `1px solid ${C.warn}55`, borderRadius: 10, padding: "20px 16px", textAlign: "center", marginBottom: 10 }}>
                    <div style={{ fontSize: 32, marginBottom: 8 }}>🗺️</div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: C.warn, marginBottom: 6 }}>まだピンを立てる準備ができていません</div>
                    <div style={{ fontSize: 11, color: C.muted, lineHeight: 1.6 }}>
                      上のボタンで「ジオコーディング」を実行すると、<br />
                      住所を緯度経度に変換してピンを立てられます
                    </div>
                  </div>
                )}
              </div>
            );
          })()}

          {/* 物件カード（地図ビュー用・コンパクト） */}
          {filtered.map(item => {
            const overdue = isOverdue(item);
            const nogo = isNoGo(item);
            return (
              <div key={item.id} style={{
                background: nogo ? C.dangerBg : C.cardBg,
                border: `2px solid ${nogo ? C.danger : overdue ? C.danger + "66" : item.status === "見込" || item.status === "興味あり" ? C.success + "55" : C.borderDim}`,
                borderRadius: 16, marginBottom: 10, overflow: "hidden",
                opacity: nogo ? 0.85 : 1,
                position: "relative",
              }}>
                {nogo && (
                  <div style={{
                    position: "absolute", top: 0, left: 0, right: 0,
                    background: C.danger, color: "#fff",
                    padding: "4px 12px", fontSize: 11, fontWeight: 800,
                    textAlign: "center", letterSpacing: "0.05em", zIndex: 1,
                  }}>⛔ NG物件・訪問禁止</div>
                )}
                <div style={{ paddingTop: nogo ? 24 : 0 }}>
                {/* ステータスバー */}
                <div style={{ display: "flex", gap: 6, padding: "10px 14px 8px", alignItems: "center", flexWrap: "wrap", borderBottom: `1px solid ${C.borderDim}` }}>
                  <Tag label={item.type === "jiage" ? "📍地上げ" : "👤所有者"} color={item.type === "jiage" ? C.accent : C.purple} />
                  <StatusTag status={item.status} />
                  <MemberTag name={item.assignee} />
                  {overdue && <Tag label="⚠ 期限切れ" color={C.danger} />}
                  <span style={{ marginLeft: "auto", color: C.muted, fontSize: 11 }}>{item.nextDate ? `次回 ${item.nextDate}` : ""}</span>
                </div>

                {/* 物件住所 */}
                <div style={{ padding: "10px 14px 8px", borderBottom: `1px solid ${C.borderDim}` }}>
                  <div style={{ fontSize: 11, color: C.accent, fontWeight: 700, marginBottom: 3 }}>🏠 物件住所</div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 8 }}>{item.address}</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <a href={navUrl(item.address)} target="_blank" rel="noopener noreferrer"
                      style={{ flex: 1, background: C.success + "22", border: `1px solid ${C.success}55`, color: C.success, borderRadius: 8, padding: "8px", fontSize: 13, fontWeight: 700, textDecoration: "none", textAlign: "center" }}>
                      🚗 物件にナビ
                    </a>
                    <a href={item.ownerAddress ? navUrl(item.ownerAddress) : navUrl(item.address)} target="_blank" rel="noopener noreferrer"
                      style={{ flex: 1, background: C.accent + "22", border: `1px solid ${C.accent}55`, color: C.accent, borderRadius: 8, padding: "8px", fontSize: 13, fontWeight: 700, textDecoration: "none", textAlign: "center" }}>
                      🚗 所有者にナビ
                    </a>
                  </div>
                </div>

                {/* 所有者情報 */}
                <div style={{ padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 11, color: C.purple, fontWeight: 700, marginBottom: 3 }}>👤 所有者</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{item.ownerName || <span style={{ color: C.muted, fontSize: 13 }}>不明</span>}</div>
                    {item.ownerAddress && <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>📮 {item.ownerAddress}</div>}
                  </div>
                  <button style={{ ...btnStyle("ghost"), padding: "8px 12px", fontSize: 12 }} onClick={() => setSelected({ item })}>詳細</button>
                </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* リストビュー */}
      {viewMode === "list" && (
        <div style={{ padding: "12px 14px" }}>
          {/* ⚠️ 座標未取得物件の案内（リストビュー） */}
          {(() => {
            const noCoordCount = filtered.filter(i => 
              !!i.address && typeof i.lat !== "number"
            ).length;
            if (noCoordCount === 0) return null;
            return (
              <button onClick={() => { setViewMode("map"); setShowFailedList(true); }} style={{
                width: "100%", padding: "12px", marginBottom: 10,
                background: "linear-gradient(90deg, #ef4444, #f59e0b)",
                color: "#fff", border: "none", borderRadius: 10,
                cursor: "pointer", fontSize: 13, fontWeight: 800, fontFamily: "inherit",
                display: "flex", justifyContent: "space-between", alignItems: "center",
              }}>
                <span style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 2 }}>
                  <span>⚠️ マップで位置未取得が {noCoordCount}件 あります</span>
                  <span style={{ fontSize: 10, fontWeight: 400, opacity: 0.9 }}>タップして修正画面へ</span>
                </span>
                <span style={{ fontSize: 18 }}>→</span>
              </button>
            );
          })()}

          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
            <FilterChips options={MEMBERS} value={filterMembers} onChange={setFilterMembers} multi />
          </div>
          {filtered.map(item => {
            const overdue = isOverdue(item);
            const nogo = isNoGo(item);
            const isHighlight = (item.type === "jiage" && highlightJiageId === item.rawId) || (item.type === "owner" && highlightOwnerId === item.rawId);
            return (
              <div
                key={item.id}
                id={item.type === "jiage" ? `jiage-item-${item.rawId}` : `owner-item-${item.rawId}`}
                style={{
                  background: nogo ? C.dangerBg : isHighlight ? "linear-gradient(135deg, rgba(14,165,233,0.15), rgba(34,197,94,0.10))" : C.cardBg,
                  border: isHighlight ? `2px solid ${C.accent}` : `2px solid ${nogo ? C.danger : overdue ? C.danger + "66" : item.status === "見込" || item.status === "興味あり" ? C.success + "55" : C.borderDim}`,
                  borderRadius: 16, marginBottom: 12, overflow: "hidden",
                  opacity: nogo ? 0.85 : 1,
                  position: "relative",
                  boxShadow: isHighlight ? `0 0 24px ${C.accent}66` : "none",
                  transition: "all 0.4s",
                }}>
                {nogo && (
                  <div style={{
                    position: "absolute", top: 0, left: 0, right: 0,
                    background: C.danger, color: "#fff",
                    padding: "4px 12px", fontSize: 11, fontWeight: 800,
                    textAlign: "center", letterSpacing: "0.05em", zIndex: 1,
                  }}>⛔ NG物件・訪問禁止</div>
                )}
                {/* ステータスバー */}
                <div style={{ display: "flex", gap: 6, padding: nogo ? "32px 14px 8px" : "10px 14px 8px", alignItems: "center", flexWrap: "wrap", borderBottom: `1px solid ${C.borderDim}` }}>
                  <Tag label={item.type === "jiage" ? "📍地上げ" : "👤所有者"} color={item.type === "jiage" ? C.accent : C.purple} />
                  <StatusTag status={item.status} />
                  {item.subStatus && <Tag label={item.subStatus} color={item.dm === "未" ? C.muted : C.accent} />}
                  <MemberTag name={item.assignee} />
                  {item.history.length > 0 && <Tag label={`履歴${item.history.length}件`} color={C.muted} />}
                  {overdue && <Tag label="⚠ 期限切れ" color={C.danger} />}
                  <span style={{ marginLeft: "auto", color: C.muted, fontSize: 11 }}>{item.nextDate ? `次回 ${item.nextDate}` : ""}</span>
                </div>

                {/* 物件住所ブロック */}
                <div style={{ padding: "12px 14px 10px", borderBottom: `1px solid ${C.borderDim}` }}>
                  <div style={{ fontSize: 11, color: C.accent, fontWeight: 700, marginBottom: 4, letterSpacing: "0.06em" }}>🏠 物件住所</div>
                  <div style={{ fontSize: 15, fontWeight: 800, color: C.text, marginBottom: 8 }}>{item.address || "住所未設定"}</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <a href={navUrl(item.address)} target="_blank" rel="noopener noreferrer"
                      style={{ flex: 1, background: C.success + "22", border: `1px solid ${C.success}55`, color: C.success, borderRadius: 8, padding: "8px", fontSize: 13, fontWeight: 700, textDecoration: "none", textAlign: "center" }}>
                      🚗 物件にナビ
                    </a>
                    <a href={item.ownerAddress ? navUrl(item.ownerAddress) : navUrl(item.address)} target="_blank" rel="noopener noreferrer"
                      style={{ flex: 1, background: C.accent + "22", border: `1px solid ${C.accent}55`, color: C.accent, borderRadius: 8, padding: "8px", fontSize: 13, fontWeight: 700, textDecoration: "none", textAlign: "center" }}>
                      🚗 所有者にナビ
                    </a>
                  </div>
                </div>

                {/* 所有者情報ブロック */}
                <div style={{ padding: "12px 14px 10px", borderBottom: `1px solid ${C.borderDim}` }}>
                  <div style={{ fontSize: 11, color: C.purple, fontWeight: 700, marginBottom: 6, letterSpacing: "0.06em" }}>👤 所有者情報</div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 3 }}>
                        {item.ownerName || <span style={{ color: C.muted, fontSize: 13 }}>所有者不明</span>}
                      </div>
                      {item.ownerContact && (
                        <div style={{ fontSize: 13, color: C.accent, marginBottom: 4 }}>{item.ownerContact}</div>
                      )}
                      {item.ownerAddress ? (
                        <div style={{ fontSize: 12, color: C.muted }}>
                          📮 {item.ownerAddress}
                        </div>
                      ) : (
                        <div style={{ fontSize: 12, color: "#334155" }}>所有者住所: 未登録</div>

              <div style={{ background: C.panelBg, border: `1px solid ${C.borderDim}`, borderRadius: 10, padding: 12, marginBottom: 14 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.accent, marginBottom: 8 }}>⏰ 訪問履歴（{log.length}回）</div>

                    <div style={{ fontSize: 16, fontWeight: 800, color: "#f59e0b" }}>{analysis.ignore}</div>

                  <div style={{ background: "#94a3b822", borderRadius: 6, padding: "6px 8px", textAlign: "center" }}>
                    <div style={{ fontSize: 9, color: C.muted }}>不在</div>

                <div style={{ marginBottom: 10 }}>

                    if (!resDef) return null;
                    const dowLabel = (v.dayOfWeek !== undefined && v.dayOfWeek !== null) ? DOW_LABELS[v.dayOfWeek] : "?";
                    // 古い順での順番（1回目、2回目...）を計算
                    const visitNumber = log.length - sortedLog.indexOf(v);
                    return (
                      <div key={v.id} style={{ padding: "8px 0", borderBottom: `1px solid ${C.borderDim}`, fontSize: 11 }}>

                          <span style={{ flex: 1 }} />

                      </div>

                </div>
                {/* パターン分析 */}
                {(analysis.absent > 0 || analysis.ignore > 0) && (
                  <div style={{ background: C.warnBg, border: `1px solid ${C.warn}44`, borderRadius: 8, padding: "8px 10px" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: C.warn, marginBottom: 5 }}>💡 パターン分析</div>
                    {analysis.ignore > 0 && (() => {
                      const ignoreBuckets = Object.entries(analysis.buckets).filter(([k, v]) => v.ignore > 0);
                      return (
                        <div style={{ fontSize: 10, color: C.muted, marginBottom: 3, lineHeight: 1.5 }}>
                          🚪 居留守パターン: <span style={{ color: "#f59e0b", fontWeight: 700 }}>{ignoreBuckets.map(([k]) => k).join(" / ")}</span><br />
                          → 同じ時間でも粘り訪問・夜間訪問・手紙作戦が有効
                        </div>
                      );
                    })()}
                    {analysis.absent > 0 && (() => {
                      const absentBuckets = Object.entries(analysis.buckets).filter(([k, v]) => v.absent > 0);
                      return (
                        <div style={{ fontSize: 10, color: C.muted, lineHeight: 1.5 }}>
                          🚫 不在パターン: <span style={{ color: "#94a3b8", fontWeight: 700 }}>{absentBuckets.map(([k]) => k).join(" / ")}</span><br />

                    })()}

              </div>

          })()}

            <select style={inp} value={selected.item.status} onChange={e => updateStatus(selected.item, e.target.value)}>

            </select>
          </Field>
          <Field label="次回訪問日">
            <input type="date" style={inp} value={selected.item.nextDate || ""} onChange={e => updateNextDate(selected.item, e.target.value)} />
          </Field>

            <div style={{ borderTop: `1px solid ${C.borderDim}`, paddingTop: 14, marginTop: 4 }}>

                アタック履歴 ({selected.item.history.length}件)
              </div>

              {[...selected.item.history].reverse().map((h, i) => (
                <div key={i} style={{ borderLeft: `3px solid ${C.accent}`, paddingLeft: 12, marginBottom: 14 }}>
                  <div style={{ fontSize: 12, color: C.muted, marginBottom: 4 }}>{h.date} · {h.method} · {h.member}</div>
                  <div style={{ fontSize: 14, color: C.text }}>{h.note}</div>
                </div>
              ))}
              <div style={{ borderTop: `1px solid ${C.borderDim}`, paddingTop: 14 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 10 }}>履歴を追加</div>
                <Field label="日付"><input type="date" style={inp} value={histForm.date} onChange={e => setHistForm(h => ({ ...h, date: e.target.value }))} /></Field>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <Field label="方法"><select style={inp} value={histForm.method} onChange={e => setHistForm(h => ({ ...h, method: e.target.value }))}>{["手紙", "電話", "訪問", "その他"].map(m => <option key={m}>{m}</option>)}</select></Field>
                  <Field label="担当"><select style={inp} value={histForm.member} onChange={e => setHistForm(h => ({ ...h, member: e.target.value }))}>{MEMBERS.map(m => <option key={m}>{m}</option>)}</select></Field>
                </div>
                <Field label="内容・結果"><textarea style={{ ...inp, height: 80, resize: "vertical" }} value={histForm.note} onChange={e => setHistForm(h => ({ ...h, note: e.target.value }))} placeholder="電話にて対応。売却検討中とのこと。" /></Field>
                <button style={{ ...btnStyle(), width: "100%" }} onClick={addHistory}>履歴を追加する</button>
              </div>
            </div>

            <button onClick={() => promoteToSekisan(selected.item)} style={{
              width: "100%", padding: "13px", background: C.warn + "22", border: `1px solid ${C.warn}66`,
              color: C.warn, borderRadius: 10, cursor: "pointer", fontSize: 14, fontWeight: 700, fontFamily: "inherit",
            }}>🧮 仕入検討積算表を作成する</button>
            <div style={{ fontSize: 10, color: C.muted, marginTop: 6, lineHeight: 1.5 }}>
              住所・担当者を引き継いで「仕入検討積算表」を新規作成します
            </div>
          </div>

          {/* 編集・削除（誰でも可） */}

            <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={() => openEdit(selected.item)}>編集する</button>
            <button style={{ ...btnStyle("danger"), flex: 1 }} onClick={() => handleDelete(selected.item)}>削除する</button>
          </div>
        </BottomSheet>

        <BottomSheet title={`${editItem ? "編集" : "新規"} — ${addType === "jiage" ? "📍地上げ物件" : "👤所有者アタック"}`} onClose={() => { setShowAdd(false); setEditItem(null); }}>

          <Field label="所有者住所"><input style={inp} value={addType === "jiage" ? form.ownerAddr || "" : form.ownerAddress || ""} onChange={e => setForm(p => ({ ...p, [addType === "jiage" ? "ownerAddr" : "ownerAddress"]: e.target.value }))} placeholder="謄本記載の住所" /></Field>

              <Field label="訪問状況"><select style={inp} value={form.status} onChange={f("status")}>{ATTACK_STATUSES.map(s => <option key={s}>{s}</option>)}</select></Field>
              <Field label="次回訪問日"><input type="date" style={inp} value={form.nextVisit || ""} onChange={f("nextVisit")} /></Field>
            </>

            <>
              <Field label="ステータス"><select style={inp} value={form.status} onChange={f("status")}>{OWNER_STATUSES.map(s => <option key={s}>{s}</option>)}</select></Field>
              <Field label="次回フォロー日"><input type="date" style={inp} value={form.nextFollowDate || ""} onChange={f("nextFollowDate")} /></Field>
            </>

          <Field label="メモ"><textarea style={{ ...inp, height: 80, resize: "vertical" }} value={form.memo || ""} onChange={f("memo")} /></Field>
          <div style={{ display: "flex", gap: 10, marginTop: 8 }}>

            <button style={{ ...btnStyle(), flex: 2 }} onClick={handleSave}>保存する</button>

        </BottomSheet>

      {/* ⚠️ ジオコーディング失敗物件リスト */}

        const failedItems = filtered.filter(i => {
          const addr = mapPinTarget === "ownerAddr" ? i.ownerAddress : i.address;
          const lat = mapPinTarget === "ownerAddr" ? i.ownerLat : i.lat;
          return !!addr && (typeof lat !== "number");
        });
        return (
          <BottomSheet title={`⚠️ 未取得 ${failedItems.length}件（${mapPinTarget === "ownerAddr" ? "所有者住所" : "物件住所"}）`} onClose={() => setShowFailedList(false)}>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 12, lineHeight: 1.5 }}>
              緯度経度を取得できなかった物件です。<br />
              ✅ 「住所を編集」で正確な住所に直す<br />
              ✅ 「マップで指定」でタップして位置を指定する<br />
              のどちらかで補正してください
            </div>
            
            {/* 一括再試行ボタン */}
            <button onClick={() => {
              setShowFailedList(false);
              runGeocoding(mapPinTarget);
            }} style={{
              width: "100%", padding: "10px", marginBottom: 14,
              background: C.accent, color: "#fff",
              border: "none", borderRadius: 8, cursor: "pointer",
              fontSize: 12, fontWeight: 700, fontFamily: "inherit",
            }}>🛰️ 全件をもう一度ジオコーディング</button>

            {/* 失敗物件リスト */}
            <div style={{ maxHeight: 500, overflowY: "auto" }}>
              {failedItems.map(item => {
                const addr = mapPinTarget === "ownerAddr" ? item.ownerAddress : item.address;
                return (
                  <div key={item.id} style={{ 
                    background: C.panelBg, border: `1px solid ${C.borderDim}`, borderRadius: 10,
                    padding: 10, marginBottom: 8, fontSize: 12,
                  }}>
                    <div style={{ color: C.text, fontWeight: 700, marginBottom: 4 }}>📍 {addr}</div>
                    {item.ownerName && <div style={{ color: C.muted, fontSize: 11, marginBottom: 6 }}>👤 {item.ownerName}</div>}
                    
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                      <a href={`https://www.google.com/maps/search/${encodeURIComponent(addr)}`}
                         target="_blank" rel="noopener noreferrer"
                         style={{
                           background: C.success + "22", color: C.success,
                           border: `1px solid ${C.success}55`, borderRadius: 6,
                           padding: "5px 10px", fontSize: 11, fontWeight: 700,
                           textDecoration: "none", flex: 1, textAlign: "center",
                         }}>🗺️ Googleマップで確認</a>
                      <button onClick={async () => {
                        const result = await geocodeAddress(addr);
                        if (result) {
                          const isOwner = mapPinTarget === "ownerAddr";
                          setData(d => ({
                            ...d,
                            jiage: (d.jiage || []).map(j => {
                              if (j.id !== item.rawId) return j;
                              return isOwner
                                ? { ...j, ownerLat: result.lat, ownerLng: result.lng }
                                : { ...j, lat: result.lat, lng: result.lng };
                            })
                          }));
                          alert(`✅ 取得成功！\n${result.matchedAddress || ""}`);
                        } else {
                          alert("❌ やっぱり失敗しました。住所を編集するか、マップで手動指定してください");
                        }
                      }} style={{
                        background: C.accent + "22", color: C.accent,
                        border: `1px solid ${C.accent}55`, borderRadius: 6,
                        padding: "5px 10px", fontSize: 11, fontWeight: 700,
                        cursor: "pointer", flex: 1, fontFamily: "inherit",
                      }}>🔄 再試行</button>
                      <button onClick={() => {
                        setShowFailedList(false);
                        setManualPinTarget({ item, target: mapPinTarget });
                      }} style={{
                        background: C.warn + "22", color: C.warn,
                        border: `1px solid ${C.warn}55`, borderRadius: 6,
                        padding: "5px 10px", fontSize: 11, fontWeight: 700,
                        cursor: "pointer", flex: 1, fontFamily: "inherit",
                      }}>📍 マップで指定</button>
                    </div>
                  </div>
                );
              })}
              {failedItems.length === 0 && (
                <div style={{ textAlign: "center", color: C.muted, fontSize: 12, padding: 20 }}>
                  ✅ すべての物件の緯度経度を取得できました！
                </div>
              )}
            </div>
          </BottomSheet>
        );
      })()}

      {/* 📍 マップで手動位置指定モーダル */}
      {manualPinTarget && (() => {
        const isOwner = manualPinTarget.target === "ownerAddr";
        const addr = isOwner ? manualPinTarget.item.ownerAddress : manualPinTarget.item.address;
        return (
          <ManualPinMap
            address={addr}
            onCancel={() => setManualPinTarget(null)}
            onSelect={(latlng) => {
              setData(d => ({
                ...d,
                jiage: (d.jiage || []).map(j => {
                  if (j.id !== manualPinTarget.item.rawId) return j;
                  return isOwner
                    ? { ...j, ownerLat: latlng.lat, ownerLng: latlng.lng }
                    : { ...j, lat: latlng.lat, lng: latlng.lng };
                })
              }));
              setManualPinTarget(null);
              setShowFailedList(true); // 失敗リストに戻る
            }}
          />
        );
      })()}

      {/* 📍 訪問結果記録BottomSheet */}
      {visitRecordTarget && visitForm && (
        <BottomSheet title={`📍 訪問記録 - ${visitRecordTarget.address || "(無住所)"}`} onClose={() => { setVisitRecordTarget(null); setVisitForm(null); }}>
          {/* 何回目の訪問か */}
          {(() => {
            const currentLog = (visitRecordTarget.raw && visitRecordTarget.raw.visitLog) || [];
            const visitNum = currentLog.length + 1;
            return (
              <div style={{ background: "#fbbf2422", border: `1px solid #fbbf2455`, borderRadius: 10, padding: "8px 12px", marginBottom: 12, textAlign: "center" }}>

                {currentLog.length > 0 && (
                  <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>
                    前回: {currentLog[currentLog.length - 1].date} ({DOW_LABELS[currentLog[currentLog.length - 1].dayOfWeek]}) {currentLog[currentLog.length - 1].time}
                    {(() => {
                      const lastResult = VISIT_RESULTS.find(r => r.key === currentLog[currentLog.length - 1].result);

                  </div>
                )}
              </div>
            );

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Field label="📅 訪問日">

// Excelインポートモーダル（エリア選択）
function ImportModal({ onClose, onImport, importing, currentCount }) {
  const [selectedAreas, setSelectedAreas] = useState([...JIAGE_AREAS]);
  const [loaded, setLoaded] = useState(false);
  const [counts, setCounts] = useState({});

  // インポートデータをlocalStorageに保存（初回のみ）
  useEffect(() => {
    const existing = localStorage.getItem("hikari_jiage_import");
    if (existing) {
      const d = JSON.parse(existing);
      const c = {};
      JIAGE_AREAS.forEach(area => { c[area] = (d[area] || []).length; });
      setCounts(c);
      setLoaded(true);
    } else {
      // データをlocalStorageに保存
      const importData = JIAGE_EXCEL_DATA;
      localStorage.setItem("hikari_jiage_import", JSON.stringify(importData));
      const c = {};
      JIAGE_AREAS.forEach(area => { c[area] = (importData[area] || []).length; });
      setCounts(c);
      setLoaded(true);
    }
  }, []);

  const totalSelected = selectedAreas.reduce((a, area) => a + (counts[area] || 0), 0);
  const hasData = Object.values(counts).some(c => c > 0);

  const toggle = area => setSelectedAreas(s => s.includes(area) ? s.filter(a => a !== area) : [...s, area]);

  return (
    <BottomSheet title="📥 Excelデータをインポート" onClose={onClose}>
      <div style={{ background: hasData ? C.successBg : C.warnBg, border: `1px solid ${hasData ? C.success : C.warn}44`, borderRadius: 12, padding: 14, marginBottom: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: hasData ? C.success : C.warn, marginBottom: 6 }}>
          {hasData ? "取り込みデータについて" : "⚠ インポート用データが未設定です"}
        </div>
        <div style={{ fontSize: 12, color: C.muted, lineHeight: 1.6 }}>
          {hasData ? (
            <>
              地上げExcelファイルから<span style={{ color: C.text }}> {Object.values(counts).reduce((a,b)=>a+b,0)}件</span>のデータを取り込めます。<br />
              エリアを選択してインポートしてください。<br />
              現在の登録数: <span style={{ color: C.accent }}>{currentCount}件</span>
            </>
          ) : (
            <>
              インポート用のExcelデータがコードに登録されていません。<br />
              Excelデータの登録方法を相談したい場合はクロードに聞いてください。<br />
              現在の登録数: <span style={{ color: C.accent }}>{currentCount}件</span>
            </>
          )}
        </div>
      </div>

      <Field label="インポートするエリアを選択">
        <div style={{ display: "grid", gap: 8 }}>
          <button onClick={() => setSelectedAreas(selectedAreas.length === JIAGE_AREAS.length ? [] : [...JIAGE_AREAS])} style={{ ...btnStyle("ghost"), width: "100%", fontSize: 13 }}>
            {selectedAreas.length === JIAGE_AREAS.length ? "全解除" : "全選択"}
          </button>
          {JIAGE_AREAS.map(area => {
            const isSelected = selectedAreas.includes(area);
            const count = counts[area] || 0;
            return (
              <button key={area} onClick={() => toggle(area)} style={{
                display: "flex", justifyContent: "space-between", alignItems: "center",
                background: isSelected ? C.purple + "22" : C.bg,
                border: `2px solid ${isSelected ? C.purple : C.borderDim}`,
                borderRadius: 10, padding: "12px 16px", cursor: "pointer", fontFamily: "inherit",
              }}>
                <span style={{ color: isSelected ? C.purple : C.text, fontWeight: 700, fontSize: 15 }}>
                  {isSelected ? "✅" : "⬜"} {area}
                </span>
                <span style={{ color: C.muted, fontSize: 13 }}>{count}件</span>
              </button>
            );
          })}
        </div>
      </Field>

      <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 10, padding: "10px 14px", marginBottom: 16, display: "flex", justifyContent: "space-between" }}>
        <span style={{ color: C.muted, fontSize: 13 }}>インポート件数</span>
        <span style={{ color: C.success, fontWeight: 700, fontSize: 16 }}>{totalSelected}件</span>
      </div>

      <div style={{ display: "flex", gap: 10 }}>
        <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={onClose}>キャンセル</button>
        <button
          style={{ ...btnStyle(), flex: 2, background: C.success, borderColor: C.success, opacity: importing || selectedAreas.length === 0 || totalSelected === 0 ? 0.6 : 1 }}
          onClick={() => onImport(selectedAreas)}
          disabled={importing || selectedAreas.length === 0 || totalSelected === 0}
        >
          {importing ? "インポート中..." : `📥 ${totalSelected}件をインポート`}
        </button>
      </div>
    </BottomSheet>
  );
}

// ===================== Web Push 購読セクション =====================
function WebPushSection({ currentUser, data }) {
  const [pushStatus, setPushStatus] = useState("checking"); // "checking"|"unsubscribed"|"subscribed"|"unsupported"
  const [busy, setBusy] = useState(false);
  const [lastError, setLastError] = useState("");

  // 初期状態チェック（3秒タイムアウト＋SW再登録＋自動再購読）
  useEffect(() => {
    (async () => {
      if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
        setPushStatus("unsupported");
        return;
      }
      try {
        // ① まず既存の登録を確認。なかったらすぐ登録してみる
        let reg = await navigator.serviceWorker.getRegistration();
        if (!reg) {
          try {
            reg = await navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' });
            console.log("[Web Push] SW を新規登録しました");
          } catch (err) {
            console.warn("[Web Push] SW 登録失敗:", err);
            setPushStatus("unsubscribed");
            setLastError("Service Worker 登録失敗: " + err.message);
            return;
          }
        }
        // ② SW が ready するのを最大3秒待つ（無限待機防止）
        await Promise.race([
          navigator.serviceWorker.ready,
          new Promise((_, rej) => setTimeout(() => rej(new Error("SW ready timeout")), 3000))
        ]);
        const finalReg = await navigator.serviceWorker.ready;
        const sub = await finalReg.pushManager.getSubscription();

        if (sub) {
          // 既に購読済み
          setPushStatus("subscribed");
          // 🛡️ 保険：Supabase 側に購読情報が落ちてた場合に備えて再登録
          if (currentUser) {
            try { await savePushSubscriptionToSupabase(currentUser, sub); } catch (_) {}
          }
        } else if (Notification.permission === "granted" && currentUser) {
          // 🆕 通知許可済み + 未購読 → 自動で再購読（毎回設定し直す手間を省く）
          console.log("[Web Push] 通知許可済みで未購読 → 自動再購読を試行");
          setPushStatus("checking");
          try {
            await autoEnable();
          } catch (err) {
            console.warn("[Web Push] 自動再購読失敗:", err);
            setPushStatus("unsubscribed");
            setLastError("自動再購読失敗: " + (err.message || err));
          }
        } else {
          setPushStatus("unsubscribed");
        }
      } catch (e) {
        // タイムアウトでもエラーでも、とにかく「未購読」扱いにしてボタンを出す
        console.warn("[Web Push] 初期化エラー:", e);
        setPushStatus("unsubscribed");
        if (e.message && e.message.includes("timeout")) {
          setLastError("Service Worker の起動に時間がかかっています。下のボタンで手動有効化してください。");
        }
      }
    })();
  }, [currentUser]);

  // 通知許可済み + 未購読 のとき、ボタンを押さなくても勝手に購読する用の関数
  const autoEnable = async () => {
    if (!currentUser) return;
    const sub = await ensurePushSubscription();
    await savePushSubscriptionToSupabase(currentUser, sub);
    setPushStatus("subscribed");
    setLastError("");
    console.log("[Web Push] 自動再購読 成功");
  };

  const enable = async () => {
    if (!currentUser) {
      alert("先に「現在のユーザー」を設定してください");
      return;
    }
    setBusy(true);
    setLastError("");
    try {
      const sub = await ensurePushSubscription();
      await savePushSubscriptionToSupabase(currentUser, sub);
      setPushStatus("subscribed");
      alert(`✅ Web Push 有効化完了！\n${currentUser}さん宛の予定が、アプリ閉じてても通知されます。`);
    } catch (e) {
      console.error(e);
      setLastError(e.message);
      alert(`エラー: ${e.message}`);
    }
    setBusy(false);
  };

  const disable = async () => {
    if (!window.confirm("Web Push を解除しますか？以降、アプリ閉じてる時の通知が届かなくなります。")) return;
    setBusy(true);
    try {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (sub) await sub.unsubscribe();
      // Supabase からも削除
      if (currentUser) {
        await fetch(`${SUPABASE_URL}/rest/v1/push_subscriptions?member=eq.${encodeURIComponent(currentUser)}`, {
          method: "DELETE",
          headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
        });
      }
      setPushStatus("unsubscribed");
      alert("Web Push を解除しました");
    } catch (e) { alert(`エラー: ${e.message}`); }
    setBusy(false);
  };

  const test = async () => {
    if (!currentUser) { alert("現在のユーザーを設定してください"); return; }
    setBusy(true);
    try {
      const ok = await sendPushNotification([currentUser], "🎉 Web Push テスト", `${currentUser}さんに届いてればOK！\nアプリ閉じてても通知される設定です。`, { tag: "test-push" });
      if (ok) {
        alert("✅ テスト送信完了！\nアプリを閉じてしばらく待ってみてください。\n通知が届いたらOK。");
      } else {
        alert("❌ 送信失敗。Supabase Edge Function の設定を確認してください。\n（その他タブの手順書参照）");
      }
    } catch (e) { alert(`エラー: ${e.message}`); }
    setBusy(false);
  };

  if (pushStatus === "unsupported") {
    return (

        <div style={{ color: C.danger, fontSize: 13, fontWeight: 700 }}>❌ このブラウザはWeb Pushに非対応</div>
        <div style={{ fontSize: 11, color: C.muted, marginTop: 8 }}>Chrome / Safari (iOS 16.4+, macOS) / Firefox / Edge をご利用ください。</div>
