                      <span>このペースで年末予測: <span style={{ color: forecastPct >= 100 ? C.success : C.warn, fontWeight: 700 }}>{forecast.toLocaleString()}{g.unit}（{forecastPct.toFixed(0)}%）</span></span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* 年間目標編集ボトムシート */}
      {showGoalEdit && (
        <BottomSheet title="🎯 年間目標を編集" onClose={() => setShowGoalEdit(false)}>
          <div style={{ color: C.muted, fontSize: 13, marginBottom: 14 }}>今年の年間目標を入力してください。</div>
          <Field label="年間売上目標（万円）">
            <input type="text" inputMode="numeric" style={inp} value={goalForm.sell} onChange={e => setGoalForm(p => ({ ...p, sell: e.target.value.replace(/[^0-9]/g, "") }))} placeholder="30000" />
          </Field>
          <Field label="年間利益目標（万円）">
            <input type="text" inputMode="numeric" style={inp} value={goalForm.profit} onChange={e => setGoalForm(p => ({ ...p, profit: e.target.value.replace(/[^0-9]/g, "") }))} placeholder="6000" />
          </Field>
          <Field label="年間仕入件数目標（件）">
            <input type="text" inputMode="numeric" style={inp} value={goalForm.buyCount} onChange={e => setGoalForm(p => ({ ...p, buyCount: e.target.value.replace(/[^0-9]/g, "") }))} placeholder="30" />
          </Field>
          <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
            <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={() => setShowGoalEdit(false)}>キャンセル</button>
            <button style={{ ...btnStyle(), flex: 2 }} onClick={() => {
              if (!isAdmin) { alert("⚠️ 年間目標の編集は管理者のみ可能です"); setShowGoalEdit(false); return; }
              setData(d => ({ ...d, annualGoals: { sell: Number(goalForm.sell) || 0, profit: Number(goalForm.profit) || 0, buyCount: Number(goalForm.buyCount) || 0 } }));
              setShowGoalEdit(false);
            }}>保存する</button>
          </div>
        </BottomSheet>
      )}

      {/* 今日フォロー予定は最上段の「今日のアクション」に統合 */}

      {/* 月別売上・利益グラフ */}
      <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.text, marginBottom: 12 }}>📅 月別売上・利益（万円）</div>
        <ResponsiveContainer width="100%" height={170}>
          <BarChart data={monthlyData} margin={{ top: 0, right: 0, left: -24, bottom: 0 }}>
            <XAxis dataKey="month" tick={{ fill: C.muted, fontSize: 9 }} axisLine={false} tickLine={false} />
            <YAxis tick={{ fill: C.muted, fontSize: 9 }} axisLine={false} tickLine={false} />
            <Tooltip contentStyle={{ background: "#0a0f1a", border: `1px solid #1a2535`, borderRadius: 8, color: C.text, fontSize: 12 }} formatter={(v) => v.toFixed(0) + "万"} />
            <Bar dataKey="sell" name="売上" fill={C.accent} radius={[3, 3, 0, 0]} opacity={0.7} />
            <Bar dataKey="profit" name="利益" fill={C.success} radius={[3, 3, 0, 0]} />
          </BarChart>
        </ResponsiveContainer>
        <div style={{ display: "flex", gap: 16, justifyContent: "center", marginTop: 6 }}>
          {[["売上", C.accent, 0.7], ["利益", C.success, 1]].map(([l, c, o]) => (
            <div key={l} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: C.muted }}>
              <div style={{ width: 10, height: 10, borderRadius: 2, background: c, opacity: o }} />{l}
            </div>
          ))}
        </div>
      </div>

      {/* 月別仕入・売却件数 */}
      <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.text, marginBottom: 12 }}>🏠 月別仕入・売却件数</div>
        <ResponsiveContainer width="100%" height={140}>
          <BarChart data={monthlyData} margin={{ top: 0, right: 0, left: -24, bottom: 0 }}>
            <XAxis dataKey="month" tick={{ fill: C.muted, fontSize: 9 }} axisLine={false} tickLine={false} />
            <YAxis tick={{ fill: C.muted, fontSize: 9 }} axisLine={false} tickLine={false} allowDecimals={false} />
            <Tooltip contentStyle={{ background: "#0a0f1a", border: `1px solid #1a2535`, borderRadius: 8, color: C.text, fontSize: 12 }} formatter={(v) => v + "件"} />
            <Bar dataKey="buyCount" name="仕入" fill={C.accent} radius={[3, 3, 0, 0]} />
            <Bar dataKey="sellCount" name="売却" fill={C.success} radius={[3, 3, 0, 0]} />
          </BarChart>
        </ResponsiveContainer>
        <div style={{ display: "flex", gap: 16, justifyContent: "center", marginTop: 6 }}>
          {[["仕入", C.accent], ["売却", C.success]].map(([l, c]) => (
            <div key={l} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: C.muted }}>
              <div style={{ width: 10, height: 10, borderRadius: 2, background: c }} />{l}
            </div>
          ))}
        </div>
      </div>

      {/* メンバー別実績 */}
      {memberData.length > 0 && (
        <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 14 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.text, marginBottom: 12 }}>👥 メンバー別実績（{selectedYear}年）</div>
          <ResponsiveContainer width="100%" height={Math.max(100, memberData.length * 36)}>
            <BarChart data={memberData} layout="vertical" margin={{ top: 0, right: 10, left: 8, bottom: 0 }}>
              <XAxis type="number" tick={{ fill: C.muted, fontSize: 9 }} axisLine={false} tickLine={false} />
              <YAxis type="category" dataKey="name" tick={{ fill: C.text, fontSize: 11 }} axisLine={false} tickLine={false} width={50} />
              <Tooltip contentStyle={{ background: "#0a0f1a", border: `1px solid #1a2535`, borderRadius: 8, color: C.text, fontSize: 12 }} formatter={(v) => v + "万"} />
              <Bar dataKey="利益万" name="利益" radius={[0, 4, 4, 0]}>
                {memberData.map((m, i) => <Cell key={i} fill={MEMBER_COLORS[m.name] || C.accent} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
          <div style={{ display: "grid", gap: 8, marginTop: 12 }}>
            {memberData.map(m => (
              <div key={m.name} style={{ background: C.bg, border: `1px solid #1a2535`, borderRadius: 12, padding: "12px 14px" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                  <MemberTag name={m.name} />
                  <span style={{ color: m.利益率 > 20 ? C.success : C.warn, fontSize: 12, fontWeight: 700 }}>利益率 {m.利益率}%</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6 }}>
                  {[["売上", m.売上万 + "万", C.warn], ["利益", m.利益万 + "万", C.success], ["仕入", m.仕入件数 + "件", C.accent], ["売却", m.売却件数 + "件", C.success]].map(([l, v, c]) => (
                    <div key={l} style={{ background: "#0d1422", borderRadius: 8, padding: "6px", textAlign: "center" }}>
                      <div style={{ color: C.muted, fontSize: 10 }}>{l}</div>
                      <div style={{ color: c, fontWeight: 700, fontSize: 13 }}>{v}</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 在庫ステータス分布 */}
      {statusData.length > 0 && (
        <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 14 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.text, marginBottom: 12 }}>🏠 在庫ステータス分布</div>
          <div style={{ display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
            <ResponsiveContainer width={140} height={140}>
              <PieChart>
                <Pie data={statusData} cx="50%" cy="50%" innerRadius={38} outerRadius={62} dataKey="value" paddingAngle={3}>
                  {statusData.map((_, i) => <Cell key={i} fill={PIE_COLORS[i % PIE_COLORS.length]} />)}
                </Pie>
                <Tooltip contentStyle={{ background: "#0a0f1a", border: `1px solid #1a2535`, borderRadius: 8, color: C.text, fontSize: 12 }} />
              </PieChart>
            </ResponsiveContainer>
            <div style={{ flex: 1, display: "grid", gap: 5 }}>
              {statusData.map((s, i) => (
                <div key={s.name} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
                  <div style={{ width: 8, height: 8, borderRadius: 2, background: PIE_COLORS[i % PIE_COLORS.length], flexShrink: 0 }} />
                  <span style={{ color: C.muted, flex: 1 }}>{s.name}</span>
                  <span style={{ color: C.text, fontWeight: 700 }}>{s.value}件</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* 在庫一覧 */}
      <div>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 10 }}>現在の在庫</div>
        {active.map(s => {
          const sinfo = stagnantInfo(s.buyDate);
          return (
            <div key={s.id} style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 12, padding: "12px 14px", marginBottom: 8 }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6, flexWrap: "wrap" }}>
                <StatusTag status={s.status} /><MemberTag name={s.assignee} />
                {sinfo && <Tag label={`${sinfo.level} 仕入${sinfo.days}日経過`} color={sinfo.color} />}
              </div>
              <div style={{ color: C.text, fontSize: 14, fontWeight: 600, marginBottom: 6 }}>{s.name}</div>
              <div style={{ display: "flex", gap: 14, fontSize: 12, flexWrap: "wrap", marginBottom: 10 }}>
                <span style={{ color: C.muted }}>仕入 <span style={{ color: C.text }}>{(nv(s.buyCost) / 10000).toFixed(0)}万</span></span>
                <span style={{ color: C.muted }}>売値 <span style={{ color: C.text }}>{(nv(s.sellPrice) / 10000).toFixed(0)}万</span></span>
                <span style={{ color: C.muted }}>利益 <span style={{ color: C.success, fontWeight: 700 }}>{((nv(s.sellPrice) - nv(s.buyCost)) / 10000).toFixed(0)}万</span></span>
              </div>
              {canEdit(s) ? (
                <button onClick={() => openQuickEdit(s)} style={{
                  width: "100%", background: C.accent + "22", border: `1.5px solid ${C.accent}`,
                  color: C.accent, borderRadius: 8, padding: "9px", cursor: "pointer",
                  fontSize: 13, fontWeight: 700, fontFamily: "inherit",
                }}>✏ クイック編集</button>
              ) : (
                <div style={{
                  width: "100%", background: C.bg, border: `1px solid #1a2535`,
                  color: C.muted, borderRadius: 8, padding: "9px", textAlign: "center",
                  fontSize: 12, fontWeight: 600,
                }}>👁 閲覧のみ（{s.assignee}さん担当）</div>
              )}
            </div>
          );
        })}
      </div>

      {/* 📍 地上げ クイック編集 BottomSheet */}
      {quickEditJiage && quickEditJiageForm && (
        <BottomSheet title={`📍 地上げを編集`} onClose={() => { setQuickEditJiage(null); setQuickEditJiageForm(null); }}>
          <Field label="物件住所">
            <input style={inp} value={quickEditJiageForm.address || ""} onChange={e => setQuickEditJiageForm(p => ({ ...p, address: e.target.value }))} placeholder="埼玉県熊谷市〇〇" />
          </Field>
          <Field label="所有者名">
            <input style={inp} value={quickEditJiageForm.owner || ""} onChange={e => setQuickEditJiageForm(p => ({ ...p, owner: e.target.value }))} />
          </Field>
          <Field label="所有者住所">
            <input style={inp} value={quickEditJiageForm.ownerAddr || ""} onChange={e => setQuickEditJiageForm(p => ({ ...p, ownerAddr: e.target.value }))} placeholder="謄本記載の住所" />
          </Field>
          <Field label="👤 担当者">
            <select style={inp} value={quickEditJiageForm.assignee} onChange={e => setQuickEditJiageForm(p => ({ ...p, assignee: e.target.value }))}>
              {MEMBERS.map(m => <option key={m}>{m}</option>)}
            </select>
          </Field>
          <Field label="エリア">
            <select style={inp} value={quickEditJiageForm.area || ""} onChange={e => setQuickEditJiageForm(p => ({ ...p, area: e.target.value }))}>
              <option value="">選択</option>{JIAGE_AREAS.map(a => <option key={a}>{a}</option>)}
            </select>
          </Field>
          <Field label="📩 DM状況">
            <select style={inp} value={quickEditJiageForm.dm || "未"} onChange={e => setQuickEditJiageForm(p => ({ ...p, dm: e.target.value }))}>
              {DM_STATUSES.map(s => <option key={s}>{s}</option>)}
            </select>
          </Field>
          <Field label="📊 訪問状況">
            <select style={inp} value={quickEditJiageForm.status} onChange={e => setQuickEditJiageForm(p => ({ ...p, status: e.target.value }))}>
              {ATTACK_STATUSES.map(s => <option key={s}>{s}</option>)}
            </select>
          </Field>
          {(() => { const dow = dayOfWeekLabel(quickEditJiageForm.nextVisit); return (
            <Field label={<>📅 次回訪問日{dow && <span style={{ color: dow.color, marginLeft: 8, fontWeight: 800 }}>（{dow.label}）</span>}</>}>
              <input type="date" style={inp} value={quickEditJiageForm.nextVisit || ""} onChange={e => setQuickEditJiageForm(p => ({ ...p, nextVisit: e.target.value }))} />
            </Field>
          ); })()}
          <Field label="📝 メモ">
            <textarea style={{ ...inp, height: 80, resize: "vertical" }} value={quickEditJiageForm.memo || ""} onChange={e => setQuickEditJiageForm(p => ({ ...p, memo: e.target.value }))} />
          </Field>
          <div style={{ display: "flex", gap: 10 }}>
            <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={() => { setQuickEditJiage(null); setQuickEditJiageForm(null); }}>キャンセル</button>
            <button style={{ ...btnStyle(), flex: 2 }} onClick={saveJiageEdit}>💾 保存する</button>
          </div>
        </BottomSheet>
      )}

      {/* 👤 所有者 クイック編集 BottomSheet */}
      {quickEditOwner && quickEditOwnerForm && (
        <BottomSheet title={`👤 所有者アタックを編集`} onClose={() => { setQuickEditOwner(null); setQuickEditOwnerForm(null); }}>
          <Field label="物件住所">
            <input style={inp} value={quickEditOwnerForm.address || ""} onChange={e => setQuickEditOwnerForm(p => ({ ...p, address: e.target.value }))} placeholder="埼玉県熊谷市〇〇" />
          </Field>
          <Field label="所有者名">
            <input style={inp} value={quickEditOwnerForm.ownerName || ""} onChange={e => setQuickEditOwnerForm(p => ({ ...p, ownerName: e.target.value }))} />
          </Field>
          <Field label="所有者住所">
            <input style={inp} value={quickEditOwnerForm.ownerAddress || ""} onChange={e => setQuickEditOwnerForm(p => ({ ...p, ownerAddress: e.target.value }))} placeholder="謄本記載の住所" />
          </Field>
          <Field label="📞 連絡先">
            <input style={inp} value={quickEditOwnerForm.ownerContact || ""} onChange={e => setQuickEditOwnerForm(p => ({ ...p, ownerContact: e.target.value }))} placeholder="電話番号など" />
          </Field>
          {quickEditOwnerForm.ownerContact && (
            <a href={`tel:${quickEditOwnerForm.ownerContact}`} style={{
              display: "block", textDecoration: "none", background: C.success + "22",
              border: `1.5px solid ${C.success}`, color: C.success,
              borderRadius: 8, padding: "10px", textAlign: "center", fontSize: 13, fontWeight: 700,
              marginBottom: 16,
            }}>📞 電話発信</a>
          )}
          <Field label="👤 担当者">
            <select style={inp} value={quickEditOwnerForm.assignee} onChange={e => setQuickEditOwnerForm(p => ({ ...p, assignee: e.target.value }))}>
              {MEMBERS.map(m => <option key={m}>{m}</option>)}
            </select>
          </Field>
          <Field label="📊 ステータス">
            <select style={inp} value={quickEditOwnerForm.status} onChange={e => setQuickEditOwnerForm(p => ({ ...p, status: e.target.value }))}>
              {OWNER_STATUSES.map(s => <option key={s}>{s}</option>)}
            </select>
          </Field>
          {(() => { const dow = dayOfWeekLabel(quickEditOwnerForm.nextFollowDate); return (
            <Field label={<>📅 次回フォロー日{dow && <span style={{ color: dow.color, marginLeft: 8, fontWeight: 800 }}>（{dow.label}）</span>}</>}>
              <input type="date" style={inp} value={quickEditOwnerForm.nextFollowDate || ""} onChange={e => setQuickEditOwnerForm(p => ({ ...p, nextFollowDate: e.target.value }))} />
            </Field>
          ); })()}
          <Field label="📝 メモ">
            <textarea style={{ ...inp, height: 80, resize: "vertical" }} value={quickEditOwnerForm.memo || ""} onChange={e => setQuickEditOwnerForm(p => ({ ...p, memo: e.target.value }))} />
          </Field>
          {(quickEditOwnerForm.history || []).length > 0 && (
            <div style={{ background: C.bg, border: `1px solid #1a2535`, borderRadius: 10, padding: "10px 12px", marginBottom: 16 }}>
              <div style={{ fontSize: 11, color: C.muted, fontWeight: 700, marginBottom: 6 }}>📋 アタック履歴 {quickEditOwnerForm.history.length}件</div>
              <div style={{ fontSize: 10, color: C.muted, lineHeight: 1.6 }}>
                履歴の追加・編集は「🗺️ 地上げ」タブから行ってください
              </div>
            </div>
          )}
          <div style={{ display: "flex", gap: 10 }}>
            <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={() => { setQuickEditOwner(null); setQuickEditOwnerForm(null); }}>キャンセル</button>
            <button style={{ ...btnStyle(), flex: 2 }} onClick={saveOwnerEdit}>💾 保存する</button>
          </div>
        </BottomSheet>
      )}

      {/* ✏ クイック編集 BottomSheet */}
      {quickEditStock && quickEditForm && (
        <BottomSheet title={`✏ ${quickEditStock.name || "物件"} を編集`} onClose={() => { setQuickEditStock(null); setQuickEditForm(null); }}>
          <div style={{ background: C.accent + "11", border: `1px solid ${C.accent}44`, borderRadius: 8, padding: "10px 12px", marginBottom: 16, fontSize: 11, color: C.muted, lineHeight: 1.6 }}>
            💡 ここではよく使う項目のみ編集できます。<br />
            <span style={{ color: C.accent }}>反響情報・写真・反響リスト</span>などの詳細編集は「🏠 在庫」タブから行ってください。
          </div>

          <Field label="👤 担当者">
            <select style={inp} value={quickEditForm.assignee} onChange={e => setQuickEditForm(p => ({ ...p, assignee: e.target.value }))}>
              {MEMBERS.map(m => <option key={m}>{m}</option>)}
            </select>
          </Field>
          <Field label="物件名">
            <input style={inp} value={quickEditForm.name || ""} onChange={e => setQuickEditForm(p => ({ ...p, name: e.target.value }))} />
          </Field>
          <Field label="📊 ステータス">
            <select style={inp} value={quickEditForm.status} onChange={e => setQuickEditForm(p => ({ ...p, status: e.target.value }))}>
              {STOCK_STATUSES.map(st => <option key={st}>{st}</option>)}
            </select>
          </Field>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Field label="仕入原価（円）">
              <MoneyInput value={quickEditForm.buyCost} onChange={v => setQuickEditForm(p => ({ ...p, buyCost: v }))} placeholder="3,000,000" />
            </Field>
            <Field label="売却額（円）">
              <MoneyInput value={quickEditForm.sellPrice} onChange={v => setQuickEditForm(p => ({ ...p, sellPrice: v }))} placeholder="5,000,000" />
            </Field>
          </div>

          {/* 仕入関連日付 */}
          <div style={{ background: C.bg, border: `1px solid #1a2535`, borderRadius: 10, padding: 12, marginBottom: 14 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.success, marginBottom: 10 }}>🏠 仕入関連</div>
            {(() => { const dow = dayOfWeekLabel(quickEditForm.buyContractDate); return (
              <Field label={<>📝 仕入契約日{dow && <span style={{ color: dow.color, marginLeft: 8, fontWeight: 800 }}>（{dow.label}）</span>}</>}>
                <input type="date" style={inp} value={quickEditForm.buyContractDate || ""} onChange={e => setQuickEditForm(p => ({ ...p, buyContractDate: e.target.value }))} />
              </Field>
            ); })()}
            {(() => { const dow = dayOfWeekLabel(quickEditForm.buyDate); return (
              <Field label={<>🏠 仕入決済日{dow && <span style={{ color: dow.color, marginLeft: 8, fontWeight: 800 }}>（{dow.label}）</span>}</>}>
                <input type="date" style={inp} value={quickEditForm.buyDate || ""} onChange={e => setQuickEditForm(p => ({ ...p, buyDate: e.target.value }))} />
              </Field>
            ); })()}
          </div>

          {/* 売却関連日付 */}
          <div style={{ background: C.bg, border: `1px solid #1a2535`, borderRadius: 10, padding: 12, marginBottom: 14 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.warn, marginBottom: 10 }}>💰 売却関連</div>
            {(() => { const dow = dayOfWeekLabel(quickEditForm.sellContractDate); return (
              <Field label={<>📋 売却契約日{dow && <span style={{ color: dow.color, marginLeft: 8, fontWeight: 800 }}>（{dow.label}）</span>}</>}>
                <input type="date" style={inp} value={quickEditForm.sellContractDate || ""} onChange={e => setQuickEditForm(p => ({ ...p, sellContractDate: e.target.value }))} />
              </Field>
            ); })()}
            {(() => { const dow = dayOfWeekLabel(quickEditForm.sellDate); return (
              <Field label={<>✅ 売却決済日{dow && <span style={{ color: dow.color, marginLeft: 8, fontWeight: 800 }}>（{dow.label}）</span>}</>}>
                <input type="date" style={inp} value={quickEditForm.sellDate || ""} onChange={e => setQuickEditForm(p => ({ ...p, sellDate: e.target.value }))} />
              </Field>
            ); })()}
          </div>

          <Field label="📝 メモ">
            <textarea style={{ ...inp, height: 80, resize: "vertical" }} value={quickEditForm.memo || ""} onChange={e => setQuickEditForm(p => ({ ...p, memo: e.target.value }))} />
          </Field>

          {/* 反響件数・写真件数の確認表示 */}
          <div style={{ background: C.bg, border: `1px solid #1a2535`, borderRadius: 10, padding: "10px 12px", marginBottom: 16, display: "flex", justifyContent: "space-between", fontSize: 12 }}>
            <span style={{ color: C.muted }}>
              👀 反響: <span style={{ color: "#06b6d4", fontWeight: 700 }}>{(quickEditForm.viewings || []).length}件</span>
            </span>
            <span style={{ color: C.muted }}>
              📷 写真: <span style={{ color: C.warn, fontWeight: 700 }}>{(quickEditForm.photos || []).length}枚</span>
            </span>
          </div>

          <div style={{ display: "flex", gap: 10 }}>
            <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={() => { setQuickEditStock(null); setQuickEditForm(null); }}>キャンセル</button>
            <button style={{ ...btnStyle(), flex: 2 }} onClick={saveQuickEdit}>💾 保存する</button>
          </div>
        </BottomSheet>
      )}
    </div>
  );
}


// ===================== STOCK PAGE =====================
function StockPage({ data, setData }) {
  const currentUser = getCurrentUser();
  const adminMember = data.adminMember || "下田";
  const isAdmin = currentUser === adminMember;
  const canEdit = (item) => canEditItem(item, currentUser, adminMember);
  const [showAdd, setShowAdd] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [search, setSearch] = useState("");
  const [filterStatuses, setFilterStatuses] = useState([]);
  const [filterMembers, setFilterMembers] = useState([]);
  const [viewMode, setViewMode] = useState("active"); // "active" | "completed" | "all"
  const [photoViewer, setPhotoViewer] = useState(null); // 写真拡大表示
  const [uploadingPhoto, setUploadingPhoto] = useState(false);
  const [expandedViewings, setExpandedViewings] = useState({}); // {index: true/false}
  const empty = {
    assignee: currentUser || MEMBERS[0], name: "", status: "仕入契約済",
    buyContractDate: "", buyDate: "", sellContractDate: "", sellDate: "",
    buyCost: "", sellPrice: "", memo: "",
    year: new Date().getFullYear(),
    photos: [],
    viewings: [], // [{date, customer, note}]
  };
  const [form, setForm] = useState(empty);
  const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));

  // 写真追加処理
  const handlePhotoAdd = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (!file.type.startsWith("image/")) { alert("画像ファイルを選択してください"); return; }
    if ((form.photos || []).length >= 3) { alert("写真は最大3枚までです"); return; }
    setUploadingPhoto(true);
    try {
      const compressed = await compressImage(file, 800, 0.6);
      setForm(p => ({ ...p, photos: [...(p.photos || []), compressed] }));
    } catch (err) {
      alert("画像の処理に失敗しました");
    }
    setUploadingPhoto(false);
    e.target.value = ""; // 同じファイルを再選択できるように
  };

  const handlePhotoRemove = (idx) => {
    if (!window.confirm("この写真を削除しますか？")) return;
    setForm(p => ({ ...p, photos: (p.photos || []).filter((_, i) => i !== idx) }));
  };

  // viewMode別の件数
  const counts = useMemo(() => ({
    active: data.stocks.filter(s => s.status !== "決済完了").length,
    completed: data.stocks.filter(s => s.status === "決済完了").length,
    all: data.stocks.length,
  }), [data.stocks]);

  const filtered = useMemo(() => data.stocks.filter(s => {
    // viewMode（現在の在庫 / 決済完了 / 全て）
    if (viewMode === "active" && s.status === "決済完了") return false;
    if (viewMode === "completed" && s.status !== "決済完了") return false;
    if (filterStatuses.length && !filterStatuses.includes(s.status)) return false;
    if (filterMembers.length && !filterMembers.includes(s.assignee)) return false;
    if (search && !s.name.includes(search) && !s.assignee.includes(search)) return false;
    return true;
  }), [data.stocks, filterStatuses, filterMembers, search, viewMode]);

  const openEdit = s => {
    if (!canEdit(s)) { alert(`⚠️ 編集権限がありません\n\n担当者: ${s.assignee || "(不明)"}`); return; }
    setForm({
      ...s,
      buyCost: String(s.buyCost),
      sellPrice: String(s.sellPrice),
      photos: s.photos || [],
      viewings: s.viewings || [],
      buyContractDate: s.buyContractDate || "",
      sellContractDate: s.sellContractDate || "",
    });
    setEditItem(s);
    setShowAdd(true);
  };
  const handleSave = () => {
    // 保険：編集時の権限チェック
    if (editItem && !canEdit(editItem)) { alert("⚠️ 編集権限がありません"); setShowAdd(false); setEditItem(null); return; }
    const item = {
      ...form,
      id: editItem?.id || Date.now(),
      buyCost: Number(form.buyCost),
      sellPrice: Number(form.sellPrice),
      photos: form.photos || [],
      viewings: form.viewings || [],
    };
    setData(d => {
      const next = { ...d, stocks: editItem ? d.stocks.map(s => s.id === editItem.id ? item : s) : [...d.stocks, item] };
      return appendLog(next, editItem ? "update" : "add", "stock", `${item.name || "(無題)"}（${item.status}）`);
    });
    setShowAdd(false); setEditItem(null);
  };
  const handleDelete = id => {
    const target = data.stocks.find(s => s.id === id);
    // 保険：削除時の権限チェック
    if (target && !canEdit(target)) { alert("⚠️ 削除権限がありません"); return; }
    if (window.confirm("削除しますか？")) setData(d => {
      const next = { ...d, stocks: d.stocks.filter(s => s.id !== id) };
      return appendLog(next, "delete", "stock", `${target?.name || "(無題)"}を削除`);
    });
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div style={{ fontSize: 20, fontWeight: 800, color: C.text }}>🏠 在庫・案件管理</div>
        <button style={{ ...btnStyle(), padding: "10px 16px", fontSize: 14 }} onClick={() => { setForm(empty); setEditItem(null); setShowAdd(true); }}>＋ 追加</button>
      </div>

      {/* ====== 表示モード切替（現在の在庫 / 決済完了 / すべて） ====== */}
      <div style={{ display: "flex", gap: 6, marginBottom: 12, background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 12, padding: 4 }}>
        {[
          { key: "active", label: "📦 現在の在庫", count: counts.active, color: C.accent },
          { key: "completed", label: "✅ 決済完了", count: counts.completed, color: C.success },
          { key: "all", label: "すべて", count: counts.all, color: C.muted },
        ].map(m => {
          const active = viewMode === m.key;
          return (
            <button key={m.key} onClick={() => setViewMode(m.key)} style={{
              flex: 1, background: active ? m.color : "none", border: "none",
              color: active ? "#fff" : C.muted, borderRadius: 9,
              padding: "10px 4px", cursor: "pointer", fontSize: 12, fontWeight: active ? 700 : 500, fontFamily: "inherit",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
            }}>
              <span>{m.label}</span>
              <span style={{ fontSize: 16, fontWeight: 800 }}>{m.count}</span>
            </button>
          );
        })}
      </div>

      <SearchBar value={search} onChange={setSearch} placeholder="物件名・担当者で検索..." />
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 4 }}>担当者</div>
      <FilterChips options={MEMBERS} value={filterMembers} onChange={setFilterMembers} multi />
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 4 }}>ステータス</div>
      <FilterChips options={viewMode === "active" ? STOCK_STATUSES.filter(s => s !== "決済完了") : viewMode === "completed" ? ["決済完了"] : STOCK_STATUSES} value={filterStatuses} onChange={setFilterStatuses} multi />
      <div style={{ color: C.muted, fontSize: 12, marginBottom: 12 }}>{filtered.length}件表示</div>
      {filtered.map(s => {
        const profit = s.sellPrice - s.buyCost;
        const sinfo = s.status !== "決済完了" ? stagnantInfo(s.buyDate) : null;
        return (
          <div key={s.id} style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: "16px", marginBottom: 10 }}>
            <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
              <StatusTag status={s.status} /><MemberTag name={s.assignee} />
              {sinfo && <Tag label={`${sinfo.level} 仕入${sinfo.days}日経過`} color={sinfo.color} />}
            </div>
            <div style={{ color: C.text, fontWeight: 600, fontSize: 16, marginBottom: 10 }}>{s.name}</div>
            {/* 写真サムネイル */}
            {s.photos && s.photos.length > 0 && (
              <div style={{ display: "flex", gap: 6, marginBottom: 10, overflowX: "auto", paddingBottom: 2 }}>
                {s.photos.map((p, i) => (
                  <img key={i} src={p} alt="" onClick={() => setPhotoViewer({ photos: s.photos, index: i, name: s.name })}
                    style={{ width: 80, height: 80, objectFit: "cover", borderRadius: 8, cursor: "pointer", border: `1px solid #1a2535`, flexShrink: 0 }} />
                ))}
              </div>
            )}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 10 }}>
              {[["仕入", (s.buyCost / 10000).toFixed(0) + "万", C.text], ["売却", (s.sellPrice / 10000).toFixed(0) + "万", C.text], ["利益", (profit / 10000).toFixed(0) + "万", profit > 0 ? C.success : C.danger]].map(([l, v, c]) => (
                <div key={l} style={{ background: C.bg, borderRadius: 8, padding: "8px 10px", textAlign: "center" }}>
                  <div style={{ color: C.muted, fontSize: 10 }}>{l}</div>
                  <div style={{ color: c, fontWeight: 700, fontSize: 15 }}>{v}</div>
                </div>
              ))}
            </div>
            {(s.buyContractDate || s.buyDate || s.sellContractDate || s.sellDate) && (
              <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, lineHeight: 1.6 }}>
                {s.buyContractDate && <span>📝 仕入契約 {s.buyContractDate}　</span>}
                {s.buyDate && <span>🏠 仕入決済 {s.buyDate}　</span>}
                {s.sellContractDate && <span>📋 売却契約 {s.sellContractDate}　</span>}
                {s.sellDate && <span>✅ 売却決済 {s.sellDate}</span>}
              </div>
            )}
            {(s.viewings || []).length > 0 && (() => {
              const all = s.viewings.length;
              const withVisit = s.viewings.filter(v => v.visitDate).length;
              return (
                <div style={{ fontSize: 11, color: "#06b6d4", marginBottom: 6 }}>
                  👀 反響 {all}件{withVisit > 0 && <span style={{ marginLeft: 6 }}>📅 案内予定 {withVisit}件</span>}
                </div>
              );
            })()}
            {s.memo && <div style={{ fontSize: 13, color: C.muted, marginBottom: 10 }}>{s.memo}</div>}
            <div style={{ display: "flex", gap: 8 }}>
              {canEdit(s) ? (
                <>
                  <button style={{ ...btnStyle("ghost"), flex: 1, padding: "10px", fontSize: 14 }} onClick={() => openEdit(s)}>編集</button>
                  <button style={{ ...btnStyle("danger"), padding: "10px 14px", fontSize: 14 }} onClick={() => handleDelete(s.id)}>削除</button>
                </>
              ) : (
                <div style={{
                  flex: 1, padding: "10px", textAlign: "center",
                  background: C.bg, border: `1px solid #1a2535`, borderRadius: 10,
                  color: C.muted, fontSize: 12,
                }}>👁 閲覧のみ（{s.assignee}さん担当）</div>
              )}
            </div>
          </div>
        );
      })}
      {showAdd && (
        <BottomSheet title={editItem ? "物件編集" : "新規物件登録"} onClose={() => { setShowAdd(false); setEditItem(null); }}>          <Field label="担当者"><select style={inp} value={form.assignee} onChange={f("assignee")}>{MEMBERS.map(m => <option key={m}>{m}</option>)}</select></Field>
          <Field label="物件名"><input style={inp} value={form.name} onChange={f("name")} placeholder="川越市木野目" /></Field>
          <Field label="ステータス"><select style={inp} value={form.status} onChange={f("status")}>{STOCK_STATUSES.map(s => <option key={s}>{s}</option>)}</select></Field>
          <Field label="仕入原価（円）"><MoneyInput value={form.buyCost} onChange={v => setForm(p => ({ ...p, buyCost: v }))} placeholder="3,000,000" /></Field>
          <Field label="売却額（円）"><MoneyInput value={form.sellPrice} onChange={v => setForm(p => ({ ...p, sellPrice: v }))} placeholder="5,000,000" /></Field>

          {/* 仕入関連日付 */}
          <div style={{ background: C.bg, border: `1px solid #1a2535`, borderRadius: 10, padding: 12, marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.success, marginBottom: 10 }}>🏠 仕入関連</div>
            {(() => { const dow = dayOfWeekLabel(form.buyContractDate); return (
              <Field label={<>📝 仕入契約日{dow && <span style={{ color: dow.color, marginLeft: 8, fontWeight: 800 }}>（{dow.label}）</span>}</>}>
                <input type="date" style={inp} value={form.buyContractDate || ""} onChange={f("buyContractDate")} />
              </Field>
            ); })()}
            {(() => { const dow = dayOfWeekLabel(form.buyDate); return (
              <Field label={<>🏠 仕入決済日{dow && <span style={{ color: dow.color, marginLeft: 8, fontWeight: 800 }}>（{dow.label}）</span>}</>}>
                <input type="date" style={inp} value={form.buyDate || ""} onChange={f("buyDate")} />
              </Field>
            ); })()}
          </div>

          {/* 売却関連日付 */}
          <div style={{ background: C.bg, border: `1px solid #1a2535`, borderRadius: 10, padding: 12, marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.warn, marginBottom: 10 }}>💰 売却関連</div>
            {(() => { const dow = dayOfWeekLabel(form.sellContractDate); return (
              <Field label={<>📋 売却契約日{dow && <span style={{ color: dow.color, marginLeft: 8, fontWeight: 800 }}>（{dow.label}）</span>}</>}>
                <input type="date" style={inp} value={form.sellContractDate || ""} onChange={f("sellContractDate")} />
              </Field>
            ); })()}
            {(() => { const dow = dayOfWeekLabel(form.sellDate); return (
              <Field label={<>✅ 売却決済日{dow && <span style={{ color: dow.color, marginLeft: 8, fontWeight: 800 }}>（{dow.label}）</span>}</>}>
                <input type="date" style={inp} value={form.sellDate || ""} onChange={f("sellDate")} />
              </Field>
            ); })()}
          </div>

          {/* 👀 反響（複数登録可・サマリー1行＋詳細展開式） */}
          <div style={{ background: C.bg, border: `1px solid #1a2535`, borderRadius: 10, padding: 12, marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#06b6d4" }}>👀 反響（{(form.viewings || []).length}件）</div>
              <button onClick={() => {
                const newIdx = (form.viewings || []).length;
                setForm(p => ({ ...p, viewings: [...(p.viewings || []), {
                  date: "", visitDate: "", visitTime: "",
                  customer: "", contact: "", email: "",
                  funding: "", purpose: "", budget: "", people: "", channel: "",
                  prospect: "", result: "未実施", nextAction: "", note: ""
                }] }));
                setExpandedViewings(p => ({ ...p, [newIdx]: true })); // 追加直後は展開
              }}
                style={{ background: "#06b6d422", border: `1.5px solid #06b6d4`, color: "#06b6d4", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 700 }}>
                ＋ 反響を追加
              </button>
            </div>
            {(form.viewings || []).length === 0 && (
              <div style={{ color: C.muted, fontSize: 11, textAlign: "center", padding: "8px 0" }}>反響なし</div>
            )}
            {(form.viewings || []).map((v, i) => {
              const isExpanded = !!expandedViewings[i];
              const updateV = (key, val) => setForm(p => ({ ...p, viewings: p.viewings.map((vv, j) => j === i ? { ...vv, [key]: val } : vv) }));
              const prospect = PROSPECT_INFO[v.prospect];
              const result = RESULT_INFO[v.result];
              const dow = dayOfWeekLabel(v.date);
              return (
                <div key={i} style={{ background: "#0d1422", borderRadius: 8, padding: 10, marginBottom: 8, border: `1px solid #1a2535` }}>
                  {/* ===== サマリー行（常時表示） ===== */}
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 13, color: C.text, fontWeight: 700 }}>{v.customer || "(名前未入力)"}</span>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap", marginTop: 3, fontSize: 11 }}>
                        <span style={{ color: C.muted }}>
                          反響:{v.date || "—"}{dow && <span style={{ color: dow.color, marginLeft: 2 }}>({dow.label})</span>}
                        </span>
                        {v.visitDate && (() => {
                          const visitDow = dayOfWeekLabel(v.visitDate);
                          return (
                            <span style={{ color: "#06b6d4", fontWeight: 700 }}>
                              → 案内:{v.visitDate}{visitDow && <span style={{ color: visitDow.color, marginLeft: 2 }}>({visitDow.label})</span>}{v.visitTime ? " " + v.visitTime : ""}
                            </span>
                          );
                        })()}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 4, flexWrap: "wrap", marginTop: 5 }}>
                        {prospect && (
                          <span style={{ background: prospect.color + "33", color: prospect.color, padding: "2px 7px", borderRadius: 10, fontSize: 10, fontWeight: 700 }}>
                            {prospect.icon}{v.prospect}
                          </span>
                        )}
                        {v.purpose && (
                          <span style={{ background: "#06b6d433", color: "#06b6d4", padding: "2px 7px", borderRadius: 10, fontSize: 10, fontWeight: 600 }}>
                            🎯{v.purpose}
                          </span>
                        )}
                        {v.funding && (
                          <span style={{ background: "#a855f733", color: "#a855f7", padding: "2px 7px", borderRadius: 10, fontSize: 10, fontWeight: 600 }}>
                            💰{v.funding}
                          </span>
                        )}
                        {result && v.result !== "未実施" && (
                          <span style={{ background: result.color + "33", color: result.color, padding: "2px 7px", borderRadius: 10, fontSize: 10, fontWeight: 600 }}>
                            {result.icon}{v.result}
                          </span>
                        )}
                      </div>
                    </div>
                    <button onClick={() => setExpandedViewings(p => ({ ...p, [i]: !isExpanded }))}
                      style={{ background: C.accent + "22", border: `1.5px solid ${C.accent}`, color: C.accent, borderRadius: 6, padding: "6px 10px", cursor: "pointer", fontSize: 11, fontFamily: "inherit", fontWeight: 700, flexShrink: 0 }}>
                      {isExpanded ? "▲ 閉じる" : "▼ 詳細"}
                    </button>
                    <button onClick={() => {
                      setForm(p => ({ ...p, viewings: (p.viewings || []).filter((_, j) => j !== i) }));
                      setExpandedViewings(p => { const n = { ...p }; delete n[i]; return n; });
                    }}
                      style={{ background: C.danger + "22", border: `1.5px solid ${C.danger}`, color: C.danger, borderRadius: "50%", width: 28, height: 28, cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", padding: 0, flexShrink: 0 }}>✕</button>
                  </div>

                  {/* ===== 詳細フォーム（展開時のみ） ===== */}
                  {isExpanded && (
                    <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid #1a2535` }}>
                      {/* 反響日 + 案内日 + 時間 */}
                      {(() => { const dowResp = dayOfWeekLabel(v.date); const dowVisit = dayOfWeekLabel(v.visitDate); return (
                        <>
                          <Field label={<>📅 反響日{dowResp && <span style={{ color: dowResp.color, marginLeft: 6, fontWeight: 800 }}>({dowResp.label})</span>}</>}>
                            <input type="date" style={inp} value={v.date} onChange={e => updateV("date", e.target.value)} />
                          </Field>
                          <div style={{ background: "#06b6d411", border: `1.5px solid #06b6d466`, borderRadius: 10, padding: 12, marginBottom: 14 }}>
                            <div style={{ fontSize: 11, color: "#06b6d4", fontWeight: 700, marginBottom: 8 }}>📅 案内日時（入力するとカレンダーに自動表示）</div>
                            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 8 }}>
                              <Field label={<>案内日{dowVisit && <span style={{ color: dowVisit.color, marginLeft: 6, fontWeight: 800 }}>({dowVisit.label})</span>}</>}>
                                <input type="date" style={inp} value={v.visitDate || ""} onChange={e => updateV("visitDate", e.target.value)} />
                              </Field>
                              <Field label="🕐 時間">
                                <input type="time" style={inp} value={v.visitTime || ""} onChange={e => updateV("visitTime", e.target.value)} />
                              </Field>
                            </div>
                          </div>
                        </>
                      ); })()}

                      {/* 顧客名 */}
                      <Field label="顧客名">
                        <input style={inp} value={v.customer} onChange={e => updateV("customer", e.target.value)} placeholder="山田様" />
                      </Field>

                      {/* 連絡先：電話＋メール */}
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                        <Field label="📞 電話番号">
                          <input type="tel" style={inp} value={v.contact || ""} onChange={e => updateV("contact", e.target.value)} placeholder="090-1234-5678" />
                        </Field>
                        <Field label="📧 メール">
                          <input type="email" style={inp} value={v.email || ""} onChange={e => updateV("email", e.target.value)} placeholder="example@mail.com" />
                        </Field>
                      </div>

                      {/* 電話・メール発信ボタン */}
                      {(v.contact || v.email) && (
                        <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
                          {v.contact && (
                            <a href={`tel:${v.contact}`} style={{ flex: 1, textDecoration: "none", background: C.success + "22", border: `1.5px solid ${C.success}`, color: C.success, borderRadius: 8, padding: "8px 12px", textAlign: "center", fontSize: 12, fontWeight: 700 }}>📞 電話発信</a>
                          )}
                          {v.email && (
                            <a href={`mailto:${v.email}`} style={{ flex: 1, textDecoration: "none", background: C.accent + "22", border: `1.5px solid ${C.accent}`, color: C.accent, borderRadius: 8, padding: "8px 12px", textAlign: "center", fontSize: 12, fontWeight: 700 }}>📧 メール作成</a>
                          )}
                        </div>
                      )}

                      {/* 資金種別＋購入目的 */}
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                        <Field label="💰 資金種別">
                          <select style={inp} value={v.funding || ""} onChange={e => updateV("funding", e.target.value)}>
                            {FUNDING_OPTIONS.map(o => <option key={o} value={o}>{o || "— 未選択 —"}</option>)}
                          </select>
                        </Field>
                        <Field label="🎯 購入目的">
                          <select style={inp} value={v.purpose || ""} onChange={e => updateV("purpose", e.target.value)}>
                            {PURPOSE_OPTIONS.map(o => <option key={o} value={o}>{o || "— 未選択 —"}</option>)}
                          </select>
                        </Field>
                      </div>

                      {/* 投資家専用の追加項目 */}
                      {v.purpose === "投資家" && (
                        <div style={{ background: "#7c3aed11", border: `1.5px solid #7c3aed66`, borderRadius: 10, padding: 12, marginBottom: 14 }}>
                          <div style={{ fontSize: 12, fontWeight: 700, color: "#a855f7", marginBottom: 10 }}>
                            💎 投資家情報（次の案件提案にも活用）
                          </div>
                          <Field label="🗺️ 購入希望エリア">
                            <input style={inp} value={v.investArea || ""} onChange={e => updateV("investArea", e.target.value)} placeholder="川越市・狭山市・所沢市 など" />
                          </Field>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                            <Field label="💴 希望価格帯">
                              <input style={inp} value={v.investBudget || ""} onChange={e => updateV("investBudget", e.target.value)} placeholder="1500〜3000万" />
                            </Field>
                            <Field label="📈 利回り希望">
                              <input style={inp} value={v.investYield || ""} onChange={e => updateV("investYield", e.target.value)} placeholder="8%以上" />
                            </Field>
                          </div>
                          <Field label="🏢 物件タイプ希望">
                            <input style={inp} value={v.investType || ""} onChange={e => updateV("investType", e.target.value)} placeholder="戸建 / 区分 / 一棟 / 土地" />
                          </Field>
                          <div style={{ fontSize: 10, color: C.muted, marginTop: 4, lineHeight: 1.5 }}>
                            ※ ここに入力した情報は「その他 → 💎 投資家リスト」に自動で集約されます
                          </div>
                        </div>
                      )}

                      {/* 予算＋人数 */}
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                        <Field label="💵 検討予算">
                          <input style={inp} value={v.budget || ""} onChange={e => updateV("budget", e.target.value)} placeholder="3000万円" />
                        </Field>
                        <Field label="👨‍👩‍👧 来場人数">
                          <select style={inp} value={v.people || ""} onChange={e => updateV("people", e.target.value)}>
                            {PEOPLE_OPTIONS.map(o => <option key={o} value={o}>{o || "— 未選択 —"}</option>)}
                          </select>
                        </Field>
                      </div>

                      {/* 経由 */}
                      <Field label="🤝 経由">
                        <select style={inp} value={v.channel || ""} onChange={e => updateV("channel", e.target.value)}>
                          {CHANNEL_OPTIONS.map(o => <option key={o} value={o}>{o || "— 未選択 —"}</option>)}
                        </select>
                      </Field>

                      {/* 見込度（チップ式） */}
                      <Field label="🔥 見込度">
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                          {Object.entries(PROSPECT_INFO).map(([key, info]) => {
                            const active = v.prospect === key;
                            return (
                              <button key={key} onClick={() => updateV("prospect", active ? "" : key)}
                                style={{ padding: "7px 12px", borderRadius: 16, cursor: "pointer", fontSize: 12, fontWeight: 700, fontFamily: "inherit",
                                  background: active ? info.color : C.bg, color: active ? "#fff" : info.color,
                                  border: `1.5px solid ${info.color}` }}>
                                {info.icon} {key}
                              </button>
                            );
                          })}
                        </div>
                      </Field>

                      {/* 結果（チップ式） */}
                      <Field label="✅ 結果">
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                          {Object.entries(RESULT_INFO).map(([key, info]) => {
                            const active = (v.result || "未実施") === key;
                            return (
                              <button key={key} onClick={() => updateV("result", key)}
                                style={{ padding: "7px 12px", borderRadius: 16, cursor: "pointer", fontSize: 12, fontWeight: 700, fontFamily: "inherit",
                                  background: active ? info.color : C.bg, color: active ? "#fff" : info.color,
                                  border: `1.5px solid ${info.color}` }}>
                                {info.icon} {key}
                              </button>
                            );
                          })}
                        </div>
                      </Field>

                      {/* 次回アクション */}
                      <Field label="🔁 次回アクション">
                        <select style={inp} value={v.nextAction || ""} onChange={e => updateV("nextAction", e.target.value)}>
                          {NEXTACTION_OPTIONS.map(o => <option key={o} value={o}>{o || "— 未選択 —"}</option>)}
                        </select>
                      </Field>

                      {/* メモ */}
                      <Field label="📝 メモ">
                        <textarea style={{ ...inp, height: 70, resize: "vertical" }} value={v.note || ""} onChange={e => updateV("note", e.target.value)} placeholder="10:00 単独内見・駅から徒歩同行など" />
                      </Field>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          <Field label="メモ"><textarea style={{ ...inp, height: 80, resize: "vertical" }} value={form.memo} onChange={f("memo")} /></Field>

          {/* 写真添付 */}
          <Field label={`物件写真（${(form.photos || []).length}/3枚）`}>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 8 }}>
              {(form.photos || []).map((p, i) => (
                <div key={i} style={{ position: "relative", width: 80, height: 80 }}>
                  <img src={p} alt="" onClick={() => setPhotoViewer({ photos: form.photos, index: i, name: form.name })}
                    style={{ width: 80, height: 80, objectFit: "cover", borderRadius: 8, cursor: "pointer", border: `1px solid #1a2535` }} />
                  <button onClick={() => handlePhotoRemove(i)} style={{
                    position: "absolute", top: -6, right: -6, width: 22, height: 22, borderRadius: "50%",
                    background: C.danger, border: "none", color: "#fff", cursor: "pointer", fontSize: 12, fontFamily: "inherit",
                    display: "flex", alignItems: "center", justifyContent: "center", padding: 0,
                  }}>✕</button>
                </div>
              ))}
            </div>
            {(form.photos || []).length < 3 && (
              <label style={{
                display: "block", padding: "12px", background: C.bg, border: `1px dashed ${C.muted}`,
                borderRadius: 10, cursor: "pointer", textAlign: "center", color: C.muted, fontSize: 13,
              }}>
                {uploadingPhoto ? "📷 圧縮中..." : "📷 写真を追加（タップしてカメラ起動 or ファイル選択）"}
                <input type="file" accept="image/*" capture="environment" onChange={handlePhotoAdd}
                  style={{ display: "none" }} disabled={uploadingPhoto} />
              </label>
            )}
            <div style={{ fontSize: 10, color: C.muted, marginTop: 6, lineHeight: 1.5 }}>
              ※ 自動で800px・JPEG圧縮されて保存されます（1枚あたり約50KB）
            </div>
          </Field>
          <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
            <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={() => { setShowAdd(false); setEditItem(null); }}>キャンセル</button>
            <button style={{ ...btnStyle(), flex: 2 }} onClick={handleSave}>保存する</button>
          </div>
        </BottomSheet>
      )}

      {/* 写真拡大ビューア */}
      {photoViewer && (
        <div onClick={() => setPhotoViewer(null)} style={{
          position: "fixed", inset: 0, background: "rgba(0,0,0,0.95)", zIndex: 600,
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 20,
        }}>
          <div style={{ color: "#fff", fontSize: 14, marginBottom: 12, fontWeight: 700 }}>{photoViewer.name}（{photoViewer.index + 1}/{photoViewer.photos.length}）</div>
          <img src={photoViewer.photos[photoViewer.index]} alt="" style={{ maxWidth: "100%", maxHeight: "75vh", borderRadius: 8 }} />
          <div style={{ display: "flex", gap: 12, marginTop: 16, alignItems: "center" }}>
            <button onClick={(e) => { e.stopPropagation(); setPhotoViewer(p => ({ ...p, index: (p.index - 1 + p.photos.length) % p.photos.length })); }}
              disabled={photoViewer.photos.length <= 1}
              style={{ background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.3)", color: "#fff", borderRadius: 8, padding: "10px 16px", cursor: "pointer", fontFamily: "inherit", fontSize: 14, opacity: photoViewer.photos.length <= 1 ? 0.3 : 1 }}>← 前</button>
            <button onClick={() => setPhotoViewer(null)}
              style={{ background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.3)", color: "#fff", borderRadius: 8, padding: "10px 16px", cursor: "pointer", fontFamily: "inherit", fontSize: 14 }}>閉じる ✕</button>
            <button onClick={(e) => { e.stopPropagation(); setPhotoViewer(p => ({ ...p, index: (p.index + 1) % p.photos.length })); }}
              disabled={photoViewer.photos.length <= 1}
              style={{ background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.3)", color: "#fff", borderRadius: 8, padding: "10px 16px", cursor: "pointer", fontFamily: "inherit", fontSize: 14, opacity: photoViewer.photos.length <= 1 ? 0.3 : 1 }}>次 →</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ===================== APPROACH PAGE =====================
function ApproachPage({ data, setData }) {
  const today = new Date().toISOString().split("T")[0];
  const currentYM = today.slice(0, 7);

  // 権限制御
  const currentUser = getCurrentUser();
  const adminMember = data.adminMember || "下田";
  const isAdmin = currentUser === adminMember;

  const [tab, setTab] = useState("cases"); // "cases" | "input" | "monthly" | "goals"
  // 一般メンバーは自分自身を初期選択、管理者は1番目のメンバー
  const [selectedMember, setSelectedMember] = useState(currentUser && !isAdmin ? currentUser : MEMBERS[0]);
  const [selectedYM, setSelectedYM] = useState(currentYM);
  const [selectedDate, setSelectedDate] = useState(today);
  const [inputValues, setInputValues] = useState({});
  const [memo, setMemo] = useState("");
  const [mailDelivery, setMailDelivery] = useState(false);
  const [area, setArea] = useState("");
  const [dailyGoals, setDailyGoals] = useState({}); // その日の目標値
  const [showDailyGoalEdit, setShowDailyGoalEdit] = useState(false);
  const [dailyGoalForm, setDailyGoalForm] = useState({});
  const [isLoaded, setIsLoaded] = useState(false); // 初回読み込み完了フラグ
  const [autoSaveStatus, setAutoSaveStatus] = useState("idle"); // "idle" | "saving" | "saved"
  const [lastSavedAt, setLastSavedAt] = useState(null); // 最終自動保存時刻
  const [showGoalEdit, setShowGoalEdit] = useState(false);
  const [goalEditMember, setGoalEditMember] = useState(MEMBERS[0]);
  const [goalForm, setGoalForm] = useState({});

  // ===== 月次タブ用：日別チャート =====
  const [dailyChartMember, setDailyChartMember] = useState(getCurrentUser() || MEMBERS[0]);

  // ===== 案件タブ用 =====
  const [casesMember, setCasesMember] = useState("__ALL__"); // "__ALL__" or member name
  const [casesExpanded, setCasesExpanded] = useState(null); // 展開中のセクションkey
  const [casesMonth, setCasesMonth] = useState(today.slice(0, 7)); // 「今月の活動」表示対象月（YYYY-MM形式）

  // 目標値はdataに保存（memberGoals: { "たっくん": { 訪問: 600, ... } }）
  const memberGoals = data.memberGoals || {};

  const getGoal = (member, item) =>
    memberGoals[member]?.[item] ?? APPROACH_TARGETS[item] ?? 0;

  // 日次入力の既存データ
  const existing = useMemo(() =>
    data.approaches.find(a => a.member === selectedMember && a.date === selectedDate),
    [data.approaches, selectedMember, selectedDate]);

  // 既存データ読み込み（担当者・日付が変わった時のみ実行）
  // ※ existingやdata.approachesを依存に入れると、自動保存→data更新→再読込→自動保存…の無限ループになるので外す
  useEffect(() => {
    setIsLoaded(false);
    setLastSavedAt(null); // 切替時に保存時刻をリセット
    // 直接data.approachesから検索（existingを使わない）
    const rec = data.approaches.find(a => a.member === selectedMember && a.date === selectedDate);
    if (rec) {
      setInputValues(rec.values || {});
      setMemo(rec.memo || "");
      setMailDelivery(rec.mailDelivery || false);
      setArea(rec.area || "");
      setDailyGoals(rec.dailyGoals || {});
    } else {
      setInputValues({}); setMemo(""); setMailDelivery(false); setArea(""); setDailyGoals({});
    }
    const t = setTimeout(() => setIsLoaded(true), 100);
    return () => clearTimeout(t);
  }, [selectedMember, selectedDate]);

  // ===== 自動保存：実際に変更があるときだけ保存（debounce 800ms） =====
  useEffect(() => {
    if (!isLoaded) return; // 初回読み込み完了前はスキップ
    // 権限チェック：管理者でなく、自分以外のメンバーが選択されてる場合は保存しない
    if (!isAdmin && currentUser && selectedMember !== currentUser) {
      setAutoSaveStatus("idle");
      return;
    }

    // 既存レコードと現在の入力を比較。同じなら保存しない（無駄なSupabaseリクエスト防止）
    const rec = data.approaches.find(a => a.member === selectedMember && a.date === selectedDate);
    if (rec) {
      const sameValues = JSON.stringify(rec.values || {}) === JSON.stringify(inputValues);
      const sameGoals = JSON.stringify(rec.dailyGoals || {}) === JSON.stringify(dailyGoals);
      if (sameValues && sameGoals && (rec.memo || "") === memo && !!rec.mailDelivery === !!mailDelivery && (rec.area || "") === area) {
        setAutoSaveStatus("idle");
        return; // 完全に同じ → 保存しない
      }
    } else {
      // 新規だが全項目が空 → 空レコードを保存しない
      const allEmpty = Object.keys(inputValues).every(k => !inputValues[k]) && !memo && !mailDelivery && !area && Object.keys(dailyGoals).every(k => !dailyGoals[k]);
      if (allEmpty) { setAutoSaveStatus("idle"); return; }
    }

    setAutoSaveStatus("saving");
    // 800msのdebounceで連打時の保存頻度を抑制
    const saveTimer = setTimeout(() => {
      setData(d => {
        const existingRec = d.approaches.find(a => a.member === selectedMember && a.date === selectedDate);
        const entry = {
          id: existingRec?.id || Date.now(),
          member: selectedMember, date: selectedDate,
          values: inputValues, memo, mailDelivery, area, dailyGoals,
        };
        return {
          ...d,
          approaches: existingRec
            ? d.approaches.map(a => a.id === existingRec.id ? entry : a)
            : [...d.approaches, entry],
        };
      });
      setAutoSaveStatus("saved");
      setLastSavedAt(new Date()); // 最終保存時刻を記録
    }, 800);

    const fadeTimer = setTimeout(() => setAutoSaveStatus("idle"), 3500);
    return () => { clearTimeout(saveTimer); clearTimeout(fadeTimer); };
  }, [inputValues, memo, mailDelivery, area, dailyGoals, isLoaded, selectedMember, selectedDate]);

  // 月次集計
  const monthlyData = useMemo(() => {
    return MEMBERS.map(m => {
      const entries = data.approaches.filter(a => a.member === m && a.date.startsWith(selectedYM));
      const totals = {};
      APPROACH_ITEMS.forEach(item => {
        totals[item] = entries.reduce((a, e) => a + (Number(e.values?.[item]) || 0), 0);
      });
      const mailDays = entries.filter(e => e.mailDelivery).length;
      const workDays = entries.length;
      return { member: m, totals, mailDays, workDays };
    }).filter(m => Object.values(m.totals).some(v => v > 0) || m.workDays > 0);
  }, [data.approaches, selectedYM]);

  // 月一覧（過去12ヶ月）
  const monthOptions = useMemo(() => {
    return Array.from({ length: 12 }, (_, i) => {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      const ym = d.toISOString().slice(0, 7);
      return { ym, label: `${d.getFullYear()}年${d.getMonth() + 1}月` };
    });
  }, []);

  const handleSave = () => {
    const entry = {
      id: existing?.id || Date.now(),
      member: selectedMember, date: selectedDate,
      values: inputValues, memo,
      mailDelivery, area, dailyGoals,
    };
    setData(d => ({ ...d, approaches: existing ? d.approaches.map(a => a.id === existing.id ? entry : a) : [...d.approaches, entry] }));
    alert("保存しました！");
  };

  const openGoalEdit = (member) => {
    // 権限チェック：管理者または本人のみ
    if (!isAdmin && member !== currentUser) {
      alert(`⚠️ 編集権限がありません\n\n「${member}」さんの目標は編集できません。\n管理者（${adminMember}）または本人のみ編集できます。`);
      return;
    }
    setGoalEditMember(member);
    const current = {};
    APPROACH_ITEMS.forEach(item => { current[item] = String(getGoal(member, item)); });
    setGoalForm(current);
    setShowGoalEdit(true);
  };

  const saveGoal = () => {
    // 保険：保存時にも権限チェック
    if (!isAdmin && goalEditMember !== currentUser) {
      alert("⚠️ 編集権限がありません");
      setShowGoalEdit(false);
      return;
    }
    const updated = {};
    APPROACH_ITEMS.forEach(item => { updated[item] = Number(goalForm[item]) || 0; });
    setData(d => ({ ...d, memberGoals: { ...(d.memberGoals || {}), [goalEditMember]: updated } }));
    setShowGoalEdit(false);
  };

  const TABS = [
    { key: "cases", label: "📋 案件" },
    { key: "input", label: "📈 行動管理" },
    { key: "monthly", label: "📊 月次" },
    { key: "goals", label: "🎯 目標" },
  ];

  // ===== 案件タブ用の集計 =====
  const filterByMember = (items, key = "assignee") => {
    if (casesMember === "__ALL__") return items;
    return items.filter(it => isAssignedTo([it[key]], casesMember));
  };

  const pipeline = useMemo(() => {
    const jiageActive = filterByMember((data.jiage || []).filter(j => !["NG", "仕入れ完了"].includes(j.status)));
    const ownersActive = filterByMember((data.owners || []).filter(o => !["断られた", "仕入れ完了", "NG"].includes(o.status)));
    const sekisanActive = filterByMember((data.sekisan || []).filter(s => s.judgment !== "見送り"));
    const sekisanHot = sekisanActive.filter(s => s.judgment === "熱い");
    const sekisanCheck = sekisanActive.filter(s => s.judgment === "検討中");
    const stocksActive = filterByMember((data.stocks || []).filter(s => s.status !== "決済完了"));
    // 「決済完了」は選択月の年（casesMonthの年）に決済完了したもの
    const selectedYear = casesMonth.slice(0, 4);
    const stocksCompleted = filterByMember((data.stocks || []).filter(s =>
      s.status === "決済完了" && (s.sellDate || "").startsWith(selectedYear)
    ));
    return { jiageActive, ownersActive, sekisanActive, sekisanHot, sekisanCheck, stocksActive, stocksCompleted, selectedYear };
  }, [data.jiage, data.owners, data.sekisan, data.stocks, casesMember, casesMonth]);

  const alerts = useMemo(() => {
    const overdueJiage = filterByMember((data.jiage || []).filter(j =>
      j.nextVisit && j.nextVisit < today && !["NG", "断られた", "仕入れ完了"].includes(j.status)
    ));
    const overdueOwner = filterByMember((data.owners || []).filter(o =>
      o.nextFollowDate && o.nextFollowDate < today && !["NG", "断られた", "仕入れ完了"].includes(o.status)
    ));
    const stagnant90 = filterByMember((data.stocks || []).filter(s => {
      if (s.status === "決済完了") return false;
      const d = daysSinceBuy(s.buyDate);
      return d != null && d >= 90 && d < 180;
    }));
    const stagnant180 = filterByMember((data.stocks || []).filter(s => {
      if (s.status === "決済完了") return false;
      const d = daysSinceBuy(s.buyDate);
      return d != null && d >= 180;
    }));
    const dmUn = filterByMember((data.jiage || []).filter(j => j.dm === "未"));
    const hotNotPurchased = filterByMember((data.sekisan || []).filter(s => {
      if (s.judgment !== "熱い") return false;
      return !(data.stocks || []).some(st => st.fromSekisanId === s.id);
    }));
    return { overdueJiage, overdueOwner, stagnant90, stagnant180, dmUn, hotNotPurchased };
  }, [data.jiage, data.owners, data.stocks, data.sekisan, casesMember, today]);

  const weekActivity = useMemo(() => {
    // 選択月の集計（casesMonth に従う）
    const ym = casesMonth; // "2026-05"
    const newSekisan = filterByMember((data.sekisan || []).filter(s => (s.createdAt || "").startsWith(ym)));
    const newPurchase = filterByMember((data.stocks || []).filter(s => (s.buyDate || "").startsWith(ym)));
    const newCompleted = filterByMember((data.stocks || []).filter(s =>
      s.status === "決済完了" && (s.sellDate || "").startsWith(ym)
    ));
    const currentHot = filterByMember((data.sekisan || []).filter(s => s.judgment === "熱い"));
    return { newSekisan, newPurchase, newCompleted, currentHot };
  }, [data.sekisan, data.stocks, casesMember, casesMonth]);

  // 過去12ヶ月の選択肢
  const casesMonthOptions = useMemo(() => {
    return Array.from({ length: 12 }, (_, i) => {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      const ym = d.toISOString().slice(0, 7);
      return { ym, label: `${d.getFullYear()}年${d.getMonth() + 1}月${i === 0 ? "（今月）" : i === 1 ? "（先月）" : ""}` };
    });
  }, []);

  return (
    <div>
      <div style={{ fontSize: 20, fontWeight: 800, color: C.text, marginBottom: 14 }}>📞 業者アプローチ管理</div>

      {/* タブ切替 */}
      <div style={{ display: "flex", background: "#0d1422", borderRadius: 12, padding: 4, marginBottom: 14, border: `1px solid #1a2535` }}>
        {TABS.map(t => (
          <button key={t.key} onClick={() => setTab(t.key)} style={{
            flex: 1, background: tab === t.key ? C.accent : "none", border: "none",
            color: tab === t.key ? "#fff" : C.muted, borderRadius: 9, padding: "10px 4px",
            cursor: "pointer", fontSize: 13, fontWeight: tab === t.key ? 700 : 400, fontFamily: "inherit",
          }}>{t.label}</button>
        ))}
      </div>

      {/* ===== 案件タブ ===== */}
      {tab === "cases" && (
        <div>
          {/* 担当者選択 */}
          <Field label={`👤 表示する担当者 ${casesMember === "__ALL__" ? "（管理者ビュー）" : ""}`}>
            <select style={inp} value={casesMember} onChange={e => { setCasesMember(e.target.value); setCasesExpanded(null); }}>
              <option value="__ALL__">全メンバー（管理者ビュー）</option>
              {MEMBERS.map(m => <option key={m} value={m}>{m}</option>)}
            </select>
          </Field>

          {/* ========== 段1：パイプライン ========== */}
          <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.accent, marginBottom: 12 }}>
              📊 {casesMember === "__ALL__" ? "全員" : casesMember} の案件パイプライン
              {pipeline.selectedYear !== String(new Date().getFullYear()) && (
                <span style={{ color: C.warn, marginLeft: 8, fontSize: 11 }}>（決済完了は{pipeline.selectedYear}年）</span>
              )}
            </div>
            {[
              { key: "jiage", icon: "🗺️", label: "地上げ", count: pipeline.jiageActive.length, color: C.purple, sub: "訪問中・見込みなど", items: pipeline.jiageActive,
                renderItem: (j) => ({ title: j.address, sub: `${j.status} · ${j.owner || "所有者不明"}`, badge: j.assignee }) },
              { key: "owners", icon: "👤", label: "所有者交渉", count: pipeline.ownersActive.length, color: C.accent, sub: "アタック中", items: pipeline.ownersActive,
                renderItem: (o) => ({ title: o.address, sub: `${o.status} · ${o.ownerName || "所有者不明"}`, badge: o.assignee }) },
              { key: "sekisan", icon: "🧮", label: "積算検討", count: pipeline.sekisanActive.length, color: C.warn,
                sub: `🔥熱い${pipeline.sekisanHot.length} / 🟡検討中${pipeline.sekisanCheck.length}`,
                items: pipeline.sekisanActive,
                renderItem: (s) => ({ title: s.address || "住所未設定", sub: `${s.judgment} · 仕入想定${s.buyPrice ? Math.round(Number(s.buyPrice)/10000)+"万" : "未"}`, badge: s.assignee }) },
              { key: "stocks", icon: "🏠", label: "在庫", count: pipeline.stocksActive.length, color: C.success,
                sub: "リフォーム中・売却準備など", items: pipeline.stocksActive,
                renderItem: (s) => { const si = stagnantInfo(s.buyDate); return { title: s.name, sub: `${s.status}${si ? ` · ${si.level}仕入${si.days}日経過` : ""}`, badge: s.assignee }; } },
              { key: "completed", icon: "✅", label: "決済完了", count: pipeline.stocksCompleted.length, color: C.muted,
                sub: `${pipeline.selectedYear}年実績`, items: pipeline.stocksCompleted,
                renderItem: (s) => ({ title: s.name, sub: `利益${Math.round(((s.sellPrice||0)-(s.buyCost||0))/10000)}万 · ${s.sellDate}`, badge: s.assignee }) },
            ].map(stage => {
              const isExpanded = casesExpanded === stage.key;
              return (
                <div key={stage.key} style={{ marginBottom: 8 }}>
                  <button onClick={() => setCasesExpanded(isExpanded ? null : stage.key)}
                    disabled={stage.count === 0}
                    style={{
                      width: "100%", background: isExpanded ? stage.color + "22" : C.bg,
                      border: `1px solid ${isExpanded ? stage.color + "66" : "#1a2535"}`,
                      borderRadius: 10, padding: "12px 14px", cursor: stage.count === 0 ? "default" : "pointer",
                      fontFamily: "inherit", display: "flex", alignItems: "center", gap: 12, textAlign: "left",
                      opacity: stage.count === 0 ? 0.5 : 1,
                    }}>
                    <span style={{ fontSize: 24, flexShrink: 0 }}>{stage.icon}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ color: C.text, fontWeight: 700, fontSize: 14 }}>{stage.label}</div>
                      <div style={{ color: C.muted, fontSize: 11, marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{stage.sub}</div>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      <div style={{ color: stage.color, fontWeight: 800, fontSize: 22, lineHeight: 1 }}>{stage.count}</div>
                      <div style={{ color: C.muted, fontSize: 10, marginTop: 2 }}>件{stage.count > 0 ? (isExpanded ? " ▲" : " ▼") : ""}</div>
                    </div>
                  </button>
                  {isExpanded && stage.items.length > 0 && (
                    <div style={{ background: "#080d18", border: `1px solid ${stage.color}33`, borderTop: "none", borderRadius: "0 0 10px 10px", padding: "4px 8px 8px", marginTop: -1 }}>
                      {stage.items.slice(0, 20).map((item, i) => {
                        const r = stage.renderItem(item);
                        return (
                          <div key={i} style={{ padding: "10px 8px", borderBottom: i < Math.min(stage.items.length - 1, 19) ? `1px solid #1a2535` : "none" }}>
                            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
                              <span style={{ color: C.text, fontSize: 13, fontWeight: 600, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.title}</span>
                              <MemberTag name={r.badge} />
                            </div>
                            <div style={{ color: C.muted, fontSize: 11 }}>{r.sub}</div>
                          </div>
                        );
                      })}
                      {stage.items.length > 20 && (
                        <div style={{ padding: "8px", textAlign: "center", color: C.muted, fontSize: 11 }}>他 {stage.items.length - 20}件（各タブで確認）</div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* ========== 段2：要対応アラート ========== */}
          <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.danger, marginBottom: 12 }}>⚡ 要対応アラート</div>
            {(() => {
              const alertList = [
                { label: "期限切れフォロー", count: alerts.overdueJiage.length + alerts.overdueOwner.length, color: C.danger, icon: "⚠️", desc: "次回訪問日を過ぎてる地上げ・所有者" },
                { label: "180日超滞留在庫", count: alerts.stagnant180.length, color: C.danger, icon: "🔴", desc: "価格見直しなど対応急務" },
                { label: "90〜180日滞留在庫", count: alerts.stagnant90.length, color: C.warn, icon: "🟡", desc: "販売促進を検討" },
                { label: "DM未送付の地上げ", count: alerts.dmUn.length, color: C.warn, icon: "📩", desc: "1次アタックがまだの案件" },
                { label: "「熱い」判定で仕入未確定", count: alerts.hotNotPurchased.length, color: C.danger, icon: "🔥", desc: "積算は終わってるが在庫転記してない" },
              ];
              const total = alertList.reduce((a, b) => a + b.count, 0);
              if (total === 0) {
                return <div style={{ background: C.bg, borderRadius: 10, padding: 16, textAlign: "center", color: C.success, fontSize: 13 }}>✅ 要対応アラートなし。クリーンな状態です。</div>;
              }
              return (
                <div style={{ display: "grid", gap: 8 }}>
                  {alertList.filter(a => a.count > 0).map(a => (
                    <div key={a.label} style={{ background: C.bg, border: `1px solid ${a.color}33`, borderRadius: 10, padding: "10px 14px", display: "flex", alignItems: "center", gap: 12 }}>
                      <span style={{ fontSize: 18, flexShrink: 0 }}>{a.icon}</span>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ color: C.text, fontSize: 13, fontWeight: 700 }}>{a.label}</div>
                        <div style={{ color: C.muted, fontSize: 11, marginTop: 1 }}>{a.desc}</div>
                      </div>
                      <div style={{ color: a.color, fontWeight: 800, fontSize: 20, flexShrink: 0 }}>{a.count}</div>
                    </div>
                  ))}
                </div>
              );
            })()}
          </div>

          {/* ========== 段3：月別の活動（月選択可） ========== */}
          <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10, flexWrap: "wrap", gap: 8 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.success }}>
                📅 {casesMonth === today.slice(0, 7) ? "今月" : casesMonth.replace("-", "年") + "月"}の活動
                {casesMember !== "__ALL__" && <span style={{ color: MEMBER_COLORS[casesMember] || C.muted, marginLeft: 6 }}>· {casesMember}</span>}
              </div>
              {/* 月切替ナビ */}
              <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                <button onClick={() => {
                  const d = new Date(casesMonth + "-01");
                  d.setMonth(d.getMonth() - 1);
                  setCasesMonth(d.toISOString().slice(0, 7));
                  setCasesExpanded(null);
                }} style={{
                  background: C.accent + "22", border: `1px solid ${C.accent}66`, color: C.accent,
                  borderRadius: 6, width: 30, height: 28, cursor: "pointer", fontSize: 16, fontWeight: 800, fontFamily: "inherit",
                }}>‹</button>
                <select value={casesMonth} onChange={e => { setCasesMonth(e.target.value); setCasesExpanded(null); }}
                  style={{ ...inp, padding: "5px 8px", fontSize: 12, width: "auto", minWidth: 130, height: 28 }}>
                  {casesMonthOptions.map(({ ym, label }) => <option key={ym} value={ym}>{label}</option>)}
                </select>
                <button onClick={() => {
                  const d = new Date(casesMonth + "-01");
                  d.setMonth(d.getMonth() + 1);
