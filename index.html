                  const next = d.toISOString().slice(0, 7);
                  // 未来は禁止（今月まで）
                  if (next > today.slice(0, 7)) return;
                  setCasesMonth(next);
                  setCasesExpanded(null);
                }}
                disabled={casesMonth >= today.slice(0, 7)}
                style={{
                  background: casesMonth >= today.slice(0, 7) ? "#1a2535" : C.accent + "22",
                  border: `1px solid ${casesMonth >= today.slice(0, 7) ? "#1a2535" : C.accent + "66"}`,
                  color: casesMonth >= today.slice(0, 7) ? "#334155" : C.accent,
                  borderRadius: 6, width: 30, height: 28, cursor: casesMonth >= today.slice(0, 7) ? "default" : "pointer",
                  fontSize: 16, fontWeight: 800, fontFamily: "inherit",
                }}>›</button>
                {casesMonth !== today.slice(0, 7) && (
                  <button onClick={() => { setCasesMonth(today.slice(0, 7)); setCasesExpanded(null); }} style={{
                    background: C.warn + "22", border: `1px solid ${C.warn}66`, color: C.warn,
                    borderRadius: 6, padding: "5px 10px", cursor: "pointer", fontSize: 11, fontWeight: 700, fontFamily: "inherit", height: 28,
                  }}>今月</button>
                )}
              </div>
            </div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 12 }}>カードをタップで詳細</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {[
                { key: "sekisan", label: "新規積算", count: weekActivity.newSekisan.length, color: C.warn, icon: "🧮" },
                { key: "purchase", label: "仕入確定", count: weekActivity.newPurchase.length, color: C.accent, icon: "🏠" },
                { key: "completed", label: "決済完了", count: weekActivity.newCompleted.length, color: C.success, icon: "✅" },
                { key: "hot", label: "🔥熱い案件", count: weekActivity.currentHot.length, color: C.danger, icon: "🔥" },
              ].map(a => {
                const isExpanded = casesExpanded === `month_${a.key}`;
                const isClickable = a.count > 0;
                return (
                  <button key={a.key}
                    onClick={() => isClickable && setCasesExpanded(isExpanded ? null : `month_${a.key}`)}
                    disabled={!isClickable}
                    style={{
                      background: isExpanded ? a.color + "22" : C.bg,
                      borderRadius: 10, padding: "12px 14px", textAlign: "center",
                      border: `1.5px solid ${isExpanded ? a.color + "88" : "transparent"}`,
                      cursor: isClickable ? "pointer" : "default",
                      fontFamily: "inherit", position: "relative",
                      opacity: isClickable ? 1 : 0.5,
                      transition: "all 0.2s",
                    }}>
                    <div style={{ fontSize: 20, marginBottom: 4 }}>{a.icon}</div>
                    <div style={{ color: a.color, fontWeight: 800, fontSize: 24, lineHeight: 1 }}>{a.count}</div>
                    <div style={{ color: C.muted, fontSize: 11, marginTop: 4 }}>{a.label}{isClickable ? (isExpanded ? " ▲" : " ▼") : ""}</div>
                  </button>
                );
              })}
            </div>

            {/* 詳細展開エリア */}
            {(() => {
              if (!casesExpanded || !casesExpanded.startsWith("month_")) return null;
              const key = casesExpanded.slice(6); // "month_xxx" -> "xxx"
              const config = {
                sekisan: { items: weekActivity.newSekisan, color: C.warn, icon: "🧮", title: "新規積算",
                  render: (s) => ({
                    title: s.address || "(住所未設定)",
                    sub: `${s.judgment || "判断未"}${s.buyPrice ? " · 仕入想定" + Math.round(Number(s.buyPrice)/10000) + "万" : ""}${s.sellPrice ? " · 売却想定" + Math.round(Number(s.sellPrice)/10000) + "万" : ""}`,
                    date: s.createdAt,
                    badge: s.assignee,
                    judgment: s.judgment,
                  })},
                purchase: { items: weekActivity.newPurchase, color: C.accent, icon: "🏠", title: "仕入確定",
                  render: (s) => ({
                    title: s.name || "(無題)",
                    sub: `${s.status} · 仕入${Math.round((s.buyCost||0)/10000)}万 · 想定売却${Math.round((s.sellPrice||0)/10000)}万`,
                    date: s.buyDate,
                    badge: s.assignee,
                  })},
                completed: { items: weekActivity.newCompleted, color: C.success, icon: "✅", title: "決済完了",
                  render: (s) => {
                    const profit = (s.sellPrice || 0) - (s.buyCost || 0);
                    return {
                      title: s.name || "(無題)",
                      sub: `売却${Math.round((s.sellPrice||0)/10000)}万 · 利益${Math.round(profit/10000)}万`,
                      date: s.sellDate,
                      badge: s.assignee,
                      highlight: profit > 0 ? `+${Math.round(profit/10000)}万` : null,
                    };
                  }},
                hot: { items: weekActivity.currentHot, color: C.danger, icon: "🔥", title: "現在「熱い」",
                  render: (s) => ({
                    title: s.address || "(住所未設定)",
                    sub: `仕入想定${s.buyPrice ? Math.round(Number(s.buyPrice)/10000) + "万" : "未"} · 売却想定${s.sellPrice ? Math.round(Number(s.sellPrice)/10000) + "万" : "未"}`,
                    date: s.createdAt,
                    badge: s.assignee,
                  })},
              };
              const cfg = config[key];
              if (!cfg) return null;
              const items = filterByMember(cfg.items, cfg.title === "新規積算" || cfg.title === "現在「熱い」" ? "assignee" : "assignee");
              // 日付の新しい順にソート
              const sortedItems = [...items].sort((a, b) => {
                const da = cfg.render(a).date || "";
                const db = cfg.render(b).date || "";
                return db.localeCompare(da);
              });

              // 集計
              const totalProfit = key === "completed" ? items.reduce((a, s) => a + ((s.sellPrice||0) - (s.buyCost||0)), 0) : null;
              const totalSell = key === "completed" ? items.reduce((a, s) => a + (s.sellPrice||0), 0) : null;
              const totalBuy = key === "purchase" ? items.reduce((a, s) => a + (s.buyCost||0), 0) : null;

              return (
                <div style={{ marginTop: 12, background: "#080d18", border: `1px solid ${cfg.color}33`, borderRadius: 10, padding: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, paddingBottom: 8, borderBottom: `1px solid ${cfg.color}22` }}>
                    <span style={{ fontSize: 16 }}>{cfg.icon}</span>
                    <span style={{ color: cfg.color, fontSize: 12, fontWeight: 700 }}>{cfg.title} 詳細（{sortedItems.length}件）</span>
                    {totalProfit !== null && (
                      <span style={{ marginLeft: "auto", fontSize: 11, color: C.muted }}>
                        合計売上 <span style={{ color: C.warn, fontWeight: 700 }}>{Math.round(totalSell/10000)}万</span> / 利益 <span style={{ color: C.success, fontWeight: 700 }}>{Math.round(totalProfit/10000)}万</span>
                      </span>
                    )}
                    {totalBuy !== null && (
                      <span style={{ marginLeft: "auto", fontSize: 11, color: C.muted }}>
                        合計仕入 <span style={{ color: C.accent, fontWeight: 700 }}>{Math.round(totalBuy/10000)}万</span>
                      </span>
                    )}
                  </div>
                  {sortedItems.length === 0 ? (
                    <div style={{ padding: "16px", textAlign: "center", color: C.muted, fontSize: 12 }}>該当する案件がありません</div>
                  ) : (
                    sortedItems.map((item, i) => {
                      const r = cfg.render(item);
                      const JCOLOR = { "熱い": C.danger, "検討中": C.warn, "普通": C.muted, "見送り": "#334155" };
                      const JEMOJI = { "熱い": "🔥", "検討中": "🟡", "普通": "⚪", "見送り": "❌" };
                      return (
                        <div key={i} style={{ padding: "9px 6px", borderBottom: i < sortedItems.length - 1 ? `1px solid #1a2535` : "none" }}>
                          <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 4, flexWrap: "wrap" }}>
                            <span style={{ color: C.text, fontSize: 13, fontWeight: 700, flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.title}</span>
                            {r.judgment && <span style={{ background: (JCOLOR[r.judgment] || C.muted) + "33", color: JCOLOR[r.judgment] || C.muted, padding: "2px 6px", borderRadius: 8, fontSize: 10, fontWeight: 700 }}>{JEMOJI[r.judgment] || ""}{r.judgment}</span>}
                            <MemberTag name={r.badge} />
                            {r.highlight && <Tag label={r.highlight} color={C.success} />}
                          </div>
                          <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
                            <span style={{ color: C.muted, fontSize: 11, flex: 1 }}>{r.sub}</span>
                            {r.date && <span style={{ color: C.muted, fontSize: 11, flexShrink: 0 }}>{r.date}</span>}
                          </div>
                        </div>
                      );
                    })
                  )}
                </div>
              );
            })()}

            {casesMember === "__ALL__" && (
              <div style={{ marginTop: 10, fontSize: 11, color: C.muted, textAlign: "center" }}>
                ※ 全メンバー合算。担当者を選ぶと個別の動きが見えます。
              </div>
            )}
          </div>
        </div>
      )}

      {/* ===== 入力タブ ===== */}
      {tab === "input" && (
        <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 16 }}>
          {/* 一般メンバー警告 */}
          {!isAdmin && currentUser && selectedMember !== currentUser && (
            <div style={{ background: C.warn + "22", border: `1px solid ${C.warn}66`, borderRadius: 10, padding: "10px 12px", marginBottom: 12 }}>
              <div style={{ color: C.warn, fontSize: 13, fontWeight: 700, marginBottom: 4 }}>👁 閲覧モード</div>
              <div style={{ color: C.muted, fontSize: 11, lineHeight: 1.6 }}>
                {selectedMember}さんのデータは閲覧のみです。<br />
                自分（{currentUser}）のデータを入力するには、担当者を「{currentUser}」に切り替えてください。
              </div>
            </div>
          )}

          {/* ヘッダー：担当者＋日付 */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
            <Field label={<>👤 担当者{!isAdmin && <span style={{ color: C.muted, fontSize: 10, marginLeft: 4 }}>（管理者以外は自分のみ入力可）</span>}</>}>
              <select style={inp} value={selectedMember} onChange={e => setSelectedMember(e.target.value)}>
                {MEMBERS.map(m => {
                  const editable = isAdmin || m === currentUser;
                  return <option key={m} value={m}>{m}{!editable ? " 👁" : ""}</option>;
                })}
              </select>
            </Field>
            <Field label={<>📅 日付{(() => { const d = dayOfWeekLabel(selectedDate); return d ? <span style={{ color: d.color, marginLeft: 6, fontWeight: 800 }}>({d.label})</span> : null; })()}</>}>
              <input type="date" style={inp} value={selectedDate} onChange={e => setSelectedDate(e.target.value)} />
            </Field>
          </div>

          {/* 編集可否で全体をラップ：閲覧モードなら全フォームを薄く＆操作不可に */}
          <div style={{
            opacity: (!isAdmin && currentUser && selectedMember !== currentUser) ? 0.55 : 1,
            pointerEvents: (!isAdmin && currentUser && selectedMember !== currentUser) ? "none" : "auto",
            filter: (!isAdmin && currentUser && selectedMember !== currentUser) ? "saturate(0.6)" : "none",
            transition: "opacity 0.2s",
          }}>

          {/* 📡 自動保存インジケータ（常時表示） */}
          <div style={{
            background: autoSaveStatus === "saving"
              ? C.warn + "22"
              : autoSaveStatus === "saved" || lastSavedAt
                ? C.success + "11"
                : C.bg,
            border: `1px solid ${autoSaveStatus === "saving" ? C.warn + "66" : C.success + "44"}`,
            borderRadius: 8, padding: "8px 12px", marginBottom: 14,
            display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8,
            fontSize: 11,
            transition: "all 0.3s",
          }}>
            <span style={{
              color: autoSaveStatus === "saving" ? C.warn : C.success,
              fontWeight: 700,
              display: "flex", alignItems: "center", gap: 6,
            }}>
              {autoSaveStatus === "saving" ? (
                <><span style={{ display: "inline-block", animation: "hikariGoldSparkle 0.8s infinite" }}>💾</span> 保存中…</>
              ) : (
                <>📡 自動保存ON</>
              )}
            </span>
            {lastSavedAt && (
              <span style={{ color: C.muted }}>
                最終保存 <span style={{ color: C.success, fontWeight: 700 }}>{lastSavedAt.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}</span>
              </span>
            )}
            {!lastSavedAt && autoSaveStatus !== "saving" && (
              <span style={{ color: C.muted, fontSize: 10 }}>入力すると自動で保存されます</span>
            )}
          </div>

          {/* 今日の目標サマリー */}
          {(() => {
            const totalGoal = APPROACH_ITEMS.reduce((a, item) => a + (Number(dailyGoals[item]) || 0), 0);
            const totalDone = APPROACH_ITEMS.reduce((a, item) => a + (Number(inputValues[item]) || 0), 0);
            const totalPct = totalGoal > 0 ? Math.min(totalDone / totalGoal * 100, 100) : 0;
            const isGoalSet = totalGoal > 0;
            const allAchieved = isGoalSet && totalDone >= totalGoal;
            return (
              <div style={{
                background: allAchieved
                  ? "linear-gradient(135deg, rgba(252,211,77,0.20) 0%, rgba(245,158,11,0.12) 50%, rgba(252,211,77,0.18) 100%)"
                  : isGoalSet ? C.accent + "11" : C.bg,
                border: allAchieved ? "2px solid #FCD34D" : `1.5px solid ${isGoalSet ? C.accent + "55" : "#1a2535"}`,
                borderRadius: 12, padding: "12px 14px", marginBottom: 14,
                position: "relative", overflow: "hidden",
                animation: allAchieved ? "hikariGoldPulse 2.5s ease-in-out infinite" : "none",
              }}>
                {allAchieved && (
                  <div style={{
                    position: "absolute", top: 0, right: 0,
                    background: "linear-gradient(135deg, #FCD34D 0%, #F59E0B 50%, #FBBF24 100%)",
                    color: "#451A03",
                    padding: "5px 16px 6px",
                    borderRadius: "0 12px 0 14px",
                    fontSize: 11, fontWeight: 900,
                    letterSpacing: "0.12em",
                    boxShadow: "0 2px 12px rgba(245,158,11,0.5), inset 0 1px 0 rgba(255,255,255,0.4)",
                    animation: "hikariGoldBadgePop 0.6s ease-out, hikariGoldSparkle 2s ease-in-out 0.6s infinite",
                  }}>👑 全制覇 👑</div>
                )}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: isGoalSet ? 10 : 0, paddingRight: allAchieved ? 100 : 0 }}>
                  <div>
                    <div style={{ fontSize: 11, color: allAchieved ? "#FCD34D" : C.muted, fontWeight: 700 }}>
                      {allAchieved ? "👑 今日の目標 全達成！" : "🎯 今日の目標"}
                    </div>
                    {isGoalSet && (
                      <div style={{
                        fontSize: 14, fontWeight: 800, marginTop: 2,
                        color: allAchieved ? "#FCD34D" : C.text,
                        textShadow: allAchieved ? "0 0 12px rgba(252,211,77,0.4)" : "none",
                      }}>
                        合計 {totalDone}/{totalGoal} 件
                        <span style={{
                          color: allAchieved ? "#FBBF24" : (totalPct >= 100 ? C.success : C.accent),
                          marginLeft: 8, fontSize: 13,
                        }}>
                          ({totalPct.toFixed(0)}%)
                        </span>
                      </div>
                    )}
                    {!isGoalSet && (
                      <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>未設定</div>
                    )}
                  </div>
                  <button onClick={() => {
                    const f = {};
                    APPROACH_ITEMS.forEach(item => { f[item] = String(dailyGoals[item] || ""); });
                    setDailyGoalForm(f);
                    setShowDailyGoalEdit(true);
                  }} style={{
                    background: isGoalSet ? C.accent + "22" : C.accent,
                    border: `1.5px solid ${C.accent}`,
                    color: isGoalSet ? C.accent : "#fff",
                    borderRadius: 8, padding: "8px 14px", cursor: "pointer", fontSize: 13, fontWeight: 700, fontFamily: "inherit",
                  }}>{isGoalSet ? "🎯 編集" : "🎯 目標を設定"}</button>
                </div>
                {isGoalSet && (
                  <div style={{
                    background: "#1a2535", borderRadius: 6, height: 8, overflow: "hidden", position: "relative",
                    border: allAchieved ? "1px solid #FCD34D" : "none",
                  }}>
                    <div style={{
                      width: totalPct + "%", height: "100%",
                      background: allAchieved
                        ? "linear-gradient(90deg, #FCD34D 0%, #F59E0B 25%, #FCD34D 50%, #F59E0B 75%, #FCD34D 100%)"
                        : (totalPct >= 100 ? C.success : C.accent),
                      backgroundSize: allAchieved ? "200% 100%" : "100% 100%",
                      animation: allAchieved ? "hikariGoldFlow 2s linear infinite" : "none",
                      transition: "width 0.4s",
                    }} />
                  </div>
                )}
              </div>
            );
          })()}

          {/* カウンター項目 */}
          <div style={{ fontSize: 12, color: C.muted, marginBottom: 8, fontWeight: 700 }}>📊 業者訪問カウンター（タップで＋1）</div>
          <div style={{ display: "grid", gap: 10, marginBottom: 14 }}>
            {APPROACH_ITEMS.map(item => {
              const goal = Number(dailyGoals[item]) || 0;
              const val = Number(inputValues[item]) || 0;
              const pct = goal > 0 ? Math.min(val / goal * 100, 100) : 0;
              const remaining = Math.max(0, goal - val);
              const overAchieved = goal > 0 && val >= goal;
              // 達成度別の色
              const color = !goal ? C.text :
                pct >= 100 ? C.success :
                pct >= 70 ? C.accent :
                pct >= 30 ? C.warn : C.danger;
              const setVal = newVal => setInputValues(p => ({ ...p, [item]: Math.max(0, newVal) }));

              // セグメント区切り線（目標を10等分、ただし目標10未満ならその数）
              const segments = goal > 0 ? Math.min(goal, 10) : 0;

              return (
                <div key={item} style={{
                  background: overAchieved
                    ? "linear-gradient(135deg, rgba(252,211,77,0.18) 0%, rgba(245,158,11,0.10) 50%, rgba(252,211,77,0.15) 100%)"
                    : C.bg,
                  borderRadius: 12, padding: "12px",
                  border: overAchieved ? "2px solid #FCD34D" : "1px solid #1a2535",
                  position: "relative",
                  overflow: "hidden",
                  animation: overAchieved ? "hikariGoldPulse 2.5s ease-in-out infinite" : "none",
                }}>
                  {/* 達成バッジ（右上） */}
                  {overAchieved && (
                    <div style={{
                      position: "absolute", top: 0, right: 0,
                      background: "linear-gradient(135deg, #FCD34D 0%, #F59E0B 50%, #FBBF24 100%)",
                      color: "#451A03",
                      padding: "5px 14px 6px",
                      borderRadius: "0 12px 0 14px",
                      fontSize: 11, fontWeight: 900,
                      letterSpacing: "0.12em",
                      boxShadow: "0 2px 12px rgba(245,158,11,0.5), inset 0 1px 0 rgba(255,255,255,0.4)",
                      animation: "hikariGoldBadgePop 0.6s ease-out, hikariGoldSparkle 2s ease-in-out 0.6s infinite",
                      zIndex: 2,
                    }}>✨ 達成 ✨</div>
                  )}

                  {/* ヘッダー：項目名＋目標値 */}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, paddingRight: overAchieved ? 88 : 0 }}>
                    <span style={{
                      color: overAchieved ? "#FCD34D" : C.text,
                      fontSize: 14, fontWeight: overAchieved ? 800 : 700,
                      textShadow: overAchieved ? "0 0 12px rgba(252,211,77,0.4)" : "none",
                    }}>{item}</span>
                    {goal > 0 ? (
                      <span style={{
                        color: overAchieved ? "#FBBF24" : color,
                        fontSize: 12, fontWeight: 800,
                      }}>
                        {overAchieved ? "🏆" : "🎯"} {val} / {goal}件 <span style={{ opacity: 0.85 }}>({pct.toFixed(0)}%)</span>
                      </span>
                    ) : (
                      <span style={{ color: C.muted, fontSize: 11 }}>目標未設定</span>
                    )}
                  </div>

                  {/* カウンター操作 */}
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: goal > 0 ? 10 : 0 }}>
                    <button onClick={() => setVal(val - 1)}
                      style={{ background: C.danger + "22", border: `1.5px solid ${C.danger}`, color: C.danger, borderRadius: 8, width: 42, height: 42, cursor: "pointer", fontSize: 20, fontWeight: 800, fontFamily: "inherit" }}>−</button>
                    <div style={{
                      flex: 1, textAlign: "center", fontSize: 28, fontWeight: 800,
                      color: overAchieved ? "#FCD34D" : C.text,
                      animation: overAchieved ? "hikariGoldNumber 2s ease-in-out infinite" : "none",
                    }}>{val}</div>
                    <button onClick={() => setVal(val + 1)}
                      style={{
                        background: overAchieved ? "linear-gradient(135deg, #FCD34D, #F59E0B)" : C.success + "22",
                        border: overAchieved ? "1.5px solid #F59E0B" : `1.5px solid ${C.success}`,
                        color: overAchieved ? "#451A03" : C.success,
                        borderRadius: 8, width: 42, height: 42, cursor: "pointer", fontSize: 20, fontWeight: 800, fontFamily: "inherit",
                        boxShadow: overAchieved ? "0 0 12px rgba(252,211,77,0.4)" : "none",
                      }}>＋</button>
                    <button onClick={() => setVal(val + 5)}
                      style={{
                        background: overAchieved ? "linear-gradient(135deg, #FCD34D, #F59E0B)" : C.accent + "22",
                        border: overAchieved ? "1.5px solid #F59E0B" : `1.5px solid ${C.accent}`,
                        color: overAchieved ? "#451A03" : C.accent,
                        borderRadius: 8, padding: "8px 14px", cursor: "pointer", fontSize: 13, fontWeight: 800, fontFamily: "inherit",
                        boxShadow: overAchieved ? "0 0 12px rgba(252,211,77,0.4)" : "none",
                      }}>＋5</button>
                  </div>

                  {/* 大きなプログレスバー＋セグメント線 */}
                  {goal > 0 && (
                    <>
                      <div style={{
                        background: "#0a0f1a", borderRadius: 8, height: 18,
                        overflow: "hidden", position: "relative",
                        border: overAchieved ? "1px solid #FCD34D" : "1px solid #1a2535",
                      }}>
                        {/* 達成バー */}
                        <div style={{
                          width: pct + "%", height: "100%",
                          background: overAchieved
                            ? "linear-gradient(90deg, #FCD34D 0%, #F59E0B 25%, #FCD34D 50%, #F59E0B 75%, #FCD34D 100%)"
                            : `linear-gradient(90deg, ${color}, ${color}dd)`,
                          backgroundSize: overAchieved ? "200% 100%" : "100% 100%",
                          animation: overAchieved ? "hikariGoldFlow 2s linear infinite" : "none",
                          borderRadius: 7, transition: "width 0.4s",
                        }} />
                        {/* セグメント区切り線 */}
                        {Array.from({ length: segments - 1 }).map((_, i) => (
                          <div key={i} style={{
                            position: "absolute",
                            left: ((i + 1) / segments * 100) + "%",
                            top: 0, bottom: 0, width: 1,
                            background: "rgba(255,255,255,0.15)",
                          }} />
                        ))}
                      </div>
                      {/* あと◯件 / 達成メッセージ */}
                      <div style={{
                        marginTop: 8, fontSize: overAchieved ? 14 : 12,
                        fontWeight: 800, textAlign: "center",
                        color: overAchieved ? "#FCD34D" : color,
                        textShadow: overAchieved ? "0 0 12px rgba(252,211,77,0.5)" : "none",
                        letterSpacing: overAchieved ? "0.05em" : "0",
                      }}>
                        {overAchieved
                          ? <>🏆 達成！ <span style={{ color: "#FBBF24" }}>+{val - goal}件</span> オーバー達成中 🏆</>
                          : remaining === 0
                            ? "🎯 目標達成！"
                            : <>あと <span style={{ fontSize: 18, fontWeight: 800 }}>{remaining}</span> 件で達成</>}
                      </div>
                    </>
                  )}
                </div>
              );
            })}
          </div>

          {/* 🎯 今日の目標設定 BottomSheet */}
          {showDailyGoalEdit && (
            <BottomSheet title={`🎯 ${selectedDate} の目標設定`} onClose={() => setShowDailyGoalEdit(false)}>
              <div style={{ color: C.muted, fontSize: 13, marginBottom: 14, lineHeight: 1.6 }}>
                この日の各項目の目標値を入力してください。<br />
                空欄または0なら未設定扱いになります。
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {APPROACH_ITEMS.map(item => (
                  <Field key={item} label={`🎯 ${item}`}>
                    <input
                      type="text" inputMode="numeric"
                      style={{ ...inp, MozAppearance: "textfield", WebkitAppearance: "none", fontSize: 16, padding: "12px 14px" }}
                      value={dailyGoalForm[item] || ""}
                      onChange={e => setDailyGoalForm(p => ({ ...p, [item]: e.target.value.replace(/[^0-9]/g, "") }))}
                      placeholder="0"
                    />
                  </Field>
                ))}
              </div>
              {/* 月間目標から自動セット */}
              <button onClick={() => {
                const f = {};
                APPROACH_ITEMS.forEach(item => {
                  const monthly = getGoal(selectedMember, item);
                  // 月の営業日を約22日として日割り
                  f[item] = String(Math.round(monthly / 22));
                });
                setDailyGoalForm(f);
              }} style={{
                ...btnStyle("ghost"), width: "100%", marginTop: 8, fontSize: 12, padding: "10px",
              }}>📊 月間目標から日割りで自動セット（÷22日）</button>
              <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={() => setShowDailyGoalEdit(false)}>キャンセル</button>
                <button style={{ ...btnStyle(), flex: 2 }} onClick={() => {
                  const updated = {};
                  APPROACH_ITEMS.forEach(item => { updated[item] = Number(dailyGoalForm[item]) || 0; });
                  setDailyGoals(updated);
                  setShowDailyGoalEdit(false);
                }}>🎯 目標を保存</button>
              </div>
            </BottomSheet>
          )}

          {/* メール配信トグル */}
          <div style={{ background: C.bg, border: `1px solid #1a2535`, borderRadius: 10, padding: "12px 14px", marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ color: C.text, fontSize: 13, fontWeight: 600 }}>📨 メール配信</span>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => setMailDelivery(true)}
                  style={{ background: mailDelivery ? C.success : C.bg, border: `1.5px solid ${C.success}`, color: mailDelivery ? "#fff" : C.success, borderRadius: 8, padding: "8px 18px", cursor: "pointer", fontSize: 13, fontWeight: 700, fontFamily: "inherit" }}>○ した</button>
                <button onClick={() => setMailDelivery(false)}
                  style={{ background: !mailDelivery ? C.muted : C.bg, border: `1.5px solid ${C.muted}`, color: !mailDelivery ? "#fff" : C.muted, borderRadius: 8, padding: "8px 18px", cursor: "pointer", fontSize: 13, fontWeight: 700, fontFamily: "inherit" }}>× してない</button>
              </div>
            </div>
          </div>

          {/* 訪問エリア */}
          <Field label="📍 訪問エリア">
            <input style={inp} value={area} onChange={e => setArea(e.target.value)} placeholder="川越市・狭山市・所沢市 など" />
          </Field>

          {/* メモ */}
          <Field label="📝 メモ">
            <textarea style={{ ...inp, height: 70, resize: "vertical" }} value={memo} onChange={e => setMemo(e.target.value)} placeholder="駅前は業者多め、A社が反応良かったなど" />
          </Field>

          <button style={{ ...btnStyle("ghost"), width: "100%", marginTop: 4, padding: "12px", fontSize: 13 }} onClick={handleSave}>💾 念のため今すぐ保存（通常は不要）</button>
          <div style={{ marginTop: 10, padding: "12px 14px", borderRadius: 10, textAlign: "center", fontSize: 12, fontWeight: 700,
            background: autoSaveStatus === "saving" ? C.warn + "22" : (autoSaveStatus === "saved" || lastSavedAt) ? C.success + "22" : C.bg,
            border: `1px solid ${autoSaveStatus === "saving" ? C.warn : (autoSaveStatus === "saved" || lastSavedAt) ? C.success : "#1a2535"}`,
            color: autoSaveStatus === "saving" ? C.warn : (autoSaveStatus === "saved" || lastSavedAt) ? C.success : C.muted,
            transition: "all 0.3s",
          }}>
            {autoSaveStatus === "saving"
              ? "💾 Supabaseに保存中..."
              : lastSavedAt
                ? <>✅ 最終保存 {lastSavedAt.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}（全端末で共有済み）</>
                : "✨ 入力するたびに自動で保存・同期されます"}
          </div>
          </div>{/* end of edit-ability wrapper */}
        </div>
      )}

      {/* ===== 月次集計タブ ===== */}
      {tab === "monthly" && (
        <div>
          {/* 月切替 */}
          <div style={{ marginBottom: 14 }}>
            <Field label="表示月">
              <select style={inp} value={selectedYM} onChange={e => setSelectedYM(e.target.value)}>
                {monthOptions.map(({ ym, label }) => (
                  <option key={ym} value={ym}>{label}</option>
                ))}
              </select>
            </Field>
          </div>

          {/* ★★★ 月別進捗テーブル ★★★ */}
          {(() => {
            const [y, m] = selectedYM.split("-").map(Number);
            const daysInMonth = new Date(y, m, 0).getDate();
            const isCurrentMonth = selectedYM === today.slice(0, 7);
            const todayDay = isCurrentMonth ? new Date().getDate() : daysInMonth;

            // 集計
            const totals = {};
            const goals = {};
            APPROACH_ITEMS.forEach(item => {
              totals[item] = 0;
              goals[item] = getGoal(dailyChartMember, item);
            });

            const rows = Array.from({ length: daysInMonth }, (_, i) => {
              const day = i + 1;
              const date = `${selectedYM}-${String(day).padStart(2, "0")}`;
              const entry = data.approaches.find(a => a.member === dailyChartMember && a.date === date);
              const values = entry?.values || {};
              APPROACH_ITEMS.forEach(item => {
                totals[item] += Number(values[item]) || 0;
              });
              return { day, date, values, hasData: !!entry };
            });

            const activeDays = rows.filter(r =>
              APPROACH_ITEMS.some(item => (Number(r.values[item]) || 0) > 0)
            ).length;

            // 曜日色
            const dowBg = (dow, isToday) => {
              if (isToday) return "#FCD34D11";
              if (dow === 0) return "#06b6d420";
              if (dow === 3) return "#fb923c15";
              if (dow === 6) return "#0ea5e915";
              return "transparent";
            };
            const dowColor = (dow) => {
              if (dow === 0) return "#06b6d4";
              if (dow === 6) return "#0ea5e9";
              return C.muted;
            };
            const dowLabel = (dow) => ["日", "月", "火", "水", "木", "金", "土"][dow];

            return (
              <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
                {/* タイトル */}
                <div style={{ fontSize: 13, fontWeight: 700, color: C.accent, marginBottom: 10 }}>
                  📊 月別進捗 — <span style={{ color: MEMBER_COLORS[dailyChartMember] || C.text }}>{dailyChartMember}</span>
                </div>

                {/* メンバー選択 */}
                <div style={{ fontSize: 11, color: C.muted, marginBottom: 4, fontWeight: 700 }}>👤 メンバー</div>
                <div style={{ display: "flex", gap: 4, marginBottom: 12, overflowX: "auto", paddingBottom: 4 }}>
                  {MEMBERS.map(member => {
                    const active = dailyChartMember === member;
                    return (
                      <button key={member} onClick={() => setDailyChartMember(member)} style={{
                        padding: "5px 11px", borderRadius: 16, cursor: "pointer", fontSize: 11,
                        background: active ? (MEMBER_COLORS[member] || C.accent) : C.bg,
                        color: active ? "#fff" : C.muted,
                        border: `1px solid ${active ? (MEMBER_COLORS[member] || C.accent) : "#1a2535"}`,
                        fontFamily: "inherit", whiteSpace: "nowrap", flexShrink: 0, fontWeight: active ? 700 : 400,
                      }}>{member}</button>
                    );
                  })}
                </div>

                {/* ===== 集計テーブル（常時表示） ===== */}
                <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch", background: "#0a0f1a", borderRadius: 10, border: `1px solid #1a2535`, marginBottom: 10 }}>
                  <table style={{ width: "100%", minWidth: 600, fontSize: 12, color: C.text, borderCollapse: "collapse", whiteSpace: "nowrap" }}>
                    <thead>
                      <tr style={{ background: "#1e3a5f" }}>
                        <th style={{ padding: "8px 10px", textAlign: "left", color: "#fff", fontSize: 11, borderBottom: `2px solid ${C.accent}`, position: "sticky", left: 0, background: "#1e3a5f", zIndex: 2, minWidth: 100 }}>
                          {Number(selectedYM.split("-")[1])}月 集計
                        </th>
                        {APPROACH_ITEMS.map(item => (
                          <th key={item} style={{ padding: "8px 4px", textAlign: "center", color: "#fff", fontSize: 11, borderBottom: `2px solid ${C.accent}`, minWidth: 56 }}>
                            {item}
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {/* 合計 */}
                      <tr style={{ background: "#0d1a2a" }}>
                        <td style={{ padding: "8px 10px", color: "#fff", fontWeight: 800, fontSize: 12, position: "sticky", left: 0, background: "#0d1a2a", borderRight: `1px solid #1a2535` }}>
                          合計
                        </td>
                        {APPROACH_ITEMS.map(item => (
                          <td key={item} style={{ padding: "8px 4px", textAlign: "center", color: "#fff", fontWeight: 800, fontSize: 13 }}>
                            {totals[item] || ""}
                          </td>
                        ))}
                      </tr>
                      {/* 一日平均 */}
                      <tr style={{ background: "#0a1424", borderTop: `1px solid #1a2535` }}>
                        <td style={{ padding: "6px 10px", color: C.muted, fontWeight: 700, fontSize: 11, position: "sticky", left: 0, background: "#0a1424", borderRight: `1px solid #1a2535` }}>
                          一日平均
                          <span style={{ fontSize: 9, color: C.muted, marginLeft: 4 }}>({activeDays}日)</span>
                        </td>
                        {APPROACH_ITEMS.map(item => {
                          const avg = activeDays > 0 ? Math.round(totals[item] / activeDays * 10) / 10 : 0;
                          return (
                            <td key={item} style={{ padding: "6px 4px", textAlign: "center", color: C.text, fontSize: 11 }}>
                              {avg > 0 ? avg : ""}
                            </td>
                          );
                        })}
                      </tr>
                      {/* 目標数値 */}
                      <tr style={{ background: "#1a1410", borderTop: `1px solid #1a2535` }}>
                        <td style={{ padding: "6px 10px", color: "#FCD34D", fontWeight: 700, fontSize: 11, position: "sticky", left: 0, background: "#1a1410", borderRight: `1px solid #1a2535` }}>
                          🎯 目標数値
                        </td>
                        {APPROACH_ITEMS.map(item => (
                          <td key={item} style={{ padding: "6px 4px", textAlign: "center", color: "#FCD34D", fontWeight: 700, fontSize: 11 }}>
                            {goals[item] || ""}
                          </td>
                        ))}
                      </tr>
                      {/* 差分 */}
                      <tr style={{ background: "#0d1422", borderTop: `1px solid #1a2535` }}>
                        <td style={{ padding: "6px 10px", color: C.muted, fontWeight: 700, fontSize: 11, position: "sticky", left: 0, background: "#0d1422", borderRight: `1px solid #1a2535` }}>
                          差分
                        </td>
                        {APPROACH_ITEMS.map(item => {
                          const diff = totals[item] - goals[item];
                          const noGoal = goals[item] === 0;
                          if (noGoal) return <td key={item} style={{ padding: "6px 4px" }} />;
                          const color = diff >= 0 ? C.success : C.danger;
                          return (
                            <td key={item} style={{ padding: "6px 4px", textAlign: "center", color, fontSize: 11, fontWeight: 800 }}>
                              {diff >= 0 ? "+" : ""}{diff}
                            </td>
                          );
                        })}
                      </tr>
                    </tbody>
                  </table>
                </div>

                {/* ===== 日別詳細テーブル（折りたたみ） ===== */}
                <details>
                  <summary style={{
                    cursor: "pointer", padding: "10px 14px", background: C.bg,
                    border: `1px solid #1a2535`, borderRadius: 10, color: C.accent,
                    fontSize: 12, fontWeight: 700, userSelect: "none",
                  }}>📅 日別の詳細を見る（{daysInMonth}日分）</summary>
                  <div style={{ marginTop: 6, overflowX: "auto", WebkitOverflowScrolling: "touch", background: "#0a0f1a", borderRadius: 10, border: `1px solid #1a2535` }}>
                    <table style={{ width: "100%", minWidth: 600, fontSize: 12, color: C.text, borderCollapse: "collapse", whiteSpace: "nowrap" }}>
                      <thead style={{ position: "sticky", top: 0, zIndex: 1 }}>
                        <tr style={{ background: "#1e3a5f" }}>
                          <th style={{ padding: "8px 6px", textAlign: "left", color: "#fff", fontSize: 11, borderBottom: `2px solid ${C.accent}`, position: "sticky", left: 0, background: "#1e3a5f", zIndex: 2, minWidth: 130 }}>
                            日付
                          </th>
                          {APPROACH_ITEMS.map(item => (
                            <th key={item} style={{ padding: "8px 4px", textAlign: "center", color: "#fff", fontSize: 11, borderBottom: `2px solid ${C.accent}`, minWidth: 56 }}>
                              {item}
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {rows.map(r => {
                          const dow = new Date(r.date).getDay();
                          const isToday = r.day === todayDay && isCurrentMonth;
                          const bg = dowBg(dow, isToday);
                          return (
                            <tr key={r.day} style={{ background: bg, borderBottom: `1px solid #1a2535` }}>
                              <td style={{
                                padding: "6px 8px", color: isToday ? "#FCD34D" : C.text,
                                fontWeight: isToday ? 800 : 400, fontSize: 11,
                                position: "sticky", left: 0, background: bg || "#0a0f1a",
                                borderRight: `1px solid #1a2535`,
                              }}>
                                <span>{Number(selectedYM.split("-")[1])}月{r.day}日</span>
                                <span style={{ color: dowColor(dow), marginLeft: 6, fontWeight: 700 }}>{dowLabel(dow)}</span>
                              </td>
                              {APPROACH_ITEMS.map(item => {
                                const v = Number(r.values[item]) || 0;
                                return (
                                  <td key={item} style={{
                                    padding: "6px 4px", textAlign: "center", color: v > 0 ? C.text : "#334155",
                                    fontWeight: v > 0 ? 700 : 400, fontSize: 12,
                                  }}>
                                    {v > 0 ? v : ""}
                                  </td>
                                );
                              })}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                  <div style={{ marginTop: 6, fontSize: 10, color: C.muted, textAlign: "center", lineHeight: 1.6 }}>
                    💡 横スクロール ←→ で全項目表示<br />
                    <span style={{ color: "#06b6d4" }}>日曜</span> / <span style={{ color: "#fb923c" }}>水曜</span> / <span style={{ color: "#0ea5e9" }}>土曜</span> / <span style={{ color: "#FCD34D" }}>今日</span>
                  </div>
                </details>
              </div>
            );
          })()}

          {monthlyData.length === 0 && (
            <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 32, textAlign: "center", color: C.muted }}>
              {selectedYM} のデータがありません
            </div>
          )}

          {monthlyData.map(m => {
            return (
              <div key={m.member} style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 14, marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <MemberTag name={m.member} />
                  <button style={{ ...btnStyle("ghost"), padding: "4px 10px", fontSize: 11 }} onClick={() => openGoalEdit(m.member)}>目標編集</button>
                </div>
                {/* 活動日数とメール配信日数 */}
                <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                  <div style={{ flex: 1, background: C.bg, borderRadius: 8, padding: "8px 10px", textAlign: "center" }}>
                    <div style={{ color: C.muted, fontSize: 10 }}>📅 活動日数</div>
                    <div style={{ color: C.accent, fontSize: 18, fontWeight: 800 }}>{m.workDays || 0}日</div>
                  </div>
                  <div style={{ flex: 1, background: C.bg, borderRadius: 8, padding: "8px 10px", textAlign: "center" }}>
                    <div style={{ color: C.muted, fontSize: 10 }}>📨 メール配信</div>
                    <div style={{ color: C.success, fontSize: 18, fontWeight: 800 }}>{m.mailDays || 0}日</div>
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  {APPROACH_ITEMS.map(item => {
                    const val = m.totals[item] || 0;
                    const goal = getGoal(m.member, item);
                    const pct = goal > 0 ? Math.min(val / goal * 100, 100) : 0;
                    const color = goal > 0 ? (val >= goal ? C.success : val > goal * 0.5 ? C.warn : C.danger) : C.text;
                    return (
                      <div key={item} style={{ background: C.bg, borderRadius: 8, padding: "8px 10px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                          <span style={{ color: C.muted, fontSize: 11 }}>{item}</span>
                          <span style={{ color, fontWeight: 700, fontSize: 13 }}>
                            {val}{goal > 0 ? `/${goal}` : ""}
                          </span>
                        </div>
                        {goal > 0 && (
                          <div style={{ background: "#1a2535", borderRadius: 3, height: 4 }}>
                            <div style={{ width: pct + "%", height: "100%", background: color, borderRadius: 3 }} />
                          </div>
                        )}
                        {goal > 0 && (
                          <div style={{ fontSize: 10, color: C.muted, marginTop: 3, textAlign: "right" }}>
                            {pct.toFixed(0)}%
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ===== 目標設定タブ ===== */}
      {tab === "goals" && (
        <div>
          <div style={{ color: C.muted, fontSize: 13, marginBottom: 14, lineHeight: 1.6 }}>
            メンバーごとに月間目標を設定できます。<br />
            {isAdmin
              ? <span style={{ color: "#FCD34D" }}>👑 管理者モード：全メンバーの目標を編集できます</span>
              : <span style={{ color: C.muted }}>👤 一般モード：自分（<span style={{ color: C.text, fontWeight: 700 }}>{currentUser || "未設定"}</span>）の目標のみ編集できます</span>
            }
          </div>
          {MEMBERS.map(m => {
            const isMe = m === currentUser;
            const canEditGoal = isAdmin || isMe;
            return (
              <div key={m} style={{
                background: "#0d1422",
                border: `1px solid ${isMe ? (MEMBER_COLORS[m] || C.accent) + "55" : "#1a2535"}`,
                borderRadius: 14, padding: 14, marginBottom: 10,
                opacity: canEditGoal ? 1 : 0.85,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, gap: 8, flexWrap: "wrap" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <MemberTag name={m} />
                    {isMe && <Tag label="自分" color={C.accent} />}
                  </div>
                  {canEditGoal ? (
                    <button style={{ ...btnStyle(), padding: "8px 14px", fontSize: 13 }} onClick={() => openGoalEdit(m)}>目標を編集</button>
                  ) : (
                    <span style={{ color: C.muted, fontSize: 11, padding: "8px 12px", background: C.bg, borderRadius: 8 }}>👁 閲覧のみ</span>
                  )}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                  {APPROACH_ITEMS.map(item => (
                    <div key={item} style={{ display: "flex", justifyContent: "space-between", background: C.bg, borderRadius: 8, padding: "6px 10px" }}>
                      <span style={{ color: C.muted, fontSize: 12 }}>{item}</span>
                      <span style={{ color: C.accent, fontWeight: 700, fontSize: 13 }}>{getGoal(m, item)}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* 目標編集ボトムシート */}
      {showGoalEdit && (
        <BottomSheet title={`${goalEditMember} の月間目標設定`} onClose={() => setShowGoalEdit(false)}>
          <div style={{ color: C.muted, fontSize: 13, marginBottom: 14 }}>各項目の月間目標値を入力してください</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {APPROACH_ITEMS.map(item => (
              <Field key={item} label={item}>
                <input
                  type="text" inputMode="numeric"
                  style={{ ...inp, MozAppearance: "textfield", WebkitAppearance: "none" }}
                  value={goalForm[item] || ""}
                  onChange={e => setGoalForm(p => ({ ...p, [item]: e.target.value.replace(/[^0-9]/g, "") }))}
                  placeholder="0"
                />
              </Field>
            ))}
          </div>
          <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
            <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={() => setShowGoalEdit(false)}>キャンセル</button>
            <button style={{ ...btnStyle(), flex: 2 }} onClick={saveGoal}>目標を保存</button>
          </div>
        </BottomSheet>
      )}
    </div>
  );
}

// ===================== 統合地上げ・所有者アタックページ =====================

// Excelから取り込んだ地上げデータ（エリア別）
const JIAGE_AREAS = ["熊谷", "行田", "深谷", "東松山", "本庄", "秩父", "上里"];

function JiagePage({ data, setData }) {
  const currentUser = getCurrentUser();
  const adminMember = data.adminMember || "下田";
  const isAdmin = currentUser === adminMember;
  const canEdit = (item) => canEditItem(item, currentUser, adminMember);
  const today = new Date().toISOString().split("T")[0];
  const [viewMode, setViewMode] = useState("list");
  const [typeFilter, setTypeFilter] = useState("all");
  const [areaFilter, setAreaFilter] = useState("すべて");
  const [filterStatuses, setFilterStatuses] = useState([]);
  const [filterMembers, setFilterMembers] = useState([]);
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [addType, setAddType] = useState("jiage");
  const [editItem, setEditItem] = useState(null);
  const [showAddMenu, setShowAddMenu] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [importing, setImporting] = useState(false);
  const [quickFilter, setQuickFilter] = useState(null); // "overdue" | "dm_un" | "hot" | null
  const [histForm, setHistForm] = useState({ date: today, method: "電話", note: "", member: MEMBERS[0] });

  const navUrl = addr => `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(addr)}&travelmode=driving`;

  // Excelデータをインポートする処理
  const handleImport = async (selectedAreas) => {
    setImporting(true);
    try {
      // 選択エリアのデータをlocalStorageから取得
      const importData = JSON.parse(localStorage.getItem("hikari_jiage_import") || "{}");
      const newItems = [];
      let uid = Date.now();
      for (const area of selectedAreas) {
        const items = importData[area] || [];
        items.forEach(item => {
          newItems.push({
            id: uid++,
            address: item.address,
            owner: item.owner,
            ownerAddr: item.ownerAddr,
            dm: item.dm || "未",
            visit: item.visit || "未",
            status: item.status || "未訪問",
            assignee: item.assignee || "未割当",
            memo: item.memo || "",
            date: item.date || today,
            nextVisit: item.nextVisit || "",
            area: item.area,
          });
        });
      }
      setData(d => ({ ...d, jiage: [...d.jiage, ...newItems] }));
      alert(`✅ ${newItems.length}件をインポートしました！`);
      setShowImport(false);
    } catch (e) {
      alert("インポートに失敗しました");
    }
    setImporting(false);
  };

  // 地上げと所有者を統合
  const allItems = useMemo(() => {
    const jiage = (data.jiage || []).map(j => ({
      type: "jiage", id: `j_${j.id}`, rawId: j.id,
      address: j.address, ownerName: j.owner, ownerAddress: j.ownerAddr,
      ownerContact: "", assignee: j.assignee,
      status: j.status, subStatus: `DM:${j.dm}`,
      nextDate: j.nextVisit, memo: j.memo, history: [],
      dm: j.dm, visit: j.visit, area: j.area || "", raw: j,
    }));
    const owners = (data.owners || []).map(o => ({
      type: "owner", id: `o_${o.id}`, rawId: o.id,
      address: o.address, ownerName: o.ownerName, ownerAddress: o.ownerAddress,
      ownerContact: o.ownerContact, assignee: o.assignee,
      status: o.status, subStatus: null,
      nextDate: o.nextFollowDate, memo: o.memo, history: o.history || [],
      area: "", raw: o,
    }));
    return [...jiage, ...owners];
  }, [data.jiage, data.owners]);

  const filtered = useMemo(() => allItems.filter(item => {
    if (typeFilter === "jiage" && item.type !== "jiage") return false;
    if (typeFilter === "owner" && item.type !== "owner") return false;
    if (areaFilter !== "すべて" && item.area !== areaFilter) return false;
    if (filterStatuses.length && !filterStatuses.includes(item.status)) return false;
    if (filterMembers.length && !filterMembers.includes(item.assignee)) return false;
    if (search && !item.address.includes(search) && !(item.ownerName || "").includes(search)) return false;
    // クイックフィルター
    if (quickFilter === "overdue") {
      if (!(item.nextDate && item.nextDate < today && !["NG", "断られた", "仕入れ完了"].includes(item.status))) return false;
    }
    if (quickFilter === "dm_un") {
      if (item.type !== "jiage" || item.dm !== "未") return false;
    }
    if (quickFilter === "hot") {
      if (!(item.status === "見込" || item.status === "興味あり")) return false;
    }
    return true;
  }), [allItems, typeFilter, areaFilter, filterStatuses, filterMembers, search, quickFilter, today]);

  const isOverdue = item => item.nextDate && item.nextDate < today && !["NG", "断られた", "仕入れ完了"].includes(item.status);

  const handleDelete = item => {
    if (!window.confirm("削除しますか？")) return;
    if (item.type === "jiage") setData(d => {
      const next = { ...d, jiage: d.jiage.filter(j => j.id !== item.rawId) };
      return appendLog(next, "delete", "jiage", `${item.address || "(無住所)"}を削除`);
    });
    else setData(d => {
      const next = { ...d, owners: d.owners.filter(o => o.id !== item.rawId) };
      return appendLog(next, "delete", "owner", `${item.address || "(無住所)"}を削除`);
    });
    setSelected(null);
  };

  const addHistory = () => {
    if (!histForm.note.trim() || !selected || selected.item.type !== "owner") return;
    const updated = { ...selected.item.raw, history: [...(selected.item.raw.history || []), histForm] };
    setData(d => ({ ...d, owners: d.owners.map(o => o.id === updated.id ? updated : o) }));
    setSelected(s => ({ ...s, item: { ...s.item, history: updated.history, raw: updated } }));
    setHistForm({ date: today, method: "電話", note: "", member: MEMBERS[0] });
  };

  const updateStatus = (item, status) => {
    if (item.type === "jiage") {
      const updated = { ...item.raw, status };
      setData(d => ({ ...d, jiage: d.jiage.map(j => j.id === item.rawId ? updated : j) }));
      setSelected(s => ({ ...s, item: { ...s.item, status, raw: updated } }));
    } else {
      const updated = { ...item.raw, status };
      setData(d => ({ ...d, owners: d.owners.map(o => o.id === item.rawId ? updated : o) }));
      setSelected(s => ({ ...s, item: { ...s.item, status, raw: updated } }));
    }
  };

  const updateNextDate = (item, date) => {
    if (item.type === "jiage") {
      const updated = { ...item.raw, nextVisit: date };
      setData(d => ({ ...d, jiage: d.jiage.map(j => j.id === item.rawId ? updated : j) }));
      setSelected(s => ({ ...s, item: { ...s.item, nextDate: date, raw: updated } }));
    } else {
      const updated = { ...item.raw, nextFollowDate: date };
      setData(d => ({ ...d, owners: d.owners.map(o => o.id === item.rawId ? updated : o) }));
      setSelected(s => ({ ...s, item: { ...s.item, nextDate: date, raw: updated } }));
    }
  };

  // 地上げ → 所有者アタックに昇格（誰でも実行可）
  const promoteToOwner = (item) => {
    const j = item.raw;
    // 重複チェック
    const alreadyExists = (data.owners || []).some(o => o.address === j.address && o.fromJiageId === j.id);
    if (alreadyExists) { alert("この物件は既に所有者アタックに登録されています"); return; }
    if (!window.confirm(`「${j.address}」を所有者アタックに昇格しますか？\n\n所有者情報・担当者・メモを引き継ぎます。`)) return;
    const newOwner = {
      id: Date.now(),
      address: j.address,
      ownerName: j.owner || "",
      ownerAddress: j.ownerAddr || "",
      ownerContact: "",
      status: "未アタック",
      assignee: j.assignee,
      nextFollowDate: "",
      memo: j.memo || "",
      history: [],
      createdAt: today,
      fromJiageId: j.id,
    };
    setData(d => {
      const next = { ...d, owners: [...d.owners, newOwner] };
      return appendLog(next, "promote", "owner", `${j.address}を地上げ→所有者に昇格`);
    });
    alert(`✅「${j.address}」を所有者アタックに昇格しました！\n「👤所有者」タブで確認できます。`);
    setSelected(null);
  };

  // 所有者 → 積算表を作成（誰でも実行可）
  const promoteToSekisan = (item) => {
    const o = item.raw;
    const alreadyExists = (data.sekisan || []).some(s => s.address === o.address && s.fromOwnerId === o.id);
    if (alreadyExists) { alert("この物件の積算表は既に作成されています"); return; }
    if (!window.confirm(`「${o.address}」の仕入検討積算表を作成しますか？\n\n住所・担当者を自動入力します。「その他」タブから確認できます。`)) return;
    const newSekisan = {
      id: Date.now(),
      address: o.address,
      assignee: o.assignee,
      createdAt: today,
      age: "", structure: "", layout: "", landArea: "", buildingArea: "", stationDist: "",
      buyPrice: "", brokerFeeIn: "", registration: "", acquisitionTax: "", stamp: "",
      leftover: "", reform: "", demolition: "", brokerFeeOut: "", other: "",
      sellPrice: "",
      similarRent: "", similarArea: "", targetBuildingArea: "",
      yieldRate: "15", investorRegistration: "50", investorReform: "150",
      targetProfitMin: "100", targetProfitMax: "200",
      rainzPriceMin: "", rainzPriceMax: "", rainzMemo: "",
      atHomeMemo: "", competitorCount: "",
      rentMin: "", rentMax: "", rentMemo: "",
      yieldBase: "", yieldMemo: "",
      judgment: "検討中", judgmentMemo: o.memo || "",
      fromOwnerId: o.id,
    };
    setData(d => {
      const next = { ...d, sekisan: [...(d.sekisan || []), newSekisan] };
      return appendLog(next, "promote", "sekisan", `${o.address}を所有者→積算に昇格`);
    });
    alert(`✅「${o.address}」の積算表を作成しました！\n「その他」→「仕入検討積算表」から編集できます。`);
    setSelected(null);
  };

  const emptyJiage = { address: "", owner: "", ownerAddr: "", dm: "未", visit: "未", status: "未訪問", assignee: currentUser || MEMBERS[0], memo: "", nextVisit: "", date: today, area: areaFilter !== "すべて" ? areaFilter : "" };
  const emptyOwner = { address: "", ownerName: "", ownerAddress: "", ownerContact: "", status: "未アタック", assignee: currentUser || MEMBERS[0], nextFollowDate: "", memo: "", history: [], createdAt: today };
  const [form, setForm] = useState(emptyJiage);
  const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));

  const openEdit = item => {
    setAddType(item.type);
    setForm({ ...item.raw });
    setEditItem(item);
    setShowAdd(true);
    setSelected(null);
  };

  const handleSave = () => {
    if (addType === "jiage") {
      const item = { ...form, id: editItem?.rawId || Date.now() };
      setData(d => {
        const next = { ...d, jiage: editItem ? d.jiage.map(j => j.id === item.id ? item : j) : [...d.jiage, item] };
        return appendLog(next, editItem ? "update" : "add", "jiage", `${item.address || "(無住所)"}（${item.status}）`);
      });
    } else {
      const item = { ...form, id: editItem?.rawId || Date.now() };
      setData(d => {
        const next = { ...d, owners: editItem ? d.owners.map(o => o.id === item.id ? item : o) : [...d.owners, item] };
        return appendLog(next, editItem ? "update" : "add", "owner", `${item.address || "(無住所)"}（${item.status}）`);
      });
    }
    setShowAdd(false); setEditItem(null);
  };

  // エリア別件数
  const areaCounts = useMemo(() => {
    const counts = {};
    allItems.filter(i => i.type === "jiage").forEach(i => {
      counts[i.area || "その他"] = (counts[i.area || "その他"] || 0) + 1;
    });
    return counts;
  }, [allItems]);

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 130px)", margin: "-16px -16px 0", overflow: "hidden" }}>

      {/* ヘッダー */}
      <div style={{ background: "#0d1422", borderBottom: `1px solid #1a2535`, padding: "10px 14px", flexShrink: 0, zIndex: 10 }}>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 10 }}>
          <div style={{ fontSize: 16, fontWeight: 800, color: C.text, flex: 1 }}>📍 地上げ・所有者</div>
          <div style={{ display: "flex", background: C.bg, borderRadius: 8, padding: 3, border: `1px solid #1a2535` }}>
            {[["list", "☰ リスト"], ["map", "🗺 地図"]].map(([key, label]) => (
              <button key={key} onClick={() => setViewMode(key)} style={{
                background: viewMode === key ? C.accent : "none", border: "none",
                color: viewMode === key ? "#fff" : C.muted, borderRadius: 6,
                padding: "6px 10px", cursor: "pointer", fontSize: 11, fontWeight: 700, fontFamily: "inherit",
              }}>{label}</button>
            ))}
          </div>
          <div style={{ position: "relative" }}>
            <button style={{ ...btnStyle(), padding: "8px 12px", fontSize: 13 }} onClick={() => setShowAddMenu(v => !v)}>＋</button>
            {showAddMenu && (
              <div style={{ position: "absolute", right: 0, top: "110%", background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 10, overflow: "hidden", zIndex: 50, minWidth: 180 }}>
                {[["jiage", "📍 地上げ物件"], ["owner", "👤 所有者アタック"]].map(([type, label]) => (
                  <button key={type} onClick={() => { setAddType(type); setForm(type === "jiage" ? emptyJiage : emptyOwner); setEditItem(null); setShowAdd(true); setShowAddMenu(false); }} style={{ display: "block", width: "100%", background: "none", border: "none", color: C.text, padding: "14px 16px", cursor: "pointer", fontSize: 14, fontFamily: "inherit", textAlign: "left", borderBottom: `1px solid #1a2535` }}>{label}</button>
                ))}
                <button onClick={() => { setShowImport(true); setShowAddMenu(false); }} style={{ display: "block", width: "100%", background: "none", border: "none", color: C.success, padding: "14px 16px", cursor: "pointer", fontSize: 14, fontFamily: "inherit", textAlign: "left" }}>📥 Excelからインポート</button>
              </div>
            )}
          </div>
        </div>

        {/* タイプフィルター */}
        <div style={{ display: "flex", gap: 6, marginBottom: 8, overflowX: "auto", paddingBottom: 2 }}>
          {[["all", `全て ${allItems.length}`], ["jiage", `📍地上げ ${(data.jiage||[]).length}`], ["owner", `👤所有者 ${(data.owners||[]).length}`]].map(([key, label]) => (
            <button key={key} onClick={() => setTypeFilter(key)} style={{ padding: "5px 12px", borderRadius: 20, cursor: "pointer", fontSize: 12, background: typeFilter === key ? C.accent : C.bg, color: typeFilter === key ? "#fff" : C.muted, border: `1px solid ${typeFilter === key ? C.accent : "#1a2535"}`, fontFamily: "inherit", whiteSpace: "nowrap", flexShrink: 0 }}>{label}</button>
          ))}
        </div>

        {/* エリアフィルター */}
        <div style={{ display: "flex", gap: 6, marginBottom: 8, overflowX: "auto", paddingBottom: 2 }}>
          {["すべて", ...JIAGE_AREAS].map(area => {
            const count = area === "すべて" ? Object.values(areaCounts).reduce((a, b) => a + b, 0) : (areaCounts[area] || 0);
            return (
              <button key={area} onClick={() => setAreaFilter(area)} style={{
                padding: "5px 12px", borderRadius: 20, cursor: "pointer", fontSize: 12,
                background: areaFilter === area ? C.purple : C.bg,
                color: areaFilter === area ? "#fff" : C.muted,
                border: `1px solid ${areaFilter === area ? C.purple : "#1a2535"}`,
                fontFamily: "inherit", whiteSpace: "nowrap", flexShrink: 0,
              }}>{area} {count > 0 ? count : ""}</button>
            );
          })}
        </div>

        {/* クイックフィルター */}
        <div style={{ display: "flex", gap: 6, marginBottom: 8, overflowX: "auto", paddingBottom: 2 }}>
          {[
            { key: "overdue", label: "⚠️ 期限切れ", activeColor: C.danger },
            { key: "dm_un",   label: "📩 DM未送付", activeColor: C.warn },
            { key: "hot",     label: "🔥 熱い案件", activeColor: C.success },
          ].map(qf => {
            const isActive = quickFilter === qf.key;
            return (
              <button key={qf.key} onClick={() => setQuickFilter(isActive ? null : qf.key)} style={{
                padding: "5px 12px", borderRadius: 20, cursor: "pointer", fontSize: 12,
                background: isActive ? qf.activeColor : C.bg,
                color: isActive ? "#fff" : C.muted,
                border: `1px solid ${isActive ? qf.activeColor : "#1a2535"}`,
                fontFamily: "inherit", whiteSpace: "nowrap", flexShrink: 0, fontWeight: isActive ? 700 : 400,
              }}>{qf.label}</button>
            );
          })}
        </div>

        {/* 検索 */}
        <div style={{ position: "relative" }}>
          <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: C.muted, fontSize: 14 }}>🔍</span>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="住所・所有者名で検索..." style={{ ...inp, paddingLeft: 36, fontSize: 14, padding: "10px 14px 10px 36px" }} />
        </div>
        <div style={{ color: C.muted, fontSize: 11, marginTop: 6 }}>{filtered.length}件表示</div>
      </div>

      {/* 地図ビュー */}
      {viewMode === "map" && (
        <div style={{ flex: 1, overflowY: "auto", padding: "12px 14px" }}>

          {/* Googleマップで全件表示ボタン */}
          <a
            href={`https://www.google.com/maps/search/${encodeURIComponent(filtered.filter(i => i.ownerAddress).map(i => i.ownerAddress).join(" / "))}`}
            target="_blank" rel="noopener noreferrer"
            style={{
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
              background: "#1a2a1a", border: `1px solid ${C.success}55`,
              color: C.success, borderRadius: 12, padding: "14px",
              fontSize: 15, fontWeight: 700, textDecoration: "none", marginBottom: 14,
            }}
          >
            🗺 所有者住所を全件マップ確認（{filtered.filter(i => i.ownerAddress).length}件）
          </a>

          {/* 物件カード（地図ビュー用・コンパクト） */}
          {filtered.map(item => {
            const overdue = isOverdue(item);
            return (
              <div key={item.id} style={{
                background: "#0d1422",
                border: `1px solid ${overdue ? C.danger + "66" : item.status === "見込" || item.status === "興味あり" ? C.success + "55" : "#1a2535"}`,
                borderRadius: 16, marginBottom: 10, overflow: "hidden",
              }}>
                {/* ステータスバー */}
                <div style={{ display: "flex", gap: 6, padding: "10px 14px 8px", alignItems: "center", flexWrap: "wrap", borderBottom: `1px solid #1a2535` }}>
                  <Tag label={item.type === "jiage" ? "📍地上げ" : "👤所有者"} color={item.type === "jiage" ? C.accent : C.purple} />
                  <StatusTag status={item.status} />
                  <MemberTag name={item.assignee} />
                  {overdue && <Tag label="⚠ 期限切れ" color={C.danger} />}
                  <span style={{ marginLeft: "auto", color: C.muted, fontSize: 11 }}>{item.nextDate ? `次回 ${item.nextDate}` : ""}</span>
                </div>

                {/* 物件住所 */}
                <div style={{ padding: "10px 14px 8px", borderBottom: `1px solid #1a2535` }}>
                  <div style={{ fontSize: 11, color: C.accent, fontWeight: 700, marginBottom: 3 }}>🏠 物件住所</div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 8 }}>{item.address}</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <a href={navUrl(item.address)} target="_blank" rel="noopener noreferrer"
                      style={{ flex: 1, background: C.success + "22", border: `1px solid ${C.success}55`, color: C.success, borderRadius: 8, padding: "8px", fontSize: 13, fontWeight: 700, textDecoration: "none", textAlign: "center" }}>
                      🚗 物件にナビ
                    </a>
                    <a href={item.ownerAddress ? navUrl(item.ownerAddress) : navUrl(item.address)} target="_blank" rel="noopener noreferrer"
                      style={{ flex: 1, background: C.accent + "22", border: `1px solid ${C.accent}55`, color: C.accent, borderRadius: 8, padding: "8px", fontSize: 13, fontWeight: 700, textDecoration: "none", textAlign: "center" }}>
                      🚗 所有者にナビ
                    </a>
                  </div>
                </div>

                {/* 所有者情報 */}
                <div style={{ padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 11, color: C.purple, fontWeight: 700, marginBottom: 3 }}>👤 所有者</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{item.ownerName || <span style={{ color: C.muted, fontSize: 13 }}>不明</span>}</div>
                    {item.ownerAddress && <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>📮 {item.ownerAddress}</div>}
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    <button style={{ ...btnStyle("ghost"), padding: "8px 12px", fontSize: 12 }} onClick={() => setSelected({ item })}>詳細</button>
                    {item.ownerAddress && (
                      <a href={navUrl(item.ownerAddress)} target="_blank" rel="noopener noreferrer"
                        style={{ background: C.purple + "22", border: `1px solid ${C.purple}55`, color: C.purple, borderRadius: 8, padding: "8px 10px", fontSize: 11, fontWeight: 700, textDecoration: "none", textAlign: "center" }}>
                        🚗 所有者宅
                      </a>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* リストビュー */}
      {viewMode === "list" && (
        <div style={{ flex: 1, overflowY: "auto", padding: "12px 14px" }}>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
            <FilterChips options={MEMBERS} value={filterMembers} onChange={setFilterMembers} multi />
          </div>
          {filtered.map(item => {
            const overdue = isOverdue(item);
            return (
              <div key={item.id} style={{
                background: "#0d1422",
                border: `1px solid ${overdue ? C.danger + "66" : item.status === "見込" || item.status === "興味あり" ? C.success + "55" : "#1a2535"}`,
                borderRadius: 16, marginBottom: 12, overflow: "hidden",
              }}>
                {/* ステータスバー */}
                <div style={{ display: "flex", gap: 6, padding: "10px 14px 8px", alignItems: "center", flexWrap: "wrap", borderBottom: `1px solid #1a2535` }}>
                  <Tag label={item.type === "jiage" ? "📍地上げ" : "👤所有者"} color={item.type === "jiage" ? C.accent : C.purple} />
                  <StatusTag status={item.status} />
                  {item.subStatus && <Tag label={item.subStatus} color={item.dm === "未" ? C.muted : C.accent} />}
                  <MemberTag name={item.assignee} />
                  {item.history.length > 0 && <Tag label={`履歴${item.history.length}件`} color={C.muted} />}
                  {overdue && <Tag label="⚠ 期限切れ" color={C.danger} />}
                  <span style={{ marginLeft: "auto", color: C.muted, fontSize: 11 }}>{item.nextDate ? `次回 ${item.nextDate}` : ""}</span>
                </div>

                {/* 物件住所ブロック */}
                <div style={{ padding: "12px 14px 10px", borderBottom: `1px solid #1a2535` }}>
                  <div style={{ fontSize: 11, color: C.accent, fontWeight: 700, marginBottom: 4, letterSpacing: "0.06em" }}>🏠 物件住所</div>
                  <div style={{ fontSize: 15, fontWeight: 800, color: C.text, marginBottom: 8 }}>{item.address || "住所未設定"}</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <a href={navUrl(item.address)} target="_blank" rel="noopener noreferrer"
                      style={{ flex: 1, background: C.success + "22", border: `1px solid ${C.success}55`, color: C.success, borderRadius: 8, padding: "8px", fontSize: 13, fontWeight: 700, textDecoration: "none", textAlign: "center" }}>
                      🚗 物件にナビ
                    </a>
                    <a href={item.ownerAddress ? navUrl(item.ownerAddress) : navUrl(item.address)} target="_blank" rel="noopener noreferrer"
                      style={{ flex: 1, background: C.accent + "22", border: `1px solid ${C.accent}55`, color: C.accent, borderRadius: 8, padding: "8px", fontSize: 13, fontWeight: 700, textDecoration: "none", textAlign: "center" }}>
                      🚗 所有者にナビ
                    </a>
                  </div>
                </div>

                {/* 所有者情報ブロック */}
                <div style={{ padding: "12px 14px 10px", borderBottom: `1px solid #1a2535` }}>
                  <div style={{ fontSize: 11, color: C.purple, fontWeight: 700, marginBottom: 6, letterSpacing: "0.06em" }}>👤 所有者情報</div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 3 }}>
                        {item.ownerName || <span style={{ color: C.muted, fontSize: 13 }}>所有者不明</span>}
                      </div>
                      {item.ownerContact && (
                        <div style={{ fontSize: 13, color: C.accent, marginBottom: 4 }}>{item.ownerContact}</div>
                      )}
                      {item.ownerAddress ? (
                        <div style={{ fontSize: 12, color: C.muted }}>
                          📮 {item.ownerAddress}
                        </div>
                      ) : (
                        <div style={{ fontSize: 12, color: "#334155" }}>所有者住所: 未登録</div>
                      )}
                    </div>
                    {item.ownerAddress && (
                      <a href={navUrl(item.ownerAddress)} target="_blank" rel="noopener noreferrer"
                        style={{ background: C.purple + "22", border: `1px solid ${C.purple}55`, color: C.purple, borderRadius: 8, padding: "8px 10px", fontSize: 12, fontWeight: 700, textDecoration: "none", textAlign: "center", flexShrink: 0 }}>
                        🚗 所有者宅<br />へナビ
                      </a>
                    )}
                  </div>
                </div>

                {/* メモ・操作ボタン */}
                <div style={{ padding: "10px 14px" }}>
                  {item.memo && <div style={{ fontSize: 12, color: C.muted, marginBottom: 10, lineHeight: 1.5 }}>{item.memo.length > 80 ? item.memo.slice(0, 80) + "…" : item.memo}</div>}
                  <div style={{ display: "flex", gap: 8 }}>
                    <button style={{ ...btnStyle("ghost"), flex: 1, padding: "9px", fontSize: 13 }} onClick={() => setSelected({ item })}>詳細・編集</button>
                    <button style={{ ...btnStyle("danger"), padding: "9px 12px", fontSize: 13 }} onClick={() => handleDelete(item)}>削除</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* 詳細ボトムシート */}
      {selected && (
        <BottomSheet title={selected.item.address} onClose={() => setSelected(null)}>
          {/* タイプバッジ */}
          <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
            <Tag label={selected.item.type === "jiage" ? "📍地上げ" : "👤所有者アタック"} color={selected.item.type === "jiage" ? C.accent : C.purple} />
            <StatusTag status={selected.item.status} />
            <MemberTag name={selected.item.assignee} />
          </div>

          {/* 所有者情報 */}
          <div style={{ background: C.bg, border: `1px solid #1a2535`, borderRadius: 12, padding: 14, marginBottom: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 10 }}>所有者情報</div>
            {[
              ["所有者名", selected.item.ownerName],
              ["連絡先", selected.item.ownerContact],
              ["所有者住所", selected.item.ownerAddress],
            ].filter(([, v]) => v).map(([l, v]) => (
              <div key={l} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid #1a2535`, fontSize: 13 }}>
                <span style={{ color: C.muted }}>{l}</span>
