                borderRadius: 10, cursor: "pointer", textAlign: "center", color: C.muted, fontSize: 13,
              }}>
                {uploadingPhoto ? "📷 圧縮中..." : "📷 写真を追加（タップしてカメラ起動 or ファイル選択）"}
                <input type="file" accept="image/*" capture="environment" onChange={handlePhotoAdd}
                  style={{ display: "none" }} disabled={uploadingPhoto} />
              </label>
            )}
            <div style={{ fontSize: 10, color: C.muted, marginTop: 6, lineHeight: 1.5 }}>
              ※ 自動で800px・JPEG圧縮されて保存されます（1枚あたり約50KB）
            </div>
          </Field>
          <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
            {editItem && !canEdit(editItem) ? (
              <button
                style={{ ...btnStyle("ghost"), flex: 1 }}
                onClick={() => { setShowAdd(false); setEditItem(null); }}
              >閉じる</button>
            ) : (
              <>
                <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={() => { setShowAdd(false); setEditItem(null); }}>キャンセル</button>
                <button style={{ ...btnStyle(), flex: 2 }} onClick={handleSave}>保存する</button>
              </>
            )}
          </div>
        </BottomSheet>
      )}

      {/* 写真拡大ビューア */}
      {photoViewer && (
        <div onClick={() => setPhotoViewer(null)} style={{
          position: "fixed", inset: 0, background: "rgba(0,0,0,0.95)", zIndex: 600,
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 20,
        }}>
          <div style={{ color: "#fff", fontSize: 14, marginBottom: 12, fontWeight: 700 }}>{photoViewer.name}（{photoViewer.index + 1}/{photoViewer.photos.length}）</div>
          <img src={photoViewer.photos[photoViewer.index]} alt="" style={{ maxWidth: "100%", maxHeight: "75vh", borderRadius: 8 }} />
          <div style={{ display: "flex", gap: 12, marginTop: 16, alignItems: "center" }}>
            <button onClick={(e) => { e.stopPropagation(); setPhotoViewer(p => ({ ...p, index: (p.index - 1 + p.photos.length) % p.photos.length })); }}
              disabled={photoViewer.photos.length <= 1}
              style={{ background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.3)", color: "#fff", borderRadius: 8, padding: "10px 16px", cursor: "pointer", fontFamily: "inherit", fontSize: 14, opacity: photoViewer.photos.length <= 1 ? 0.3 : 1 }}>← 前</button>
            <button onClick={() => setPhotoViewer(null)}
              style={{ background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.3)", color: "#fff", borderRadius: 8, padding: "10px 16px", cursor: "pointer", fontFamily: "inherit", fontSize: 14 }}>閉じる ✕</button>
            <button onClick={(e) => { e.stopPropagation(); setPhotoViewer(p => ({ ...p, index: (p.index + 1) % p.photos.length })); }}
              disabled={photoViewer.photos.length <= 1}
              style={{ background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.3)", color: "#fff", borderRadius: 8, padding: "10px 16px", cursor: "pointer", fontFamily: "inherit", fontSize: 14, opacity: photoViewer.photos.length <= 1 ? 0.3 : 1 }}>次 →</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ===================== APPROACH PAGE =====================
function ApproachPage({ data, setData, pendingNav, onConsumeNav }) {
  const today = new Date().toISOString().split("T")[0];
  const currentYM = today.slice(0, 7);

  // 権限制御
  const currentUser = getCurrentUser();
  const adminMember = data.adminMember || "下田";
  const isAdmin = isAdminUser(data, currentUser); // 🆕 管理者リスト（下田・比嘉）に含まれるか

  const [tab, setTab] = useState("cases"); // "cases" | "input" | "monthly" | "goals"
  // 一般メンバーは自分自身を初期選択、管理者は1番目のメンバー
  const [selectedMember, setSelectedMember] = useState(currentUser && !isAdmin ? currentUser : MEMBERS[0]);
  const [selectedYM, setSelectedYM] = useState(currentYM);
  const [selectedDate, setSelectedDate] = useState(today);
  const [inputValues, setInputValues] = useState({});
  const [memo, setMemo] = useState("");
  const [mailDelivery, setMailDelivery] = useState(false);
  const [area, setArea] = useState("");
  const [dailyGoals, setDailyGoals] = useState({}); // その日の目標値
  const [showDailyGoalEdit, setShowDailyGoalEdit] = useState(false);
  const [dailyGoalForm, setDailyGoalForm] = useState({});
  const [isLoaded, setIsLoaded] = useState(false); // 初回読み込み完了フラグ
  const [autoSaveStatus, setAutoSaveStatus] = useState("idle"); // "idle" | "saving" | "saved"
  const [lastSavedAt, setLastSavedAt] = useState(null); // 最終自動保存時刻
  const [showGoalEdit, setShowGoalEdit] = useState(false);
  const [goalEditMember, setGoalEditMember] = useState(MEMBERS[0]);
  const [goalForm, setGoalForm] = useState({});

  // ===== 月次タブ用：日別チャート =====
  const [dailyChartMember, setDailyChartMember] = useState(getCurrentUser() || MEMBERS[0]);
  // 各種の編集モード（パイプライン・カードから開く）
  const [editingSekisan, setEditingSekisan] = useState(null);
  const [editingStock, setEditingStock] = useState(null);
  const [editingJiage, setEditingJiage] = useState(null);
  const [editingOwner, setEditingOwner] = useState(null);

  // ===== 案件タブ用 =====
  const [casesMember, setCasesMember] = useState("__ALL__"); // "__ALL__" or member name

  // 🆕 全タブ連動：casesMember 変更時に他のタブの担当者も連動
  useEffect(() => {
    if (casesMember && casesMember !== "__ALL__") {
      setSelectedMember(casesMember);
      setDailyChartMember(casesMember);
    }
    // "__ALL__"（全員）の時は、各タブのデフォルトをキープ
  }, [casesMember]);

  // 🆕 営業活動カウンター長押し連射用
  const holdTimersRef = useRef({});
  // 🆕 モバイルで touchstart の後に mousedown が自動発火するのを防ぐためのフラグ
  const lastTouchTimeRef = useRef(0);
  const startHold = (key, action) => {
    action(); // 即発火（タップでも反応）
    const timer = setTimeout(() => {
      const interval = setInterval(action, 80); // 80msごとに連射
      if (holdTimersRef.current[key]) {
        holdTimersRef.current[key].interval = interval;
      }
    }, 400); // 400ms 押し続けてから連射開始
    holdTimersRef.current[key] = { timer, interval: null };
  };
  const stopHold = (key) => {
    const refs = holdTimersRef.current[key];
    if (refs) {
      if (refs.timer) clearTimeout(refs.timer);
      if (refs.interval) clearInterval(refs.interval);
      delete holdTimersRef.current[key];
    }
  };
  // クリーンアップ
  useEffect(() => () => {
    Object.values(holdTimersRef.current).forEach(refs => {
      if (refs.timer) clearTimeout(refs.timer);
      if (refs.interval) clearInterval(refs.interval);
    });
    holdTimersRef.current = {};
  }, []);

  // ===== コメント入力用 =====
  const [newComment, setNewComment] = useState("");
  // コメント編集モード用
  const [editingCommentId, setEditingCommentId] = useState(null);
  const [editingCommentText, setEditingCommentText] = useState("");
  const [casesExpanded, setCasesExpanded] = useState(null); // 展開中のセクションkey
  const [casesMonth, setCasesMonth] = useState(today.slice(0, 7)); // 「今月の活動」表示対象月（YYYY-MM形式）

  // 目標値はdataに保存（memberGoals: { "たっくん": { 訪問: 600, ... } }）
  const memberGoals = data.memberGoals || {};

  const getGoal = (member, item) =>
    memberGoals[member]?.[item] ?? APPROACH_TARGETS[item] ?? 0;

  // 日次入力の既存データ
  const existing = useMemo(() =>
    data.approaches.find(a => a.member === selectedMember && a.date === selectedDate),
    [data.approaches, selectedMember, selectedDate]);

  // 既存データ読み込み（担当者・日付が変わった時のみ実行）
  // ※ existingやdata.approachesを依存に入れると、自動保存→data更新→再読込→自動保存…の無限ループになるので外す
  useEffect(() => {
    setIsLoaded(false);
    setLastSavedAt(null); // 切替時に保存時刻をリセット
    // 直接data.approachesから検索（existingを使わない）
    const rec = data.approaches.find(a => a.member === selectedMember && a.date === selectedDate);
    if (rec) {
      setInputValues(rec.values || {});
      setMemo(rec.memo || "");
      setMailDelivery(rec.mailDelivery || false);
      setArea(rec.area || "");
      setDailyGoals(rec.dailyGoals || {});
    } else {
      setInputValues({}); setMemo(""); setMailDelivery(false); setArea(""); setDailyGoals({});
    }
    const t = setTimeout(() => setIsLoaded(true), 100);
    return () => clearTimeout(t);
  }, [selectedMember, selectedDate]);

  // 🔔 通知タップから飛んできた時：sub-tab・メンバー・日付を切り替える
  useEffect(() => {
    if (pendingNav && pendingNav.tab === 'approach') {
      if (pendingNav.sub) setTab(pendingNav.sub);
      if (pendingNav.member) setSelectedMember(pendingNav.member);
      if (pendingNav.date) {
        setSelectedDate(pendingNav.date);
        setSelectedYM(pendingNav.date.slice(0, 7));
      }
      // 🆕 sekisanLinkId が来てたら案件タブを開く
      if (pendingNav.sekisanLinkId) {
        setTab("cases");
      }
      // 🆕 scrollTo: 'comments' ならコメント欄まで自動スクロール
      if (pendingNav.scrollTo === 'comments') {
        // データ読込・タブ切替を待ってからスクロール
        setTimeout(() => {
          const el = document.getElementById('approach-comments-section');
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            // 軽くハイライト効果
            const orig = el.style.boxShadow;
            el.style.transition = 'box-shadow 0.5s';
            el.style.boxShadow = `0 0 0 3px ${C.accent}`;
            setTimeout(() => { el.style.boxShadow = orig; }, 1500);
          }
        }, 700);
      }
      if (onConsumeNav) onConsumeNav();
    }
  }, [pendingNav]);

  // ===== 自動保存：実際に変更があるときだけ保存（debounce 800ms） =====
  useEffect(() => {
    if (!isLoaded) return; // 初回読み込み完了前はスキップ
    // 権限チェック：管理者でなく、自分以外のメンバーが選択されてる場合は保存しない
    if (!isAdmin && currentUser && selectedMember !== currentUser) {
      setAutoSaveStatus("idle");
      return;
    }

    // 既存レコードと現在の入力を比較。同じなら保存しない（無駄なSupabaseリクエスト防止）
    const rec = data.approaches.find(a => a.member === selectedMember && a.date === selectedDate);
    if (rec) {
      const sameValues = JSON.stringify(rec.values || {}) === JSON.stringify(inputValues);
      const sameGoals = JSON.stringify(rec.dailyGoals || {}) === JSON.stringify(dailyGoals);
      if (sameValues && sameGoals && (rec.memo || "") === memo && !!rec.mailDelivery === !!mailDelivery && (rec.area || "") === area) {
        setAutoSaveStatus("idle");
        return; // 完全に同じ → 保存しない
      }
    } else {
      // 新規だが全項目が空 → 空レコードを保存しない
      const allEmpty = Object.keys(inputValues).every(k => !inputValues[k]) && !memo && !mailDelivery && !area && Object.keys(dailyGoals).every(k => !dailyGoals[k]);
      if (allEmpty) { setAutoSaveStatus("idle"); return; }
    }

    setAutoSaveStatus("saving");
    // 800msのdebounceで連打時の保存頻度を抑制
    const saveTimer = setTimeout(() => {
      setData(d => {
        const existingRec = d.approaches.find(a => a.member === selectedMember && a.date === selectedDate);
        const entry = {
          id: existingRec?.id || Date.now(),
          member: selectedMember, date: selectedDate,
          values: inputValues, memo, mailDelivery, area, dailyGoals,
          // 🛡️ 既存の追加フィールドを保持（コメント・始業/終業記録を消さない）
          comments: existingRec?.comments || [],
          goalSetAt: existingRec?.goalSetAt,
          goalNotifiedToManagers: existingRec?.goalNotifiedToManagers,
          closedAt: existingRec?.closedAt,
          closeNotifiedToManagers: existingRec?.closeNotifiedToManagers,
        };
        return {
          ...d,
          approaches: existingRec
            ? d.approaches.map(a => a.id === existingRec.id ? entry : a)
            : [...d.approaches, entry],
        };
      });
      setAutoSaveStatus("saved");
      setLastSavedAt(new Date()); // 最終保存時刻を記録
    }, 800);

    const fadeTimer = setTimeout(() => setAutoSaveStatus("idle"), 3500);
    return () => { clearTimeout(saveTimer); clearTimeout(fadeTimer); };
  }, [inputValues, memo, mailDelivery, area, dailyGoals, isLoaded, selectedMember, selectedDate]);

  // 月次集計
  const monthlyData = useMemo(() => {
    return MEMBERS.map(m => {
      const entries = data.approaches.filter(a => a.member === m && a.date.startsWith(selectedYM));
      const totals = {};
      APPROACH_ITEMS.forEach(item => {
        totals[item] = entries.reduce((a, e) => a + (Number(e.values?.[item]) || 0), 0);
      });
      const mailDays = entries.filter(e => e.mailDelivery).length;
      const workDays = entries.length;
      return { member: m, totals, mailDays, workDays };
    }).filter(m => Object.values(m.totals).some(v => v > 0) || m.workDays > 0);
  }, [data.approaches, selectedYM]);

  // 月一覧（過去12ヶ月）
  const monthOptions = useMemo(() => {
    return Array.from({ length: 12 }, (_, i) => {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      const ym = d.toISOString().slice(0, 7);
      return { ym, label: `${d.getFullYear()}年${d.getMonth() + 1}月` };
    });
  }, []);

  // ===== 🏁 就業報告 =====
  const handleCloseReport = () => {
    const me = selectedMember;
    if (currentUser !== me && !isAdmin) {
      alert("⚠️ 自分の業務報告のみ送信できます");
      return;
    }
    if (!window.confirm(`今日の業務を終了して、下田さん・比嘉さんに就業報告を送ります。\nよろしいですか？\n\n※ カウンター実績と振り返りメモが通知されます。`)) return;
    const now = new Date().toISOString();
    setData(d => {
      const rec = d.approaches.find(a => a.member === me && a.date === selectedDate);
      const entry = {
        id: rec?.id || Date.now(),
        member: me, date: selectedDate,
        values: inputValues, memo, mailDelivery, area, dailyGoals,
        goalSetAt: rec?.goalSetAt || now,
        goalNotifiedToManagers: rec?.goalNotifiedToManagers || false,
        closedAt: now,
        closeNotifiedToManagers: true,
        comments: rec?.comments || [],
      };
      return {
        ...d,
        approaches: rec
          ? d.approaches.map(a => a.id === rec.id ? entry : a)
          : [...d.approaches, entry]
      };
    });
    // 通知送信
    const resultLabel = APPROACH_ITEMS
      .filter(item => (Number(inputValues[item]) || 0) > 0)
      .map(item => `${item}${inputValues[item]}`)
      .join(" / ");
    const memoLabel = memo ? `\n💭 ${memo}` : "";
    const targets = getNotifyTargets(data, me, { member: selectedMember }); // 対象メンバーも含める
    if (targets.length > 0) {
      sendPushNotification(
        targets,
        `🏁 ${me}さんが業務終了`,
        `${selectedDate}の実績\n${resultLabel || "(なし)"}${memoLabel}`,
        { 
          tag: `hikari-business-close-${me}-${selectedDate}`,
          data: { tab: 'approach', sub: 'input', member: me, date: selectedDate },
          tab: 'approach', sub: 'input', member: me, date: selectedDate
        }
      );
    }
    alert("✅ 就業報告を送りました。お疲れさまでした！");
  };

  // ===== 💬 コメント送信 =====
  const handlePostComment = () => {
    const text = newComment.trim();
    if (!text) return;
    if (!currentUser) { alert("先にログインしてください"); return; }
    const comment = {
      id: Date.now(),
      member: currentUser,
      text,
      createdAt: new Date().toISOString(),
    };
    setData(d => {
      const rec = d.approaches.find(a => a.member === selectedMember && a.date === selectedDate);
      if (rec) {
        return {
          ...d,
          approaches: d.approaches.map(a =>
            a.id === rec.id
              ? { ...a, comments: [...(a.comments || []), comment] }
              : a
          )
        };
      }
      return {
        ...d,
        approaches: [...d.approaches, {
          id: Date.now() + 1,
          member: selectedMember, date: selectedDate,
          values: inputValues, memo, mailDelivery, area, dailyGoals,
          comments: [comment],
        }]
      };
    });
    // 通知：本人＋下田＋比嘉（送信者を除く）
    const targets = getNotifyTargets(data, currentUser, { member: selectedMember });
    if (targets.length > 0) {
      sendPushNotification(
        targets,
        `💬 ${currentUser}さんからコメント`,
        `${selectedMember}さんの${selectedDate}の活動について\n${text}`,
        { 
          tag: `hikari-comment-${selectedMember}-${selectedDate}-${comment.id}`,
          data: { tab: 'approach', sub: 'input', member: selectedMember, date: selectedDate, scrollTo: 'comments' },
          tab: 'approach', sub: 'input', member: selectedMember, date: selectedDate, scrollTo: 'comments'
        }
      );
    }
    setNewComment("");
  };

  // ===== ✏️ コメント編集 =====
  const handleStartEditComment = (c) => {
    setEditingCommentId(c.id);
    setEditingCommentText(c.text);
  };
  const handleCancelEditComment = () => {
    setEditingCommentId(null);
    setEditingCommentText("");
  };
  const handleSaveEditComment = (commentId) => {
    const newText = editingCommentText.trim();
    if (!newText) { alert("内容が空です"); return; }
    setData(d => ({
      ...d,
      approaches: d.approaches.map(a => {
        if (a.member !== selectedMember || a.date !== selectedDate) return a;
        return {
          ...a,
          comments: (a.comments || []).map(c =>
            c.id === commentId ? { ...c, text: newText, editedAt: new Date().toISOString() } : c
          ),
        };
      }),
    }));
    setEditingCommentId(null);
    setEditingCommentText("");
  };

  // ===== 🗑️ コメント削除 =====
  const handleDeleteComment = (commentId) => {
    if (!window.confirm("このコメントを削除しますか？")) return;
    setData(d => ({
      ...d,
      approaches: d.approaches.map(a => {
        if (a.member !== selectedMember || a.date !== selectedDate) return a;
        return {
          ...a,
          comments: (a.comments || []).filter(c => c.id !== commentId),
        };
      }),
    }));
  };

  const handleSave = () => {
    const entry = {
      id: existing?.id || Date.now(),
      member: selectedMember, date: selectedDate,
      values: inputValues, memo,
      mailDelivery, area, dailyGoals,
      // 🛡️ 既存の追加フィールドを保持（コメント・始業/終業記録を消さない）
      comments: existing?.comments || [],
      goalSetAt: existing?.goalSetAt,
      goalNotifiedToManagers: existing?.goalNotifiedToManagers,
      closedAt: existing?.closedAt,
      closeNotifiedToManagers: existing?.closeNotifiedToManagers,
    };
    setData(d => ({ ...d, approaches: existing ? d.approaches.map(a => a.id === existing.id ? entry : a) : [...d.approaches, entry] }));
    alert("保存しました！");
  };

  const openGoalEdit = (member) => {
    // 権限チェック：管理者または本人のみ
    if (!isAdmin && member !== currentUser) {
      alert(`⚠️ 編集権限がありません\n\n「${member}」さんの目標は編集できません。\n管理者（${adminMember}）または本人のみ編集できます。`);
      return;
    }
    setGoalEditMember(member);
    const current = {};
    APPROACH_GOAL_ITEMS.forEach(item => { current[item] = String(getGoal(member, item)); });
    setGoalForm(current);
    setShowGoalEdit(true);
  };

  const saveGoal = () => {
    // 保険：保存時にも権限チェック
    if (!isAdmin && goalEditMember !== currentUser) {
      alert("⚠️ 編集権限がありません");
      setShowGoalEdit(false);
      return;
    }
    const updated = {};
    APPROACH_GOAL_ITEMS.forEach(item => { updated[item] = Number(goalForm[item]) || 0; });
    setData(d => ({ ...d, memberGoals: { ...(d.memberGoals || {}), [goalEditMember]: updated } }));

    // 🆕 下田・比嘉 + 目標対象者に通知（送信者除外）
    const me = currentUser || "";
    const targets = getNotifyTargets(data, me, { member: goalEditMember }); // 目標対象者も含める
    if (targets.length > 0) {
      const goalSummary = APPROACH_ITEMS
        .filter(item => Number(goalForm[item]) > 0)
        .map(item => `${item}: ${goalForm[item]}件`)
        .slice(0, 3)
        .join(" / ");
      sendPushNotification(
        targets,
        `🎯 ${goalEditMember}さんの目標が更新されました`,
        `${me ? me + "さんが更新\n" : ""}${goalSummary || "目標が設定されました"}`,
        {
          tag: `hikari-goal-${goalEditMember}-${Date.now()}`,
          data: { tab: 'approach', sub: 'goals' },
          tab: 'approach', sub: 'goals',
        }
      );
    }

    setShowGoalEdit(false);
  };

  const TABS = [
    { key: "cases", label: "📋 案件" },
    { key: "input", label: "📈 行動管理" },
    { key: "monthly", label: "📊 月次" },
    { key: "goals", label: "🎯 目標" },
  ];

  // ===== 案件タブ用の集計 =====
  const filterByMember = (items, key = "assignee") => {
    if (casesMember === "__ALL__") return items;
    return items.filter(it => isAssignedTo([it[key]], casesMember));
  };

  const pipeline = useMemo(() => {
    const jiageActive = filterByMember((data.jiage || []).filter(j => !["NG", "仕入れ完了"].includes(j.status)));
    const ownersActive = filterByMember((data.owners || []).filter(o => !["断られた", "仕入れ完了", "NG"].includes(o.status)));
    const sekisanActive = filterByMember((data.sekisan || []).filter(s => s.judgment !== "見送り"));
    const sekisanHot = sekisanActive.filter(s => s.judgment === "熱い");
    const sekisanCheck = sekisanActive.filter(s => s.judgment === "検討中");
    const stocksActive = filterByMember((data.stocks || []).filter(s => s.status !== "売決完了"));
    // 「決済完了」は選択月の年（casesMonthの年）に決済完了したもの
    const selectedYear = casesMonth.slice(0, 4);
    const stocksCompleted = filterByMember((data.stocks || []).filter(s =>
      s.status === "売決完了" && (s.sellDate || "").startsWith(selectedYear)
    ));
    return { jiageActive, ownersActive, sekisanActive, sekisanHot, sekisanCheck, stocksActive, stocksCompleted, selectedYear };
  }, [data.jiage, data.owners, data.sekisan, data.stocks, casesMember, casesMonth]);

  const alerts = useMemo(() => {
    const overdueJiage = filterByMember((data.jiage || []).filter(j =>
      j.nextVisit && j.nextVisit < today && !["NG", "断られた", "仕入れ完了"].includes(j.status)
    ));
    const overdueOwner = filterByMember((data.owners || []).filter(o =>
      o.nextFollowDate && o.nextFollowDate < today && !["NG", "断られた", "仕入れ完了"].includes(o.status)
    ));
    const stagnant90 = filterByMember((data.stocks || []).filter(s => {
      if (s.status === "売決完了") return false;
      const d = daysSinceBuy(s.buyDate);
      return d != null && d >= 90 && d < 180;
    }));
    const stagnant180 = filterByMember((data.stocks || []).filter(s => {
      if (s.status === "売決完了") return false;
      const d = daysSinceBuy(s.buyDate);
      return d != null && d >= 180;
    }));
    const dmUn = filterByMember((data.jiage || []).filter(j => j.dm === "未"));
    const hotNotPurchased = filterByMember((data.sekisan || []).filter(s => {
      if (s.judgment !== "熱い") return false;
      return !(data.stocks || []).some(st => st.fromSekisanId === s.id);
    }));
    return { overdueJiage, overdueOwner, stagnant90, stagnant180, dmUn, hotNotPurchased };
  }, [data.jiage, data.owners, data.stocks, data.sekisan, casesMember, today]);

  const weekActivity = useMemo(() => {
    // 選択月の集計（casesMonth に従う）
    const ym = casesMonth; // "2026-05"
    const newSekisan = filterByMember((data.sekisan || []).filter(s => (s.createdAt || "").startsWith(ym)));
    const newBuyContract = filterByMember((data.stocks || []).filter(s => (s.buyContractDate || "").startsWith(ym)));
    const newPurchase = filterByMember((data.stocks || []).filter(s => (s.buyDate || "").startsWith(ym)));
    const newSellContract = filterByMember((data.stocks || []).filter(s => (s.sellContractDate || "").startsWith(ym)));
    const newCompleted = filterByMember((data.stocks || []).filter(s =>
      s.status === "売決完了" && (s.sellDate || "").startsWith(ym)
    ));
    const currentKentou = filterByMember((data.sekisan || []).filter(s => s.judgment === "仕入検討"));
    const currentHot = filterByMember((data.sekisan || []).filter(s => s.judgment === "熱い"));
    return { newSekisan, newBuyContract, newPurchase, newSellContract, newCompleted, currentKentou, currentHot };
  }, [data.sekisan, data.stocks, casesMember, casesMonth]);

  // 過去12ヶ月の選択肢
  const casesMonthOptions = useMemo(() => {
    return Array.from({ length: 12 }, (_, i) => {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      const ym = d.toISOString().slice(0, 7);
      return { ym, label: `${d.getFullYear()}年${d.getMonth() + 1}月${i === 0 ? "（今月）" : i === 1 ? "（先月）" : ""}` };
    });
  }, []);

  // 積算表の編集モード（案件タブから開いた時）
  if (editingSekisan) {
    return <SekisanForm
      initial={editingSekisan}
      onSave={(form) => {
        const item = { ...form, id: editingSekisan.id || Date.now() };
        setData(d => ({
          ...d,
          sekisan: editingSekisan.id
            ? d.sekisan.map(s => s.id === item.id ? item : s)
            : [...d.sekisan, item]
        }));
        setEditingSekisan(null);
      }}
      onClose={() => setEditingSekisan(null)}
      onTransfer={(form) => {
        const stockItem = {
          id: Date.now(),
          assignee: form.assignee,
          name: form.address,
          status: "仕入役調中",
          buyDate: "",
          buyCost: Number(form.buyPrice) || 0,
          sellPrice: Number(form.sellPrice) || 0,
          memo: `仕入検討積算表から転記\n判定: ${form.judgment}`,
          year: new Date().getFullYear(),
          fromSekisanId: editingSekisan.id,
        };
        setData(d => ({
          ...d,
          stocks: [...d.stocks, stockItem],
          sekisan: d.sekisan.map(s => s.id === editingSekisan.id ? { ...form, id: editingSekisan.id } : s)
        }));
        setEditingSekisan(null);
        alert(`✅「${form.address}」を在庫管理に転記しました！`);
      }}
      canEditThis={canEdit(editingSekisan)}
    />;
  }

  return (
    <div>
      <div style={{ fontSize: 20, fontWeight: 800, color: C.text, marginBottom: 14 }}>📞 アプローチ管理</div>

      {/* 🆕 統一の担当者選択（全タブで連動） */}
      <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 12, padding: 14, marginBottom: 14 }}>
        <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>👤 表示する担当者{casesMember === "__ALL__" ? "（管理者ビュー）" : ""}</div>
        <select
          style={{ ...inp, marginBottom: 0 }}
          value={casesMember}
          onChange={e => { setCasesMember(e.target.value); setCasesExpanded(null); }}
        >
          <option value="__ALL__">全メンバー（管理者ビュー）</option>
          {MEMBERS.map(m => <option key={m} value={m}>{m}</option>)}
        </select>
      </div>

      {/* タブ切替 */}
      <div style={{ display: "flex", background: C.cardBg, borderRadius: 12, padding: 4, marginBottom: 14, border: `1px solid ${C.borderDim}` }}>
        {TABS.map(t => (
          <button key={t.key} onClick={() => setTab(t.key)} style={{
            flex: 1, background: tab === t.key ? C.accent : "none", border: "none",
            color: tab === t.key ? "#fff" : C.muted, borderRadius: 9, padding: "10px 4px",
            cursor: "pointer", fontSize: 13, fontWeight: tab === t.key ? 700 : 400, fontFamily: "inherit",
          }}>{t.label}</button>
        ))}
      </div>

      {/* ===== 案件タブ ===== */}
      {tab === "cases" && (
        <div>
          {/* ========== 仕入検討積算表（埋め込み） ========== */}
          <div style={{ background: C.cardBg, border: `1px solid ${C.warn}33`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
            <SekisanPage data={data} setData={setData} embedded={true} defaultAssignee={casesMember === "__ALL__" ? null : casesMember} casesMember={casesMember} sekisanLinkId={pendingNav?.sekisanLinkId} onConsumeNav={onConsumeNav} />
          </div>

          {/* ========== 段1：パイプライン ========== */}
          <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.accent, marginBottom: 12 }}>
              📊 {casesMember === "__ALL__" ? "全員" : casesMember} の案件パイプライン
              {pipeline.selectedYear !== String(new Date().getFullYear()) && (
                <span style={{ color: C.warn, marginLeft: 8, fontSize: 11 }}>（決済完了は{pipeline.selectedYear}年）</span>
              )}
            </div>
            {[
              { key: "jiage", icon: "🗺️", label: "地上げ・交渉", count: pipeline.jiageActive.length, color: C.purple, sub: "訪問・DM・交渉", items: pipeline.jiageActive,
                type: "jiage",
                renderItem: (j) => ({ title: j.address, sub: `${j.status} · ${j.owner || "所有者不明"}`, badge: j.assignee, raw: j }) },
              { key: "sekisan", icon: "🧮", label: "積算検討", count: pipeline.sekisanActive.length, color: C.warn,
                sub: `🔥熱い${pipeline.sekisanHot.length} / 🟡検討中${pipeline.sekisanCheck.length}`,
                items: pipeline.sekisanActive,
                type: "sekisan",
                renderItem: (s) => ({ title: s.address || "住所未設定", sub: `${s.judgment} · 仕入想定${s.buyPrice ? Math.round(Number(s.buyPrice)/10000)+"万" : "未"}`, badge: s.assignee, raw: s }) },
              { key: "stocks", icon: "🏠", label: "在庫", count: pipeline.stocksActive.length, color: C.success,
                sub: "リフォーム中・売却準備など", items: pipeline.stocksActive,
                type: "stock",
                renderItem: (s) => { const si = stagnantInfo(s.buyDate); return { title: s.name, sub: `${s.status}${si ? ` · ${si.level}仕入${si.days}日経過` : ""}`, badge: s.assignee, raw: s }; } },
              { key: "completed", icon: "✅", label: "売却決済", count: pipeline.stocksCompleted.length, color: C.muted,
                sub: `${pipeline.selectedYear}年実績`, items: pipeline.stocksCompleted,
                type: "stock",
                renderItem: (s) => ({ title: s.name, sub: `利益${Math.round(((s.sellPrice||0)-(s.buyCost||0))/10000)}万 · ${s.sellDate}`, badge: s.assignee, raw: s }) },
            ].map(stage => {
              const isExpanded = casesExpanded === stage.key;
              return (
                <div key={stage.key} style={{ marginBottom: 8 }}>
                  <button onClick={() => setCasesExpanded(isExpanded ? null : stage.key)}
                    disabled={stage.count === 0}
                    style={{
                      width: "100%", background: isExpanded ? stage.color + "22" : C.bg,
                      border: `1px solid ${isExpanded ? stage.color + "66" : C.borderDim}`,
                      borderRadius: 10, padding: "12px 14px", cursor: stage.count === 0 ? "default" : "pointer",
                      fontFamily: "inherit", display: "flex", alignItems: "center", gap: 12, textAlign: "left",
                      opacity: stage.count === 0 ? 0.5 : 1,
                    }}>
                    <span style={{ fontSize: 24, flexShrink: 0 }}>{stage.icon}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ color: C.text, fontWeight: 700, fontSize: 14 }}>{stage.label}</div>
                      <div style={{ color: C.muted, fontSize: 11, marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{stage.sub}</div>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      <div style={{ color: stage.color, fontWeight: 800, fontSize: 22, lineHeight: 1 }}>{stage.count}</div>
                      <div style={{ color: C.muted, fontSize: 10, marginTop: 2 }}>件{stage.count > 0 ? (isExpanded ? " ▲" : " ▼") : ""}</div>
                    </div>
                  </button>
                  {isExpanded && stage.items.length > 0 && (
                    <div style={{ background: C.bgDark, border: `1px solid ${stage.color}33`, borderTop: "none", borderRadius: "0 0 10px 10px", padding: "4px 8px 8px", marginTop: -1 }}>
                      {stage.items.slice(0, 20).map((item, i) => {
                        const r = stage.renderItem(item);
                        return (
                          <div key={i} style={{ padding: "10px 8px", borderBottom: i < Math.min(stage.items.length - 1, 19) ? `1px solid ${C.borderDim}` : "none" }}>
                            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
                              <span style={{ color: C.text, fontSize: 13, fontWeight: 600, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.title}</span>
                              <MemberTag name={r.badge} />
                            </div>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                              <span style={{ color: C.muted, fontSize: 11, flex: 1 }}>{r.sub}</span>
                              {r.raw && (
                                <button onClick={() => {
                                  if (stage.type === "jiage") setEditingJiage(r.raw);
                                  else if (stage.type === "owner") setEditingOwner(r.raw);
                                  else if (stage.type === "sekisan") setEditingSekisan(r.raw);
                                  else if (stage.type === "stock") setEditingStock(r.raw);
                                }} style={{
                                  padding: "4px 9px", background: stage.color + "22", border: `1px solid ${stage.color}`,
                                  color: stage.color, borderRadius: 6, cursor: "pointer", fontSize: 10, fontWeight: 700,
                                  fontFamily: "inherit", flexShrink: 0, whiteSpace: "nowrap",
                                }}>📋 詳細</button>
                              )}
                            </div>
                          </div>
                        );
                      })}
                      {stage.items.length > 20 && (
                        <div style={{ padding: "8px", textAlign: "center", color: C.muted, fontSize: 11 }}>他 {stage.items.length - 20}件（各タブで確認）</div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* ========== 段2：要対応アラート ========== */}
          <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.danger, marginBottom: 12 }}>⚡ 要対応アラート</div>
            {(() => {
              const alertList = [
                { label: "期限切れフォロー", count: alerts.overdueJiage.length + alerts.overdueOwner.length, color: C.danger, icon: "⚠️", desc: "次回訪問日を過ぎてる地上げ・所有者" },
                { label: "180日超滞留在庫", count: alerts.stagnant180.length, color: C.danger, icon: "🔴", desc: "価格見直しなど対応急務" },
                { label: "90〜180日滞留在庫", count: alerts.stagnant90.length, color: C.warn, icon: "🟡", desc: "販売促進を検討" },
                { label: "DM未送付の地上げ", count: alerts.dmUn.length, color: C.warn, icon: "📩", desc: "1次アタックがまだの案件" },
                { label: "「熱い」判定で仕入未確定", count: alerts.hotNotPurchased.length, color: C.danger, icon: "🔥", desc: "積算は終わってるが在庫転記してない" },
              ];
              const total = alertList.reduce((a, b) => a + b.count, 0);
              if (total === 0) {
                return <div style={{ background: C.bg, borderRadius: 10, padding: 16, textAlign: "center", color: C.success, fontSize: 13 }}>✅ 要対応アラートなし。クリーンな状態です。</div>;
              }
              return (
                <div style={{ display: "grid", gap: 8 }}>
                  {alertList.filter(a => a.count > 0).map(a => (
                    <div key={a.label} style={{ background: C.bg, border: `1px solid ${a.color}33`, borderRadius: 10, padding: "10px 14px", display: "flex", alignItems: "center", gap: 12 }}>
                      <span style={{ fontSize: 18, flexShrink: 0 }}>{a.icon}</span>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ color: C.text, fontSize: 13, fontWeight: 700 }}>{a.label}</div>
                        <div style={{ color: C.muted, fontSize: 11, marginTop: 1 }}>{a.desc}</div>
                      </div>
                      <div style={{ color: a.color, fontWeight: 800, fontSize: 20, flexShrink: 0 }}>{a.count}</div>
                    </div>
                  ))}
                </div>
              );
            })()}
          </div>

          {/* ========== 段3：月別の活動（月選択可） ========== */}
          <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10, flexWrap: "wrap", gap: 8 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.success }}>
                📅 {casesMonth === today.slice(0, 7) ? "今月" : casesMonth.replace("-", "年") + "月"}の活動
                {casesMember !== "__ALL__" && <span style={{ color: MEMBER_COLORS[casesMember] || C.muted, marginLeft: 6 }}>· {casesMember}</span>}
              </div>
              {/* 月切替ナビ */}
              <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                <button onClick={() => {
                  const d = new Date(casesMonth + "-01");
                  d.setMonth(d.getMonth() - 1);
                  setCasesMonth(d.toISOString().slice(0, 7));
                  setCasesExpanded(null);
                }} style={{
                  background: C.accent + "22", border: `1px solid ${C.accent}66`, color: C.accent,
                  borderRadius: 6, width: 30, height: 28, cursor: "pointer", fontSize: 16, fontWeight: 800, fontFamily: "inherit",
                }}>‹</button>
                <select value={casesMonth} onChange={e => { setCasesMonth(e.target.value); setCasesExpanded(null); }}
                  style={{ ...inp, padding: "5px 8px", fontSize: 12, width: "auto", minWidth: 130, height: 28 }}>
                  {casesMonthOptions.map(({ ym, label }) => <option key={ym} value={ym}>{label}</option>)}
                </select>
                <button onClick={() => {
                  const d = new Date(casesMonth + "-01");
                  d.setMonth(d.getMonth() + 1);
                  const next = d.toISOString().slice(0, 7);
                  // 未来は禁止（今月まで）
                  if (next > today.slice(0, 7)) return;
                  setCasesMonth(next);
                  setCasesExpanded(null);
                }}
                disabled={casesMonth >= today.slice(0, 7)}
                style={{
                  background: casesMonth >= today.slice(0, 7) ? C.borderDim : C.accent + "22",
                  border: `1px solid ${casesMonth >= today.slice(0, 7) ? C.borderDim : C.accent + "66"}`,
                  color: casesMonth >= today.slice(0, 7) ? "#334155" : C.accent,
                  borderRadius: 6, width: 30, height: 28, cursor: casesMonth >= today.slice(0, 7) ? "default" : "pointer",
                  fontSize: 16, fontWeight: 800, fontFamily: "inherit",
                }}>›</button>
                {casesMonth !== today.slice(0, 7) && (
                  <button onClick={() => { setCasesMonth(today.slice(0, 7)); setCasesExpanded(null); }} style={{
                    background: C.warn + "22", border: `1px solid ${C.warn}66`, color: C.warn,
                    borderRadius: 6, padding: "5px 10px", cursor: "pointer", fontSize: 11, fontWeight: 700, fontFamily: "inherit", height: 28,
                  }}>今月</button>
                )}
              </div>
            </div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 12 }}>カードをタップで詳細</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
              {[
                { key: "sekisan", label: "査定件数", count: weekActivity.newSekisan.length, color: C.warn, icon: "🧮" },
                { key: "buyContract", label: "仕入契約", count: weekActivity.newBuyContract.length, color: "#a855f7", icon: "📝" },
                { key: "purchase", label: "仕入決済", count: weekActivity.newPurchase.length, color: C.accent, icon: "🏠" },
                { key: "sellContract", label: "売却契約", count: weekActivity.newSellContract.length, color: C.accent, icon: "📋" },
                { key: "completed", label: "売却決済", count: weekActivity.newCompleted.length, color: C.success, icon: "✅" },
                { key: "kentou", label: "仕入検討", count: weekActivity.currentKentou.length, color: C.accent, icon: "📝" },
                { key: "hot", label: "🔥熱い", count: weekActivity.currentHot.length, color: C.danger, icon: "🔥" },
              ].map(a => {
                const isExpanded = casesExpanded === `month_${a.key}`;
                const isClickable = a.count > 0;
                return (
                  <button key={a.key}
                    onClick={() => isClickable && setCasesExpanded(isExpanded ? null : `month_${a.key}`)}
                    disabled={!isClickable}
                    style={{
                      background: isExpanded ? a.color + "22" : C.bg,
                      borderRadius: 10, padding: "12px 14px", textAlign: "center",
                      border: `1.5px solid ${isExpanded ? a.color + "88" : "transparent"}`,
                      cursor: isClickable ? "pointer" : "default",
                      fontFamily: "inherit", position: "relative",
                      opacity: isClickable ? 1 : 0.5,
                      transition: "all 0.2s",
                    }}>
                    <div style={{ fontSize: 20, marginBottom: 4 }}>{a.icon}</div>
                    <div style={{ color: a.color, fontWeight: 800, fontSize: 24, lineHeight: 1 }}>{a.count}</div>
                    <div style={{ color: C.muted, fontSize: 11, marginTop: 4 }}>{a.label}{isClickable ? (isExpanded ? " ▲" : " ▼") : ""}</div>
                  </button>
                );
              })}
            </div>

            {/* 詳細展開エリア */}
            {(() => {
              if (!casesExpanded || !casesExpanded.startsWith("month_")) return null;
              const key = casesExpanded.slice(6); // "month_xxx" -> "xxx"
              const config = {
                sekisan: { items: weekActivity.newSekisan, color: C.warn, icon: "🧮", title: "査定件数",
                  render: (s) => {
                    const buyPriceYen = Number(s.buyPrice) || 0;
                    const sellPriceYen = Number(s.sellPrice) || 0;
                    const expensesYen = ["brokerFeeIn","registration","acquisitionTax","stamp","leftover","reform","demolition","brokerFeeOut","other","propertyTax","cleaning"].reduce((a, k) => a + (Number(s[k])||0), 0);
                    const totalCostYen = buyPriceYen + expensesYen;
                    const profitYen = sellPriceYen - totalCostYen;
                    const buyMan = Math.round(buyPriceYen / 10000);
                    const sellMan = Math.round(sellPriceYen / 10000);
                    const profitMan = Math.round(profitYen / 10000);
                    return {
                      title: s.address || "(住所未設定)",
                      sub: `${s.judgment || "判断未"}${buyMan ? " · 仕入" + buyMan + "万" : ""}${sellMan ? " · 売却" + sellMan + "万" : ""}`,
                      date: s.createdAt,
                      badge: s.assignee,
                      judgment: s.judgment,
                      sekisanDetail: { buyMan, sellMan, profitMan, totalCostMan: Math.round(totalCostYen/10000), expensesMan: Math.round(expensesYen/10000), memo: s.memo, judgmentMemo: s.judgmentMemo, layout: s.layout, landArea: s.landArea, buildingArea: s.buildingArea, age: s.age, structure: s.structure, stationDist: s.stationDist },
                      rawSekisan: s,
                    };
                  }},
                purchase: { items: weekActivity.newPurchase, color: C.accent, icon: "🏠", title: "仕入決済",
                  render: (s) => ({
                    title: s.name || "(無題)",
                    sub: `${s.status} · 仕入${Math.round((s.buyCost||0)/10000)}万 · 想定売却${Math.round((s.sellPrice||0)/10000)}万`,
                    date: s.buyDate,
                    badge: s.assignee,
                    stockDetail: { buyMan: Math.round((s.buyCost||0)/10000), sellMan: Math.round((s.sellPrice||0)/10000), status: s.status, memo: s.memo },
                  })},
                buyContract: { items: weekActivity.newBuyContract, color: "#a855f7", icon: "📝", title: "仕入契約",
                  render: (s) => ({
                    title: s.name || "(無題)",
                    sub: `${s.status} · 仕入${Math.round((s.buyCost||0)/10000)}万 · 仕入契約日 ${s.buyContractDate}`,
                    date: s.buyContractDate,
                    badge: s.assignee,
                    stockDetail: { buyMan: Math.round((s.buyCost||0)/10000), sellMan: Math.round((s.sellPrice||0)/10000), status: s.status, memo: s.memo },
                  })},
                sellContract: { items: weekActivity.newSellContract, color: C.accent, icon: "📋", title: "売却契約",
                  render: (s) => ({
                    title: s.name || "(無題)",
                    sub: `${s.status} · 売却${Math.round((s.sellPrice||0)/10000)}万 · 売却契約日 ${s.sellContractDate}`,
                    date: s.sellContractDate,
                    badge: s.assignee,
                    stockDetail: { buyMan: Math.round((s.buyCost||0)/10000), sellMan: Math.round((s.sellPrice||0)/10000), status: s.status, memo: s.memo },
                  })},

// Excelから取り込んだ地上げデータ（エリア別）
const JIAGE_AREAS = ["熊谷", "行田", "深谷", "東松山", "本庄", "秩父", "上里"];

// 🗺️ ジオコーディング：住所→緯度経度（国土地理院API・日本特化・無料）
async function geocodeAddress(address) {
  if (!address) return null;
  
  // 住所の前処理
  const normalize = (s) => {
    return String(s)
      .replace(/[\u3000\s]+/g, " ") // 全角空白→半角
      .replace(/[０-９]/g, (c) => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)) // 全角数字→半角
      .replace(/[Ａ-Ｚａ-ｚ]/g, (c) => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)) // 全角アルファベット→半角
      .replace(/[－ー−―‐]/g, "-") // 各種ダッシュ→半角ハイフン
      .replace(/\s+$/, "")
      .trim();
  };
  
  const q = normalize(address);
  
  // 試行する住所のバリエーション（番地を段階的に削る）
  const candidates = [q];
  // 1. 番地の枝番を削る（例: "1-2-3" → "1-2"）
  const m1 = q.match(/^(.+?)(\d+)-\d+(?:-\d+)?$/);
  if (m1) candidates.push(`${m1[1]}${m1[2]}`);
  // 2. 番地を全部削る（例: "熊谷市中奈良1824" → "熊谷市中奈良"）
  const m2 = q.match(/^(.+?[市町村区])(.+?)\d/);
  if (m2) candidates.push(`${m2[1]}${m2[2]}`);
  
  for (const candidate of candidates) {
    try {
      // 国土地理院ジオコーディングAPI（日本特化・無料）
      const url = `https://msearch.gsi.go.jp/address-search/AddressSearch?q=${encodeURIComponent(candidate)}`;
      const res = await fetch(url);
      if (!res.ok) continue;
      const data = await res.json();
      if (data && data.length > 0 && data[0].geometry && data[0].geometry.coordinates) {
        const [lng, lat] = data[0].geometry.coordinates;
        if (!isNaN(lat) && !isNaN(lng)) return { lat, lng, matchedAddress: data[0].properties?.title };
      }
    } catch (e) {
      console.warn("Geocode error:", candidate, e);
    }
  }
  return null;
}

// 曜日ラベル
const DOW_LABELS = ["日", "月", "火", "水", "木", "金", "土"];

// 時間帯のラベル化（時刻 → カテゴリ）
function timeBucket(timeStr) {
  if (!timeStr) return null;
  const h = parseInt(timeStr.split(":")[0]);
  if (isNaN(h)) return null;
  if (h < 9) return "早朝";
  if (h < 12) return "午前";
  if (h < 14) return "昼";
  if (h < 17) return "午後";
  if (h < 20) return "夕方";
  return "夜";
}

// 訪問パターン分析
function analyzeVisitLog(visitLog) {
  if (!visitLog || visitLog.length === 0) return null;
  const absent = visitLog.filter(v => v.result === "absent");
  const ignore = visitLog.filter(v => v.result === "ignore");
  const home = visitLog.filter(v => v.result === "home");
  // 曜日×時間帯マップ
  const buckets = {};
  visitLog.forEach(v => {
    if (!v.dayOfWeek && v.dayOfWeek !== 0) return;
    const tb = timeBucket(v.time);
    if (!tb) return;
    const key = `${DOW_LABELS[v.dayOfWeek]}${tb}`;
    if (!buckets[key]) buckets[key] = { absent: 0, ignore: 0, home: 0 };
    if (v.result === "absent") buckets[key].absent++;
    else if (v.result === "ignore") buckets[key].ignore++;
    else if (v.result === "home") buckets[key].home++;
  });
  return { total: visitLog.length, absent: absent.length, ignore: ignore.length, home: home.length, buckets };
}

// 住所からエリアを推測（「○○市」を含むかどうか）
function inferAreaFromAddress(address) {
  if (!address) return "";
  const s = String(address);
  for (const area of JIAGE_AREAS) {
    if (s.includes(area + "市") || s.includes(area + "町") || s.includes(area + "郡")) {
      return area;
    }
  }
  // 上里町は児玉郡上里町なので別途判定
  if (s.includes("上里町")) return "上里";
  return "";
}

        const mapping = {};

      if (!isNaN(d.getTime())) return d.toISOString().split("T")[0];

    const s = String(v).trim();

    const m1 = s.match(/(\d{4})[\/\-年\.](\d{1,2})[\/\-月\.](\d{1,2})/);

    if (search) {

      const inAddr = (item.address || "").includes(s);

    }
    // クイックフィルター
    if (quickFilter === "overdue") {
      if (!(item.nextDate && item.nextDate < today && !["NG", "断られた", "仕入れ完了"].includes(item.status))) return false;
    }
    if (quickFilter === "dm_un") {
      if (item.type !== "jiage" || item.dm !== "未") return false;
