window.forceHikariReset = async function() {
  try { localStorage.clear(); } catch(e) {}
  try {
    if ('caches' in window) {
      const names = await caches.keys();
      await Promise.all(names.map(n => caches.delete(n)));
    }
  } catch(e) {}
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
  } catch(e) {}
  setTimeout(function() { window.location.reload(true); }, 500);
};

// 連結担当者を分解（例：「比嘉・下田」→ ["比嘉", "下田"]）
function expandAssignee(name) {
  if (!name) return [];
  return String(name).split(/[・,、]/).map(s => s.trim()).filter(Boolean);
}
function expandAssignees(arr) {
  if (!Array.isArray(arr)) return [];
  return arr.flatMap(a => expandAssignee(a));
}
function isAssignedTo(assignees, member) {
  if (!member) return true;
  const list = Array.isArray(assignees) ? assignees : [assignees];
  const expanded = list.flatMap(a => expandAssignee(a));
  return expanded.includes(member);
}

// CSV/Excelダウンロード（UTF-8 BOM付き、Excel日本語対応）
function downloadCSV(rows, filename) {
  if (!rows || !rows.length) { alert("ダウンロードするデータがありません"); return; }
  const headers = Object.keys(rows[0]);
  const escape = v => {
    const s = (v === null || v === undefined) ? "" : String(v);
    return `"${s.replace(/"/g, '""')}"`;
  };
  const lines = [
    headers.map(escape).join(","),
    ...rows.map(row => headers.map(h => escape(row[h])).join(","))
  ];
  // BOM付きUTF-8でExcelの文字化けを防ぐ
  const bom = "\uFEFF";
  const blob = new Blob([bom + lines.join("\r\n")], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function daysSinceBuy(buyDateStr) {
  if (!buyDateStr) return null;
  const buy = new Date(buyDateStr);
  const today = new Date();
  if (isNaN(buy.getTime())) return null;
  return Math.floor((today - buy) / 86400000);
}

// 滞留日数の色分け情報を返す
function stagnantInfo(buyDateStr) {
  const d = daysSinceBuy(buyDateStr);
  if (d == null) return null;
  let color, level;
  if (d >= 180) { color = "#ef4444"; level = "🔴"; }
  else if (d >= 90) { color = "#f59e0b"; level = "🟡"; }
  else if (d >= 30) { color = "#94a3b8"; level = "⚪"; }
  else { color = "#10b981"; level = "🟢"; }
  return { days: d, color, level };
}

// VAPID公開鍵をUint8Arrayに変換するヘルパー
function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

// Push購読を取得 or 新規作成
async function ensurePushSubscription() {
  if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
    throw new Error("このブラウザはWeb Pushに対応していません");
  }
  if (Notification.permission !== "granted") {
    const perm = await Notification.requestPermission();
    if (perm !== "granted") throw new Error("通知が許可されませんでした");
  }
  const reg = await navigator.serviceWorker.ready;
  let sub = await reg.pushManager.getSubscription();
  if (!sub) {
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
    });
  }
  return sub;
}

// Supabaseに購読情報を保存
async function savePushSubscriptionToSupabase(member, sub) {
  const body = {
    member,
    endpoint: sub.endpoint,
    p256dh: btoa(String.fromCharCode(...new Uint8Array(sub.getKey("p256dh")))),
    auth: btoa(String.fromCharCode(...new Uint8Array(sub.getKey("auth")))),
    updated_at: new Date().toISOString(),
  };
  // 既存チェック
  const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/push_subscriptions?member=eq.${encodeURIComponent(member)}&select=id`, {
    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
  });
  const existing = await checkRes.json();
  const method = existing && existing.length > 0 ? "PATCH" : "POST";
  const url = existing && existing.length > 0
    ? `${SUPABASE_URL}/rest/v1/push_subscriptions?member=eq.${encodeURIComponent(member)}`
    : `${SUPABASE_URL}/rest/v1/push_subscriptions`;
  const res = await fetch(url, {
    method,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=minimal",
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`Supabase保存失敗: ${res.status} ${await res.text()}`);
  return true;
}

// ============== 現在のユーザー識別 ==============
const CURRENT_USER_KEY = "hikari_current_user";
function getCurrentUser() {
  try { return localStorage.getItem(CURRENT_USER_KEY) || ""; } catch { return ""; }
}
function setCurrentUser(name) {
  try { localStorage.setItem(CURRENT_USER_KEY, name); } catch {}
}

// ============== 操作履歴 ==============
// data に対してログエントリを追加する純粋関数
function appendLog(d, action, target, description) {
  const entry = {
    id: Date.now() + Math.random(),
    timestamp: new Date().toISOString(),
    user: getCurrentUser() || "未設定",
    action, // "add" | "update" | "delete" | "promote"
    target, // "stock" | "jiage" | "owner" | "sekisan" | "yakusho"
    description,
  };
  const log = [entry, ...(d.activityLog || [])].slice(0, 200);
  return { ...d, activityLog: log };
}

// Supabaseからデータを取得
async function loadFromSupabase() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/app_data?id=eq.${DATA_ID}&select=data`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    const rows = await res.json();
    if (rows && rows.length > 0 && rows[0].data) return rows[0].data;
  } catch (e) { console.error("Supabase load error:", e); }
  return null;
}

// Supabaseにデータを保存
async function saveToSupabase(data, retries = 3) {
  // ローカルキャッシュは先に保存（Supabase失敗してもローカルには確実に残す）
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) { console.warn("localStorage save failed:", e); }

  for (let attempt = 0; attempt < retries; attempt++) {
    try {
      // まず存在確認
      const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/app_data?id=eq.${DATA_ID}&select=id`, {
        headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
      });
      if (!checkRes.ok) throw new Error(`Check failed: ${checkRes.status}`);
      const exists = await checkRes.json();
      const method = exists && exists.length > 0 ? "PATCH" : "POST";
      const url = exists && exists.length > 0
        ? `${SUPABASE_URL}/rest/v1/app_data?id=eq.${DATA_ID}`
        : `${SUPABASE_URL}/rest/v1/app_data`;
      const res = await fetch(url, {
        method,
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json",
          "Prefer": "return=minimal",
        },
        body: JSON.stringify({ id: DATA_ID, data, updated_at: new Date().toISOString() }),
      });
      if (!res.ok) throw new Error(`Save failed: ${res.status} ${await res.text()}`);
      // 保存成功！カレンダー予定数も含めてログ出力（デバッグ用）
      console.log(`[Supabase] 保存成功 (試行${attempt+1}/${retries}) customEvents=${(data.customEvents||[]).length}件 stocks=${(data.stocks||[]).length}件`);
      return true;
    } catch (e) {
      console.error(`[Supabase] 保存失敗 (試行${attempt+1}/${retries}):`, e);
      if (attempt < retries - 1) {
        // 1秒、2秒待ってからリトライ
        await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
      }
    }
  }
  console.error("[Supabase] 3回試して保存失敗。ローカルキャッシュには保存済み。");
  return false;
}

// ローカルキャッシュから読み込み（DEFAULT_DATAとマージして互換性を保つ）
function loadFromCache() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    if (r) {
      const parsed = JSON.parse(r);
      // 古いキャッシュに新キーが無くてもクラッシュしないよう、DEFAULT_DATAをベースにマージ
      return { ...DEFAULT_DATA, ...parsed };
    }
  } catch {}
  return null;
}

// リモートデータをマージ（同様に互換性確保）
function mergeWithDefault(remote) {
  if (!remote) return null;
  return { ...DEFAULT_DATA, ...remote };
}

// フォーム入力中かどうか判定（input/textarea/selectにフォーカスがあれば編集中とみなす）
function isUserEditing() {
  const tag = document.activeElement?.tagName;
  return tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT";
}

// ============== PINロック関連 ==============
const PIN_KEY = "hikari_pin";
const PIN_UNLOCK_KEY = "hikari_pin_unlocked_at";
const PIN_LOCK_DURATION = 24 * 60 * 60 * 1000; // 24時間

function getPin() {
  try { return localStorage.getItem(PIN_KEY); } catch { return null; }
}
function setPin(pin) {
  try { localStorage.setItem(PIN_KEY, pin); } catch {}
}
function clearPin() {
  try { localStorage.removeItem(PIN_KEY); localStorage.removeItem(PIN_UNLOCK_KEY); } catch {}
}
function isUnlocked() {
  const pin = getPin();
  if (!pin) return true; // PIN未設定なら認証スキップ
  try {
    const at = Number(localStorage.getItem(PIN_UNLOCK_KEY));
    if (!at) return false;
    return Date.now() - at < PIN_LOCK_DURATION;
  } catch { return false; }
}
function markUnlocked() {
  try { localStorage.setItem(PIN_UNLOCK_KEY, String(Date.now())); } catch {}
}

// ============== 画像圧縮関数（写真添付用）==============
// 画像ファイルを受け取って、リサイズ＆圧縮してbase64で返す
async function compressImage(file, maxSize = 800, quality = 0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let { width, height } = img;
        if (width > height && width > maxSize) {
          height = Math.round((height * maxSize) / width);
          width = maxSize;
        } else if (height > maxSize) {
          width = Math.round((width * maxSize) / height);
          height = maxSize;
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ===================== PIN画面 =====================
function PinScreen({ onUnlock }) {
  const hasPin = !!getPin();
  const [mode, setMode] = useState(hasPin ? "verify" : "setup"); // verify | setup | confirm
  const [pin, setPinInput] = useState("");
  const [pinConfirm, setPinConfirm] = useState("");
  const [error, setError] = useState("");

  const handleVerify = () => {
    if (pin === getPin()) {
      markUnlocked();
      onUnlock();
    } else {
      setError("PINが違います");
      setPinInput("");
    }
  };

  const handleSetup = () => {
    if (pin.length !== 4) { setError("4桁で入力してください"); return; }
    setMode("confirm");
    setError("");
  };

  const handleConfirm = () => {
    if (pinConfirm === pin) {
      setPin(pin);
      markUnlocked();
      onUnlock();
    } else {
      setError("PINが一致しません");
      setPinConfirm("");
    }
  };

  const title = mode === "verify" ? "🔒 PINを入力" : mode === "setup" ? "🔐 PIN設定（初回）" : "🔐 もう一度入力";
  const desc = mode === "verify" ? "アプリ起動用の4桁PINを入力してください" : mode === "setup" ? "4桁のPINを設定してください。次回起動時から必要になります。" : "確認のためもう一度同じPINを入力してください";

  const currentValue = mode === "confirm" ? pinConfirm : pin;
  const setCurrentValue = mode === "confirm" ? setPinConfirm : setPinInput;
  const handleSubmit = mode === "verify" ? handleVerify : mode === "setup" ? handleSetup : handleConfirm;

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 20, fontFamily: "'Noto Sans JP', sans-serif" }}>
      <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 18, padding: "30px 24px", maxWidth: 360, width: "100%" }}>
        <div style={{ fontSize: 18, fontWeight: 800, color: C.text, marginBottom: 8, textAlign: "center" }}>{title}</div>
        <div style={{ fontSize: 12, color: C.muted, marginBottom: 24, textAlign: "center", lineHeight: 1.6 }}>{desc}</div>
        <input
          type="password"
          inputMode="numeric"
          maxLength={4}
          value={currentValue}
          onChange={e => { setCurrentValue(e.target.value.replace(/[^0-9]/g, "")); setError(""); }}
          onKeyDown={e => { if (e.key === "Enter") handleSubmit(); }}
          placeholder="••••"
          autoFocus
          style={{ ...inp, fontSize: 32, textAlign: "center", letterSpacing: "0.5em", padding: "16px", marginBottom: 12 }}
        />
        {error && <div style={{ color: C.danger, fontSize: 13, textAlign: "center", marginBottom: 12 }}>{error}</div>}
        <button onClick={handleSubmit} style={{ ...btnStyle(), width: "100%", padding: "14px", fontSize: 15 }}>
          {mode === "verify" ? "ロック解除" : mode === "setup" ? "次へ" : "設定完了"}
        </button>
        {mode === "verify" && (
          <button
            onClick={() => { if (window.confirm("PINをリセットしますか？\nリセットすると再設定が必要になります。")) { clearPin(); setMode("setup"); setPinInput(""); setError(""); } }}
            style={{ background: "none", border: "none", color: C.muted, fontSize: 12, marginTop: 16, width: "100%", cursor: "pointer", fontFamily: "inherit" }}
          >
            PINを忘れた場合（リセット）
          </button>
        )}
      </div>
      <div style={{ marginTop: 14, fontSize: 10, color: C.muted }}>ひかり不動産</div>
    </div>
  );
}

function MainApp({ onLock, onSwitchUser }) {
  const [page, setPage] = useState("dashboard");
  const [data, setDataRaw] = useState(() => loadFromCache() || DEFAULT_DATA);
  const [savedMsg, setSavedMsg] = useState(false);
  const [syncing, setSyncing] = useState(true);
  const [syncError, setSyncError] = useState(false);

  // 直近の自分の保存時刻（ポーリングで自分の更新を上書きしないため）
  const lastLocalSaveRef = useRef(0);

  // ローカル(キャッシュ)とリモートを賢くマージする関数
  // リモートに該当キーが空配列で、ローカルには中身がある場合、ローカルを優先（データ消失防止）
  const mergeRemoteSafely = (remote) => {
    if (!remote) return null;
    const local = loadFromCache();
    const merged = mergeWithDefault(remote);
    if (!local) return merged;

    // 配列フィールドで「リモートが空 or 少ない」「ローカルが多い」場合、ローカルを優先
    // これによりSupabase保存失敗時のデータ消失を防ぐ
    const arrayKeys = ["customEvents", "stocks", "approaches", "jiage", "owners", "yakusho", "sekisan", "activityLog"];
    arrayKeys.forEach(k => {
      const localArr = Array.isArray(local[k]) ? local[k] : [];
      const remoteArr = Array.isArray(merged[k]) ? merged[k] : [];
      // ローカルにあってリモートにないIDのアイテムを保護
      const remoteIds = new Set(remoteArr.map(item => item?.id).filter(id => id != null));
      const protectedItems = localArr.filter(item => item?.id != null && !remoteIds.has(item.id));
      if (protectedItems.length > 0) {
        console.log(`[Sync] ${k}: ローカル限定の${protectedItems.length}件を保護してマージ`);
        merged[k] = [...remoteArr, ...protectedItems];
      }
    });
    return merged;
  };

  // 起動時にSupabaseから最新データを取得
  useEffect(() => {
    loadFromSupabase().then(remote => {
      const merged = mergeRemoteSafely(remote);
      if (merged) {
        setDataRaw(merged);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(merged)); } catch {}
      }
      setSyncing(false);
    }).catch(() => {
      setSyncing(false);
      setSyncError(true);
    });
  }, []);

  // ポーリング：15秒ごとに最新データを取得（他のメンバーの更新を素早く反映）
  // ただし「自分が30秒以内に保存した」or「ユーザーが入力中」の時はスキップして、編集中のデータが消えないようにする
  useEffect(() => {
    const timer = setInterval(() => {
      if (Date.now() - lastLocalSaveRef.current < 30000) return; // 直近の自分の保存はスキップ
      if (isUserEditing()) return; // 入力中はスキップ
      loadFromSupabase().then(remote => {
        const merged = mergeRemoteSafely(remote);
        if (merged) {
          setDataRaw(merged);
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(merged)); } catch {}
        }
      });
    }, 15000);
    return () => clearInterval(timer);
  }, []);

  const setData = updater => {
    setDataRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      // 自分の保存時刻を記録（ポーリング上書き防止用）
      lastLocalSaveRef.current = Date.now();
      // Supabaseに保存（非同期）
      saveToSupabase(next).then(ok => {
        if (ok) {
          setSavedMsg(true);
          setSyncError(false);
          setTimeout(() => setSavedMsg(false), 2000);
        } else {
          // 3回試して失敗 → ユーザーに警告表示
          setSyncError(true);
          setSavedMsg(false);
        }
      });
      // ローカルにも即時保存
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch {}
      return next;
    });
  };

  const isMapPage = page === "jiage";

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'Noto Sans JP', 'Hiragino Sans', sans-serif", paddingBottom: isMapPage ? 60 : 80 }}>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ background: "#0d1422", borderBottom: `1px solid #1a2535`, padding: "12px 16px", position: "sticky", top: 0, zIndex: 100, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontSize: 16, fontWeight: 800, color: C.text, letterSpacing: "-0.01em" }}>ひかり不動産</div>
          <div style={{ fontSize: 10, marginTop: 1, color: syncing ? C.warn : savedMsg ? C.success : syncError ? C.danger : C.muted }}>
            {syncing ? "⟳ 同期中..." : savedMsg ? "✓ 保存・同期完了" : syncError ? "⚠ オフライン（ローカル保存）" : "☁ クラウド同期済み"}
          </div>
        </div>
        <div style={{ fontSize: 12, color: C.muted }}>{new Date().toLocaleDateString("ja-JP", { month: "short", day: "numeric", weekday: "short" })}</div>
      </div>

      {/* 同期中ローディング */}
      {syncing && (
        <div style={{ background: C.warn + "22", border: `1px solid ${C.warn}44`, margin: "8px 16px", borderRadius: 10, padding: "10px 14px", fontSize: 13, color: C.warn, textAlign: "center" }}>
          ⟳ 最新データを取得中...
        </div>
      )}

      {/* Content */}
      <div style={{ padding: isMapPage ? "0" : "16px 16px 20px" }}>
        {page === "dashboard" && <Dashboard data={data} setData={setData} />}
        {page === "stock" && <StockPage data={data} setData={setData} />}
        {page === "approach" && <ApproachPage data={data} setData={setData} />}
        {page === "jiage" && <JiagePage data={data} setData={setData} />}
        {page === "more" && <MorePage data={data} setData={setData} onLock={onLock} onSwitchUser={onSwitchUser} />}
      </div>

      {/* Bottom Navigation */}
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#0d1422", borderTop: `1px solid #1a2535`, display: "flex", zIndex: 200, paddingBottom: "env(safe-area-inset-bottom)" }}>
        {PAGES.map(p => (
          <button key={p.key} onClick={() => setPage(p.key)} style={{
            flex: 1, background: "none", border: "none", padding: "10px 4px 8px",
            color: page === p.key ? C.accent : C.muted, cursor: "pointer", fontFamily: "inherit",
            display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
            touchAction: "manipulation", WebkitTapHighlightColor: "transparent",
            borderTop: `2px solid ${page === p.key ? C.accent : "transparent"}`,
          }}>
            <span style={{ fontSize: 20 }}>{p.icon}</span>
            <span style={{ fontSize: 10, fontWeight: page === p.key ? 700 : 400 }}>{p.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// カンマ区切り数字入力（スピナーなし・手入力対応）
function MoneyInput({ value, onChange, placeholder, style: extraStyle }) {
  const [focused, setFocused] = useState(false);
  const num = parseFloat(String(value || "").replace(/,/g, ""));
  const display = focused || isNaN(num) || value === ""
    ? String(value || "")
    : num.toLocaleString("ja-JP");

  const handleChange = e => {
    const raw = e.target.value.replace(/[^0-9.]/g, "");
    onChange(raw);
  };

  return (
    <input
      type="text"
      inputMode="numeric"
      value={display}
      onChange={handleChange}
      onFocus={() => setFocused(true)}
      onBlur={() => setFocused(false)}
      placeholder={placeholder}
      style={{ ...inp, MozAppearance: "textfield", WebkitAppearance: "none", ...(extraStyle || {}) }}
    />
  );
}

// NInp用の内部コンポーネント（入力中はraw、blur後はカンマ整形）
function NInpInner({ value, onChange, onBlur, placeholder, suffix }) {
  const [focused, setFocused] = useState(false);
  const num = parseFloat(value);
  const display = focused || isNaN(num) || value === ""
    ? value
    : num.toLocaleString("ja-JP");
  return (
    <div style={{ position: "relative" }}>
      <input
        type="text"
        inputMode="decimal"
        value={display}
        onChange={onChange}
        onFocus={() => setFocused(true)}
        onBlur={e => { setFocused(false); onBlur && onBlur(e); }}

      {suffix && <span style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", color: C.muted, fontSize: 13 }}>{suffix}</span>}

}

// 積算表用の数字入力（formとsetFormを外から受け取る）
function SekisanNInp({ fkey, placeholder, suffix, form, setForm }) {
  const raw = String(form[fkey] ?? "");
  const handleChange = e => {
    const v = e.target.value.replace(/[^0-9.]/g, "");
    setForm(p => ({ ...p, [fkey]: v }));
  };
  return <NInpInner value={raw} onChange={handleChange} placeholder={placeholder} suffix={suffix} />;
}

function FilterChips({ options, value, onChange, multi = false }) {
  const selected = multi ? (Array.isArray(value) ? value : []) : value;
  const toggle = opt => {
    if (multi) {
      const arr = Array.isArray(value) ? value : [];
      onChange(arr.includes(opt) ? arr.filter(v => v !== opt) : [...arr, opt]);
    } else {
      onChange(value === opt ? "すべて" : opt);
    }
  };
  return (
    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
      {options.map(opt => {
        const isActive = multi ? selected.includes(opt) : selected === opt;
        return (
          <button key={opt} onClick={() => toggle(opt)} style={{
            padding: "7px 13px", borderRadius: 20, cursor: "pointer", fontSize: 13,
            background: isActive ? C.accent : "#0d1422",
            color: isActive ? "#fff" : C.muted,
            border: `1px solid ${isActive ? C.accent : "#1a2535"}`,
            whiteSpace: "nowrap", fontFamily: "inherit", touchAction: "manipulation",
          }}>{opt}</button>
        );
      })}
    </div>
  );
}

// ===================== DASHBOARD =====================
function Dashboard({ data, setData }) {
  const today = new Date().toISOString().split("T")[0];
  const currentYear = new Date().getFullYear();
  // 権限制御用
  const currentUser = getCurrentUser();
  const adminMember = data.adminMember || "下田";
  const isAdmin = currentUser === adminMember;
  const canEdit = (item) => canEditItem(item, currentUser, adminMember);
  const [selectedYear, setSelectedYear] = useState(currentYear);
  const [showGoalEdit, setShowGoalEdit] = useState(false);
  const [goalForm, setGoalForm] = useState({
    sell: String((data.annualGoals?.sell) ?? 30000),
    profit: String((data.annualGoals?.profit) ?? 6000),
    buyCount: String((data.annualGoals?.buyCount) ?? 30),
  });

  // ===== クイック編集用 state =====
  const [quickEditStock, setQuickEditStock] = useState(null);
  const [quickEditForm, setQuickEditForm] = useState(null);
  const [quickEditJiage, setQuickEditJiage] = useState(null);
  const [quickEditJiageForm, setQuickEditJiageForm] = useState(null);
  const [quickEditOwner, setQuickEditOwner] = useState(null);
  const [quickEditOwnerForm, setQuickEditOwnerForm] = useState(null);

  const openQuickEdit = (stock) => {
    if (!canEdit(stock)) {
      alert(`⚠️ 編集権限がありません\n\nこの物件の担当者は「${stock.assignee}」さんです。\n管理者（${adminMember}）または担当者本人のみ編集できます。`);
      return;
    }
    setQuickEditStock(stock);
    setQuickEditForm({
      ...stock,
      buyCost: String(stock.buyCost || ""),
      sellPrice: String(stock.sellPrice || ""),
    });
  };

  const saveQuickEdit = () => {
    if (!quickEditStock || !quickEditForm) return;
    // 保険：保存時の権限チェック
    if (!canEdit(quickEditStock)) { alert("⚠️ 編集権限がありません"); setQuickEditStock(null); setQuickEditForm(null); return; }
    const updated = {
      ...quickEditStock,
      ...quickEditForm,
      buyCost: Number(quickEditForm.buyCost) || 0,
      sellPrice: Number(quickEditForm.sellPrice) || 0,
    };
    setData(d => {
      const next = { ...d, stocks: d.stocks.map(s => s.id === quickEditStock.id ? updated : s) };
      return appendLog(next, "update", "stock", `${updated.name || "(無題)"}（${updated.status}）をホームから編集`);
    });
    setQuickEditStock(null);
    setQuickEditForm(null);
  };

  const openJiageEdit = (j) => {
    setQuickEditJiage(j);
    setQuickEditJiageForm({ ...j });
  };

  const saveJiageEdit = () => {
    if (!quickEditJiage || !quickEditJiageForm) return;
    const updated = { ...quickEditJiage, ...quickEditJiageForm };
    setData(d => {
      const next = { ...d, jiage: d.jiage.map(j => j.id === quickEditJiage.id ? updated : j) };
      return appendLog(next, "update", "jiage", `${updated.address || "(無住所)"}（${updated.status}）をホームから編集`);
    });
    setQuickEditJiage(null);
    setQuickEditJiageForm(null);
  };

  const openOwnerEdit = (o) => {
    setQuickEditOwner(o);
    setQuickEditOwnerForm({ ...o });
  };

  const saveOwnerEdit = () => {
    if (!quickEditOwner || !quickEditOwnerForm) return;
    const updated = { ...quickEditOwner, ...quickEditOwnerForm };
    setData(d => {
      const next = { ...d, owners: d.owners.map(o => o.id === quickEditOwner.id ? updated : o) };
      return appendLog(next, "update", "owner", `${updated.address || "(無住所)"}（${updated.status}）をホームから編集`);
    });
    setQuickEditOwner(null);
    setQuickEditOwnerForm(null);
  };

  // ===== カレンダー用 state =====
  const [calMode, setCalMode] = useState("month"); // "month" | "week"
  const [calCursor, setCalCursor] = useState(() => new Date());
  const [calSelectedDate, setCalSelectedDate] = useState(today);
  const [calFilterType, setCalFilterType] = useState("all");
  const [calFilterMember, setCalFilterMember] = useState("__ALL__");
  const [calShowFilters, setCalShowFilters] = useState(false); // フィルター展開状態
  const [showEventForm, setShowEventForm] = useState(false);
  const [editingEvent, setEditingEvent] = useState(null);
  const eventEmpty = { title: "", date: today, time: "", location: "", memo: "", assignees: [], reminderMinutes: 0 };
  const [eventForm, setEventForm] = useState(eventEmpty);

  const openNewEvent = (dateStr) => {
    setEventForm({ ...eventEmpty, date: dateStr || calSelectedDate });
    setEditingEvent(null);
    setShowEventForm(true);
  };

  const openEditEvent = (ev) => {
    if (!canEdit(ev)) {
      const assigneeLabel = (ev.assignees || []).length > 0 ? ev.assignees.join("・") : (ev.createdBy || "他のメンバー");
      alert(`⚠️ 編集権限がありません\n\nこの予定の担当者/作成者は「${assigneeLabel}」です。\n管理者（${adminMember}）または担当者本人のみ編集できます。`);
      return;
    }
    setEventForm({
      title: ev.title || "",
      date: ev.date || today,
      time: ev.time || "",
      location: ev.location || "",
      memo: ev.memo || "",
      // 旧データの assignee (単一) も吸収して assignees (配列) に統一
      assignees: ev.assignees || (ev.assignee ? [ev.assignee] : []),
      reminderMinutes: ev.reminderMinutes || 0,
    });
    setEditingEvent(ev);
    setShowEventForm(true);
  };

  const handleSaveEvent = () => {
    if (!eventForm.title.trim()) { alert("タイトルを入力してください"); return; }
    if (!eventForm.date) { alert("日付を入力してください"); return; }
    // 保険：編集時の権限チェック
    if (editingEvent && !canEdit(editingEvent)) {
      alert("⚠️ 編集権限がありません");
      setShowEventForm(false); setEditingEvent(null);
      return;
    }
    const me = getCurrentUser() || "未設定";
    const assignees = eventForm.assignees || [];
    // 自分が作成者の場合は、自分への通知はスキップ済みとしてマーク（重複通知防止）
    const initialNotifiedTo = {};
    if (me && assignees.includes(me)) initialNotifiedTo[me] = true;

    const item = {
      id: editingEvent?.id || Date.now(),
      title: eventForm.title,
      date: eventForm.date,
      time: eventForm.time,
      location: eventForm.location,
      memo: eventForm.memo,
      assignees,
      reminderMinutes: eventForm.reminderMinutes || 0,
      createdAt: editingEvent?.createdAt || new Date().toISOString(),
      createdBy: editingEvent?.createdBy || me,
      notified: editingEvent?.notified || false,
      newNotifiedTo: editingEvent?.newNotifiedTo || initialNotifiedTo,
    };
    setData(d => {
      const next = { ...d, customEvents: editingEvent
        ? (d.customEvents || []).map(e => e.id === editingEvent.id ? item : e)
        : [...(d.customEvents || []), item] };
      const assigneeLabel = item.assignees.length > 0 ? `（${item.assignees.join("・")}）` : "";
      return appendLog(next, editingEvent ? "update" : "add", "event", `予定「${item.title}」${assigneeLabel}（${item.date}${item.time ? " " + item.time : ""}）`);
    });
    setShowEventForm(false);
    setEditingEvent(null);

    // リマインダーが設定されてたら通知許可をリクエスト
    if (item.reminderMinutes > 0 && "Notification" in window && Notification.permission === "default") {
      Notification.requestPermission();
    }

    // ★ Web Push 送信：担当者の端末にリアルタイム通知（アプリ閉じてても届く）
    if (!editingEvent && assignees.length > 0) {
      const otherAssignees = assignees.filter(a => a !== me);
      const allTargets = expandAssignees(otherAssignees); // 「比嘉・下田」など分解
      if (allTargets.length > 0) {
        const dateLabel = `${item.date}${item.time ? " " + item.time : ""}`;
        const pushTitle = `📅 新しい予定: ${item.title}`;
        const pushBody = `${dateLabel}${item.location ? " @" + item.location : ""}\n作成者: ${me}${item.memo ? "\n" + item.memo : ""}`;
        sendPushNotification(allTargets, pushTitle, pushBody, { tag: `hikari-new-event-${item.id}` });
      }
    }
  };

  const handleDeleteEvent = (id) => {
    const target = (data.customEvents || []).find(e => e.id === id);
    if (!target) return;
    if (!canEdit(target)) {
      const assigneeLabel = (target.assignees || []).length > 0 ? target.assignees.join("・") : (target.createdBy || "他のメンバー");
      alert(`⚠️ 削除権限がありません\n\nこの予定の担当者/作成者は「${assigneeLabel}」です。\n管理者（${adminMember}）または担当者本人のみ削除できます。`);
      return;
    }
    if (!window.confirm(`予定「${target.title}」を削除しますか？`)) return;
    setData(d => {
      const next = { ...d, customEvents: (d.customEvents || []).filter(e => e.id !== id) };
      return appendLog(next, "delete", "event", `予定「${target.title}」を削除`);
    });
  };

  // ===== リマインダー：1分ごとに通知すべきイベントをチェック =====
  useEffect(() => {
    if (!("Notification" in window)) return;
    const check = () => {
      if (Notification.permission !== "granted") return;
      const now = new Date();
      (data.customEvents || []).forEach(ev => {
        if (ev.notified) return;
        if (!ev.time || !ev.reminderMinutes) return;
        const [h, m] = (ev.time || "00:00").split(":").map(Number);
        const evTime = new Date(ev.date);
        evTime.setHours(h || 0, m || 0, 0, 0);
        const remindAt = new Date(evTime.getTime() - ev.reminderMinutes * 60000);
        if (remindAt <= now && now < evTime) {
          // ▼自分が担当者に含まれているかチェック（「比嘉・下田」のような連結も分解判定）
          const me = getCurrentUser();
          const assignees = ev.assignees || (ev.assignee ? [ev.assignee] : []);
          const isForMe = !me || assignees.length === 0 || isAssignedTo(assignees, me);
          if (!isForMe) {
            // 自分宛じゃないなら通知済みフラグだけ立てる
            setData(d => ({
              ...d,
              customEvents: (d.customEvents || []).map(e => e.id === ev.id ? { ...e, notified: true } : e)
            }));
            return;
          }
          const title = `📅 ${ev.title}`;
          const body = `${ev.time}〜${ev.location ? " @" + ev.location : ""}${ev.memo ? "\n" + ev.memo : ""}`;
          const tag = `hikari-event-${ev.id}`;
          // Service Worker 経由で通知（バックグラウンドでも動作）
          if (navigator.serviceWorker && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({
              type: 'SHOW_NOTIFICATION', title, body, tag,
            });
          } else {
            // SW未登録ならフォールバックでNotification API
            try { new Notification(title, { body, tag }); } catch (err) {}
          }
          // 通知済みフラグを立てる
          setData(d => ({
            ...d,
            customEvents: (d.customEvents || []).map(e => e.id === ev.id ? { ...e, notified: true } : e)
          }));
        }
      });
    };
    check();
    const timer = setInterval(check, 60000);
    return () => clearInterval(timer);
  }, [data.customEvents]);

  // ===== 新規予定の即時通知：data.customEventsが変化するたびに、自分宛の未通知予定をチェック =====
  // 別端末で作成された予定 → 自分の端末が30秒ポーリングで取得 → 即通知される仕組み
  useEffect(() => {
    if (!("Notification" in window)) return;
    if (Notification.permission !== "granted") return;
    const me = getCurrentUser();
    if (!me) return; // 「現在のユーザー」未設定なら通知できない

    (data.customEvents || []).forEach(ev => {
      const assignees = ev.assignees || (ev.assignee ? [ev.assignee] : []);
      if (assignees.length === 0) return; // 担当者なしならスキップ
      if (!isAssignedTo(assignees, me)) return; // 自分が担当者じゃないならスキップ

      const newNotifiedTo = ev.newNotifiedTo || {};
      if (newNotifiedTo[me]) return; // 既に自分に通知済み
      if (ev.createdBy === me) {
        // 自分が作成者の場合は通知不要だが、フラグだけ立てる（他端末で同じユーザーログインしてた時の重複防止）
        setData(d => ({
          ...d,
          customEvents: (d.customEvents || []).map(e =>
            e.id === ev.id
              ? { ...e, newNotifiedTo: { ...(e.newNotifiedTo || {}), [me]: true } }
              : e
          )
        }));
        return;
      }

      // 通知発火！
      const dateLabel = `${ev.date}${ev.time ? " " + ev.time : ""}`;
      const title = `📅 新しい予定: ${ev.title}`;
      const body = `${dateLabel}${ev.location ? " @" + ev.location : ""}\n作成者: ${ev.createdBy || "未設定"}${ev.memo ? "\n" + ev.memo : ""}`;
      const tag = `hikari-new-event-${ev.id}`;

      if (navigator.serviceWorker && navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({
          type: 'SHOW_NOTIFICATION', title, body, tag,
        });
      } else {
        try { new Notification(title, { body, tag }); } catch (e) {}
      }

      // 通知済みフラグ（メンバー別）を立てる
      setData(d => ({
        ...d,
        customEvents: (d.customEvents || []).map(e =>
          e.id === ev.id
            ? { ...e, newNotifiedTo: { ...(e.newNotifiedTo || {}), [me]: true } }
            : e
        )
      }));
    });
  }, [data.customEvents]);

  // 既存データから全カレンダーイベントを集計
  const calEvents = useMemo(() => {
    const list = [];
    (data.jiage || []).forEach(j => {
      if (j.nextVisit) list.push({ date: j.nextVisit, type: "jiage", icon: "🗺️", color: C.purple, title: j.address || "(無住所)", sub: `訪問予定・${j.status}`, assignee: j.assignee });
    });
    (data.owners || []).forEach(o => {
      if (o.nextFollowDate) list.push({ date: o.nextFollowDate, type: "owner", icon: "👤", color: C.accent, title: o.address || "(無住所)", sub: `所有者フォロー・${o.status}`, assignee: o.assignee });
    });
    (data.sekisan || []).forEach(s => {
      if (s.createdAt) list.push({ date: s.createdAt, type: "sekisan", icon: "🧮", color: C.danger, title: s.address || "(無住所)", sub: `仕入検討・${s.judgment}`, assignee: s.assignee });
    });
    (data.stocks || []).forEach(s => {
      if (s.buyContractDate) list.push({ date: s.buyContractDate, type: "buyContract", icon: "📝", color: "#a855f7", title: s.name || "(無題)", sub: "仕入契約", assignee: s.assignee });
      if (s.buyDate) list.push({ date: s.buyDate, type: "buy", icon: "🏠", color: C.success, title: s.name || "(無題)", sub: "仕入決済", assignee: s.assignee });
      if (s.sellContractDate) list.push({ date: s.sellContractDate, type: "sellContract", icon: "📋", color: C.accent, title: s.name || "(無題)", sub: "売却契約", assignee: s.assignee });
      if (s.sellDate) list.push({ date: s.sellDate, type: "sell", icon: "✅", color: C.warn, title: s.name || "(無題)", sub: "売却決済", assignee: s.assignee });
      (s.viewings || []).forEach(v => {
        // 案内日があれば案内日でカレンダー表示、なければ反響日（任意）でなくスキップ
        const eventDate = v.visitDate || "";
        if (eventDate) {
          const tags = [];
          if (v.prospect) tags.push(`${(PROSPECT_INFO[v.prospect]||{}).icon||""}${v.prospect}`);
          if (v.purpose) tags.push(`🎯${v.purpose}`);
          if (v.funding) tags.push(`💰${v.funding}`);
          const timePrefix = v.visitTime ? `${v.visitTime} ` : "";
          // 案内予定の担当者：物件担当者＋「比嘉・下田」（重複除く）
          const assignees = [];
          if (s.assignee) assignees.push(s.assignee);
          if (!assignees.includes("比嘉・下田")) assignees.push("比嘉・下田");
          list.push({
            date: eventDate, type: "viewing", icon: "👀", color: "#06b6d4",
            title: `${timePrefix}${s.name || "(無題)"}`,
            sub: `案内・${v.customer || "顧客未設定"}${tags.length ? "（" + tags.join(" ") + "）" : ""}${v.note ? " | " + v.note : ""}`,
            assignee: s.assignee,
            assignees,
            time: v.visitTime || "",
          });
        }
      });
    });
    // カスタム予定
    (data.customEvents || []).forEach(ev => {
      // 旧データの assignee (単一) も吸収
      const assignees = ev.assignees || (ev.assignee ? [ev.assignee] : []);
      list.push({
        date: ev.date, type: "custom", icon: "📌", color: "#f97316",
        title: ev.title,
        sub: `${ev.time ? ev.time + "〜" : ""}${ev.location ? " @" + ev.location : ""}${ev.memo ? " | " + ev.memo : ""}`,
        assignee: assignees[0] || "", // 後方互換
        assignees, // 配列で保持
        time: ev.time,
        location: ev.location,
        memo: ev.memo,
        reminderMinutes: ev.reminderMinutes,
        rawId: ev.id,
        isCustom: true,
      });
    });
    return list;
  }, [data.jiage, data.owners, data.stocks, data.sekisan, data.customEvents]);

  // フィルター適用
  const calFilteredEvents = useMemo(() => calEvents.filter(e => {
    if (calFilterType !== "all" && e.type !== calFilterType) return false;
    if (calFilterMember !== "__ALL__") {
      // assignees配列があればそれを優先、なければ単一assigneeで判定
      // 「比嘉・下田」のような連結担当者も分解して判定する
      if (e.assignees && e.assignees.length > 0) {
        if (!isAssignedTo(e.assignees, calFilterMember)) return false;
      } else {
        if (!isAssignedTo([e.assignee], calFilterMember)) return false;
      }
    }
    return true;
  }), [calEvents, calFilterType, calFilterMember]);

  // 日付ごとにマッピング
  const calEventsByDate = useMemo(() => {
    const m = {};
    calFilteredEvents.forEach(e => { (m[e.date] ||= []).push(e); });
    return m;
  }, [calFilteredEvents]);

  // 月の42日（6週分）を生成
  const calMonthDays = useMemo(() => {
    const y = calCursor.getFullYear(), mo = calCursor.getMonth();
    const firstDay = new Date(y, mo, 1).getDay(); // 0=日
    const lastDate = new Date(y, mo + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < firstDay; i++) cells.push(null);
    for (let d = 1; d <= lastDate; d++) cells.push(new Date(y, mo, d));
    while (cells.length < 42) cells.push(null);
    return cells;
  }, [calCursor]);

  // 週の7日を生成（calCursorを含む週）
  const calWeekDays = useMemo(() => {
    const d = new Date(calCursor);
    const sunday = new Date(d);
    sunday.setDate(d.getDate() - d.getDay());
    return [0,1,2,3,4,5,6].map(i => { const dd = new Date(sunday); dd.setDate(sunday.getDate() + i); return dd; });
  }, [calCursor]);

  const fmtDate = d => d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}` : null;
  const selectedEvents = calEventsByDate[calSelectedDate] || [];

  const availableYears = useMemo(() => {
    const years = new Set([currentYear]);
    data.stocks.forEach(s => {
      if (s.buyDate) years.add(parseInt(s.buyDate.slice(0, 4)));
      if (s.sellDate) years.add(parseInt(s.sellDate.slice(0, 4)));
    });
    return [...years].sort((a, b) => b - a);
  }, [data.stocks]);

  const nv = v => parseFloat(String(v || "").replace(/,/g, "")) || 0;

  const yearCompleted = useMemo(() =>
    data.stocks.filter(s => s.status === "決済完了" && (s.sellDate || "").startsWith(String(selectedYear))),
    [data.stocks, selectedYear]);

  const yearBought = useMemo(() =>
    data.stocks.filter(s => (s.buyDate || "").startsWith(String(selectedYear))),
    [data.stocks, selectedYear]);

  const active = data.stocks.filter(s => s.status !== "決済完了");
  const jiageToday = (data.jiage || []).filter(j => j.nextVisit === today);
  const ownerToday = (data.owners || []).filter(o => o.nextFollowDate === today);

  // 滞留警告：90日超・180日超の在庫を抽出（決済完了除外）
  const stagnant90 = active.filter(s => {
    const d = daysSinceBuy(s.buyDate);
    return d != null && d >= 90 && d < 180;
  });
  const stagnant180 = active.filter(s => {
    const d = daysSinceBuy(s.buyDate);
    return d != null && d >= 180;
  });

  // 役所調査リマインダー：仕入契約済/リフォーム関連の物件で、役所調査シートがない物件を抽出
  const needYakushoStatuses = ["仕入契約済", "リフォーム待ち", "リフォーム中"];
  const needYakusho = active.filter(s => {
    if (!needYakushoStatuses.includes(s.status)) return false;
    // 役所調査シートの住所と一致するものがあれば除外
    return !(data.yakusho || []).some(y => y.address && s.name && y.address.includes(s.name));
  });

  const yearSell = yearCompleted.reduce((a, s) => a + nv(s.sellPrice), 0);
  const yearProfit = yearCompleted.reduce((a, s) => a + (nv(s.sellPrice) - nv(s.buyCost)), 0);
  const avgProfit = yearCompleted.length > 0 ? yearProfit / yearCompleted.length : 0;
  const avgProfitRate = yearCompleted.length > 0
    ? yearCompleted.reduce((a, s) => {
        const sp = nv(s.sellPrice); const bc = nv(s.buyCost);
        return a + (sp > 0 ? (sp - bc) / sp * 100 : 0);
      }, 0) / yearCompleted.length : 0;

  const monthlyData = useMemo(() => {
    return Array.from({ length: 12 }, (_, i) => {
      const m = i + 1;
      const ym = `${selectedYear}-${String(m).padStart(2, "0")}`;
      const sold = data.stocks.filter(s => (s.sellDate || "").startsWith(ym));
      const bought = data.stocks.filter(s => (s.buyDate || "").startsWith(ym));
      return {
        month: m + "月",
        sell: sold.reduce((a, s) => a + nv(s.sellPrice), 0) / 10000,
        profit: sold.reduce((a, s) => a + (nv(s.sellPrice) - nv(s.buyCost)), 0) / 10000,
        sellCount: sold.filter(s => s.status === "決済完了").length,
        buyCount: bought.length,
      };
    });
  }, [data.stocks, selectedYear]);

  const memberData = useMemo(() => {
    return MEMBERS.map(m => {
      const done = yearCompleted.filter(s => s.assignee === m);
      const bought = yearBought.filter(s => s.assignee === m);
      const profit = done.reduce((a, s) => a + (nv(s.sellPrice) - nv(s.buyCost)), 0);
      const sell = done.reduce((a, s) => a + nv(s.sellPrice), 0);
      const profitRate = done.length > 0
        ? done.reduce((a, s) => { const sp = nv(s.sellPrice); const bc = nv(s.buyCost); return a + (sp > 0 ? (sp - bc) / sp * 100 : 0); }, 0) / done.length : 0;
      return { name: m, 売上万: Math.round(sell / 10000), 利益万: Math.round(profit / 10000), 仕入件数: bought.length, 売却件数: done.length, 利益率: Math.round(profitRate * 10) / 10 };
    }).filter(m => m.仕入件数 > 0 || m.売却件数 > 0);
  }, [data.stocks, selectedYear]);

  const statusData = useMemo(() => {
    const map = {};
    active.forEach(s => { map[s.status] = (map[s.status] || 0) + 1; });
    return Object.entries(map).map(([name, value]) => ({ name, value }));
  }, [active]);

  const PIE_COLORS = [C.accent, C.success, C.warn, C.purple, C.danger, "#06b6d4"];

  const StatCard = ({ label, value, sub, color, icon }) => (
    <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 12, padding: "13px 14px", flex: 1, minWidth: 90 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 6 }}>
        <span style={{ fontSize: 13 }}>{icon}</span>
        <span style={{ color: C.muted, fontSize: 10, letterSpacing: "0.04em" }}>{label}</span>
      </div>
      <div style={{ color: color || C.text, fontSize: 22, fontWeight: 800, lineHeight: 1 }}>{value}</div>
      {sub && <div style={{ color: C.muted, fontSize: 10, marginTop: 4 }}>{sub}</div>}
    </div>
  );

  return (
    <div style={{ display: "grid", gap: 14 }}>

      {/* ============== 📅 カレンダー（最上段・Googleカレンダー風） ============== */}
      <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 0, overflow: "hidden" }}>
        {/* ヘッダー部 */}
        <div style={{ padding: "14px 14px 10px", borderBottom: `1px solid #1a2535` }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10, gap: 8 }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: C.text }}>
              {calMode === "month"
                ? `${calCursor.getFullYear()}年 ${calCursor.getMonth()+1}月`
                : `${calWeekDays[0].getFullYear()}年 ${calWeekDays[0].getMonth()+1}/${calWeekDays[0].getDate()}〜${calWeekDays[6].getMonth()+1}/${calWeekDays[6].getDate()}`}
            </div>
            <div style={{ display: "flex", background: C.bg, borderRadius: 8, padding: 2, border: `1px solid #1a2535` }}>
              {[["month", "月"], ["week", "週"]].map(([key, label]) => (
                <button key={key} onClick={() => setCalMode(key)} style={{
                  background: calMode === key ? C.accent : "none", border: "none",
                  color: calMode === key ? "#fff" : C.muted, borderRadius: 6,
                  padding: "6px 14px", cursor: "pointer", fontSize: 13, fontWeight: 700, fontFamily: "inherit",
                }}>{label}</button>
              ))}
            </div>
          </div>
          {/* ナビ＋今日＋フィルター開閉 */}
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <button onClick={() => {
              const d = new Date(calCursor);
              if (calMode === "month") d.setMonth(d.getMonth() - 1);
              else d.setDate(d.getDate() - 7);
              setCalCursor(d);
            }} style={{ background: C.accent + "22", border: `1.5px solid ${C.accent}`, color: C.accent, borderRadius: 8, width: 36, height: 32, cursor: "pointer", fontSize: 20, fontFamily: "inherit", fontWeight: 800 }}>‹</button>
            <button onClick={() => {
              const d = new Date(calCursor);
              if (calMode === "month") d.setMonth(d.getMonth() + 1);
              else d.setDate(d.getDate() + 7);
              setCalCursor(d);
            }} style={{ background: C.accent + "22", border: `1.5px solid ${C.accent}`, color: C.accent, borderRadius: 8, width: 36, height: 32, cursor: "pointer", fontSize: 20, fontFamily: "inherit", fontWeight: 800 }}>›</button>
            <button onClick={() => { setCalCursor(new Date()); setCalSelectedDate(today); }} style={{ background: C.accent + "22", border: `1px solid ${C.accent}66`, color: C.accent, borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 13, fontFamily: "inherit", fontWeight: 700 }}>今日</button>
            <div style={{ flex: 1 }} />
            <button onClick={() => setCalShowFilters(v => !v)} style={{
              background: (calFilterType !== "all" || calFilterMember !== "__ALL__") ? C.warn + "22" : "#1a2535",
              border: `1px solid ${(calFilterType !== "all" || calFilterMember !== "__ALL__") ? C.warn + "66" : "#1a2535"}`,
              color: (calFilterType !== "all" || calFilterMember !== "__ALL__") ? C.warn : C.muted,
              borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 700,
            }}>🔽 絞り込み{(calFilterType !== "all" || calFilterMember !== "__ALL__") ? " ●" : ""}</button>
          </div>

          {/* フィルター（折りたたみ） */}
          {calShowFilters && (
            <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid #1a2535` }}>
              <div style={{ fontSize: 10, color: C.muted, marginBottom: 6, fontWeight: 700 }}>種類</div>
              <div style={{ display: "flex", gap: 4, marginBottom: 10, overflowX: "auto", paddingBottom: 4 }}>
                {[
                  { key: "all", label: `全て(${calFilteredEvents.length})`, color: C.muted },
                  { key: "sekisan", label: "🧮検討", color: C.danger },
                  { key: "jiage", label: "🗺️地上げ", color: C.purple },
                  { key: "owner", label: "👤所有者", color: C.accent },
                  { key: "buyContract", label: "📝仕入契約", color: "#a855f7" },
                  { key: "buy", label: "🏠仕入決済", color: C.success },
                  { key: "viewing", label: "👀反響", color: "#06b6d4" },
                  { key: "sellContract", label: "📋売却契約", color: C.accent },
                  { key: "sell", label: "✅売却決済", color: C.warn },
                  { key: "custom", label: "📌メモ", color: "#f97316" },
                ].map(t => {
                  const active = calFilterType === t.key;
                  return (
                    <button key={t.key} onClick={() => setCalFilterType(t.key)} style={{
                      padding: "5px 11px", borderRadius: 16, cursor: "pointer", fontSize: 11,
                      background: active ? t.color : C.bg, color: active ? "#fff" : C.muted,
                      border: `1px solid ${active ? t.color : "#1a2535"}`, fontFamily: "inherit",
                      whiteSpace: "nowrap", flexShrink: 0, fontWeight: active ? 700 : 400,
                    }}>{t.label}</button>
                  );
                })}
              </div>
              <div style={{ fontSize: 10, color: C.muted, marginBottom: 6, fontWeight: 700 }}>担当者</div>
              <div style={{ display: "flex", gap: 4, overflowX: "auto", paddingBottom: 2 }}>
                <button onClick={() => setCalFilterMember("__ALL__")} style={{
                  padding: "5px 11px", borderRadius: 16, cursor: "pointer", fontSize: 11,
                  background: calFilterMember === "__ALL__" ? "#1a2535" : C.bg,
                  color: calFilterMember === "__ALL__" ? C.text : C.muted,
                  border: `1px solid ${calFilterMember === "__ALL__" ? C.muted : "#1a2535"}`,
                  fontFamily: "inherit", whiteSpace: "nowrap", flexShrink: 0, fontWeight: calFilterMember === "__ALL__" ? 700 : 400,
                }}>全員</button>
                {MEMBERS.map(m => (
                  <button key={m} onClick={() => setCalFilterMember(m)} style={{
                    padding: "5px 11px", borderRadius: 16, cursor: "pointer", fontSize: 11,
                    background: calFilterMember === m ? MEMBER_COLORS[m] : C.bg,
                    color: calFilterMember === m ? "#fff" : C.muted,
                    border: `1px solid ${calFilterMember === m ? MEMBER_COLORS[m] : "#1a2535"}`,
                    fontFamily: "inherit", whiteSpace: "nowrap", flexShrink: 0, fontWeight: calFilterMember === m ? 700 : 400,
                  }}>{m}</button>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* 曜日ヘッダー */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", padding: "8px 6px 4px", borderBottom: `1px solid #1a2535`, background: "#080d18" }}>
          {["日", "月", "火", "水", "木", "金", "土"].map((d, i) => (
            <div key={d} style={{
              textAlign: "center", fontSize: 11, fontWeight: 700,
              color: i === 0 ? C.danger : i === 6 ? C.accent : C.muted,
              padding: "4px 0",
            }}>{d}</div>
          ))}
        </div>

        {/* 月表示（Googleカレンダー風） */}
        {calMode === "month" && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", borderTop: `1px solid #1a2535` }}>
            {calMonthDays.map((d, i) => {
              if (!d) return <div key={i} style={{ minHeight: 78, background: "#06090f", borderRight: i % 7 !== 6 ? `1px solid #1a2535` : "none", borderBottom: `1px solid #1a2535` }} />;
              const dateStr = fmtDate(d);
              const isToday = dateStr === today;
              const isSelected = dateStr === calSelectedDate;
              const events = calEventsByDate[dateStr] || [];
              const dow = d.getDay();
              const isOverdue = dateStr < today && events.some(e => e.type === "jiage" || e.type === "owner");
              return (
                <button key={i} onClick={() => {
                  if (calSelectedDate === dateStr) openNewEvent(dateStr);
                  else setCalSelectedDate(dateStr);
                }} style={{
                  minHeight: 78, background: isSelected ? C.accent + "22" : "#0a0f1a",
                  border: "none",
                  borderRight: i % 7 !== 6 ? `1px solid #1a2535` : "none",
                  borderBottom: `1px solid #1a2535`,
                  padding: "3px 3px 2px", cursor: "pointer", fontFamily: "inherit",
                  display: "flex", flexDirection: "column", alignItems: "stretch", gap: 2,
                  textAlign: "left", overflow: "hidden", position: "relative",
                }}>
                  {/* 日付バッジ */}
                  <div style={{ display: "flex", justifyContent: "flex-start" }}>
                    <span style={{
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      minWidth: 20, height: 20, padding: "0 4px",
                      borderRadius: 10,
                      background: isToday ? C.accent : "transparent",
                      color: isToday ? "#fff" : isOverdue ? C.danger : dow === 0 ? C.danger : dow === 6 ? C.accent : C.text,
                      fontSize: 11, fontWeight: isToday ? 800 : 600,
                    }}>{d.getDate()}</span>
                  </div>
                  {/* 予定タイトル（最大2件） */}
                  <div style={{ display: "flex", flexDirection: "column", gap: 1, overflow: "hidden" }}>
                    {events.slice(0, 2).map((e, j) => (
                      <div key={j} style={{
                        background: e.color + "33", borderLeft: `2px solid ${e.color}`,
                        color: e.color, borderRadius: 2,
                        padding: "1px 3px", fontSize: 9, fontWeight: 600,
                        overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", lineHeight: 1.3,
                      }}>{e.icon}{e.title}</div>
                    ))}
                    {events.length > 2 && (
                      <div style={{ fontSize: 9, color: C.muted, padding: "0 3px", fontWeight: 700 }}>+{events.length - 2}件</div>
                    )}
                  </div>
                </button>
              );
            })}
          </div>
        )}

        {/* 週表示（Googleカレンダー風・縦長） */}
        {calMode === "week" && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", borderTop: `1px solid #1a2535` }}>
            {calWeekDays.map((d, i) => {
              const dateStr = fmtDate(d);
              const isToday = dateStr === today;
              const isSelected = dateStr === calSelectedDate;
              const events = calEventsByDate[dateStr] || [];
              const dow = d.getDay();
              return (
                <button key={i} onClick={() => {
                  if (calSelectedDate === dateStr) openNewEvent(dateStr);
                  else setCalSelectedDate(dateStr);
                }} style={{
                  minHeight: 240,
                  background: isSelected ? C.accent + "22" : "#0a0f1a",
                  border: "none",
                  borderRight: i !== 6 ? `1px solid #1a2535` : "none",
                  borderBottom: `1px solid #1a2535`,
                  padding: "6px 4px", cursor: "pointer", fontFamily: "inherit",
                  display: "flex", flexDirection: "column", alignItems: "stretch", gap: 4,
                  textAlign: "left", overflow: "hidden",
                }}>
                  <div style={{ display: "flex", justifyContent: "center" }}>
                    <span style={{
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      minWidth: 26, height: 26, borderRadius: 13,
                      background: isToday ? C.accent : "transparent",
                      color: isToday ? "#fff" : dow === 0 ? C.danger : dow === 6 ? C.accent : C.text,
                      fontSize: 13, fontWeight: isToday ? 800 : 700,
                    }}>{d.getDate()}</span>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 3, overflow: "hidden" }}>
                    {events.slice(0, 6).map((e, j) => (
                      <div key={j} style={{
                        background: e.color + "33", borderLeft: `2px solid ${e.color}`,
                        color: e.color, borderRadius: 3,
                        padding: "3px 4px", fontSize: 10, fontWeight: 600,
                        overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", lineHeight: 1.3,
                      }}>{e.icon}{e.title}</div>
                    ))}
                    {events.length > 6 && <div style={{ fontSize: 10, color: C.muted, padding: "0 4px", fontWeight: 700 }}>+{events.length - 6}件</div>}
                  </div>
                </button>
              );
            })}
          </div>
        )}

        {/* 選択日のイベント一覧 */}
        <div style={{ padding: "14px", background: "#080d18" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
            <span style={{ fontSize: 16, fontWeight: 800, color: C.text }}>📅 {calSelectedDate}</span>
            {calSelectedDate === today && <Tag label="今日" color={C.accent} />}
            {calSelectedDate < today && <Tag label="過去" color={C.muted} />}
            {calSelectedDate > today && <Tag label="予定" color={C.success} />}
            <span style={{ color: C.muted, fontSize: 12, marginLeft: "auto" }}>{selectedEvents.length}件</span>
            <button onClick={() => openNewEvent(calSelectedDate)} style={{
              background: "#f9731622", border: `1px solid #f9731666`, color: "#f97316",
              borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 700,
            }}>＋ 予定を追加</button>
          </div>
          {selectedEvents.length === 0 ? (
            <div style={{ color: C.muted, fontSize: 13, textAlign: "center", padding: "16px 0" }}>
              この日の予定はありません<br />
              <span style={{ fontSize: 11 }}>上の「＋ 予定を追加」からメモを追加できます</span>
            </div>
          ) : (
            <div style={{ display: "grid", gap: 6 }}>
              {selectedEvents.map((e, i) => (
                <div key={i} style={{
                  display: "flex", alignItems: "center", gap: 10,
                  background: C.bg, borderLeft: `4px solid ${e.color}`,
                  borderRadius: 6, padding: "10px 12px",
                }}>
                  <span style={{ fontSize: 20, flexShrink: 0 }}>{e.icon}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                      <span style={{ color: C.text, fontSize: 14, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.title}</span>
                      {e.isCustom && e.time && <span style={{ color: "#f97316", fontSize: 11, fontWeight: 700 }}>🕐 {e.time}</span>}
                      {e.isCustom && e.reminderMinutes > 0 && <span style={{ color: C.muted, fontSize: 10 }}>🔔{e.reminderMinutes < 60 ? `${e.reminderMinutes}分前` : `${Math.round(e.reminderMinutes/60)}時間前`}</span>}
                    </div>
                    <div style={{ color: C.muted, fontSize: 11 }}>{e.sub}</div>
                  </div>
                  {e.assignees && e.assignees.length > 0 ? (
                    <div style={{ display: "flex", gap: 3, flexShrink: 0, flexWrap: "wrap", justifyContent: "flex-end", maxWidth: 130 }}>
                      {e.assignees.map(a => <MemberTag key={a} name={a} />)}
                    </div>
                  ) : (e.assignee && <MemberTag name={e.assignee} />)}
                  {e.isCustom && (() => {
                    const customEv = (data.customEvents || []).find(ev => ev.id === e.rawId);
                    if (!customEv || !canEdit(customEv)) return null;
                    return (
                      <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                        <button onClick={() => openEditEvent(customEv)} style={{ background: C.accent + "22", border: `1.5px solid ${C.accent}`, color: C.accent, borderRadius: 6, padding: "6px 9px", cursor: "pointer", fontSize: 13, fontFamily: "inherit", fontWeight: 700 }}>✏️</button>
                        <button onClick={() => handleDeleteEvent(e.rawId)} style={{ background: C.danger + "22", border: `1.5px solid ${C.danger}`, color: C.danger, borderRadius: 6, padding: "6px 9px", cursor: "pointer", fontSize: 13, fontFamily: "inherit", fontWeight: 700 }}>🗑</button>
                      </div>
                    );
                  })()}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* 📌 カスタム予定の追加・編集 BottomSheet */}
      {showEventForm && (
        <BottomSheet title={editingEvent ? "📌 予定を編集" : "📌 新しい予定を追加"} onClose={() => { setShowEventForm(false); setEditingEvent(null); }}>
          <Field label="タイトル *">
            <input style={inp} value={eventForm.title} onChange={e => setEventForm(p => ({ ...p, title: e.target.value }))} placeholder="比嘉さんとMTG" autoFocus />
          </Field>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Field label="日付 *">
              <input type="date" style={inp} value={eventForm.date} onChange={e => setEventForm(p => ({ ...p, date: e.target.value }))} />
            </Field>
            <Field label="時間">
              <input type="time" style={inp} value={eventForm.time} onChange={e => setEventForm(p => ({ ...p, time: e.target.value }))} />
            </Field>
          </div>
          <Field label="場所">
            <input style={inp} value={eventForm.location} onChange={e => setEventForm(p => ({ ...p, location: e.target.value }))} placeholder="現地 / 事務所 / Zoom" />
          </Field>
          <Field label="メモ">
            <textarea style={{ ...inp, height: 80, resize: "vertical" }} value={eventForm.memo} onChange={e => setEventForm(p => ({ ...p, memo: e.target.value }))} placeholder="持ち物・確認事項など" />
          </Field>
          <Field label={`👥 担当者（複数選択可・${(eventForm.assignees || []).length}人選択中）`}>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {MEMBERS.map(m => {
                const isSelected = (eventForm.assignees || []).includes(m);
                return (
                  <button key={m} onClick={() => {
                    setEventForm(p => ({
                      ...p,
                      assignees: isSelected
                        ? (p.assignees || []).filter(a => a !== m)
                        : [...(p.assignees || []), m]
                    }));
                  }} style={{
                    padding: "8px 14px", borderRadius: 20, cursor: "pointer", fontSize: 13,
                    background: isSelected ? (MEMBER_COLORS[m] || C.accent) : C.bg,
                    color: isSelected ? "#fff" : C.muted,
                    border: `1px solid ${isSelected ? (MEMBER_COLORS[m] || C.accent) : "#1a2535"}`,
                    fontFamily: "inherit", fontWeight: isSelected ? 700 : 400,
                  }}>{isSelected ? "✓ " : ""}{m}</button>
                );
              })}
            </div>
            {(eventForm.assignees || []).length === 0 && (
              <div style={{ fontSize: 11, color: C.muted, marginTop: 6 }}>※ 担当者を指定しない場合は全員に共通の予定として扱われます</div>
            )}
          </Field>
          <Field label="🔔 リマインダー">
            <select style={inp} value={eventForm.reminderMinutes} onChange={e => setEventForm(p => ({ ...p, reminderMinutes: Number(e.target.value) }))}>
              <option value={0}>通知なし</option>
              <option value={5}>5分前</option>
              <option value={15}>15分前</option>
              <option value={30}>30分前</option>
              <option value={60}>1時間前</option>
              <option value={180}>3時間前</option>
              <option value={1440}>1日前</option>
            </select>
            {eventForm.reminderMinutes > 0 && !eventForm.time && (
              <div style={{ fontSize: 11, color: C.warn, marginTop: 4 }}>⚠️ リマインダーには「時間」の入力が必要です</div>
            )}
            {eventForm.reminderMinutes > 0 && (
              <div style={{ fontSize: 10, color: C.muted, marginTop: 4, lineHeight: 1.5 }}>
                ※ 通知はアプリを開いている時のみ届きます。<br />初回設定時にブラウザの通知許可が求められます。
              </div>
            )}
          </Field>
          <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
            <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={() => { setShowEventForm(false); setEditingEvent(null); }}>キャンセル</button>
            <button style={{ ...btnStyle(), flex: 2, background: "#f97316", borderColor: "#f97316" }} onClick={handleSaveEvent}>{editingEvent ? "更新する" : "予定を保存"}</button>
          </div>
        </BottomSheet>
      )}

      {/* ヘッダー＋年度切替 */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
        <div style={{ fontSize: 20, fontWeight: 800, color: C.text }}>📊 ダッシュボード</div>
        <div style={{ display: "flex", background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 10, overflow: "hidden" }}>
          {availableYears.map(y => (
            <button key={y} onClick={() => setSelectedYear(y)} style={{
              background: selectedYear === y ? C.accent : "none", border: "none",
              color: selectedYear === y ? "#fff" : C.muted,
              padding: "8px 14px", cursor: "pointer", fontSize: 13, fontWeight: 700, fontFamily: "inherit",
            }}>{y}年</button>
          ))}
        </div>
      </div>

      {/* 今日のアクション（最上段：毎朝開いたら最初に見るやつ） */}
      <div style={{
        background: "#0d1422",
        border: `1px solid ${(jiageToday.length + ownerToday.length > 0 || stagnant90.length > 0 || stagnant180.length > 0) ? C.warn + "55" : "#1a2535"}`,
        borderRadius: 14, padding: 14,
      }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.warn, marginBottom: 12 }}>⚡ 今日のアクション（タップで編集）</div>

        {/* 本日フォロー予定 */}
        {(jiageToday.length + ownerToday.length) > 0 ? (
          <div style={{ marginBottom: stagnant180.length + stagnant90.length > 0 ? 12 : 0 }}>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 8, fontWeight: 700 }}>📞 本日フォロー予定 {jiageToday.length + ownerToday.length}件</div>
            {[
              ...jiageToday.map(j => ({ raw: j, _type: "jiage" })),
              ...ownerToday.map(o => ({ raw: o, _type: "owner" }))
            ].map((item, i) => {
              const isJiage = item._type === "jiage";
              return (
                <button key={i} onClick={() => isJiage ? openJiageEdit(item.raw) : openOwnerEdit(item.raw)} style={{
                  display: "flex", gap: 8, alignItems: "center", marginBottom: 6,
                  width: "100%", background: C.bg, border: `1px solid #1a2535`,
                  cursor: "pointer", padding: "8px 10px", borderRadius: 8,
                  fontFamily: "inherit", fontSize: 13, color: C.text, textAlign: "left",
                  touchAction: "manipulation", WebkitTapHighlightColor: "transparent",
                }}>
                  <Tag label={isJiage ? "📍地上げ" : "👤所有者"} color={isJiage ? C.purple : C.accent} />
                  <span style={{ color: C.text, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.raw.address}</span>
                  <MemberTag name={item.raw.assignee} />
                  <span style={{ color: C.accent, fontSize: 13, flexShrink: 0 }}>✏</span>
                </button>
              );
            })}
          </div>
        ) : (
          <div style={{ fontSize: 12, color: C.muted, marginBottom: stagnant180.length + stagnant90.length > 0 ? 12 : 0 }}>
            📞 本日のフォロー予定なし
          </div>
        )}

        {/* 滞留警告：180日超（危険） */}
        {stagnant180.length > 0 && (
          <div style={{ marginBottom: stagnant90.length > 0 ? 8 : 0, background: "#1a0000", border: `1px solid ${C.danger}55`, borderRadius: 10, padding: "10px 12px" }}>
            <div style={{ fontSize: 12, color: C.danger, fontWeight: 700, marginBottom: 6 }}>🔴 180日超滞留 {stagnant180.length}件 — 価格見直しなど対応急務</div>
            {stagnant180.slice(0, 3).map(s => {
              const days = daysSinceBuy(s.buyDate);
              return (
                <button key={s.id} onClick={() => openQuickEdit(s)} style={{
                  display: "flex", gap: 8, alignItems: "center", marginBottom: 4,
                  width: "100%", background: "rgba(255,255,255,0.03)", border: `1px solid ${C.danger}33`,
                  cursor: "pointer", padding: "7px 9px", borderRadius: 7,
                  fontFamily: "inherit", fontSize: 12, textAlign: "left",
                  touchAction: "manipulation", WebkitTapHighlightColor: "transparent",
                }}>
                  <span style={{ color: C.danger, fontWeight: 700, minWidth: 60 }}>{days}日経過</span>
                  <span style={{ color: C.text, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.name}</span>
                  <MemberTag name={s.assignee} />
                  <span style={{ color: C.accent, fontSize: 12, flexShrink: 0 }}>✏</span>
                </button>
              );
            })}
            {stagnant180.length > 3 && <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>他 {stagnant180.length - 3}件</div>}
          </div>
        )}

        {/* 滞留警告：90〜180日（注意） */}
        {stagnant90.length > 0 && (
          <div style={{ background: "#1a1000", border: `1px solid ${C.warn}55`, borderRadius: 10, padding: "10px 12px" }}>
            <div style={{ fontSize: 12, color: C.warn, fontWeight: 700, marginBottom: 6 }}>🟡 90〜180日滞留 {stagnant90.length}件 — 販売促進を検討</div>
            {stagnant90.slice(0, 3).map(s => {
              const days = daysSinceBuy(s.buyDate);
              return (
                <button key={s.id} onClick={() => openQuickEdit(s)} style={{
                  display: "flex", gap: 8, alignItems: "center", marginBottom: 4,
                  width: "100%", background: "rgba(255,255,255,0.03)", border: `1px solid ${C.warn}33`,
                  cursor: "pointer", padding: "7px 9px", borderRadius: 7,
                  fontFamily: "inherit", fontSize: 12, textAlign: "left",
                  touchAction: "manipulation", WebkitTapHighlightColor: "transparent",
                }}>
                  <span style={{ color: C.warn, fontWeight: 700, minWidth: 60 }}>{days}日経過</span>
                  <span style={{ color: C.text, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.name}</span>
                  <MemberTag name={s.assignee} />
                  <span style={{ color: C.accent, fontSize: 12, flexShrink: 0 }}>✏</span>
                </button>
              );
            })}
            {stagnant90.length > 3 && <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>他 {stagnant90.length - 3}件</div>}
          </div>
        )}

        {/* 役所調査リマインダー */}
        {needYakusho.length > 0 && (
          <div style={{ marginTop: (stagnant90.length + stagnant180.length) > 0 ? 8 : 0, background: "#0a1520", border: `1px solid ${C.accent}55`, borderRadius: 10, padding: "10px 12px" }}>
            <div style={{ fontSize: 12, color: C.accent, fontWeight: 700, marginBottom: 6 }}>🏛 役所調査未実施 {needYakusho.length}件 — シート作成しよう</div>
            {needYakusho.slice(0, 3).map(s => (
              <button key={s.id} onClick={() => openQuickEdit(s)} style={{
                display: "flex", gap: 8, alignItems: "center", marginBottom: 4,
                width: "100%", background: "rgba(255,255,255,0.03)", border: `1px solid ${C.accent}33`,
                cursor: "pointer", padding: "7px 9px", borderRadius: 7,
                fontFamily: "inherit", fontSize: 12, textAlign: "left",
                touchAction: "manipulation", WebkitTapHighlightColor: "transparent",
              }}>
                <StatusTag status={s.status} />
                <span style={{ color: C.text, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.name}</span>
                <MemberTag name={s.assignee} />
                <span style={{ color: C.accent, fontSize: 12, flexShrink: 0 }}>✏</span>
              </button>
            ))}
            {needYakusho.length > 3 && <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>他 {needYakusho.length - 3}件</div>}
          </div>
        )}

        {/* 全部問題なし */}
        {jiageToday.length === 0 && ownerToday.length === 0 && stagnant90.length === 0 && stagnant180.length === 0 && needYakusho.length === 0 && (
          <div style={{ fontSize: 12, color: C.success, marginTop: 4 }}>✅ 滞留在庫なし。在庫回転は良好。</div>
        )}
      </div>

      {/* 年間KPI */}
      <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.accent, marginBottom: 12 }}>📅 {selectedYear}年 年間実績</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
          <StatCard icon="💰" label="年間売上" value={(yearSell / 10000).toFixed(0) + "万"} color={C.warn} sub={`決済${yearCompleted.length}件`} />
          <StatCard icon="📈" label="年間利益" value={(yearProfit / 10000).toFixed(0) + "万"} color={C.success} sub="税引前" />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 8 }}>
          <StatCard icon="🏠" label="仕入件数" value={yearBought.length + "件"} color={C.accent} />
          <StatCard icon="✅" label="売却件数" value={yearCompleted.length + "件"} color={C.success} />
          <StatCard icon="📦" label="在庫" value={active.length + "件"} color={C.muted} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          <StatCard icon="💡" label="平均利益" value={(avgProfit / 10000).toFixed(0) + "万"} color={C.purple} sub="1件あたり" />
          <StatCard icon="📊" label="平均利益率" value={avgProfitRate.toFixed(1) + "%"} color={avgProfitRate > 20 ? C.success : C.warn} sub="売却完了分" />
        </div>
      </div>

      {/* 年間目標達成率ゲージ */}
      {selectedYear === currentYear && (() => {
        const goals = data.annualGoals || { sell: 30000, profit: 6000, buyCount: 30 };
        const monthsPassed = new Date().getMonth() + 1; // 1-12
        const items = [
          { label: "売上", current: Math.round(yearSell / 10000), goal: goals.sell, unit: "万", color: C.warn, icon: "💰" },
          { label: "利益", current: Math.round(yearProfit / 10000), goal: goals.profit, unit: "万", color: C.success, icon: "📈" },
          { label: "仕入件数", current: yearBought.length, goal: goals.buyCount, unit: "件", color: C.accent, icon: "🏠" },
        ];
        return (
          <div style={{ background: "#0d1422", border: `1px solid #1a2535`, borderRadius: 14, padding: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.accent }}>🎯 年間目標達成率（{currentYear}年）</div>
              {isAdmin ? (
                <button onClick={() => { setGoalForm({ sell: String(goals.sell), profit: String(goals.profit), buyCount: String(goals.buyCount) }); setShowGoalEdit(true); }} style={{ ...btnStyle("ghost"), padding: "4px 10px", fontSize: 11 }}>目標編集</button>
              ) : (
                <span style={{ color: C.muted, fontSize: 10 }}>👑管理者のみ編集可</span>
              )}
            </div>
            <div style={{ display: "grid", gap: 12 }}>
              {items.map(g => {
                const pct = g.goal > 0 ? (g.current / g.goal * 100) : 0;
                const forecast = monthsPassed > 0 ? Math.round(g.current / monthsPassed * 12) : 0;
                const forecastPct = g.goal > 0 ? (forecast / g.goal * 100) : 0;
                return (
                  <div key={g.label} style={{ background: C.bg, borderRadius: 10, padding: "12px 14px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
                      <span style={{ fontSize: 13, color: C.muted }}>{g.icon} {g.label}</span>
                      <span style={{ fontSize: 11, color: pct >= 100 ? C.success : pct >= 50 ? C.warn : C.muted, fontWeight: 700 }}>{pct.toFixed(0)}%</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                      <span style={{ fontSize: 18, fontWeight: 800, color: g.color }}>{g.current.toLocaleString()}{g.unit}</span>
                      <span style={{ fontSize: 12, color: C.muted }}>/ {g.goal.toLocaleString()}{g.unit}</span>
                    </div>
                    <div style={{ background: "#1a2535", borderRadius: 4, height: 6, overflow: "hidden", marginBottom: 6 }}>
                      <div style={{ width: Math.min(pct, 100) + "%", height: "100%", background: pct >= 100 ? C.success : pct >= 50 ? C.warn : C.danger, borderRadius: 4, transition: "width 0.5s" }} />
                    </div>
                    <div style={{ fontSize: 11, color: C.muted, display: "flex", justifyContent: "space-between" }}>
