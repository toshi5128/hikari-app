            {/* 仕入れ確定ボタン（編集権限あるときのみ） */}
            {canEditThis && nv(form.buyPrice) > 0 && (
              <div style={{ marginTop: 12, background: C.successBg, border: `1px solid ${C.success}55`, borderRadius: 14, padding: 16 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.success, marginBottom: 8 }}>🏠 仕入れ確定したら</div>
                <div style={{ fontSize: 12, color: C.muted, marginBottom: 12, lineHeight: 1.6 }}>
                  以下の内容で在庫管理に自動転記されます：<br />
                  <span style={{ color: C.text }}>物件名：{form.address || "未入力"}</span><br />
                  <span style={{ color: C.text }}>仕入原価：{nv(form.buyPrice) > 0 ? (nv(form.buyPrice)).toLocaleString() + "円" : "未入力"}</span><br />
                  <span style={{ color: C.text }}>売却想定：{nv(form.sellPrice) > 0 ? (nv(form.sellPrice)).toLocaleString() + "円" : "未入力"}</span><br />
                  <span style={{ color: C.text }}>担当者：{form.assignee}</span>
                </div>
                <button
                  onClick={() => {
                    if (!form.address) { alert("物件住所を入力してください"); return; }
                    if (window.confirm(`「${form.address}」を在庫管理に転記しますか？`)) {
                      onSave(form);
                      onTransfer(form);
                    }
                  }}
                  style={{
                    width: "100%", background: C.success, border: "none", color: "#fff",
                    borderRadius: 12, padding: "15px", cursor: "pointer", fontSize: 16,
                    fontWeight: 800, fontFamily: "inherit", letterSpacing: "0.02em",
                  }}
                >
                  ✅ 仕入れ確定 → 在庫管理に転記
                </button>
              </div>
            )}
          </div>
        )}

        {tab === "progress" && (
          <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 16, marginBottom: 14 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.accent, marginBottom: 4 }}>📅 案件進捗</div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 16, lineHeight: 1.6 }}>
              この案件の現在のステータスと、関連する日時を記録します。
            </div>

            <Field label="📋 ステータス">
              <select style={inp} value={form.caseStatus || ""} onChange={f("caseStatus")}>
                <option value="">未設定</option>
                <option value="未査定">未査定</option>
                <option value="査定済">査定済</option>
                <option value="売主結果確認日">売主結果確認日</option>
              </select>
            </Field>

            {form.caseStatus && (
              <Field label={form.caseStatus === "売主結果確認日" ? "🗓 結果確認の日時" : "🗓 日時"}>
                <input
                  type="datetime-local"
                  style={inp}
                  value={form.caseStatusAt || ""}
                  onChange={f("caseStatusAt")}
                />
              </Field>
            )}

            {form.caseStatus === "売主結果確認日" && form.caseStatusAt && (
              <div style={{
                marginTop: 12, padding: "12px 14px",
                background: C.warn + "15", border: `1px solid ${C.warn}55`,
                borderRadius: 10, fontSize: 12, color: C.text, lineHeight: 1.7,
              }}>
                <div style={{ fontWeight: 700, color: C.warn, marginBottom: 6 }}>💡 カレンダー連動について</div>
                保存すると、この日時で <b style={{ color: C.accent }}>下田さん・比嘉さん宛のカレンダー予定</b> が自動登録され、
                Web Push通知が飛びます。
                <br /><br />
                日時を変更して再保存すれば、カレンダー予定も自動更新されます。
                ステータスを「売主結果確認日」以外に変えると、カレンダー予定は削除されます。
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function SekisanPage({ data, setData, onBack, embedded = false, defaultAssignee = null, casesMember = null, sekisanLinkId = null }) {
  const currentUser = getCurrentUser();
  const adminMember = data.adminMember || "下田";
  const isAdmin = isAdminUser(data, currentUser); // 🆕 管理者リスト
  const canEdit = (item) => canEditItem(item, currentUser, getAdminMembers(data));
  // 🆕 通知タップでハイライトする ID
  const [highlightSekisanId, setHighlightSekisanId] = useState(null);

  // 🆕 sekisanLinkId 受け取り：該当積算表にスクロール
  useEffect(() => {
    if (sekisanLinkId) {
      const targetId = Number(sekisanLinkId);
      setHighlightSekisanId(targetId);
      let retries = 0;
      const tryScroll = () => {
        const el = document.getElementById(`sekisan-item-${targetId}`);
        if (el) {
          el.scrollIntoView({ behavior: "smooth", block: "center" });
        } else if (retries < 10) {
          retries++;
          setTimeout(tryScroll, 150);
        }
      };
      setTimeout(tryScroll, 200);
      setTimeout(() => setHighlightSekisanId(null), 3000);
    }
  }, [sekisanLinkId]);
  const [showForm, setShowForm] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [search, setSearch] = useState("");
  const [filterMember, setFilterMember] = useState("すべて");
  const [filterJudgment, setFilterJudgment] = useState(embedded ? "熱い" : "すべて");

  // 💬 コメント関連 state
  const [newSekisanComment, setNewSekisanComment] = useState({}); // {sekisanId: text}
  const [sekisanCommentExpanded, setSekisanCommentExpanded] = useState({}); // {sekisanId: bool}
  const [editingSekisanCommentId, setEditingSekisanCommentId] = useState(null);
  const [editingSekisanCommentText, setEditingSekisanCommentText] = useState("");

  // embedded で casesMember が来ていればそちらを優先（営業タブ上部の担当者選択に連動）
  const effectiveMember = embedded
    ? (casesMember === "__ALL__" || !casesMember ? "すべて" : casesMember)
    : filterMember;

  const JCOLOR = { "熱い": C.danger, "検討中": C.warn, "仕入検討": C.accent, "仕入": C.success, "見送り": "#334155" };
  const JEMOJI = { "熱い": "🔥", "検討中": "🟡", "仕入検討": "📝", "仕入": "🏠", "見送り": "❌" };

  const filtered = useMemo(() => data.sekisan.filter(s => {
    if (effectiveMember !== "すべて" && s.assignee !== effectiveMember) return false;
    if (filterJudgment !== "すべて" && s.judgment !== filterJudgment) return false;
    if (search && !(s.address || "").includes(search)) return false;
    return true;
  }), [data.sekisan, effectiveMember, filterJudgment, search]);

  const handleSave = form => {
    const item = { ...form, id: editItem?.id || Date.now() };

    // 売主結果確認日のカレンダー連動判定
    const nowIsResult = item.caseStatus === "売主結果確認日" && item.caseStatusAt;

    // 🆕 判定が「仕入検討」「仕入」になったかチェック
    const oldJudgment = editItem ? editItem.judgment : "";
    const newJudgment = item.judgment;
    const becameKentou = newJudgment === "仕入検討" && oldJudgment !== "仕入検討";
    const becameShiire = newJudgment === "仕入" && oldJudgment !== "仕入";

    setData(d => {
      // この積算表に紐付いた既存の customEvents を一旦削除（重複防止 / 日時変更対応）
      let nextEvents = (d.customEvents || []).filter(e => !(e.sekisanLinkId && e.sekisanLinkId === item.id));

      // 売主結果確認日なら customEvents に新規追加
      if (nowIsResult) {
        const [date, time] = String(item.caseStatusAt).split("T");
        nextEvents = [...nextEvents, {
          id: Date.now() + 1,
          date: date,
          time: time || "09:00",
          title: `📋 売主結果確認: ${item.address || "(住所未設定)"}`,
          assignees: getNotifyMembers(data),
          memo: `仕入検討積算表との連動\n担当: ${item.assignee}\n判定: ${item.judgment || "未設定"}${item.vendorName ? `\n紹介元: ${item.vendorName}` : ""}`,
          sekisanLinkId: item.id,
          color: "#f59e0b",
        }];
      }

      // 🆕 行動管理（approaches）に自動カウント反映
      let nextApproaches = d.approaches || [];
      if (becameKentou || becameShiire) {
        const targetMember = item.assignee || currentUser || "";
        const today = new Date().toISOString().split("T")[0];
        const countKey = becameShiire ? "仕入" : "仕入検討";
        if (targetMember) {
          const existing = nextApproaches.find(a => a.member === targetMember && a.date === today);
          if (existing) {
            // 既存レコードに +1
            nextApproaches = nextApproaches.map(a =>
              a.id === existing.id
                ? { ...a, values: { ...(a.values || {}), [countKey]: ((a.values || {})[countKey] || 0) + 1 } }
                : a
            );
          } else {
            // 新規レコード作成
            nextApproaches = [...nextApproaches, {
              id: Date.now() + 2,
              member: targetMember,
              date: today,
              values: { [countKey]: 1 },
              memo: "", mailDelivery: 0, area: "", dailyGoals: {},
              comments: [],
            }];
          }
        }
      }

      const next = {
        ...d,
        sekisan: editItem ? d.sekisan.map(s => s.id === editItem.id ? item : s) : [...d.sekisan, item],
        customEvents: nextEvents,
        approaches: nextApproaches,
      };
      return appendLogAndNotify(next, editItem ? "update" : "add", "sekisan", `${item.address || "(無住所)"}（判定: ${item.judgment}）`, item);
    });

    // 売主結果確認日が新規追加 or 更新された時、下田・比嘉に通知
    if (nowIsResult) {
      const [date, time] = String(item.caseStatusAt).split("T");
      const me = currentUser || "";
      const targets = getNotifyTargets(data, me, item); // 積算表の担当者も含める
      if (targets.length > 0) {
        sendPushNotification(
          targets,
          `📋 売主結果確認日が登録されました`,
          `${item.address || "(住所未設定)"}\n📅 ${date} ${time || "09:00"}\n担当: ${item.assignee}`,
          {
            tag: `hikari-sekisan-result-${item.id}`,
            data: { tab: 'dashboard', sekisanLinkId: item.id },
            tab: 'dashboard', sekisanLinkId: item.id,
          }
        );
      }
    }

    // 🆕 「仕入」になった時、自動で在庫転記を提案
    if (becameShiire) {
      setTimeout(() => {
        if (window.confirm(`✅ 判定が「🏠 仕入」になりました！\n\n${item.address || "(住所未設定)"} を在庫管理に転記しますか？\n\n（仕入検討積算表のデータはそのまま残ります）`)) {
          handleTransfer(item);
          return; // handleTransfer 内で setShowForm が呼ばれるはず
        }
        setShowForm(false); setEditItem(null);
      }, 100);
      return;
    }

    setShowForm(false); setEditItem(null);
  };

  const handleTransfer = form => {
    // 積算表から在庫管理に転記
    const nv = v => parseFloat(String(v).replace(/,/g, "")) || 0;
    const newStock = {
      id: Date.now(),
      assignee: form.assignee,
      name: form.address,
      status: "仕入役調中",
      buyDate: "",
      sellDate: "",
      buyCost: nv(form.buyPrice),
      sellPrice: nv(form.sellPrice),
      memo: `積算表より転記。${form.judgmentMemo ? "\n" + form.judgmentMemo.slice(0, 100) : ""}`,
      year: new Date().getFullYear(),
      fromSekisanId: form.id || Date.now(),
      photos: [],
    };
    setData(d => {
      const next = { ...d, stocks: [...d.stocks, newStock] };
      return appendLogAndNotify(next, "promote", "stock", `${form.address}を積算→在庫に転記（仕入${Math.round(nv(form.buyPrice)/10000)}万）`, newStock);
    });
    setShowForm(false); setEditItem(null);
    alert(`✅「${form.address}」を在庫管理に転記しました！\nステータス：仕入契約済`);
  };

  // 💬 コメント投稿
  const handlePostSekisanComment = (sekisanId) => {
    const text = (newSekisanComment[sekisanId] || "").trim();
    if (!text) return;
    if (!currentUser) { alert("先にログインしてください"); return; }
    const comment = {
      id: Date.now(),
      member: currentUser,
      text,
      createdAt: new Date().toISOString(),
    };
    setData(d => ({
      ...d,
      sekisan: (d.sekisan || []).map(s =>
        s.id === sekisanId
          ? { ...s, comments: [...(s.comments || []), comment] }
          : s
      ),
    }));
    // 通知：担当者 + 通知メンバー + 過去にコメントした人（送信者除く）
    const target = data.sekisan.find(s => s.id === sekisanId);
    if (target) {
      const pastCommenters = (target.comments || []).map(c => c.member);
      const allTargets = new Set([
        ...getNotifyMembers(data),
        target.assignee,
        ...pastCommenters,
      ]);
      allTargets.delete(currentUser);
      const targets = [...allTargets].filter(Boolean);
      if (targets.length > 0) {
        sendPushNotification(
          targets,
          `💬 ${currentUser}さんがコメント`,
          `${target.address || "(住所未設定)"}\n${text}`,
          {
            tag: `hikari-sekisan-comment-${sekisanId}-${comment.id}`,
            data: { tab: 'approach', sub: 'cases', sekisanLinkId: sekisanId },
            tab: 'approach', sub: 'cases', sekisanLinkId: sekisanId,
          }
        );
      }
    }
    setNewSekisanComment(p => ({ ...p, [sekisanId]: "" }));
  };

  // ✏️ コメント編集開始
  const handleStartEditSekisanComment = (c) => {
    setEditingSekisanCommentId(c.id);
    setEditingSekisanCommentText(c.text);
  };
  const handleCancelEditSekisanComment = () => {
    setEditingSekisanCommentId(null);
    setEditingSekisanCommentText("");
  };
  const handleSaveEditSekisanComment = (sekisanId, commentId) => {
    const newText = editingSekisanCommentText.trim();
    if (!newText) { alert("内容が空です"); return; }
    setData(d => ({
      ...d,
      sekisan: (d.sekisan || []).map(s => {
        if (s.id !== sekisanId) return s;
        return {
          ...s,
          comments: (s.comments || []).map(c =>
            c.id === commentId ? { ...c, text: newText, editedAt: new Date().toISOString() } : c
          ),
        };
      }),
    }));
    setEditingSekisanCommentId(null);
    setEditingSekisanCommentText("");
  };

  // 🗑️ コメント削除
  const handleDeleteSekisanComment = (sekisanId, commentId) => {
    if (!window.confirm("このコメントを削除しますか？")) return;
    setData(d => ({
      ...d,
      sekisan: (d.sekisan || []).map(s => {
        if (s.id !== sekisanId) return s;
        return {
          ...s,
          comments: (s.comments || []).filter(c => c.id !== commentId),
        };
      }),
    }));
  };

  const handleDelete = id => {
    const target = data.sekisan.find(s => s.id === id);
    if (window.confirm("削除しますか？\n※ 関連するカレンダーイベントも削除されます")) setData(d => {
      // 🆕 カスケード削除されるカレンダーイベントの ID も追跡（他端末からの復活防止）
      const relatedEvents = (d.customEvents || []).filter(e => e.sekisanLinkId && e.sekisanLinkId === id);
      relatedEvents.forEach(ev => recordDeletion("event", ev.id));
      const next = {
        ...d,
        sekisan: d.sekisan.filter(s => s.id !== id),
        // 🆕 関連カレンダーイベント連動削除（売主結果確認日など）
        customEvents: (d.customEvents || []).filter(e => !(e.sekisanLinkId && e.sekisanLinkId === id)),
      };
      return appendLogAndNotify(next, "delete", "sekisan", `${target?.address || "(無住所)"}を削除`, target);
    });
  };
  const nv = v => parseFloat(v) || 0;

  if (showForm) return <SekisanForm initial={editItem} onSave={handleSave} onClose={() => { setShowForm(false); setEditItem(null); }} onTransfer={handleTransfer} canEditThis={!editItem || canEdit(editItem)} defaultAssignee={defaultAssignee} />;

  return (
    <div>
      {!embedded && (
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
          {onBack && <button onClick={onBack} style={{ background: "none", border: "none", color: C.accent, fontSize: 24, cursor: "pointer", padding: 0 }}>←</button>}
          <div style={{ fontSize: 20, fontWeight: 800, color: C.text }}>🧮 仕入検討積算表</div>
          <div style={{ flex: 1 }} />
          <button style={{ ...btnStyle(), padding: "10px 16px", fontSize: 14 }} onClick={() => { setEditItem(null); setShowForm(true); }}>＋ 追加</button>
        </div>
      )}
      {embedded && (
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.warn }}>🧮 仕入検討積算表（{effectiveMember === "すべて" ? (data.sekisan?.length || 0) : (data.sekisan || []).filter(s => s.assignee === effectiveMember).length}件）</div>
          <div style={{ flex: 1 }} />
          <button style={{ ...btnStyle(), padding: "6px 12px", fontSize: 12 }} onClick={() => { setEditItem(null); setShowForm(true); }}>＋ 追加</button>
        </div>
      )}
      <SearchBar value={search} onChange={setSearch} placeholder="住所で検索..." />
      {!embedded && (
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
          {["すべて", ...MEMBERS].map(m => (
            <button key={m} onClick={() => setFilterMember(m)} style={{ padding: "6px 12px", borderRadius: 20, cursor: "pointer", fontSize: 12, background: filterMember === m ? C.accent : C.cardBg, color: filterMember === m ? "#fff" : C.muted, border: `1px solid ${filterMember === m ? C.accent : C.borderDim}`, fontFamily: "inherit" }}>{m}</button>
          ))}
        </div>
      )}
      {/* 判定別タブ（件数バッジ付き） */}
      <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 10, background: C.panelBg, padding: 4, borderRadius: 10, border: `1px solid ${C.borderDim}` }}>
        {["仕入", "仕入検討", "熱い", "検討中", "見送り", "すべて"].map(j => {
          const count = j === "すべて" 
            ? data.sekisan.filter(s => effectiveMember === "すべて" || s.assignee === effectiveMember).length
            : data.sekisan.filter(s => (effectiveMember === "すべて" || s.assignee === effectiveMember) && s.judgment === j).length;
          const active = filterJudgment === j;
          const jcolor = JCOLOR[j] || C.accent;
          return (
            <button key={j} onClick={() => setFilterJudgment(j)} style={{
              flex: "1 1 auto", minWidth: 70, padding: "8px 6px", borderRadius: 7,
              cursor: "pointer", fontSize: 11, fontWeight: 700,
              background: active ? jcolor : "transparent",
              color: active ? "#fff" : (count > 0 ? jcolor : C.muted),
              border: `1.5px solid ${active ? jcolor : (count > 0 ? jcolor + "44" : C.borderDim)}`,
              fontFamily: "inherit", display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
              transition: "all 0.15s",
            }}>
              <span style={{ fontSize: 14 }}>{JEMOJI[j] || "📋"}</span>
              <span style={{ fontSize: 10 }}>{j}</span>
              <span style={{ fontSize: 16, fontWeight: 800, lineHeight: 1 }}>{count}</span>
            </button>
          );
        })}
      </div>
      <div style={{ color: C.muted, fontSize: 11, marginBottom: 10 }}>
        {filterJudgment === "すべて" ? "全件表示中" : `${JEMOJI[filterJudgment]}${filterJudgment} のみ表示`} · {filtered.length}件
      </div>

      {filtered.length === 0 && (
        <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 32, textAlign: "center", color: C.muted }}>該当する積算表がありません</div>
      )}

      {filtered.map(s => {
        const exp = ["brokerFeeIn","registration","acquisitionTax","stamp","leftover","reform","demolition","brokerFeeOut","other","propertyTax","cleaning"].reduce((a, k) => a + nv(s[k]), 0);
        const profit = nv(s.sellPrice) - nv(s.buyPrice) - exp;
        const jColor = JCOLOR[s.judgment] || C.muted;
        const jEmoji = JEMOJI[s.judgment] || "";
        // この積算表から在庫管理に転記済みか確認
        const isTransferred = s.id && data.stocks.some(st => st.fromSekisanId === s.id);
        const isHighlight = highlightSekisanId === s.id;
        return (
          <div
            key={s.id}
            id={`sekisan-item-${s.id}`}
            style={{
              background: isHighlight ? "linear-gradient(135deg, rgba(14,165,233,0.15), rgba(34,197,94,0.10))" : C.cardBg,
              border: isHighlight ? `2px solid ${C.accent}` : `1px solid ${s.judgment === "熱い" ? C.danger + "55" : isTransferred ? C.success + "55" : C.borderDim}`,
              borderRadius: 14, padding: 16, marginBottom: 10,
              boxShadow: isHighlight ? `0 0 24px ${C.accent}66` : "none",
              transition: "all 0.4s",
            }}>
            <div style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "center", flexWrap: "wrap" }}>
              <MemberTag name={s.assignee} />
              {s.judgment && <Tag label={`${jEmoji} ${s.judgment}`} color={jColor} />}
              {s.source && <Tag label={`📥 ${s.source}`} color={C.purple} />}
              {isTransferred && <Tag label="✅ 在庫転記済" color={C.success} />}
              <span style={{ color: C.muted, fontSize: 12, marginLeft: "auto" }}>
                {s.occurredAt ? `📅 ${new Date(s.occurredAt).toLocaleString("ja-JP", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}` : s.createdAt}
              </span>
            </div>
            <div style={{ color: C.text, fontWeight: 700, fontSize: 15, marginBottom: 10 }}>{s.address || "住所未設定"}</div>
            {/* 紹介元（業者情報がある場合のみ表示） */}
            {s.vendorName && (
              <div style={{ fontSize: 11, color: C.muted, marginBottom: 8, padding: "6px 10px", background: C.bg, borderRadius: 6, borderLeft: `2px solid ${C.purple}` }}>
                📇 {s.vendorName}{s.vendorPerson ? `（${s.vendorPerson}）` : ""}{s.vendorContact ? ` / ${s.vendorContact}` : ""}
              </div>
            )}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 10 }}>
              {[
                ["仕入額", nv(s.buyPrice) > 0 ? (nv(s.buyPrice) / 10000).toFixed(0) + "万" : "—", C.text],
                ["売却想定", nv(s.sellPrice) > 0 ? (nv(s.sellPrice) / 10000).toFixed(0) + "万" : "—", C.accent],
                ["想定利益", nv(s.buyPrice) > 0 && nv(s.sellPrice) > 0 ? (profit / 10000).toFixed(0) + "万" : "—", profit > 0 ? C.success : C.danger],
              ].map(([l, v, c]) => (
                <div key={l} style={{ background: C.bg, borderRadius: 8, padding: "8px 10px", textAlign: "center" }}>
                  <div style={{ color: C.muted, fontSize: 10 }}>{l}</div>
                  <div style={{ color: c, fontWeight: 700, fontSize: 15 }}>{v}</div>
                </div>
              ))}
            </div>
            {(s.rainzPriceMin || s.rainzPriceMax) && (
              <div style={{ fontSize: 12, color: C.muted, marginBottom: 4 }}>レインズ成約: <span style={{ color: C.text }}>{s.rainzPriceMin}〜{s.rainzPriceMax}万</span></div>
            )}
            {s.judgmentMemo && (
              <div style={{ fontSize: 12, color: C.muted, marginBottom: 10, lineHeight: 1.5 }}>
                {s.judgmentMemo.length > 80 ? s.judgmentMemo.slice(0, 80) + "…" : s.judgmentMemo}
              </div>
            )}
            {/* 💬 コメント欄 */}
            {(() => {
              const comments = s.comments || [];
              const expanded = !!sekisanCommentExpanded[s.id];
              const visible = expanded ? comments : comments.slice(-3);
              return (
                <div style={{ background: C.bg, border: `1px solid ${C.borderDim}`, borderRadius: 10, padding: "10px 12px", marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <span style={{ fontSize: 11, fontWeight: 700, color: C.accent }}>💬 コメント ({comments.length}件)</span>
                    {comments.length > 3 && (
                      <button onClick={() => setSekisanCommentExpanded(p => ({ ...p, [s.id]: !expanded }))} style={{
                        background: "transparent", border: "none", color: C.muted, fontSize: 11,
                        cursor: "pointer", fontFamily: "inherit", padding: 0,
                      }}>{expanded ? "▲ 直近3件のみ" : `▼ 全${comments.length}件を見る`}</button>
                    )}
                  </div>
                  {comments.length === 0 ? (
                    <div style={{ fontSize: 11, color: C.muted, textAlign: "center", padding: "4px 0" }}>まだコメントなし</div>
                  ) : visible.map(c => (
                    <div key={c.id} style={{
                      background: C.cardBg, borderLeft: `3px solid ${MEMBER_COLORS[c.member] || C.muted}`,
                      borderRadius: 4, padding: "8px 10px", marginBottom: 5,
                    }}>
                      <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 3 }}>
                        <MemberTag name={c.member} />
                        <span style={{ fontSize: 10, color: C.muted, marginLeft: "auto" }}>
                          {new Date(c.createdAt).toLocaleString("ja-JP", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}
                          {c.editedAt && <span style={{ marginLeft: 4 }}>(編集済)</span>}
                        </span>
                      </div>
                      {editingSekisanCommentId === c.id ? (
                        <>
                          <textarea
                            value={editingSekisanCommentText}
                            onChange={e => setEditingSekisanCommentText(e.target.value)}
                            style={{ ...inp, height: 50, resize: "vertical", marginBottom: 5, fontSize: 13 }}
                          />
                          <div style={{ display: "flex", gap: 5 }}>
                            <button onClick={() => handleSaveEditSekisanComment(s.id, c.id)}
                              style={{ ...btnStyle(), flex: 1, padding: "6px", fontSize: 11 }}>💾 保存</button>
                            <button onClick={handleCancelEditSekisanComment}
                              style={{ ...btnStyle("ghost"), flex: 1, padding: "6px", fontSize: 11 }}>キャンセル</button>
                          </div>
                        </>
                      ) : (
                        <>
                          <div style={{ fontSize: 12, color: C.text, lineHeight: 1.5, whiteSpace: "pre-wrap", marginBottom: c.member === currentUser ? 4 : 0 }}>{c.text}</div>
                          {c.member === currentUser && (
                            <div style={{ display: "flex", gap: 4, justifyContent: "flex-end" }}>
                              <button onClick={() => handleStartEditSekisanComment(c)} style={{
                                background: "transparent", border: `1px solid ${C.muted}33`, color: C.muted,
                                borderRadius: 4, padding: "2px 8px", fontSize: 10, cursor: "pointer", fontFamily: "inherit",
                              }}>✏️</button>
                              <button onClick={() => handleDeleteSekisanComment(s.id, c.id)} style={{
                                background: "transparent", border: `1px solid ${C.danger}55`, color: C.danger,
                                borderRadius: 4, padding: "2px 8px", fontSize: 10, cursor: "pointer", fontFamily: "inherit",
                              }}>🗑️</button>
                            </div>
                          )}
                        </>
                      )}
                    </div>
                  ))}
                  <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                    <textarea
                      value={newSekisanComment[s.id] || ""}
                      onChange={e => setNewSekisanComment(p => ({ ...p, [s.id]: e.target.value }))}
                      onKeyDown={e => {
                        if (e.key === "Enter" && !e.shiftKey) {
                          e.preventDefault();
                          handlePostSekisanComment(s.id);
                        }
                      }}
                      placeholder={currentUser ? `${currentUser}としてコメント... (Enterで送信)` : "ログインしてください"}
                      style={{ ...inp, flex: 1, height: 40, resize: "vertical", fontSize: 12, padding: "8px 10px" }}
                    />
                    <button onClick={() => handlePostSekisanComment(s.id)}
                      disabled={!(newSekisanComment[s.id] || "").trim() || !currentUser}
                      style={{
                        ...btnStyle(), padding: "8px 14px", fontSize: 12, flexShrink: 0,
                        opacity: (!(newSekisanComment[s.id] || "").trim() || !currentUser) ? 0.5 : 1,
                      }}>送信</button>
                  </div>
                </div>
              );
            })()}
            <div style={{ display: "flex", gap: 8 }}>
              <button style={{ ...btnStyle("ghost"), flex: 1, padding: "11px", fontSize: 14 }} onClick={() => { setEditItem(s); setShowForm(true); }}>編集・詳細</button>
              <button style={{ ...btnStyle("danger"), padding: "11px 14px", fontSize: 14 }} onClick={() => handleDelete(s.id)}>削除</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ===================== APP =====================

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
