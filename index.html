              color: (calFilterType !== "all" || calFilterMember !== "__ALL__") ? C.warn : C.muted,
              borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 700,
            }}>🔽 絞り込み{(calFilterType !== "all" || calFilterMember !== "__ALL__") ? " ●" : ""}</button>
          </div>

          {/* フィルター（折りたたみ） */}
          {calShowFilters && (
            <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.borderDim}` }}>
              <div style={{ fontSize: 10, color: C.muted, marginBottom: 6, fontWeight: 700 }}>種類</div>
              <div style={{ display: "flex", gap: 4, marginBottom: 10, overflowX: "auto", paddingBottom: 4 }}>
                {[
                  { key: "all", label: `全て(${calFilteredEvents.length})`, color: C.muted },
                  { key: "sekisan", label: "🧮検討", color: C.danger },
                  { key: "jiage", label: "🗺️地上げ", color: C.purple },
                  { key: "owner", label: "👤所有者", color: C.accent },
                  { key: "buyContract", label: "📝仕入契約", color: "#a855f7" },
                  { key: "buy", label: "🏠仕入決済", color: C.success },
                  { key: "viewing", label: "👀反響", color: "#06b6d4" },
                  { key: "sellContract", label: "📋売却契約", color: C.accent },
                  { key: "sell", label: "✅売却決済", color: C.warn },
                  { key: "custom", label: "📌メモ", color: "#f97316" },
                ].map(t => {
                  const active = calFilterType === t.key;
                  return (
                    <button key={t.key} onClick={() => setCalFilterType(t.key)} style={{
                      padding: "5px 11px", borderRadius: 16, cursor: "pointer", fontSize: 11,
                      background: active ? t.color : C.bg, color: active ? "#fff" : C.muted,
                      border: `1px solid ${active ? t.color : C.borderDim}`, fontFamily: "inherit",
                      whiteSpace: "nowrap", flexShrink: 0, fontWeight: active ? 700 : 400,
                    }}>{t.label}</button>
                  );
                })}
              </div>
              <div style={{ fontSize: 10, color: C.muted, marginBottom: 6, fontWeight: 700 }}>担当者</div>
              <div style={{ display: "flex", gap: 4, overflowX: "auto", paddingBottom: 2 }}>
                <button onClick={() => setCalFilterMember("__ALL__")} style={{
                  padding: "5px 11px", borderRadius: 16, cursor: "pointer", fontSize: 11,
                  background: calFilterMember === "__ALL__" ? C.borderDim : C.bg,
                  color: calFilterMember === "__ALL__" ? C.text : C.muted,
                  border: `1px solid ${calFilterMember === "__ALL__" ? C.muted : C.borderDim}`,
                  fontFamily: "inherit", whiteSpace: "nowrap", flexShrink: 0, fontWeight: calFilterMember === "__ALL__" ? 700 : 400,
                }}>全員</button>
                {MEMBERS.map(m => (
                  <button key={m} onClick={() => setCalFilterMember(m)} style={{
                    padding: "5px 11px", borderRadius: 16, cursor: "pointer", fontSize: 11,
                    background: calFilterMember === m ? MEMBER_COLORS[m] : C.bg,
                    color: calFilterMember === m ? "#fff" : C.muted,
                    border: `1px solid ${calFilterMember === m ? MEMBER_COLORS[m] : C.borderDim}`,
                    fontFamily: "inherit", whiteSpace: "nowrap", flexShrink: 0, fontWeight: calFilterMember === m ? 700 : 400,
                  }}>{m}</button>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* 曜日ヘッダー */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", padding: "8px 6px 4px", borderBottom: `1px solid ${C.borderDim}`, background: C.bgDark }}>
          {["日", "月", "火", "水", "木", "金", "土"].map((d, i) => (
            <div key={d} style={{
              textAlign: "center", fontSize: 11, fontWeight: 700,
              color: i === 0 ? C.danger : i === 6 ? C.accent : C.muted,
              padding: "4px 0",
            }}>{d}</div>
          ))}
        </div>

        {/* 月表示（Googleカレンダー風） */}
        {calMode === "month" && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", borderTop: `1px solid ${C.borderDim}` }}>
            {calMonthDays.map((d, i) => {
              if (!d) return <div key={i} style={{ minHeight: 78, background: C.bgDark, borderRight: i % 7 !== 6 ? `1px solid ${C.borderDim}` : "none", borderBottom: `1px solid ${C.borderDim}` }} />;
              const dateStr = fmtDate(d);
              const isToday = dateStr === today;
              const isSelected = dateStr === calSelectedDate;
              const events = calEventsByDate[dateStr] || [];
              const dow = d.getDay();
              const isOverdue = dateStr < today && events.some(e => e.type === "jiage" || e.type === "owner");
              return (
                <div
                  key={i}
                  role="button"
                  tabIndex={0}
                  onClick={() => {
                    if (calSelectedDate === dateStr) openNewEvent(dateStr);
                    else setCalSelectedDate(dateStr);
                  }}
                  style={{
                    minHeight: 78, background: isSelected ? C.accent + "22" : C.panelBg,
                    borderRight: i % 7 !== 6 ? `1px solid ${C.borderDim}` : "none",
                    borderBottom: `1px solid ${C.borderDim}`,
                    padding: "3px 3px 2px", cursor: "pointer", fontFamily: "inherit",
                    display: "flex", flexDirection: "column", alignItems: "stretch", gap: 2,
                    textAlign: "left", overflow: "hidden", position: "relative",
                  }}>
                  {/* 日付バッジ */}
                  <div style={{ display: "flex", justifyContent: "flex-start" }}>
                    <span style={{
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      minWidth: 20, height: 20, padding: "0 4px",
                      borderRadius: 10,
                      background: isToday ? C.accent : "transparent",
                      color: isToday ? "#fff" : isOverdue ? C.danger : dow === 0 ? C.danger : dow === 6 ? C.accent : C.text,
                      fontSize: 11, fontWeight: isToday ? 800 : 600,
                    }}>{d.getDate()}</span>
                  </div>
                  {/* 予定タイトル（最大2件）- タップで編集 or 該当画面へ */}
                  <div style={{ display: "flex", flexDirection: "column", gap: 1, overflow: "hidden" }}>
                    {events.slice(0, 2).map((e, j) => {
                      const customEv = e.isCustom ? (data.customEvents || []).find(ev => ev.id === e.rawId) : null;
                      const editable = (customEv && canEdit(customEv)) || (!e.isCustom && e.rawId);
                      return (
                        <div
                          key={j}
                          onClick={editable ? (clickEvt) => {
                            clickEvt.stopPropagation();
                            if (customEv) openEditEvent(customEv);
                            else openLinkedEdit(e);
                          } : undefined}
                          style={{
                            background: e.color + "33", borderLeft: `2px solid ${e.color}`,
                            color: e.color, borderRadius: 2,
                            cursor: editable ? "pointer" : "default",
                            padding: "1px 3px", fontSize: 9, fontWeight: 600,
                            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", lineHeight: 1.3,
                          }}>{e.icon}{e.title}</div>
                      );
                    })}
                    {events.length > 2 && (
                      <div style={{ fontSize: 9, color: C.muted, padding: "0 3px", fontWeight: 700 }}>+{events.length - 2}件</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* 週表示（Googleカレンダー風・縦長） */}
        {calMode === "week" && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", borderTop: `1px solid ${C.borderDim}` }}>
            {calWeekDays.map((d, i) => {
              const dateStr = fmtDate(d);
              const isToday = dateStr === today;
              const isSelected = dateStr === calSelectedDate;
              const events = calEventsByDate[dateStr] || [];
              const dow = d.getDay();
              return (
                <div
                  key={i}
                  role="button"
                  tabIndex={0}
                  onClick={() => {
                    if (calSelectedDate === dateStr) openNewEvent(dateStr);
                    else setCalSelectedDate(dateStr);
                  }}
                  style={{
                    minHeight: 240,
                    background: isSelected ? C.accent + "22" : C.panelBg,
                    borderRight: i !== 6 ? `1px solid ${C.borderDim}` : "none",
                    borderBottom: `1px solid ${C.borderDim}`,
                    padding: "6px 4px", cursor: "pointer", fontFamily: "inherit",
                    display: "flex", flexDirection: "column", alignItems: "stretch", gap: 4,
                    textAlign: "left", overflow: "hidden",
                  }}>
                  <div style={{ display: "flex", justifyContent: "center" }}>
                    <span style={{
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      minWidth: 26, height: 26, borderRadius: 13,
                      background: isToday ? C.accent : "transparent",
                      color: isToday ? "#fff" : dow === 0 ? C.danger : dow === 6 ? C.accent : C.text,
                      fontSize: 13, fontWeight: isToday ? 800 : 700,
                    }}>{d.getDate()}</span>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 3, overflow: "hidden" }}>
                    {events.slice(0, 6).map((e, j) => {
                      const customEv = e.isCustom ? (data.customEvents || []).find(ev => ev.id === e.rawId) : null;
                      const editable = (customEv && canEdit(customEv)) || (!e.isCustom && e.rawId);
                      return (
                        <div
                          key={j}
                          onClick={editable ? (clickEvt) => {
                            clickEvt.stopPropagation();
                            if (customEv) openEditEvent(customEv);
                            else openLinkedEdit(e);
                          } : undefined}
                          style={{
                            background: e.color + "33", borderLeft: `2px solid ${e.color}`,
                            color: e.color, borderRadius: 3,
                            cursor: editable ? "pointer" : "default",
                            padding: "3px 4px", fontSize: 10, fontWeight: 600,
                            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", lineHeight: 1.3,
                          }}>{e.icon}{e.title}</div>
                      );
                    })}
                    {events.length > 6 && <div style={{ fontSize: 10, color: C.muted, padding: "0 4px", fontWeight: 700 }}>+{events.length - 6}件</div>}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* 選択日のイベント一覧 */}
        <div style={{ padding: "14px", background: C.bgDark }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
            <span style={{ fontSize: 16, fontWeight: 800, color: C.text }}>📅 {calSelectedDate}</span>
            {calSelectedDate === today && <Tag label="今日" color={C.accent} />}
            {calSelectedDate < today && <Tag label="過去" color={C.muted} />}
            {calSelectedDate > today && <Tag label="予定" color={C.success} />}
            <span style={{ color: C.muted, fontSize: 12, marginLeft: "auto" }}>{selectedEvents.length}件</span>
            <button onClick={() => openNewEvent(calSelectedDate)} style={{
              background: "#f9731622", border: `1px solid #f9731666`, color: "#f97316",
              borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 700,
            }}>＋ 予定を追加</button>
          </div>
          {selectedEvents.length === 0 ? (
            <div style={{ color: C.muted, fontSize: 13, textAlign: "center", padding: "16px 0" }}>
              この日の予定はありません<br />
              <span style={{ fontSize: 11 }}>上の「＋ 予定を追加」からメモを追加できます</span>
            </div>
          ) : (
            <div style={{ display: "grid", gap: 6 }}>
              {selectedEvents.map((e, i) => {
                const customEv = e.isCustom ? (data.customEvents || []).find(ev => ev.id === e.rawId) : null;
                const editable = (customEv && canEdit(customEv)) || (!e.isCustom && e.rawId);
                return (
                <div key={i} 
                  onClick={editable ? () => {
                    if (customEv) openEditEvent(customEv);
                    else openLinkedEdit(e);
                  } : undefined}
                  style={{
                  display: "flex", alignItems: "center", gap: 10,
                  flexWrap: "wrap",
                  background: C.bg, borderLeft: `4px solid ${e.color}`,
                  borderRadius: 6, padding: "10px 12px",
                  cursor: editable ? "pointer" : "default",
                  transition: "background 0.15s",
                }}>
                  <span style={{ fontSize: 20, flexShrink: 0 }}>{e.icon}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2, flexWrap: "wrap" }}>
                      <span style={{ color: C.text, fontSize: 14, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", minWidth: 0, flex: "0 1 auto" }}>{e.title}</span>
                      {e.isCustom && e.time && <span style={{ color: "#f97316", fontSize: 11, fontWeight: 700 }}>🕐 {e.time}</span>}
                      {e.isCustom && e.reminderMinutes > 0 && <span style={{ color: C.muted, fontSize: 10 }}>🔔{e.reminderMinutes < 60 ? `${e.reminderMinutes}分前` : `${Math.round(e.reminderMinutes/60)}時間前`}</span>}
                    </div>
                    <div style={{ color: C.muted, fontSize: 11, wordBreak: "break-all" }}>{e.sub}</div>
                  </div>
                  {/* 🆕 右側のアクション群を1つのコンテナに（折り返し対応） */}
                  <div style={{
                    display: "flex", alignItems: "center", gap: 6,
                    flexWrap: "wrap", justifyContent: "flex-end",
                    marginLeft: "auto", flexShrink: 0,
                  }}>
                    {e.assignees && e.assignees.length > 0 ? (
                      <div style={{ display: "flex", gap: 3, flexWrap: "wrap", justifyContent: "flex-end" }}>
                        {e.assignees.map(a => <MemberTag key={a} name={a} />)}
                      </div>
                    ) : (e.assignee && <MemberTag name={e.assignee} />)}
                    {e.isCustom && (() => {
                      const customEv = (data.customEvents || []).find(ev => ev.id === e.rawId);
                      if (!customEv || !canEdit(customEv)) return null;
                      return (
                        <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                          <button onClick={(clickEvt) => { clickEvt.stopPropagation(); openEditEvent(customEv); }} style={{ background: C.accent + "22", border: `1.5px solid ${C.accent}`, color: C.accent, borderRadius: 6, padding: "5px 8px", cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 700 }}>✏️</button>
                          <button onClick={(clickEvt) => { clickEvt.stopPropagation(); handleDeleteEvent(e.rawId); }} style={{ background: C.danger + "22", border: `1.5px solid ${C.danger}`, color: C.danger, borderRadius: 6, padding: "5px 8px", cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 700 }}>🗑</button>
                        </div>
                      );
                    })()}
                    {/* 🆕 自動連動予定にも編集/削除ボタン */}
                    {!e.isCustom && ["jiage", "owner", "buyContract", "buy", "sellContract", "sell", "viewing"].includes(e.type) && e.rawId && (() => {
                      const sourceMap = { jiage: "jiage", owner: "owners", buyContract: "stocks", buy: "stocks", sellContract: "stocks", sell: "stocks", viewing: "stocks" };
                      const src = sourceMap[e.type];
                      const parent = (data[src] || []).find(p => p.id === e.rawId);
                      if (!parent || !canEdit(parent)) return null;
                      return (
                        <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                          <button onClick={(clickEvt) => { clickEvt.stopPropagation(); openLinkedEdit(e); }} style={{ background: C.accent + "22", border: `1.5px solid ${C.accent}`, color: C.accent, borderRadius: 6, padding: "5px 8px", cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 700 }}>✏️</button>
                          <button onClick={(clickEvt) => { clickEvt.stopPropagation(); clearLinkedDate(e); }} style={{ background: C.danger + "22", border: `1.5px solid ${C.danger}`, color: C.danger, borderRadius: 6, padding: "5px 8px", cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 700 }}>🗑</button>
                        </div>
                      );
                    })()}
                  </div>
                </div>
              );
              })}
            </div>
          )}
        </div>
      </div>

      {/* 📌 カスタム予定の追加・編集 BottomSheet */}
      {showEventForm && (
        <BottomSheet title={editingEvent ? "📌 予定を編集" : "📌 新しい予定を追加"} onClose={() => { setShowEventForm(false); setEditingEvent(null); }}>
          <Field label="タイトル *">
            <input style={inp} value={eventForm.title} onChange={e => setEventForm(p => ({ ...p, title: e.target.value }))} placeholder="比嘉さんとMTG" autoFocus />
          </Field>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Field label="日付 *">
              <input type="date" style={inp} value={eventForm.date} onChange={e => setEventForm(p => ({ ...p, date: e.target.value }))} />
            </Field>
            <Field label="時間">
              <input type="time" style={inp} value={eventForm.time} onChange={e => setEventForm(p => ({ ...p, time: e.target.value }))} />
            </Field>
          </div>
          <Field label="場所">
            <input style={inp} value={eventForm.location} onChange={e => setEventForm(p => ({ ...p, location: e.target.value }))} placeholder="現地 / 事務所 / Zoom" />
          </Field>
          <Field label="メモ">
            <textarea style={{ ...inp, height: 80, resize: "vertical" }} value={eventForm.memo} onChange={e => setEventForm(p => ({ ...p, memo: e.target.value }))} placeholder="持ち物・確認事項など" />
          </Field>
          <Field label={`👥 担当者（複数選択可・${(eventForm.assignees || []).length}人選択中）`}>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {MEMBERS.map(m => {
                const isSelected = (eventForm.assignees || []).includes(m);
                return (
                  <button key={m} onClick={() => {
                    setEventForm(p => ({
                      ...p,
                      assignees: isSelected
                        ? (p.assignees || []).filter(a => a !== m)
                        : [...(p.assignees || []), m]
                    }));
                  }} style={{
                    padding: "8px 14px", borderRadius: 20, cursor: "pointer", fontSize: 13,
                    background: isSelected ? (MEMBER_COLORS[m] || C.accent) : C.bg,
                    color: isSelected ? "#fff" : C.muted,
                    border: `1px solid ${isSelected ? (MEMBER_COLORS[m] || C.accent) : C.borderDim}`,
                    fontFamily: "inherit", fontWeight: isSelected ? 700 : 400,
                  }}>{isSelected ? "✓ " : ""}{m}</button>
                );
              })}
            </div>
            {(eventForm.assignees || []).length === 0 && (
              <div style={{ fontSize: 11, color: C.muted, marginTop: 6 }}>※ 担当者を指定しない場合は全員に共通の予定として扱われます</div>
            )}
          </Field>
          <Field label="🔔 リマインダー">
            <select style={inp} value={eventForm.reminderMinutes} onChange={e => setEventForm(p => ({ ...p, reminderMinutes: Number(e.target.value) }))}>
              <option value={0}>通知なし</option>
              <option value={5}>5分前</option>
              <option value={15}>15分前</option>
              <option value={30}>30分前</option>
              <option value={60}>1時間前</option>
              <option value={180}>3時間前</option>
              <option value={1440}>1日前</option>
            </select>
            {eventForm.reminderMinutes > 0 && !eventForm.time && (
              <div style={{ fontSize: 11, color: C.warn, marginTop: 4 }}>⚠️ リマインダーには「時間」の入力が必要です</div>
            )}
            {eventForm.reminderMinutes > 0 && (
              <div style={{ fontSize: 10, color: C.muted, marginTop: 4, lineHeight: 1.5 }}>
                ※ 通知はアプリを開いている時のみ届きます。<br />初回設定時にブラウザの通知許可が求められます。
              </div>
            )}
          </Field>
          <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
            <button style={{ ...btnStyle("ghost"), flex: 1 }} onClick={() => { setShowEventForm(false); setEditingEvent(null); }}>キャンセル</button>
            <button style={{ ...btnStyle(), flex: 2, background: "#f97316", borderColor: "#f97316" }} onClick={handleSaveEvent}>{editingEvent ? "更新する" : "予定を保存"}</button>
          </div>
          {/* 🆕 編集モード時のみ削除ボタンを表示 */}
          {editingEvent && (
            <button
              onClick={() => {
                handleDeleteEvent(editingEvent.id);
                setShowEventForm(false);
                setEditingEvent(null);
              }}
              style={{
                width: "100%", marginTop: 10, padding: "12px",
                background: C.danger + "22", border: `1.5px solid ${C.danger}`,
                color: C.danger, borderRadius: 10, cursor: "pointer",
                fontSize: 14, fontWeight: 700, fontFamily: "inherit",
              }}
            >🗑️ この予定を削除</button>
          )}
        </BottomSheet>
      )}

      {/* 🆕 自動連動予定（地上げ・所有者・在庫の日付）の編集 BottomSheet */}
      {linkedEditForm && (
        <BottomSheet title={`${linkedEditForm.icon} ${linkedEditForm.dateLabel}を編集`} onClose={() => setLinkedEditForm(null)}>
          <div style={{ background: C.panelBg, borderRadius: 10, padding: "12px 14px", marginBottom: 14, borderLeft: `4px solid ${linkedEditForm.color}` }}>

          <div style={{ maxHeight: 320, overflowY: "auto" }}>

              const ts = new Date(log.timestamp);
              const now = new Date();
              const isToday = ts.toDateString() === now.toDateString();
              const yest = new Date(now); yest.setDate(yest.getDate() - 1);
              const isYesterday = ts.toDateString() === yest.toDateString();
              const timeStr = isToday
                ? `${ts.getHours()}:${String(ts.getMinutes()).padStart(2, "0")}`
                : isYesterday
                  ? `昨日 ${ts.getHours()}:${String(ts.getMinutes()).padStart(2, "0")}`
                  : `${ts.getMonth() + 1}/${ts.getDate()}`;
              const actionIcon = { add: "➕", update: "✏️", delete: "🗑️", promote: "🚀" }[log.action] || "•";
              const actionColor = { add: C.success, update: C.accent, delete: C.danger, promote: C.warn }[log.action] || C.muted;
              const targetIcon = {
                stock: "🏠", jiage: "🚧", owner: "👤",
                sekisan: "🧮", yakusho: "🏛", event: "📅",
              }[log.target] || "📋";
              const memberColor = MEMBER_COLORS[log.user] || C.accent;

                <div key={log.id} style={{ display: "flex", gap: 10, padding: "8px 0", borderBottom: `1px solid ${C.borderDim}`, fontSize: 12, alignItems: "flex-start" }}>

                  <span style={{ color: C.muted, fontSize: 11, whiteSpace: "nowrap", paddingTop: 2 }}>{timeStr}</span>

                  <span style={{ color: C.text, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.name}</span>
                  <MemberTag name={s.assignee} />
                  <span style={{ color: C.accent, fontSize: 12, flexShrink: 0 }}>✏</span>

          <StatCard icon="📈" label="年間利益" value={(yearProfit / 10000).toFixed(0) + "万"} color={C.success} sub="税引前" />

          { label: "売上", current: Math.round(yearSell / 10000), goal: goals.sell, unit: "万", color: C.warn, icon: "💰" },

          <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>

                <button onClick={() => { setGoalForm({ sell: String(goals.sell), profit: String(goals.profit), buyCount: String(goals.buyCount) }); setShowGoalEdit(true); }} style={{ ...btnStyle("ghost"), padding: "4px 10px", fontSize: 11 }}>目標編集</button>
              ) : (
                <span style={{ color: C.muted, fontSize: 10 }}>👑管理者のみ編集可</span>
              )}
            </div>
            <div style={{ display: "grid", gap: 12 }}>
              {items.map(g => {
                const pct = g.goal > 0 ? (g.current / g.goal * 100) : 0;
                const forecast = monthsPassed > 0 ? Math.round(g.current / monthsPassed * 12) : 0;
                const forecastPct = g.goal > 0 ? (forecast / g.goal * 100) : 0;
                return (
                  <div key={g.label} style={{ background: C.bg, borderRadius: 10, padding: "12px 14px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
                      <span style={{ fontSize: 13, color: C.muted }}>{g.icon} {g.label}</span>
                      <span style={{ fontSize: 11, color: pct >= 100 ? C.success : pct >= 50 ? C.warn : C.muted, fontWeight: 700 }}>{pct.toFixed(0)}%</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                      <span style={{ fontSize: 18, fontWeight: 800, color: g.color }}>{g.current.toLocaleString()}{g.unit}</span>
                      <span style={{ fontSize: 12, color: C.muted }}>/ {g.goal.toLocaleString()}{g.unit}</span>
                    </div>
                    <div style={{ background: C.borderDim, borderRadius: 4, height: 6, overflow: "hidden", marginBottom: 6 }}>
                      <div style={{ width: Math.min(pct, 100) + "%", height: "100%", background: pct >= 100 ? C.success : pct >= 50 ? C.warn : C.danger, borderRadius: 4, transition: "width 0.5s" }} />

                    <div style={{ fontSize: 11, color: C.muted, display: "flex", justifyContent: "space-between" }}>

          </div>
        );

            <input type="text" inputMode="numeric" style={inp} value={goalForm.buyCount} onChange={e => setGoalForm(p => ({ ...p, buyCount: e.target.value.replace(/[^0-9]/g, "") }))} placeholder="30" />
          </Field>

              setData(d => ({ ...d, annualGoals: { sell: Number(goalForm.sell) || 0, profit: Number(goalForm.profit) || 0, buyCount: Number(goalForm.buyCount) || 0 } }));
              setShowGoalEdit(false);

        <div style={{ fontSize: 12, fontWeight: 700, color: C.text, marginBottom: 12 }}>📅 月別売上・利益（万円）</div>
        <ResponsiveContainer width="100%" height={170}>
          <BarChart data={monthlyData} margin={{ top: 0, right: 0, left: -24, bottom: 0 }}>
            <XAxis dataKey="month" tick={{ fill: C.muted, fontSize: 9 }} axisLine={false} tickLine={false} />
            <YAxis tick={{ fill: C.muted, fontSize: 9 }} axisLine={false} tickLine={false} />
            <Tooltip contentStyle={{ background: C.panelBg, border: `1px solid ${C.borderDim}`, borderRadius: 8, color: C.text, fontSize: 12 }} formatter={(v) => v.toFixed(0) + "万"} />

        <ResponsiveContainer width="100%" height={140}>
          <BarChart data={monthlyData} margin={{ top: 0, right: 0, left: -24, bottom: 0 }}>
            <XAxis dataKey="month" tick={{ fill: C.muted, fontSize: 9 }} axisLine={false} tickLine={false} />
            <YAxis tick={{ fill: C.muted, fontSize: 9 }} axisLine={false} tickLine={false} allowDecimals={false} />
            <Tooltip contentStyle={{ background: C.panelBg, border: `1px solid ${C.borderDim}`, borderRadius: 8, color: C.text, fontSize: 12 }} formatter={(v) => v + "件"} />
            <Bar dataKey="buyCount" name="仕入" fill={C.accent} radius={[3, 3, 0, 0]} />
            <Bar dataKey="sellCount" name="売却" fill={C.success} radius={[3, 3, 0, 0]} />

// ===================== 📥 SUUMO/アットホーム反響取り込み =====================
// メール本文を解析して反響情報を抽出するパース関数
function parseInquiryEmail(text) {
  if (!text || typeof text !== "string") return null;
  // SUUMO判定（特徴的なキーワード）
  if (text.includes("お客様プロフィール") || text.includes("問合せ物件")) {
    return parseSUUMO(text);
  }
  // アットホーム判定
  if (text.includes("お問合せされた物件") || text.includes("お客様のプロフィール") || text.includes("at home 物件番号") || text.includes("athome.co.jp")) {
    return parseAtHome(text);
  }
  return null;
}

// SUUMO 形式パース（ラベル[空白/タブ]値）
function parseSUUMO(text) {
  const result = { channel: "SUUMO" };
  const grab = (label) => {
    // 「ラベル　値」「ラベル\t値」「ラベル　　値」など空白/タブを許容
    const re = new RegExp(label + "\\s*[\\t\\s　]+([^\\n\\r]+)");
    const m = text.match(re);
    return m ? m[1].trim() : "";
  };
  const customer = grab("氏名（漢字）") || grab("氏名（カナ）");
  if (customer) result.customer = customer;
  const phone = grab("電話番号");
  if (phone) result.contact = phone;
  const email = grab("メールアドレス");
  if (email) result.email = email.replace(/^\[([^\]]+)\].*$/, "$1");
  const address = grab("住所");
  if (address) result.customerAddress = address;
  const propertyName = grab("物件名");
  if (propertyName) result.propertyName = propertyName;
  const propertyAddress = grab("所在地");
  if (propertyAddress) result.propertyAddress = propertyAddress;
  const price = grab("価格");
  if (price) result.propertyPrice = price;
  const urlMatch = text.match(/物件詳細画面\s*[\t\s　]+(https?:\/\/[^\s\n\r]+)/);
  if (urlMatch) result.propertyUrl = urlMatch[1].trim();
  return result;
}

// アットホーム形式パース（改行なし形式にも対応、複数フォーマット対応）
function parseAtHome(text) {
  const result = { channel: "アットホーム" };
  // アットホームのラベルリスト（次のラベルが現れるまでを値とする境界判定用）
  const AT_HOME_LABELS = [
    "お問合わせ日時", "お問合せ日時",
    "物件種目", "建物名", "交通", "駅名", "徒歩", "バス停名",
    "バス乗車分", "バス停歩分", "所在地", "賃料", "価格",
    "間取り", "専有・建物面積", "専有面積", "建物面積", "土地面積",
    "at home 物件番号", "貴社物件管理番号", "詳しい物件情報",
    "お名前\\(漢字\\)", "お名前（漢字）", "お名前\\(カナ\\)", "お名前（カナ）",
    "お名前", "希望連絡方法", "メールアドレス", "郵便番号",
    "住所", "電話番号", "連絡希望の時間帯", "ＦＡＸ",
    "その他の連絡方法", "性別", "年齢", "入居希望時期",
  ];
  const grab = (label) => {
    // 「：」の後、次のラベル名 or 区切り線（━─—-）or ＜ が現れるまでを値として取る
    const stopLabels = AT_HOME_LABELS.filter(l => l !== label).join("|");
    const re = new RegExp(
      label + "[\\t\\s　]*[:：][\\t\\s　]*([\\s\\S]*?)(?=(?:" + stopLabels + ")[\\t\\s　]*[:：]|[━─—\\-]{3,}|＜|$)"
    );
    const m = text.match(re);
    return m ? m[1].trim() : "";
  };
  // 顧客名：複数パターン対応
  const customer = grab("お名前\\(漢字\\)") || grab("お名前（漢字）") || grab("お名前\\(カナ\\)") || grab("お名前（カナ）") || grab("お名前");
  if (customer) result.customer = customer;
  const phone = grab("電話番号");
  if (phone) result.contact = phone;
  let email = grab("メールアドレス");
  if (email) {
    // 「[email](mailto:email)」形式の場合は中身だけ抜く
    email = email.replace(/^\[([^\]]+)\].*$/, "$1");
    // 残った余分な空白除去
    email = email.replace(/\s+/g, "").trim();
    result.email = email;
  }
  const customerAddr = grab("住所");
  if (customerAddr) result.customerAddress = customerAddr;
  const buildingName = grab("建物名");
  if (buildingName) result.propertyName = buildingName;
  const propertyAddress = grab("所在地");
  if (propertyAddress) result.propertyAddress = propertyAddress;
  const rent = grab("賃料") || grab("価格");
  if (rent) result.propertyPrice = rent;
  // お問合せ日時：両表記対応
  const dateMatch = text.match(/お問合わ?せ日時[\t\s　]*[:：][\t\s　]*(\S+)/);
  if (dateMatch) result.inquiryDate = dateMatch[1].trim();
  // 問い合わせ内容（複数区切り線パターン対応）
  const noteMatch = text.match(/＜物件に関するお問合わ?せ内容＞([\s\S]*?)(?:[━─—\-]{3,}|＜|$)/);
  if (noteMatch) {
    result.note = noteMatch[1].trim().replace(/\s+/g, " ").slice(0, 500);
  }
  return result;
}

// 物件名から在庫物件をマッチング（部分一致でスコアリング）
function findMatchingStock(parsed, stocks) {
  if (!parsed || !stocks || stocks.length === 0) return null;
  const candidates = [];
  const searchTerms = [parsed.propertyName, parsed.propertyAddress].filter(Boolean);
  if (searchTerms.length === 0) return null;

  for (const stock of stocks) {
    const stockName = (stock.name || "").trim();
    if (!stockName) continue;
    let score = 0;
    for (const term of searchTerms) {
      // 完全一致
      if (stockName === term) score += 100;
      // 部分一致（どちらかが含む）
      if (stockName.includes(term) || term.includes(stockName)) score += 50;
      // 単語ベース一致（3文字以上の単語が含まれてる）
      const tokens = stockName.split(/[\s　・\-_\u3000]/).filter(t => t.length >= 3);
      for (const tok of tokens) {
        if (term.includes(tok)) score += 20;
      }
      // 数字パターン一致（地番など）
      const numbers = stockName.match(/\d+/g) || [];
      for (const num of numbers) {
        if (num.length >= 2 && term.includes(num)) score += 10;
      }
    }
    if (score > 0) candidates.push({ stock, score });
  }
  candidates.sort((a, b) => b.score - a.score);
  return candidates.length > 0 ? candidates[0].stock : null;
}

      const relatedEvents = (d.customEvents || []).filter(e => e.stockLinkId && e.stockLinkId === id);
      relatedEvents.forEach(ev => recordDeletion("event", ev.id));
      const next = {
        ...d,
        stocks: d.stocks.filter(s => s.id !== id),
        // 🆕 関連カレンダーイベント連動削除（仕入契約日・決済日など）
        customEvents: (d.customEvents || []).filter(e => !(e.stockLinkId && e.stockLinkId === id)),
      };
      return appendLogAndNotify(next, "delete", "stock", `${target?.name || "(無題)"}を削除`, target);

            fontFamily: "inherit", fontWeight: 700,

          <button style={{ ...btnStyle(), padding: "10px 16px", fontSize: 14 }} onClick={() => { setForm(empty); setEditItem(null); setShowAdd(true); }}>＋ 追加</button>

      {/* ====== 表示モード切替（現在の在庫 / 決済完了 / すべて） ====== */}
      <div style={{ display: "flex", gap: 6, marginBottom: 12, background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 12, padding: 4 }}>
        {[

          { key: "completed", label: "✅ 決済完了", count: counts.completed, color: C.success },
          { key: "all", label: "すべて", count: counts.all, color: C.muted },

          const active = viewMode === m.key;

            <button key={m.key} onClick={() => setViewMode(m.key)} style={{
              flex: 1, background: active ? m.color : "none", border: "none",

      <FilterChips options={MEMBERS} value={filterMembers} onChange={setFilterMembers} multi />

      <div style={{ marginBottom: 8 }}>
        <button
          onClick={() => setStatusFilterExpanded(p => !p)}
          style={{
            width: "100%", background: "none", border: "none",
            display: "flex", alignItems: "center", gap: 6,
            cursor: "pointer", fontFamily: "inherit", padding: "4px 0",
          }}>
          <span style={{ fontSize: 12, color: C.muted }}>ステータス</span>
          {filterStatuses.length > 0 && (

        {statusFilterExpanded && (
          <div style={{ marginTop: 6 }}>
            {/* 🆕 グループ表示でステータス選択 */}

              const visibleStatuses = grp.statuses.filter(st => {
                if (viewMode === "active" && st === "売決完了") return false;

                return true;

                <div key={grp.label} style={{ marginBottom: 8 }}>

                    <span style={{ marginLeft: "auto", color: C.muted, fontSize: 11, fontWeight: 700 }}>{expanded ? "▲ 閉じる" : "▼ 詳細"}</span>

                                <span style={{ background: "#06b6d433", color: "#06b6d4", padding: "1px 7px", borderRadius: 10, fontSize: 10, fontWeight: 700 }}>

                              {v.visitDate && (
                                <span style={{ color: "#06b6d4", marginLeft: 8, fontWeight: 700 }}>
