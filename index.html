<script>
// ローディングメッセージを段階的に変える（ユーザーに状況を伝える）
var hikariLoadingMessages = [
  { delay: 0, msg: "読み込み中..." },
  { delay: 5000, msg: "コードを読み込んでいます..." },
  { delay: 15000, msg: "もうしばらくお待ちください..." },
  { delay: 30000, msg: "通信や端末の状況により時間がかかっています..." },
  { delay: 45000, msg: "それでも開かない場合は下のボタンを押してください" },
];
hikariLoadingMessages.forEach(function(item) {
  setTimeout(function() {
    var el = document.getElementById('hikari-loading-msg');
    if (el && !window.__hikariReactStarted__) el.textContent = item.msg;
  }, item.delay);
});
// グローバルエラーキャッチ（最初に登録）
window.__hikariErrors__ = [];
window.addEventListener('error', function(e) {
  window.__hikariErrors__.push({
    type: 'error', msg: e.message || String(e.error),
    src: e.filename || '', line: e.lineno || 0, col: e.colno || 0
  });
});
window.addEventListener('unhandledrejection', function(e) {
  window.__hikariErrors__.push({
    type: 'promise', msg: String(e.reason && (e.reason.message || e.reason))
  });
});

// 強制リセット関数（HTMLから呼べる）
window.forceHikariReset = async function() {
  try { localStorage.clear(); } catch(e) {}
  try {
    if ('caches' in window) {
      const names = await caches.keys();
      await Promise.all(names.map(n => caches.delete(n)));
    }
  } catch(e) {}
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
  } catch(e) {}
  setTimeout(function() { window.location.reload(true); }, 500);
};

// タイムアウト処理は削除した（React起動を待つ）
// もし読み込み中のままで動かない場合、ユーザーは画面長押し→更新で対応してもらう
// 一応、手動で呼び出せるエラー画面復旧関数だけ残しておく
window.__showHikariRecovery__ = function() {
  var root = document.getElementById('root');
  if (root) {
    root.innerHTML = '<div style="padding:32px 24px;color:#e2e8f0;font-family:sans-serif;max-width:480px;margin:0 auto">' +
      '<h2 style="color:#0ea5e9;margin-bottom:16px">🔧 リカバリーメニュー</h2>' +
      '<button onclick="window.location.reload(true)" style="width:100%;padding:14px;background:#0ea5e9;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px">🔁 再読み込み</button>' +
      '<button onclick="window.forceHikariReset()" style="width:100%;padding:14px;background:#1a2535;color:#e2e8f0;border:1px solid #475569;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit">🔄 強制リセット（キャッシュ全削除）</button>' +
      '</div>';
  }
};

// PWA: Service Worker 登録
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    // updateViaCache: 'none' で sw.js を毎回最新取得（HTTP キャッシュをバイパス）
    navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).then(function(reg) {
      console.log('[PWA] Service Worker 登録成功:', reg.scope);
      // 起動するたびに最新の sw.js があるかチェック
      reg.update().catch(function(){});

      // 新しい sw.js が見つかったら、即座に切り替える
      reg.addEventListener('updatefound', function() {
        const newSW = reg.installing;
        if (!newSW) return;
        newSW.addEventListener('statechange', function() {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            // 既に古い SW が動いている状態で、新しい SW が installed になった
            console.log('[PWA] 新しい Service Worker を検出 → 切り替えます');
            newSW.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    }).catch(function(err) {
      console.warn('[PWA] Service Worker 登録失敗:', err);
    });

    // controller が変わったら（新SWがアクティブになったら）画面をリロード
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      if (reloaded) return;
      reloaded = true;
      console.log('[PWA] Service Worker 切替完了 → リロード');
      window.location.reload();
    });
  });
}

// 連結担当者を分解（例：「比嘉・下田」→ ["比嘉", "下田"]）
function expandAssignee(name) {
  if (!name) return [];
  return String(name).split(/[・,、]/).map(s => s.trim()).filter(Boolean);
}
function expandAssignees(arr) {
  if (!Array.isArray(arr)) return [];
  return arr.flatMap(a => expandAssignee(a));
}
function isAssignedTo(assignees, member) {
  if (!member) return true;
  const list = Array.isArray(assignees) ? assignees : [assignees];
  const expanded = list.flatMap(a => expandAssignee(a));
  return expanded.includes(member);
}

function canEditItem(item, currentUser, adminMembers) {
  // adminMembers は配列 ["下田", "比嘉"] or 文字列 "下田"（後方互換）
  const admins = Array.isArray(adminMembers)
    ? adminMembers
    : (adminMembers ? [adminMembers] : ["下田", "比嘉"]); // デフォルト

  if (!currentUser) return false; // 未認証は全て不可
  if (admins.includes(currentUser)) return true; // 管理者は全権限
  if (!item) return false;
  // 単一assignee（stocks/jiage/owners/sekisan/yakusho）
  // 配列assignees（customEvents）

  const single = item.assignee || item.member || "";

  const createdBy = item.createdBy || "";
  const all = [single, ...arr, createdBy].filter(Boolean);
  return isAssignedTo(all, currentUser);
}

// CSV/Excelダウンロード（UTF-8 BOM付き、Excel日本語対応）
function downloadCSV(rows, filename) {
  if (!rows || !rows.length) { alert("ダウンロードするデータがありません"); return; }
  const headers = Object.keys(rows[0]);
  const escape = v => {
    const s = (v === null || v === undefined) ? "" : String(v);
    return `"${s.replace(/"/g, '""')}"`;
  };
  const lines = [
    headers.map(escape).join(","),
    ...rows.map(row => headers.map(h => escape(row[h])).join(","))
  ];
  // BOM付きUTF-8でExcelの文字化けを防ぐ
  const bom = "\uFEFF";
  const blob = new Blob([bom + lines.join("\r\n")], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

// 仕入日からの経過日数を計算
function daysSinceBuy(buyDateStr) {
  if (!buyDateStr) return null;
  const buy = new Date(buyDateStr);
  const today = new Date();
  if (isNaN(buy.getTime())) return null;
  return Math.floor((today - buy) / 86400000);
}

// 滞留日数の色分け情報を返す
function stagnantInfo(buyDateStr) {
  const d = daysSinceBuy(buyDateStr);
  if (d == null) return null;
  let color, level;
  if (d >= 180) { color = "#ef4444"; level = "🔴"; }
  else if (d >= 90) { color = "#f59e0b"; level = "🟡"; }
  else if (d >= 30) { color = "#94a3b8"; level = "⚪"; }
  else { color = "#10b981"; level = "🟢"; }
  return { days: d, color, level };
}

// VAPID公開鍵をUint8Arrayに変換するヘルパー
function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

// Push購読を取得 or 新規作成
async function ensurePushSubscription() {
  if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
    throw new Error("このブラウザはWeb Pushに対応していません");
  }
  if (Notification.permission !== "granted") {
    const perm = await Notification.requestPermission();
    if (perm !== "granted") throw new Error("通知が許可されませんでした");
  }
  const reg = await navigator.serviceWorker.ready;
  let sub = await reg.pushManager.getSubscription();
  if (!sub) {
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
    });
  }
  return sub;
}

  const targets = new Set(getNotifyMembers(data));

// Supabaseにデータを保存
async function saveToSupabase(data, retries = 3) {
  // 🆕 バージョン情報を含める（自動更新通知用）
  const dataWithVersion = { ...data, __appVersion: APP_VERSION };
  // ローカルキャッシュは先に保存（Supabase失敗してもローカルには確実に残す）
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(dataWithVersion)); } catch (e) { console.warn("localStorage save failed:", e); }

  for (let attempt = 0; attempt < retries; attempt++) {
    try {
      // まず存在確認
      const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/app_data?id=eq.${DATA_ID}&select=id`, {
        headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
      });
      if (!checkRes.ok) throw new Error(`Check failed: ${checkRes.status}`);
      const exists = await checkRes.json();
      const method = exists && exists.length > 0 ? "PATCH" : "POST";
      const url = exists && exists.length > 0
        ? `${SUPABASE_URL}/rest/v1/app_data?id=eq.${DATA_ID}`
        : `${SUPABASE_URL}/rest/v1/app_data`;
      const res = await fetch(url, {
        method,
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json",
          "Prefer": "return=minimal",
        },
        body: JSON.stringify({ id: DATA_ID, data: dataWithVersion, updated_at: new Date().toISOString() }),
      });
      if (!res.ok) throw new Error(`Save failed: ${res.status} ${await res.text()}`);
      // 保存成功！カレンダー予定数も含めてログ出力（デバッグ用）
      console.log(`[Supabase] 保存成功 (試行${attempt+1}/${retries}) customEvents=${(data.customEvents||[]).length}件 stocks=${(data.stocks||[]).length}件`);
      return true;
    } catch (e) {
      console.error(`[Supabase] 保存失敗 (試行${attempt+1}/${retries}):`, e);
      if (attempt < retries - 1) {
        // 1秒、2秒待ってからリトライ
        await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
      }
    }
  }
  console.error("[Supabase] 3回試して保存失敗。ローカルキャッシュには保存済み。");
  return false;
}

// ============== 🆕 削除アイテムID追跡 ==============
// 複数端末で同期する際、ローカルで削除したアイテムが
// 他端末の古いキャッシュから「復活」するのを防ぐ
// localStorageに「削除済みID」を7日間保持
const DELETED_IDS_KEY = "hikari_deleted_ids";
const DELETED_RETENTION_MS = 7 * 24 * 60 * 60 * 1000; // 7日間
// 🆕 共有tombstone（data.tombstones）の保持期間。これを過ぎたら自動で掃除する
const TOMBSTONE_RETENTION_MS = 30 * 24 * 60 * 60 * 1000; // 30日間

function _getDeletedIdsRaw() {
  try { return JSON.parse(localStorage.getItem(DELETED_IDS_KEY) || "{}"); }
  catch { return {}; }
}

function recordDeletion(target, id) {
  if (id == null) return;
  // 🆕 ターゲット名 → arrayKey マッピング（appendLogAndNotifyのtarget名と、mergeRemoteSafelyのarrayKeyのズレを吸収）
  const targetToArrayKey = {
    "event": "customEvents",
    "stock": "stocks",
    "owner": "owners",
    "sekisan": "sekisan",
    "jiage": "jiage",
    "yakusho": "yakusho",
    "approach": "approaches",
  };
  const arrayKey = targetToArrayKey[target] || target;
  try {
    const data = _getDeletedIdsRaw();
    if (!data[arrayKey]) data[arrayKey] = {};
    data[arrayKey][String(id)] = Date.now();
    localStorage.setItem(DELETED_IDS_KEY, JSON.stringify(data));
  } catch {}
}

function getDeletedIdSet(target) {
  const data = _getDeletedIdsRaw();
  const map = data[target] || {};
  const cutoff = Date.now() - DELETED_RETENTION_MS;
  const result = new Set();
  Object.entries(map).forEach(([id, ts]) => {
    if (ts > cutoff) {
      // ID は数値の場合と文字列の場合があるので両方
      result.add(id);
      const numId = Number(id);
      if (!isNaN(numId)) result.add(numId);
    }
  });
  return result;
}

function cleanupOldDeletions() {
  try {
    const data = _getDeletedIdsRaw();
    const cutoff = Date.now() - DELETED_RETENTION_MS;
    let changed = false;
    Object.keys(data).forEach(target => {
      const map = data[target] || {};
      Object.keys(map).forEach(id => {
        if (map[id] < cutoff) {
          delete map[id];
          changed = true;
        }
      });
    });
    if (changed) localStorage.setItem(DELETED_IDS_KEY, JSON.stringify(data));
  } catch {}
}

// ============== 画像圧縮関数（写真添付用）==============
// 画像ファイルを受け取って、リサイズ＆圧縮してbase64で返す
async function compressImage(file, maxSize = 800, quality = 0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let { width, height } = img;
        if (width > height && width > maxSize) {
          height = Math.round((height * maxSize) / width);
          width = maxSize;
        } else if (height > maxSize) {
          width = Math.round((width * maxSize) / height);
          height = maxSize;
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function PinScreen({ onUnlock }) {
  const hasPin = !!getPin();
  const [mode, setMode] = useState(hasPin ? "verify" : "setup"); // verify | setup | confirm
  const [pin, setPinInput] = useState("");
  const [pinConfirm, setPinConfirm] = useState("");
  const [error, setError] = useState("");

  const handleVerify = () => {
    if (pin === getPin()) {
      markUnlocked();
      onUnlock();
    } else {
      setError("PINが違います");
      setPinInput("");
    }
  };

  const handleSetup = () => {
    if (pin.length !== 4) { setError("4桁で入力してください"); return; }
    setMode("confirm");
    setError("");
  };

  const handleConfirm = () => {
    if (pinConfirm === pin) {
      setPin(pin);
      markUnlocked();
      onUnlock();
    } else {
      setError("PINが一致しません");
      setPinConfirm("");
    }
  };

  const title = mode === "verify" ? "🔒 PINを入力" : mode === "setup" ? "🔐 PIN設定（初回）" : "🔐 もう一度入力";
  const desc = mode === "verify" ? "アプリ起動用の4桁PINを入力してください" : mode === "setup" ? "4桁のPINを設定してください。次回起動時から必要になります。" : "確認のためもう一度同じPINを入力してください";

  const currentValue = mode === "confirm" ? pinConfirm : pin;
  const setCurrentValue = mode === "confirm" ? setPinConfirm : setPinInput;
  const handleSubmit = mode === "verify" ? handleVerify : mode === "setup" ? handleSetup : handleConfirm;

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 20, fontFamily: "'Noto Sans JP', sans-serif" }}>
      <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 18, padding: "30px 24px", maxWidth: 360, width: "100%" }}>
        <div style={{ fontSize: 18, fontWeight: 800, color: C.text, marginBottom: 8, textAlign: "center" }}>{title}</div>
        <div style={{ fontSize: 12, color: C.muted, marginBottom: 24, textAlign: "center", lineHeight: 1.6 }}>{desc}</div>
        <input
          type="password"
          inputMode="numeric"
          maxLength={4}
          value={currentValue}
          onChange={e => { setCurrentValue(e.target.value.replace(/[^0-9]/g, "")); setError(""); }}
          onKeyDown={e => { if (e.key === "Enter") handleSubmit(); }}
          placeholder="••••"
          autoFocus
          style={{ ...inp, fontSize: 32, textAlign: "center", letterSpacing: "0.5em", padding: "16px", marginBottom: 12 }}
        />
        {error && <div style={{ color: C.danger, fontSize: 13, textAlign: "center", marginBottom: 12 }}>{error}</div>}
        <button onClick={handleSubmit} style={{ ...btnStyle(), width: "100%", padding: "14px", fontSize: 15 }}>
          {mode === "verify" ? "ロック解除" : mode === "setup" ? "次へ" : "設定完了"}
        </button>
        {mode === "verify" && (
          <button
            onClick={() => { if (window.confirm("PINをリセットしますか？\nリセットすると再設定が必要になります。")) { clearPin(); setMode("setup"); setPinInput(""); setError(""); } }}
            style={{ background: "none", border: "none", color: C.muted, fontSize: 12, marginTop: 16, width: "100%", cursor: "pointer", fontFamily: "inherit" }}
          >
            PINを忘れた場合（リセット）
          </button>
        )}
      </div>
      <div style={{ marginTop: 14, fontSize: 10, color: C.muted }}>ひかり不動産</div>
    </div>
  );
}

        else if (tabParam === 'jiage') setPage('jiage');

    const onMsg = (event) => {

      "契約書作成中": "売契準備中",

    // マイグレーション不要なら何もしない（saveToSupabase もスキップ）

    console.log("[Migration] マイグレーション実行");
    setData(d => {

          // 13段階版 → 14段階版（リネーム + 統合 + 分割）
          "仕契完成": "仕契完了",           // 統合

  // 直近の自分の保存時刻（ポーリングで自分の更新を上書きしないため）
  // 🆕 直近の自分保存時刻を localStorage で永続化（強制更新後も5分ガードが効くように）
  const LAST_SAVE_KEY = "hikari_last_save";
  const lastLocalSaveRef = useRef(Number(localStorage.getItem(LAST_SAVE_KEY) || 0));

  // ローカル(キャッシュ)とリモートを賢くマージする関数
  // 🔧 削除IDトラッキング方式：
  //   - 自分が削除したID は別途追跡（7日間）→ 他端末から復活させない
  //   - ローカル限定アイテム（自分が新規追加）は常に保護 → 並行編集でも消失しない
  //   - 両立により「削除復活」「データ消失」両方を防ぐ
  const mergeRemoteSafely = (remote) => {
    if (!remote) return null;
    const local = loadFromCache();
    const merged = mergeWithDefault(remote);
    if (!local) return merged;

    // 🆕 直近5分以内に自分が編集したか（updatedAt が無い既存データの保護）
    const recentlyEdited = (Date.now() - lastLocalSaveRef.current) < 5 * 60 * 1000;
    const nowTs = Date.now();
    const tombCutoff = nowTs - TOMBSTONE_RETENTION_MS;

    // 🆕 共有tombstone（削除済みID）を local と remote から統合する
    //    - どちらかで削除されていれば全端末に伝わる
    //    - 30日より古い記録は自動で掃除する
    const localTombAll = (local && local.tombstones) || {};
    const remoteTombAll = (merged && merged.tombstones) || {};
    const mergedTomb = {};
    [localTombAll, remoteTombAll].forEach(src => {
      Object.keys(src || {}).forEach(arrKey => {
        const m = src[arrKey] || {};
        if (!mergedTomb[arrKey]) mergedTomb[arrKey] = {};
        Object.keys(m).forEach(id => {
          const ts = Number(m[id]) || 0;
          if (ts >= tombCutoff) {
            mergedTomb[arrKey][id] = Math.max(mergedTomb[arrKey][id] || 0, ts);
          }
        });
      });
    });

    const arrayKeys = ["customEvents", "stocks", "approaches", "jiage", "owners", "yakusho", "sekisan", "activityLog"];
    arrayKeys.forEach(k => {
      const localArr = Array.isArray(local[k]) ? local[k] : [];
      const remoteArr = Array.isArray(merged[k]) ? merged[k] : [];

      // ① 自分のローカルで削除したID（localStorage・7日以内）
      const deletedIds = getDeletedIdSet(k);
      // 🆕 ② 共有tombstone（全端末で共有・30日以内）
      const tombForK = mergedTomb[k] || {};

      // アイテム単位の updatedAt 比較でマージ
      const localMap = new Map();
      localArr.forEach(item => {
        if (item?.id != null && !deletedIds.has(item.id)) {
          localMap.set(item.id, item);
        }
      });
      const remoteMap = new Map();
      remoteArr.forEach(item => {
        if (item?.id != null && !deletedIds.has(item.id)) {
          remoteMap.set(item.id, item);
        }
      });

      const allIds = new Set([...localMap.keys(), ...remoteMap.keys()]);
      const finalArr = [];
      let localWins = 0, remoteWins = 0, tombRemoved = 0;
      allIds.forEach(id => {
        const localItem = localMap.get(id);
        const remoteItem = remoteMap.get(id);
        const localTime = Number(localItem && localItem.updatedAt) || 0;
        const remoteTime = Number(remoteItem && remoteItem.updatedAt) || 0;

        // 🆕 共有tombstoneで削除確定なら、どちらにあっても除外（復活防止）
        //    削除時刻 >= アイテムの更新時刻 のときだけ「削除のまま」とする
        //    （削除より後に編集されていれば、その編集を優先して復活させる）
        const tombTime = Number(tombForK[String(id)]) || 0;
        if (tombTime && tombTime >= Math.max(localTime, remoteTime)) {
          tombRemoved++;
          return; // 削除されたまま
        }

        if (!localItem) {
          finalArr.push(remoteItem);
        } else if (!remoteItem) {
          // ローカルにしか無い（自分が追加してまだ同期されてない）→ 保護
          finalArr.push(localItem);
          localWins++;
        } else {
          // 両方にある → タイムスタンプ比較
          if (localTime > remoteTime) {
            finalArr.push(localItem);
            localWins++;
          } else if (remoteTime > localTime) {
            finalArr.push(remoteItem);
            remoteWins++;
          } else {
            // updatedAt が同じ or 両方0（updatedAt なし既存データ）
            if (localTime === 0 && remoteTime === 0 && recentlyEdited) {
              // 既存データで直近5分編集中 → ローカル優先（古いデータの保護）
              finalArr.push(localItem);
              localWins++;
            } else {
              finalArr.push(remoteItem);
            }
          }
        }
      });

      if (localWins > 0 || remoteWins > 0 || tombRemoved > 0) {
        console.log(`[Sync] ${k}: ローカル勝ち${localWins}件 / リモート勝ち${remoteWins}件 / 削除除外${tombRemoved}件`);
      }

      merged[k] = finalArr;
    });

    // 🆕 統合した共有tombstoneを保存（全端末に削除が伝わり続ける）
    merged.tombstones = mergedTomb;
    return merged;
  };

  // 起動時にSupabaseから最新データを取得
  useEffect(() => {
    // 🆕 古い削除レコード（7日以上前）を掃除
    cleanupOldDeletions();
    loadFromSupabase().then(remote => {
      // 🆕 バージョンチェック：誰かが新版で保存してたら自動更新を促す
      if (remote?.__appVersion && remote.__appVersion !== APP_VERSION) {
        console.warn(`[ひかり不動産] ⚠ 古いバージョンを検出`);
        console.warn(`  あなたの端末: ${APP_VERSION}`);
        console.warn(`  最新: ${remote.__appVersion}`);
        const msg = `🔔 アプリの新しいバージョンがあります\n\n` +
                    `あなたの端末: ${APP_VERSION}\n` +
                    `最新版: ${remote.__appVersion}\n\n` +
                    `今すぐ更新してください（古いままだと編集が消える可能性があります）。\n` +
                    `OKを押すとアプリを最新版に更新します。`;
        if (window.confirm(msg)) {
          // ブラウザキャッシュをバイパスして強制リロード
          window.location.href = window.location.pathname + "?v=" + Date.now();
          return;
        }
      }
      const merged = mergeRemoteSafely(remote);
      if (merged) {
        setDataRaw(merged);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(merged)); } catch {}
      }
      setSyncing(false);
    }).catch(() => {
      setSyncing(false);
      setSyncError(true);
    });
  }, []);

  // ポーリング：15秒ごとに最新データを取得（他のメンバーの更新を素早く反映）
  // ただし「自分が30秒以内に保存した」or「ユーザーが入力中」の時はスキップして、編集中のデータが消えないようにする
  useEffect(() => {
    const timer = setInterval(() => {
      if (Date.now() - lastLocalSaveRef.current < 30000) return; // 直近の自分の保存はスキップ
      if (isUserEditing()) return; // 入力中はスキップ
      loadFromSupabase().then(remote => {
        // 🆕 ポーリング時もバージョンチェック（開きっぱなしのアプリにも更新通知）
        if (remote?.__appVersion && remote.__appVersion !== APP_VERSION) {
          console.warn(`[ひかり不動産] ⚠ ポーリング中に新バージョン検出: ${remote.__appVersion}`);
          const msg = `🔔 アプリの新しいバージョンがあります！\n\n` +
                      `あなたの端末: ${APP_VERSION}\n` +
                      `最新版: ${remote.__appVersion}\n\n` +
                      `今すぐ更新してください。\n` +
                      `OKを押すとアプリを最新版に更新します。`;
          if (window.confirm(msg)) {
            window.location.href = window.location.pathname + "?v=" + Date.now();
            return;
          }
          // キャンセルされたら、次回ポーリングまで通知を抑制（5分後にまた問い合わせ）
          lastLocalSaveRef.current = Date.now() + 5 * 60 * 1000 - 30 * 1000;
        }
        const merged = mergeRemoteSafely(remote);
        if (merged) {
          setDataRaw(merged);
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(merged)); } catch {}
        }
      });
    }, 15000);
    return () => clearInterval(timer);
  }, []);

  const setData = updater => {
    setDataRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;

      // 🆕 データが変わってない場合は何もしない（無駄な Supabase 上書き防止）
      if (next === prev) {
        console.log("[setData] データ変更なし、Supabase保存スキップ");
        return prev;
      }

      const now = Date.now();

      // 🆕 変更されたアイテムに updatedAt をセット（マージ時の競合解決用）
      const trackedKeys = ["customEvents", "stocks", "approaches", "jiage", "owners", "yakusho", "sekisan"];
      let hasActualChange = false; // 実質的な変更があったか
      // 🆕 共有tombstone（削除済みID）を更新するための作業コピー
      let nextTomb = { ...(next.tombstones || prev.tombstones || {}) };
      let tombChanged = false;
      trackedKeys.forEach(k => {
        const prevArr = Array.isArray(prev[k]) ? prev[k] : [];
        const nextArr = Array.isArray(next[k]) ? next[k] : [];
        const prevMap = new Map();
        prevArr.forEach(item => { if (item?.id != null) prevMap.set(item.id, item); });

        const updated = nextArr.map(item => {
          if (!item || item.id == null) return item;
          const prevItem = prevMap.get(item.id);
          // 新規 or 参照が変わった（編集された）アイテム → updatedAt 更新
          if (!prevItem || prevItem !== item) {
            hasActualChange = true;
            // 🆕 updatedAt は必ず「編集元より新しい値」にする（端末の時計ズレ対策）
            const prevUA = Number(prevItem && prevItem.updatedAt) || 0;
            return { ...item, updatedAt: Math.max(now, prevUA + 1) };
          }
          return item;
        });
        next[k] = updated;

        // 🆕 削除されたアイテムID → 共有tombstoneに記録（全端末で削除を確実に伝える）
        const nextIds = new Set(updated.map(it => (it && it.id != null) ? it.id : null).filter(x => x != null));
        const tk = { ...(nextTomb[k] || {}) };
        prevMap.forEach((_, id) => {
          if (!nextIds.has(id)) {
            tk[String(id)] = now;
            hasActualChange = true;
            tombChanged = true;
          }
        });
        // 🆕 生きているアイテムのIDは tombstone から外す（誤った削除扱いを防ぐ）
        nextIds.forEach(id => {
          if (tk[String(id)] != null) { delete tk[String(id)]; tombChanged = true; }
        });
        nextTomb[k] = tk;
      });
      // 🆕 tombstoneに変化があった時だけ反映（無変更時の無駄な保存を防ぐ）
      if (tombChanged) next.tombstones = nextTomb;

      // activityLog も含めて、何か変わったかチェック
      if (!hasActualChange) {
        const otherKeys = Object.keys(next).filter(k => !trackedKeys.includes(k) && k !== "__appVersion");
        for (const k of otherKeys) {
          if (next[k] !== prev[k]) {
            hasActualChange = true;
            break;
          }
        }
      }

      // 🆕 実質的な変更がない場合は Supabase 保存をスキップ
      if (!hasActualChange) {
        console.log("[setData] 実質変更なし、Supabase保存スキップ");
        return prev; // prev を返して再レンダリングも防ぐ
      }

      // 自分の保存時刻を記録（ポーリング上書き防止用）
      lastLocalSaveRef.current = now;
      // 🆕 強制更新後も5分ガードが効くように localStorage に永続化
      try { localStorage.setItem(LAST_SAVE_KEY, String(now)); } catch {}
      // Supabaseに保存（非同期）
      saveToSupabase(next).then(ok => {
        if (ok) {
          setSavedMsg(true);
          setSyncError(false);
          setTimeout(() => setSavedMsg(false), 2000);
        } else {
          // 3回試して失敗 → ユーザーに警告表示
          setSyncError(true);
          setSavedMsg(false);
        }
      });
      // ローカルにも即時保存
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch {}
      return next;
    });
  };

  const isMapPage = page === "jiage";

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'Noto Sans JP', 'Hiragino Sans', sans-serif", paddingBottom: isMapPage ? 60 : 80 }}>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ background: C.cardBg, borderBottom: `1px solid ${C.borderDim}`, padding: "12px 16px", position: "sticky", top: 0, zIndex: 100, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontSize: 16, fontWeight: 800, color: C.text, letterSpacing: "-0.01em" }}>
            ひかり不動産 <span style={{ fontSize: 9, fontWeight: 600, color: C.success, marginLeft: 4, padding: "2px 6px", background: C.success + "22", borderRadius: 4 }}>v4</span>
          </div>
          <div style={{ fontSize: 10, marginTop: 1, color: syncing ? C.warn : savedMsg ? C.success : syncError ? C.danger : C.muted }}>
            {syncing ? "⟳ 同期中..." : savedMsg ? "✓ 保存・同期完了" : syncError ? "⚠ オフライン（ローカル保存）" : "☁ クラウド同期済み"}
          </div>
        </div>
        <div style={{ fontSize: 12, color: C.muted }}>{new Date().toLocaleDateString("ja-JP", { month: "short", day: "numeric", weekday: "short" })}</div>
      </div>

      {/* 同期中ローディング */}
      {syncing && (
        <div style={{ background: C.warn + "22", border: `1px solid ${C.warn}44`, margin: "8px 16px", borderRadius: 10, padding: "10px 14px", fontSize: 13, color: C.warn, textAlign: "center" }}>
          ⟳ 最新データを取得中...
        </div>
      )}

      {/* Content */}
      <div style={{ padding: isMapPage ? "0" : "16px 16px 20px" }}>
        {page === "dashboard" && <Dashboard data={data} setData={setData} setPage={setPage} setPendingNav={setPendingNav} />}
        {page === "stock" && <StockPage data={data} setData={setData} pendingNav={pendingNav} onConsumeNav={() => setPendingNav(null)} />}
        {page === "approach" && <ApproachPage data={data} setData={setData} pendingNav={pendingNav} onConsumeNav={() => setPendingNav(null)} />}
        {page === "jiage" && <JiagePage data={data} setData={setData} pendingNav={pendingNav} onConsumeNav={() => setPendingNav(null)} />}
        {page === "more" && <MorePage data={data} setData={setData} onLock={onLock} onSwitchUser={onSwitchUser} />}
      </div>

      {/* Bottom Navigation */}
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: C.cardBg, borderTop: `1px solid ${C.borderDim}`, display: "flex", zIndex: 200, paddingBottom: "env(safe-area-inset-bottom)" }}>
        {PAGES.map(p => (
          <button key={p.key} onClick={() => setPage(p.key)} style={{
            flex: 1, background: "none", border: "none", padding: "10px 4px 8px",
            color: page === p.key ? C.accent : C.muted, cursor: "pointer", fontFamily: "inherit",
            display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
            touchAction: "manipulation", WebkitTapHighlightColor: "transparent",
            borderTop: `2px solid ${page === p.key ? C.accent : "transparent"}`,
          }}>
            <span style={{ fontSize: 20 }}>{p.icon}</span>
            <span style={{ fontSize: 10, fontWeight: page === p.key ? 700 : 400 }}>{p.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// カンマ区切り数字入力（スピナーなし・手入力対応）
function MoneyInput({ value, onChange, placeholder, style: extraStyle }) {
  const [focused, setFocused] = useState(false);
  const num = parseFloat(String(value || "").replace(/,/g, ""));
  const display = focused || isNaN(num) || value === ""
    ? String(value || "")
    : num.toLocaleString("ja-JP");

  const handleChange = e => {
    const raw = e.target.value.replace(/[^0-9.]/g, "");
    onChange(raw);
  };

  return (
    <input
      type="text"
      inputMode="numeric"
      value={display}
      onChange={handleChange}
      onFocus={() => setFocused(true)}
      onBlur={() => setFocused(false)}
      placeholder={placeholder}
      style={{ ...inp, MozAppearance: "textfield", WebkitAppearance: "none", ...(extraStyle || {}) }}
    />
  );
}

// NInp用の内部コンポーネント（入力中はraw、blur後はカンマ整形）
function NInpInner({ value, onChange, onBlur, placeholder, suffix }) {
  const [focused, setFocused] = useState(false);
  const num = parseFloat(value);
  const display = focused || isNaN(num) || value === ""
    ? value
    : num.toLocaleString("ja-JP");
  return (
    <div style={{ position: "relative" }}>
      <input
        type="text"
        inputMode="decimal"
        value={display}
        onChange={onChange}
        onFocus={() => setFocused(true)}
        onBlur={e => { setFocused(false); onBlur && onBlur(e); }}
        placeholder={placeholder}
        style={{ ...inp, paddingRight: suffix ? 36 : 15, MozAppearance: "textfield", WebkitAppearance: "none" }}
      />
      {suffix && <span style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", color: C.muted, fontSize: 13 }}>{suffix}</span>}
    </div>
  );
}

// 積算表用の数字入力（formとsetFormを外から受け取る）
function SekisanNInp({ fkey, placeholder, suffix, form, setForm }) {
  const raw = String(form[fkey] ?? "");
  const handleChange = e => {
    const v = e.target.value.replace(/[^0-9.]/g, "");
    setForm(p => ({ ...p, [fkey]: v }));
  };
  return <NInpInner value={raw} onChange={handleChange} placeholder={placeholder} suffix={suffix} />;
}

}
// 🗺️ Leafletマップコンポーネント
function LeafletMap({ items, onPinClick, pinTarget = "address", height = 480 }) {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);
  const markersRef = React.useRef([]);

  // マップ初期化（一度だけ）
  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    if (typeof L === "undefined") {
      console.warn("Leaflet not loaded");
      return;
    }
    // 埼玉県中心
    const map = L.map(mapRef.current).setView([36.05, 139.4], 9);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap",
      maxZoom: 19,
    }).addTo(map);
    mapInstanceRef.current = map;
    return () => {
      try { map.remove(); } catch (e) {}
      mapInstanceRef.current = null;
    };
  }, []);

  // マーカー更新
  React.useEffect(() => {
    const map = mapInstanceRef.current;
    if (!map || typeof L === "undefined") return;
    // 既存マーカー削除
    markersRef.current.forEach(m => map.removeLayer(m));
    markersRef.current = [];
    // 表示対象（座標あり）
    const validItems = items.filter(it => {
      const lat = pinTarget === "ownerAddr" ? it.ownerLat : it.lat;
      const lng = pinTarget === "ownerAddr" ? it.ownerLng : it.lng;
      return typeof lat === "number" && typeof lng === "number" && !isNaN(lat) && !isNaN(lng);
    });
    // 色判定
    const colorByStatus = (status) => {
      if (status === "NG" || status === "断られた") return "#ef4444";
      if (status === "見込" || status === "興味あり" || status === "検討中" || status === "交渉中") return "#10b981";
      if (status === "不在") return "#f59e0b";
      if (status === "訪問済") return "#3b82f6";
      if (status === "居住している") return "#64748b";
      if (status === "仕入れ完了") return "#06b6d4";
      return "#94a3b8";
    };
    validItems.forEach(it => {
      const lat = pinTarget === "ownerAddr" ? it.ownerLat : it.lat;
      const lng = pinTarget === "ownerAddr" ? it.ownerLng : it.lng;
      const color = colorByStatus(it.status);
      const icon = L.divIcon({
        className: "hikari-pin",
        html: `<div style="background:${color};width:22px;height:22px;border-radius:50%;border:2.5px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.5);"></div>`,
        iconSize: [22, 22],
        iconAnchor: [11, 11],
      });
      const marker = L.marker([lat, lng], { icon }).addTo(map);
      marker.bindPopup(`
        <div style="font-family:'Noto Sans JP',sans-serif;min-width:160px;">
          <div style="font-weight:700;font-size:13px;margin-bottom:4px;">${(it.address || "").slice(0, 40)}</div>
          ${it.ownerName ? `<div style="font-size:11px;color:#64748b;">👤 ${it.ownerName}</div>` : ""}
          <div style="margin-top:5px;"><span style="background:${color};color:#fff;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;">${it.status}</span></div>
          <button id="pin-detail-btn" style="margin-top:6px;background:#3b82f6;color:#fff;border:none;padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;width:100%;font-family:inherit;">詳細を開く</button>
        </div>
      `);
      marker.on("popupopen", () => {
        setTimeout(() => {
          const btn = document.getElementById("pin-detail-btn");
          if (btn) btn.onclick = () => onPinClick && onPinClick(it);
        }, 10);
      });
      markersRef.current.push(marker);
    });
    // 中心調整
    if (markersRef.current.length > 0) {
      try {
        const group = L.featureGroup(markersRef.current);
        map.fitBounds(group.getBounds().pad(0.15), { maxZoom: 14 });
      } catch (e) {}
    }
  }, [items, pinTarget]);

  return <div ref={mapRef} style={{ height, width: "100%", borderRadius: 12, border: `1px solid ${C.borderDim}` }} />;
}

// 📍 手動でピン位置を指定するモーダル
function ManualPinMap({ address, onCancel, onSelect }) {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);
  const markerRef = React.useRef(null);
  const [pickedLatLng, setPickedLatLng] = React.useState(null);

  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    if (typeof L === "undefined") return;
    // 埼玉県中心
    const map = L.map(mapRef.current).setView([36.05, 139.4], 9);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap", maxZoom: 19,
    }).addTo(map);
    mapInstanceRef.current = map;
    map.on("click", (e) => {
      if (markerRef.current) map.removeLayer(markerRef.current);
      const icon = L.divIcon({
        className: "manual-pin",
        html: `<div style="background:#f59e0b;width:24px;height:24px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.5);"></div>`,
        iconSize: [24, 24], iconAnchor: [12, 12],
      });
      markerRef.current = L.marker(e.latlng, { icon }).addTo(map);
      setPickedLatLng(e.latlng);
    });
    return () => {
      try { map.remove(); } catch (e) {}
      mapInstanceRef.current = null;
    };
  }, []);

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 500, display: "flex", flexDirection: "column" }}>
      <div style={{ padding: "12px 16px", background: C.panelBg, borderBottom: `1px solid ${C.borderDim}` }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", marginBottom: 4 }}>📍 マップをタップして位置を指定</div>
        <div style={{ fontSize: 11, color: "#94a3b8", lineHeight: 1.4 }}>住所: {address}</div>
      </div>
      <div ref={mapRef} style={{ flex: 1 }} />
      <div style={{ padding: "12px 16px", background: C.panelBg, borderTop: `1px solid ${C.borderDim}`, display: "flex", gap: 10 }}>
        <button onClick={onCancel} style={{
          flex: 1, padding: "12px", background: "transparent", color: "#94a3b8",
          border: `1px solid ${C.borderDim}`, borderRadius: 8, cursor: "pointer", fontSize: 14, fontFamily: "inherit",
        }}>キャンセル</button>
        <button 
          onClick={() => pickedLatLng && onSelect(pickedLatLng)}
          disabled={!pickedLatLng}
          style={{
            flex: 2, padding: "12px", background: pickedLatLng ? "#10b981" : C.borderDim,
            color: "#fff", border: "none", borderRadius: 8,
            cursor: pickedLatLng ? "pointer" : "not-allowed", fontSize: 14, fontWeight: 700, fontFamily: "inherit",
            opacity: pickedLatLng ? 1 : 0.5,
          }}>{pickedLatLng ? "✅ この位置に決定" : "マップをタップしてください"}</button>
      </div>
    </div>
  );
}

function FilterChips({ options, value, onChange, multi = false }) {
  const selected = multi ? (Array.isArray(value) ? value : []) : value;
  const toggle = opt => {
    if (multi) {
      const arr = Array.isArray(value) ? value : [];
      onChange(arr.includes(opt) ? arr.filter(v => v !== opt) : [...arr, opt]);
    } else {
      onChange(value === opt ? "すべて" : opt);
    }
  };
  return (
    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
      {options.map(opt => {
        const isActive = multi ? selected.includes(opt) : selected === opt;
        return (
          <button key={opt} onClick={() => toggle(opt)} style={{
            padding: "7px 13px", borderRadius: 20, cursor: "pointer", fontSize: 13,
            background: isActive ? C.accent : C.cardBg,
            color: isActive ? "#fff" : C.muted,
            border: `1px solid ${isActive ? C.accent : C.borderDim}`,
            whiteSpace: "nowrap", fontFamily: "inherit", touchAction: "manipulation",
          }}>{opt}</button>
        );
      })}
    </div>
  );
}

    if (!canEdit(ev)) {
      const assigneeLabel = (ev.assignees || []).length > 0 ? ev.assignees.join("・") : (ev.createdBy || "他のメンバー");
      alert(`⚠️ 編集権限がありません\n\nこの予定の担当者/作成者は「${assigneeLabel}」です。\n管理者（${adminMember}）または担当者本人のみ編集できます。`);
      return;
    }
    setEventForm({
      title: ev.title || "",
      date: ev.date || today,
      time: ev.time || "",
      location: ev.location || "",
      memo: ev.memo || "",
      // 旧データの assignee (単一) も吸収して assignees (配列) に統一
      assignees: ev.assignees || (ev.assignee ? [ev.assignee] : []),
      reminderMinutes: ev.reminderMinutes || 0,
    });
    setEditingEvent(ev);
    setShowEventForm(true);
  };

  const handleSaveEvent = () => {
    if (!eventForm.title.trim()) { alert("タイトルを入力してください"); return; }
    if (!eventForm.date) { alert("日付を入力してください"); return; }
    // 保険：編集時の権限チェック
    if (editingEvent && !canEdit(editingEvent)) {
      alert("⚠️ 編集権限がありません");
      setShowEventForm(false); setEditingEvent(null);
      return;
    }
    const me = getCurrentUser() || "未設定";
    const assignees = eventForm.assignees || [];
    // 自分が作成者の場合は、自分への通知はスキップ済みとしてマーク（重複通知防止）
    const initialNotifiedTo = {};
    if (me && assignees.includes(me)) initialNotifiedTo[me] = true;

    const item = {
      id: editingEvent?.id || Date.now(),
      title: eventForm.title,
      date: eventForm.date,
      time: eventForm.time,
      location: eventForm.location,
      memo: eventForm.memo,
      assignees,
      reminderMinutes: eventForm.reminderMinutes || 0,
      createdAt: editingEvent?.createdAt || new Date().toISOString(),
      createdBy: editingEvent?.createdBy || me,
      notified: editingEvent?.notified || false,
      newNotifiedTo: editingEvent?.newNotifiedTo || initialNotifiedTo,
    };
    setData(d => {
      const next = { ...d, customEvents: editingEvent
        ? (d.customEvents || []).map(e => e.id === editingEvent.id ? item : e)
        : [...(d.customEvents || []), item] };
      const assigneeLabel = item.assignees.length > 0 ? `（${item.assignees.join("・")}）` : "";
      return appendLogAndNotify(next, editingEvent ? "update" : "add", "event", `予定「${item.title}」${assigneeLabel}（${item.date}${item.time ? " " + item.time : ""}）`, item, { skipPush: !editingEvent });
    });
    setShowEventForm(false);
    setEditingEvent(null);

    // リマインダーが設定されてたら通知許可をリクエスト
    if (item.reminderMinutes > 0 && "Notification" in window && Notification.permission === "default") {
      Notification.requestPermission();
    }

    // ★ Web Push 送信：担当者の端末にリアルタイム通知（アプリ閉じてても届く）
    if (!editingEvent && assignees.length > 0) {
      const otherAssignees = assignees.filter(a => a !== me);
      const allTargets = expandAssignees(otherAssignees); // 「比嘉・下田」など分解
      if (allTargets.length > 0) {
        const dateLabel = `${item.date}${item.time ? " " + item.time : ""}`;
        const pushTitle = `📅 新しい予定: ${item.title}`;
        const pushBody = `${dateLabel}${item.location ? " @" + item.location : ""}\n作成者: ${me}${item.memo ? "\n" + item.memo : ""}`;
        sendPushNotification(allTargets, pushTitle, pushBody, {
          tag: `hikari-new-event-${item.id}`,
          data: { tab: 'dashboard', eventId: item.id },
          tab: 'dashboard', eventId: item.id,
        });
      }
    }
  };

  const handleDeleteEvent = (id) => {
    const target = (data.customEvents || []).find(e => e.id === id);
    if (!target) return;
    if (!canEdit(target)) {
      const assigneeLabel = (target.assignees || []).length > 0 ? target.assignees.join("・") : (target.createdBy || "他のメンバー");
      alert(`⚠️ 削除権限がありません\n\nこの予定の担当者/作成者は「${assigneeLabel}」です。\n管理者（${adminMember}）または担当者本人のみ削除できます。`);
      return;
    }
    // 🆕 sekisanLinkId 付きの場合、元の sekisan の進捗もクリアする旨を確認
    const isSekisanLinked = !!target.sekisanLinkId;
    const confirmMsg = isSekisanLinked
      ? `予定「${target.title}」を削除しますか？\n\n仕入検討積算表の進捗（売主結果確認日）も同時にクリアされます。\nこれをやらないと、次回 sekisan 編集時にカレンダーに復活します。`
      : `予定「${target.title}」を削除しますか？`;
    if (!window.confirm(confirmMsg)) return;
    setData(d => {
      let next = { ...d, customEvents: (d.customEvents || []).filter(e => e.id !== id) };
      // 🆕 sekisan 連動なら、元データの進捗もクリア
      if (isSekisanLinked) {
        next.sekisan = (d.sekisan || []).map(s =>
          s.id === target.sekisanLinkId ? { ...s, caseStatus: "", caseStatusAt: "" } : s
        );
      }
      return appendLogAndNotify(next, "delete", "event", `予定「${target.title}」を削除`, target);
    });
  };

  // ===== リマインダー：1分ごとに通知すべきイベントをチェック =====
  useEffect(() => {
    if (!("Notification" in window)) return;
    const check = () => {
      if (Notification.permission !== "granted") return;
      const now = new Date();
      (data.customEvents || []).forEach(ev => {
        if (ev.notified) return;
        if (!ev.time || !ev.reminderMinutes) return;
        const [h, m] = (ev.time || "00:00").split(":").map(Number);
        const evTime = new Date(ev.date);
        evTime.setHours(h || 0, m || 0, 0, 0);
        const remindAt = new Date(evTime.getTime() - ev.reminderMinutes * 60000);
        if (remindAt <= now && now < evTime) {
          // ▼自分が担当者に含まれているかチェック（「比嘉・下田」のような連結も分解判定）
          const me = getCurrentUser();
          const assignees = ev.assignees || (ev.assignee ? [ev.assignee] : []);
          const isForMe = !me || assignees.length === 0 || isAssignedTo(assignees, me);
          if (!isForMe) {
            // 自分宛じゃないなら通知済みフラグだけ立てる
            setData(d => ({
              ...d,
              customEvents: (d.customEvents || []).map(e => e.id === ev.id ? { ...e, notified: true } : e)
            }));
            return;
          }
          const title = `📅 ${ev.title}`;
          const body = `${ev.time}〜${ev.location ? " @" + ev.location : ""}${ev.memo ? "\n" + ev.memo : ""}`;
          const tag = `hikari-event-${ev.id}`;
          // Service Worker 経由で通知（バックグラウンドでも動作）
          if (navigator.serviceWorker && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({
              type: 'SHOW_NOTIFICATION', title, body, tag,
            });
          } else {
            // SW がまだ active じゃない場合は ready で待って showNotification
            navigator.serviceWorker.ready.then(reg => {
              reg.showNotification(title, { body, tag, icon: './icon-192.png' });
            }).catch(err => console.warn('通知失敗:', err));
          }
          // 通知済みフラグを立てる
          setData(d => ({
            ...d,
            customEvents: (d.customEvents || []).map(e => e.id === ev.id ? { ...e, notified: true } : e)
          }));
        }
      });
    };
    check();
    const timer = setInterval(check, 60000);
    return () => clearInterval(timer);
  }, [data.customEvents]);

  // ===== 新規予定の即時通知：data.customEventsが変化するたびに、自分宛の未通知予定をチェック =====
  // 別端末で作成された予定 → 自分の端末が30秒ポーリングで取得 → 即通知される仕組み
  useEffect(() => {
    if (!("Notification" in window)) return;
    if (Notification.permission !== "granted") return;
    const me = getCurrentUser();
    if (!me) return; // 「現在のユーザー」未設定なら通知できない

    (data.customEvents || []).forEach(ev => {
      const assignees = ev.assignees || (ev.assignee ? [ev.assignee] : []);
      if (assignees.length === 0) return; // 担当者なしならスキップ
      if (!isAssignedTo(assignees, me)) return; // 自分が担当者じゃないならスキップ

      const newNotifiedTo = ev.newNotifiedTo || {};
      if (newNotifiedTo[me]) return; // 既に自分に通知済み
      if (ev.createdBy === me) {
        // 自分が作成者の場合は通知不要だが、フラグだけ立てる（他端末で同じユーザーログインしてた時の重複防止）
        setData(d => ({
          ...d,
          customEvents: (d.customEvents || []).map(e =>
            e.id === ev.id
              ? { ...e, newNotifiedTo: { ...(e.newNotifiedTo || {}), [me]: true } }
              : e
          )
        }));
        return;
      }

      // 通知発火！
      const dateLabel = `${ev.date}${ev.time ? " " + ev.time : ""}`;
      const title = `📅 新しい予定: ${ev.title}`;
      const body = `${dateLabel}${ev.location ? " @" + ev.location : ""}\n作成者: ${ev.createdBy || "未設定"}${ev.memo ? "\n" + ev.memo : ""}`;
      const tag = `hikari-new-event-${ev.id}`;

      if (navigator.serviceWorker && navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({
          type: 'SHOW_NOTIFICATION', title, body, tag,
        });
      } else {
        navigator.serviceWorker.ready.then(reg => {
          reg.showNotification(title, { body, tag, icon: './icon-192.png' });
        }).catch(e => console.warn('通知失敗:', e));
      }

      // 通知済みフラグ（メンバー別）を立てる
      setData(d => ({
        ...d,
        customEvents: (d.customEvents || []).map(e =>
          e.id === ev.id
            ? { ...e, newNotifiedTo: { ...(e.newNotifiedTo || {}), [me]: true } }
            : e
        )
      }));
    });
  }, [data.customEvents]);

  // 既存データから全カレンダーイベントを集計
  const calEvents = useMemo(() => {
    const list = [];
    (data.jiage || []).forEach(j => {
      if (j.nextVisit) list.push({ date: j.nextVisit, type: "jiage", icon: "🗺️", color: C.purple, title: j.address || "(無住所)", sub: `訪問予定・${j.status}`, assignee: j.assignee, rawId: j.id });
    });
    (data.owners || []).forEach(o => {
      if (o.nextFollowDate) list.push({ date: o.nextFollowDate, type: "owner", icon: "👤", color: C.accent, title: o.address || "(無住所)", sub: `所有者フォロー・${o.status}`, assignee: o.assignee, rawId: o.id });
    });
    (data.sekisan || []).forEach(s => {
      // 🆕 査定したものはカレンダーに連動しない（売主結果確認日のみ customEvents 経由で連動）
      // if (s.createdAt) list.push({ date: s.createdAt, type: "sekisan", icon: "🧮", color: C.danger, title: s.address || "(無住所)", sub: `仕入検討・${s.judgment}`, assignee: s.assignee, rawId: s.id });
    });
    (data.stocks || []).forEach(s => {
      if (s.buyContractDate) list.push({ date: s.buyContractDate, type: "buyContract", icon: "📝", color: "#a855f7", title: s.name || "(無題)", sub: "仕入契約", assignee: s.assignee, rawId: s.id });
      if (s.buyDate) list.push({ date: s.buyDate, type: "buy", icon: "🏠", color: C.success, title: s.name || "(無題)", sub: "仕入決済", assignee: s.assignee, rawId: s.id });
      if (s.sellContractDate) list.push({ date: s.sellContractDate, type: "sellContract", icon: "📋", color: C.accent, title: s.name || "(無題)", sub: "売却契約", assignee: s.assignee, rawId: s.id });
      if (s.sellDate) list.push({ date: s.sellDate, type: "sell", icon: "✅", color: C.warn, title: s.name || "(無題)", sub: "売決完了", assignee: s.assignee, rawId: s.id });
      (s.viewings || []).forEach((v, idx) => {
        const eventDate = v.visitDate || "";
        if (eventDate) {
          const tags = [];
          if (v.prospect) tags.push(`${(PROSPECT_INFO[v.prospect]||{}).icon||""}${v.prospect}`);
          if (v.purpose) tags.push(`🎯${v.purpose}`);
          if (v.funding) tags.push(`💰${v.funding}`);
          const timePrefix = v.visitTime ? `${v.visitTime} ` : "";
          const assignees = [];
          if (s.assignee) assignees.push(s.assignee);
          if (!assignees.includes("比嘉・下田")) assignees.push("比嘉・下田");
          list.push({
            date: eventDate, type: "viewing", icon: "👀", color: "#06b6d4",
            title: `${timePrefix}${s.name || "(無題)"}`,
            sub: `案内・${v.customer || "顧客未設定"}${tags.length ? "(" + tags.join(" ") + ")" : ""}${v.note ? " | " + v.note : ""}`,
            assignee: s.assignee,
            assignees,
            time: v.visitTime || "",
            rawId: s.id,
            viewingIdx: idx, // 🆕 viewings 配列内のインデックス（編集・削除用）
          });
        }
      });
    });
    // カスタム予定
    (data.customEvents || []).forEach(ev => {
      // 旧データの assignee (単一) も吸収
      const assignees = ev.assignees || (ev.assignee ? [ev.assignee] : []);
      list.push({
        date: ev.date, type: "custom", icon: "📌", color: "#f97316",
        title: ev.title,
        sub: `${ev.time ? ev.time + "〜" : ""}${ev.location ? " @" + ev.location : ""}${ev.memo ? " | " + ev.memo : ""}`,
        assignee: assignees[0] || "", // 後方互換
        assignees, // 配列で保持
        time: ev.time,
        location: ev.location,
        memo: ev.memo,
        reminderMinutes: ev.reminderMinutes,
        rawId: ev.id,
        isCustom: true,
      });
    });
    return list;
  }, [data.jiage, data.owners, data.stocks, data.sekisan, data.customEvents]);

  // フィルター適用
  const calFilteredEvents = useMemo(() => calEvents.filter(e => {
    if (calFilterType !== "all" && e.type !== calFilterType) return false;
    if (calFilterMember !== "__ALL__") {
      // assignees配列があればそれを優先、なければ単一assigneeで判定
      // 「比嘉・下田」のような連結担当者も分解して判定する
      if (e.assignees && e.assignees.length > 0) {
        if (!isAssignedTo(e.assignees, calFilterMember)) return false;
      } else {
        if (!isAssignedTo([e.assignee], calFilterMember)) return false;
      }
    }
    return true;
  }), [calEvents, calFilterType, calFilterMember]);

  // 日付ごとにマッピング
  const calEventsByDate = useMemo(() => {
    const m = {};
    calFilteredEvents.forEach(e => { (m[e.date] ||= []).push(e); });
    return m;
  }, [calFilteredEvents]);

  // 月の42日（6週分）を生成
  const calMonthDays = useMemo(() => {
    const y = calCursor.getFullYear(), mo = calCursor.getMonth();
    const firstDay = new Date(y, mo, 1).getDay(); // 0=日
    const lastDate = new Date(y, mo + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < firstDay; i++) cells.push(null);
    for (let d = 1; d <= lastDate; d++) cells.push(new Date(y, mo, d));
    while (cells.length < 42) cells.push(null);
    return cells;
  }, [calCursor]);

  // 週の7日を生成（calCursorを含む週）
  const calWeekDays = useMemo(() => {
    const d = new Date(calCursor);
    const sunday = new Date(d);
    sunday.setDate(d.getDate() - d.getDay());
    return [0,1,2,3,4,5,6].map(i => { const dd = new Date(sunday); dd.setDate(sunday.getDate() + i); return dd; });
  }, [calCursor]);

  const fmtDate = d => d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}` : null;
  const selectedEvents = calEventsByDate[calSelectedDate] || [];

  const availableYears = useMemo(() => {
    const years = new Set([currentYear]);
    data.stocks.forEach(s => {
      if (s.buyDate) years.add(parseInt(s.buyDate.slice(0, 4)));
      if (s.sellDate) years.add(parseInt(s.sellDate.slice(0, 4)));
    });
    return [...years].sort((a, b) => b - a);
  }, [data.stocks]);

  const nv = v => parseFloat(String(v || "").replace(/,/g, "")) || 0;

  const yearCompleted = useMemo(() =>
    data.stocks.filter(s => s.status === "売決完了" && (s.sellDate || "").startsWith(String(selectedYear))),
    [data.stocks, selectedYear]);

  const yearBought = useMemo(() =>
    data.stocks.filter(s => (s.buyDate || "").startsWith(String(selectedYear))),
    [data.stocks, selectedYear]);

  const active = data.stocks.filter(s => s.status !== "売決完了");
  const jiageToday = (data.jiage || []).filter(j => j.nextVisit === today);
  const ownerToday = (data.owners || []).filter(o => o.nextFollowDate === today);

  // 滞留警告：90日超・180日超の在庫を抽出（決済完了除外）
  const stagnant90 = active.filter(s => {
    const d = daysSinceBuy(s.buyDate);
    return d != null && d >= 90 && d < 180;
  });
  const stagnant180 = active.filter(s => {
    const d = daysSinceBuy(s.buyDate);
    return d != null && d >= 180;
  });

  // 役所調査リマインダー：仕入契約済/リフォーム関連の物件で、役所調査シートがない物件を抽出
  const needYakushoStatuses = ["仕入契約", "リフォーム待ち", "リフォーム中"];
  const needYakusho = active.filter(s => {
    if (!needYakushoStatuses.includes(s.status)) return false;
    // 役所調査シートの住所と一致するものがあれば除外
    return !(data.yakusho || []).some(y => y.address && s.name && y.address.includes(s.name));
  });

  const yearSell = yearCompleted.reduce((a, s) => a + nv(s.sellPrice), 0);
  const yearProfit = yearCompleted.reduce((a, s) => a + (nv(s.sellPrice) - nv(s.buyCost)), 0);
  const avgProfit = yearCompleted.length > 0 ? yearProfit / yearCompleted.length : 0;
  const avgProfitRate = yearCompleted.length > 0
    ? yearCompleted.reduce((a, s) => {
        const sp = nv(s.sellPrice); const bc = nv(s.buyCost);
        return a + (sp > 0 ? (sp - bc) / sp * 100 : 0);
      }, 0) / yearCompleted.length : 0;

  const monthlyData = useMemo(() => {
    return Array.from({ length: 12 }, (_, i) => {
      const m = i + 1;
      const ym = `${selectedYear}-${String(m).padStart(2, "0")}`;
      const sold = data.stocks.filter(s => (s.sellDate || "").startsWith(ym));
      const bought = data.stocks.filter(s => (s.buyDate || "").startsWith(ym));
      return {
        month: m + "月",
        sell: sold.reduce((a, s) => a + nv(s.sellPrice), 0) / 10000,
        profit: sold.reduce((a, s) => a + (nv(s.sellPrice) - nv(s.buyCost)), 0) / 10000,
        sellCount: sold.filter(s => s.status === "売決完了").length,
        buyCount: bought.length,
      };
    });
  }, [data.stocks, selectedYear]);

  const memberData = useMemo(() => {
    return MEMBERS.map(m => {
      const done = yearCompleted.filter(s => s.assignee === m);
      const bought = yearBought.filter(s => s.assignee === m);
      const profit = done.reduce((a, s) => a + (nv(s.sellPrice) - nv(s.buyCost)), 0);
      const sell = done.reduce((a, s) => a + nv(s.sellPrice), 0);
      const profitRate = done.length > 0
        ? done.reduce((a, s) => { const sp = nv(s.sellPrice); const bc = nv(s.buyCost); return a + (sp > 0 ? (sp - bc) / sp * 100 : 0); }, 0) / done.length : 0;
      return { name: m, 売上万: Math.round(sell / 10000), 利益万: Math.round(profit / 10000), 仕入件数: bought.length, 売却件数: done.length, 利益率: Math.round(profitRate * 10) / 10 };
    }).filter(m => m.仕入件数 > 0 || m.売却件数 > 0);
  }, [data.stocks, selectedYear]);

  const statusData = useMemo(() => {
    const map = {};
    active.forEach(s => { map[s.status] = (map[s.status] || 0) + 1; });
    return Object.entries(map).map(([name, value]) => ({ name, value }));
  }, [active]);

  const PIE_COLORS = [C.accent, C.success, C.warn, C.purple, C.danger, "#06b6d4"];

  const StatCard = ({ label, value, sub, color, icon }) => (
    <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 12, padding: "13px 14px", flex: 1, minWidth: 90 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 6 }}>
        <span style={{ fontSize: 13 }}>{icon}</span>
        <span style={{ color: C.muted, fontSize: 10, letterSpacing: "0.04em" }}>{label}</span>
      </div>
      <div style={{ color: color || C.text, fontSize: 22, fontWeight: 800, lineHeight: 1 }}>{value}</div>
      {sub && <div style={{ color: C.muted, fontSize: 10, marginTop: 4 }}>{sub}</div>}
    </div>
  );

  return (
    <div style={{ display: "grid", gap: 14 }}>

      {/* ============== 📅 カレンダー（最上段・Googleカレンダー風） ============== */}
      <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 0, overflow: "hidden" }}>
        {/* ヘッダー部 */}
        <div style={{ padding: "14px 14px 10px", borderBottom: `1px solid ${C.borderDim}` }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10, gap: 8 }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: C.text }}>
              {calMode === "month"
                ? `${calCursor.getFullYear()}年 ${calCursor.getMonth()+1}月`
                : `${calWeekDays[0].getFullYear()}年 ${calWeekDays[0].getMonth()+1}/${calWeekDays[0].getDate()}〜${calWeekDays[6].getMonth()+1}/${calWeekDays[6].getDate()}`}
            </div>
            <div style={{ display: "flex", background: C.bg, borderRadius: 8, padding: 2, border: `1px solid ${C.borderDim}` }}>
              {[["month", "月"], ["week", "週"]].map(([key, label]) => (
                <button key={key} onClick={() => setCalMode(key)} style={{
                  background: calMode === key ? C.accent : "none", border: "none",
                  color: calMode === key ? "#fff" : C.muted, borderRadius: 6,

              if (calMode === "month") d.setMonth(d.getMonth() - 1);
              else d.setDate(d.getDate() - 7);
              setCalCursor(d);
            }} style={{ background: C.accent + "22", border: `1.5px solid ${C.accent}`, color: C.accent, borderRadius: 8, width: 36, height: 32, cursor: "pointer", fontSize: 20, fontFamily: "inherit", fontWeight: 800 }}>‹</button>
            <button onClick={() => {
              const d = new Date(calCursor);
              if (calMode === "month") d.setMonth(d.getMonth() + 1);
              else d.setDate(d.getDate() + 7);
              setCalCursor(d);
            }} style={{ background: C.accent + "22", border: `1.5px solid ${C.accent}`, color: C.accent, borderRadius: 8, width: 36, height: 32, cursor: "pointer", fontSize: 20, fontFamily: "inherit", fontWeight: 800 }}>›</button>
            <button onClick={() => { setCalCursor(new Date()); setCalSelectedDate(today); }} style={{ background: C.accent + "22", border: `1px solid ${C.accent}66`, color: C.accent, borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 13, fontFamily: "inherit", fontWeight: 700 }}>今日</button>
            <div style={{ flex: 1 }} />
            <button onClick={() => setCalShowFilters(v => !v)} style={{
              background: (calFilterType !== "all" || calFilterMember !== "__ALL__") ? C.warn + "22" : C.borderDim,
