  return (
    <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 12, lineHeight: 1.6 }}>
        {pushStatus === "subscribed"
          ? <>✅ <span style={{ color: C.success, fontWeight: 700 }}>{currentUser}</span> として購読中。<br />予定が追加されると、アプリ閉じてても即通知が届きます。</>
          : pushStatus === "checking"
            ? "⌛ 確認中..."
            : "⚠️ Web Push 未設定。下のボタンで有効化してください。"}
      </div>

      {pushStatus === "unsubscribed" && (
        <button onClick={enable} disabled={busy || !currentUser} style={{
          ...btnStyle(), width: "100%", padding: "14px", fontSize: 14,
          background: "linear-gradient(135deg, #0ea5e9, #06b6d4)",
          borderColor: "#0ea5e9", opacity: (busy || !currentUser) ? 0.6 : 1,
        }}>{busy ? "⌛ 設定中..." : "🚀 Web Push を有効化する"}</button>
      )}

      {/* エラー表示（タイムアウトや SW 失敗時） */}
      {lastError && pushStatus !== "subscribed" && (
        <div style={{
          marginTop: 10, padding: "10px 12px",
          background: C.warn + "22", border: `1px solid ${C.warn}55`,
          borderRadius: 8, fontSize: 11, color: C.warn, lineHeight: 1.6,
        }}>
          ⚠️ {lastError}
        </div>
      )}

      {pushStatus === "subscribed" && (
        <>
          <button onClick={test} disabled={busy} style={{
            ...btnStyle(), width: "100%", padding: "12px", fontSize: 13,
            background: C.success, borderColor: C.success, marginBottom: 8,
          }}>{busy ? "送信中..." : "🧪 自分宛に Web Push テスト送信"}</button>

          {/* 🆕 通知メンバー全員にテスト */}
          <button onClick={async () => {
            setBusy(true);
            try {
              const notifyTargets = getNotifyMembers(data);
              const ok = await sendPushNotification(
                notifyTargets,
                `🧪 通知メンバー (${notifyTargets.length}名) テスト`,
                `${currentUser || "送信者不明"} さんから ${notifyTargets.join("・")} さんへの送信テスト。\n各端末で受信確認してください。`,
                { tag: "test-push-managers" }
              );
              if (ok) {
                alert(`✅ 送信完了！\n通知メンバー（${notifyTargets.join("・")}）の端末で、\n通知が届いたか確認してください。\n\n届かない方は「🚀 Web Push を有効化する」が必要です。`);
              } else {
                alert("❌ 送信失敗。Edge Function や Supabase 設定を確認してください。");
              }
            } catch (e) { alert(`エラー: ${e.message}`); }
            setBusy(false);
          }} disabled={busy} style={{
            ...btnStyle(), width: "100%", padding: "12px", fontSize: 13,
            background: C.accent, borderColor: C.accent, marginBottom: 8,
          }}>{busy ? "送信中..." : `📨 通知メンバー全員にテスト (${getNotifyMembers(data).join("・")})`}</button>

          <button onClick={disable} disabled={busy} style={{
            ...btnStyle("ghost"), width: "100%", padding: "10px", fontSize: 12,
            color: C.danger, borderColor: C.danger + "55",
          }}>🛑 Web Push を解除</button>
        </>
      )}

      {/* 🆕 詳細診断ボタン（誰でも押せる） */}
      <button onClick={async () => {
        const lines = ["🔍 Web Push 診断結果\n"];
        // 1. ブラウザ・OS
        const ua = navigator.userAgent;
        let osType = "不明";
        if (/iPhone|iPad|iPod/.test(ua)) osType = "iOS";
        else if (/Android/.test(ua)) osType = "Android";
        else if (/Windows/.test(ua)) osType = "Windows";
        else if (/Mac/.test(ua)) osType = "Mac";
        lines.push(`📱 OS: ${osType}`);
        // iOS バージョン
        if (osType === "iOS") {
          const m = ua.match(/OS (\d+)_(\d+)/);
          if (m) {
            const ver = `${m[1]}.${m[2]}`;
            const okIos = parseFloat(ver) >= 16.4;
            lines.push(`📱 iOS バージョン: ${ver} ${okIos ? "✅ OK" : "❌ 16.4以降が必要"}`);
          }
        }
        // 2. PWA インストール状態
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        lines.push(`📦 PWA: ${isStandalone ? "✅ ホーム画面起動" : "❌ ブラウザ起動（iOS は PWA 必須）"}`);
        // 3. Service Worker API
        lines.push(`⚙️ Service Worker API: ${"serviceWorker" in navigator ? "✅" : "❌ 非対応"}`);
        // 4. PushManager API
        lines.push(`📨 Push API: ${"PushManager" in window ? "✅" : "❌ 非対応"}`);
        // 5. Notification 許可
        if ("Notification" in window) {
          const perm = Notification.permission;
          const okPerm = perm === "granted";
          lines.push(`🔔 通知許可: ${perm} ${okPerm ? "✅" : (perm === "denied" ? "❌ ブロック中（端末設定で許可に）" : "⚠️ 未許可")}`);
        }
        // 6. SW 登録状態
        if ("serviceWorker" in navigator) {
          const reg = await navigator.serviceWorker.getRegistration();
          lines.push(`⚙️ SW 登録: ${reg ? "✅ あり" : "❌ なし"}`);
          if (reg) {
            const sub = await reg.pushManager.getSubscription();
            lines.push(`📬 購読: ${sub ? "✅ 登録済み" : "❌ なし"}`);
            if (sub) {
              lines.push(`   endpoint: ${sub.endpoint.slice(0, 50)}...`);
            }
          }
        }
        // 7. HTTPS
        lines.push(`🔒 HTTPS: ${location.protocol === "https:" || location.hostname === "localhost" ? "✅" : "❌ Web Push は HTTPS 必須"}`);
        // 8. ネットワーク
        lines.push(`🌐 オンライン: ${navigator.onLine ? "✅" : "❌ オフライン"}`);
        // 9. ブラウザ
        const browser = /Chrome/.test(ua) && !/Edge/.test(ua) ? "Chrome" :
                        /Safari/.test(ua) && !/Chrome/.test(ua) ? "Safari" :
                        /Firefox/.test(ua) ? "Firefox" :
                        /Edge/.test(ua) ? "Edge" : "その他";
        lines.push(`🌐 ブラウザ: ${browser}`);
        // 10. 直近のエラー
        if (lastError) {
          lines.push(`\n⚠️ 直近のエラー:\n${lastError}`);
        }
        // 11. 推奨アクション
        lines.push("\n💡 推奨対応:");
        if (osType === "iOS" && !isStandalone) {
          lines.push("• Safari の共有ボタンから「ホーム画面に追加」→ ホームのアイコンから開く");
        }
        if (Notification.permission === "denied") {
          lines.push("• 端末設定 → アプリ → 通知 → 許可に変更");
        }
        if (osType === "Android" && browser !== "Chrome") {
          lines.push("• Chrome ブラウザで開いてみる");
        }
        lines.push("• VPN を切ってみる（FCM/APNs が遮断される可能性）");
        lines.push("• Wi-Fi → 4G/5G に切替えてみる");
        lines.push("• ブラウザのキャッシュをクリア");

        alert(lines.join("\n"));
      }} style={{
        width: "100%", marginTop: 10, padding: "10px", fontSize: 12,
        background: C.accent + "11", border: `1px solid ${C.accent}55`,
        color: C.accent, borderRadius: 8, cursor: "pointer", fontFamily: "inherit", fontWeight: 700,
      }}>🔍 詳細診断（通知が来ない原因を調べる）</button>

      {!currentUser && (
        <div style={{ marginTop: 10, padding: 10, background: C.warn + "22", border: `1px solid ${C.warn}55`, borderRadius: 8, fontSize: 11, color: C.warn }}>
          ⚠️ 先に「現在のユーザー」を設定してください
        </div>
      )}

      <div style={{ marginTop: 14, padding: 12, background: C.bg, border: `1px solid ${C.borderDim}`, borderRadius: 8, fontSize: 10, color: C.muted, lineHeight: 1.7 }}>
        <div style={{ color: C.accent, fontWeight: 700, marginBottom: 6 }}>💡 仕組み</div>
        ① 自分の端末で購読 → Supabaseに登録<br />
        ② 別の人が予定を作って自分を担当者に指定<br />
        ③ Supabase Edge Function が自分の端末にプッシュ送信<br />
        ④ アプリ閉じてても通知が届く<br /><br />
        <span style={{ color: C.warn }}>※ 初回セットアップで Supabase 側の設定が必要です（手順は別途）</span>
      </div>
    </div>
  );
}

// ===================== MORE PAGE (役所・積算) =====================
function MorePage({ data, setData, onLock, onSwitchUser }) {
  const [subPage, setSubPage] = useState(null);
  const [currentUser, setCurrentUserState] = useState(getCurrentUser());
  const [showActivityAll, setShowActivityAll] = useState(false);

  // パスワード認証ダイアログの状態
  const [pwdAuth, setPwdAuth] = useState(null); // { member, action: "switch"|"setOwn"|"setOther", onSuccess: fn }
  const [pwdInput, setPwdInput] = useState("");
  const [pwdInput2, setPwdInput2] = useState("");
  const [pwdOldInput, setPwdOldInput] = useState("");
  const [pwdError, setPwdError] = useState("");

  if (subPage === "yakusho") return <YakushoPage data={data} setData={setData} onBack={() => setSubPage(null)} />;
  if (subPage === "sekisan") return <SekisanPage data={data} setData={setData} onBack={() => setSubPage(null)} />;
  if (subPage === "investors") return <InvestorListPage data={data} setData={setData} onBack={() => setSubPage(null)} />;
  const hasPin = !!getPin();
  const activityLog = data.activityLog || [];
  const notifPermission = typeof Notification !== "undefined" ? Notification.permission : "unsupported";
  const isStandalone = typeof window !== "undefined" && (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true);

  // 管理者判定
  const adminMember = data.adminMember || "下田";
  const isAdmin = isAdminUser(data, currentUser); // 🆕 管理者リスト（下田・比嘉）に含まれるか
  const memberPasswords = data.memberPasswords || {};

  // ユーザー切替試行（パスワード必要なら認証ダイアログを開く）
  const tryChangeUser = (newUser) => {
    if (!newUser) {
      if (window.confirm("「現在のユーザー」を未設定に戻しますか？")) {
        setCurrentUserState("");
        setCurrentUser("");
      }
      return;
    }
    if (newUser === currentUser) return;

    const targetPwd = memberPasswords[newUser];
    // 管理者で切替先がパスワード未設定 → そのまま切替
    // 一般ユーザーで切替先がパスワード未設定 → そのまま切替
    if (!targetPwd) {
      setCurrentUserState(newUser);
      setCurrentUser(newUser);
      return;
    }
    // 管理者が自分以外に切替 → 切替先のパスワードを入力
    // 一般ユーザーが切替 → 切替先のパスワードを入力
    setPwdInput(""); setPwdError("");
    setPwdAuth({ member: newUser, action: "switch" });
  };

  // 切替認証
  const confirmSwitch = () => {
    const target = pwdAuth.member;
    if (pwdInput === memberPasswords[target]) {
      setCurrentUserState(target);
      setCurrentUser(target);
      setPwdAuth(null);
      setPwdInput("");
      setPwdError("");
    } else {
      setPwdError("パスワードが違います");
      setPwdInput("");
    }
  };

  // パスワード設定試行
  const tryOpenPwdSetting = (member) => {
    // 管理者は誰でも設定可能（旧パスワード不要）
    if (isAdmin) {
      setPwdInput(""); setPwdInput2(""); setPwdOldInput(""); setPwdError("");
      setPwdAuth({ member, action: "setOther" });
      return;
    }
    // 一般ユーザーは自分のだけ設定可能
    if (member !== currentUser) {
      alert("⚠️ 他のメンバーのパスワードは管理者だけが変更できます");
      return;
    }
    setPwdInput(""); setPwdInput2(""); setPwdOldInput(""); setPwdError("");
    setPwdAuth({ member, action: "setOwn" });
  };

  // パスワード保存（新規 or 変更）
  const savePwd = () => {
    const member = pwdAuth.member;
    const existingPwd = memberPasswords[member];

    // 一般ユーザーが自分のパスワードを変更：旧パスワード確認必要（既に設定済みの場合）
    if (pwdAuth.action === "setOwn" && existingPwd && pwdOldInput !== existingPwd) {
      setPwdError("旧パスワードが違います");
      setPwdOldInput("");
      return;
    }
    // 新パスワード4桁チェック
    if (pwdInput.length !== 4) {
      setPwdError("4桁の数字で入力してください");
      return;
    }
    // 確認入力との一致チェック
    if (pwdInput !== pwdInput2) {
      setPwdError("確認用パスワードが一致しません");
      setPwdInput2("");
      return;
    }
    setData(d => ({
      ...d,
      memberPasswords: { ...(d.memberPasswords || {}), [member]: pwdInput }
    }));
    alert(`✅ ${member} のパスワードを設定しました`);
    setPwdAuth(null);
    setPwdInput(""); setPwdInput2(""); setPwdOldInput(""); setPwdError("");
  };

  // パスワード削除
  const deletePwd = (member) => {
    if (!window.confirm(`${member} のパスワードを削除しますか？\n削除後はパスワードなしで切替可能になります。`)) return;
    setData(d => {
      const updated = { ...(d.memberPasswords || {}) };
      delete updated[member];
      return { ...d, memberPasswords: updated };
    });
    alert(`${member} のパスワードを削除しました`);
  };

  return (
    <div>
      <div style={{ fontSize: 20, fontWeight: 800, color: C.text, marginBottom: 20 }}>その他の機能</div>
      {[
        { key: "yakusho", icon: "🏛", title: "役所調査シート", desc: "用途地域・建ぺい率・ライフライン・ハザードを記録", count: data.yakusho.length },
        { key: "investors", icon: "💎", title: "投資家リスト", desc: "反響で「投資家」を選択した顧客を自動集約", count: (data.stocks || []).reduce((a, s) => a + (s.viewings || []).filter(v => v.purpose === "投資家").length, 0) },
      ].map(item => (
        <button key={item.key} onClick={() => setSubPage(item.key)} style={{ width: "100%", background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 20, marginBottom: 12, textAlign: "left", cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 16, touchAction: "manipulation" }}>
          <span style={{ fontSize: 32 }}>{item.icon}</span>
          <div style={{ flex: 1 }}>
            <div style={{ color: C.text, fontWeight: 700, fontSize: 16, marginBottom: 4 }}>{item.title}</div>
            <div style={{ color: C.muted, fontSize: 13 }}>{item.desc}</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ color: C.accent, fontWeight: 700, fontSize: 18 }}>{item.count}</div>
            <div style={{ color: C.muted, fontSize: 11 }}>件</div>
          </div>
        </button>
      ))}

      {/* 👤 現在のユーザー（起動時認証済み） */}
      <div style={{ marginTop: 24, marginBottom: 12, fontSize: 14, fontWeight: 700, color: C.muted, letterSpacing: "0.05em" }}>👤 現在のユーザー</div>
      <div style={{ background: C.cardBg, border: `2px solid ${currentUser ? (MEMBER_COLORS[currentUser] || C.accent) + "55" : C.warn + "55"}`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 4 }}>
              {currentUser ? "✅ 認証済み" : "⚠️ 未認証"}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <span style={{ fontSize: 22, fontWeight: 800, color: MEMBER_COLORS[currentUser] || C.text }}>{currentUser || "未設定"}</span>
              {isAdmin && <Tag label="👑 管理者" color="#FCD34D" />}
              {memberPasswords[currentUser] && <Tag label="🔒 認証済み" color={C.success} />}
            </div>

          }}>🔄 ユーザー切替</button>
        </div>
        <div style={{ marginTop: 10, fontSize: 10, color: C.muted, lineHeight: 1.5 }}>
          ※ 起動時に認証されたユーザーで全ての操作が記録されます。<br />
          別のメンバーとして作業する場合は「ユーザー切替」ボタンから再ログインしてください。

      {/* 🔐 メンバーパスワード管理 */}
      <div style={{ marginTop: 24, marginBottom: 12, fontSize: 14, fontWeight: 700, color: C.muted, letterSpacing: "0.05em" }}>🔐 メンバーパスワード管理</div>
      <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 16, marginBottom: 12 }}>

            <div style={{ fontSize: 11, color: C.muted, marginBottom: 8, lineHeight: 1.5 }}>

            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>

      {/* パスワード認証 BottomSheet */}

          <div style={{ display: "flex", gap: 10 }}>

      {pwdAuth && (pwdAuth.action === "setOwn" || pwdAuth.action === "setOther") && (
        <BottomSheet title={`🔐 ${pwdAuth.member} のパスワード${memberPasswords[pwdAuth.member] ? "変更" : "設定"}`} onClose={() => { setPwdAuth(null); setPwdInput(""); setPwdInput2(""); setPwdOldInput(""); setPwdError(""); }}>

              <input type="password" inputMode="numeric" maxLength={4}

                style={{ ...inp, fontSize: 22, textAlign: "center", letterSpacing: "0.5em", padding: "12px" }}
              />
            </Field>
          )}
          <Field label="🆕 新しいパスワード（4桁）">
            <input type="password" inputMode="numeric" maxLength={4}
              value={pwdInput} onChange={e => { setPwdInput(e.target.value.replace(/[^0-9]/g, "")); setPwdError(""); }}

      {/* 🆕 💾 ストレージ使用状況 */}
      <div style={{ marginTop: 24, marginBottom: 12, fontSize: 14, fontWeight: 700, color: C.muted, letterSpacing: "0.05em" }}>💾 ストレージ使用状況</div>
      <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
        {(() => {
          // データサイズを計算（JSON文字列のバイト数）
          const dataStr = JSON.stringify(data);
          const totalBytes = new Blob([dataStr]).size;
          const totalMB = totalBytes / (1024 * 1024);
          const LIMIT_MB = 500; // Supabase 無料プラン
          const percent = (totalMB / LIMIT_MB) * 100;

          // 内訳計算
          const breakdown = {
            stocks: new Blob([JSON.stringify(data.stocks || [])]).size,
            sekisan: new Blob([JSON.stringify(data.sekisan || [])]).size,
            jiage: new Blob([JSON.stringify(data.jiage || [])]).size,
            owners: new Blob([JSON.stringify(data.owners || [])]).size,
            approaches: new Blob([JSON.stringify(data.approaches || [])]).size,
            customEvents: new Blob([JSON.stringify(data.customEvents || [])]).size,
            memos: new Blob([JSON.stringify(data.memos || [])]).size,
          };

          // 写真の総バイト数を抽出
          let photoBytes = 0;
          (data.stocks || []).forEach(s => {
            (s.photos || []).forEach(p => {
              photoBytes += (typeof p === "string" ? p.length : 0);
            });
          });

          // 件数
          const counts = {
            stocks: (data.stocks || []).length,
            sekisan: (data.sekisan || []).length,
            jiage: (data.jiage || []).length,
            owners: (data.owners || []).length,
            approaches: (data.approaches || []).length,
            events: (data.customEvents || []).length,
            memos: (data.memos || []).length,
            photos: (data.stocks || []).reduce((acc, s) => acc + ((s.photos || []).length), 0),
          };

          // 色分け
          const barColor = percent < 50 ? C.success : percent < 80 ? C.warn : C.danger;
          const status = percent < 50 ? "✅ 余裕あり" : percent < 80 ? "⚠️ 注意" : "🚨 上限近い";

          const fmtSize = bytes => bytes >= 1024 * 1024 ? (bytes / (1024 * 1024)).toFixed(2) + " MB" : (bytes / 1024).toFixed(1) + " KB";

          return (
            <>
              {/* メイン使用率 */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <span style={{ fontSize: 13, color: C.muted }}>Supabase 無料プラン</span>
                <span style={{ fontSize: 12, color: barColor, fontWeight: 700 }}>{status}</span>
              </div>
              <div style={{ background: C.panelBg, borderRadius: 10, height: 24, overflow: "hidden", border: `1px solid ${C.borderDim}`, position: "relative" }}>
                <div style={{
                  width: Math.min(percent, 100) + "%", height: "100%",
                  background: `linear-gradient(90deg, ${barColor}, ${barColor}dd)`,
                  transition: "width 0.4s",
                }} />
                <div style={{
                  position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 13, fontWeight: 800, color: "#fff",
                  textShadow: "0 1px 2px rgba(0,0,0,0.7)",
                }}>
                  {percent.toFixed(2)}%
                </div>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontSize: 12 }}>
                <span style={{ color: C.text, fontWeight: 700 }}>{totalMB.toFixed(2)} MB</span>
                <span style={{ color: C.muted }}>/ {LIMIT_MB} MB</span>
              </div>

              {/* 内訳 */}
              <div style={{ marginTop: 14, padding: 12, background: C.bg, borderRadius: 10, border: `1px solid ${C.borderDim}` }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, marginBottom: 8, letterSpacing: "0.05em" }}>📊 内訳</div>
                {[
                  ["📸 物件写真", photoBytes, `${counts.photos}枚`],
                  ["🏠 在庫物件（写真除く）", breakdown.stocks - photoBytes, `${counts.stocks}件`],
                  ["🧮 仕入検討積算表", breakdown.sekisan, `${counts.sekisan}件`],
                  ["🚧 地上げ", breakdown.jiage, `${counts.jiage}件`],
                  ["👤 所有者アタック", breakdown.owners, `${counts.owners}件`],
                  ["📞 営業活動", breakdown.approaches, `${counts.approaches}件`],
                  ["📅 カレンダー", breakdown.customEvents, `${counts.events}件`],
                  ["📝 メモ", breakdown.memos, `${counts.memos}件`],
                ].map(([label, bytes, count]) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: `1px solid ${C.borderDim}`, fontSize: 12 }}>
                    <span style={{ color: C.muted }}>{label}</span>
                    <span style={{ color: C.text, fontWeight: 600 }}>
                      <span style={{ color: C.muted, fontSize: 11, marginRight: 6 }}>{count}</span>
                      {fmtSize(Math.max(0, bytes))}
                    </span>
                  </div>
                ))}
              </div>

              {/* 警告メッセージ */}
              {percent >= 80 && (
                <div style={{ marginTop: 12, padding: 12, background: C.danger + "22", border: `1px solid ${C.danger}`, borderRadius: 10, fontSize: 12, color: C.danger, lineHeight: 1.6 }}>
                  🚨 容量が上限に近づいています。古い決済完了物件の写真を削除するか、Supabase Pro プラン（8GB）への切り替えを検討してください。
                </div>
              )}
              {percent >= 50 && percent < 80 && (
                <div style={{ marginTop: 12, padding: 12, background: C.warn + "22", border: `1px solid ${C.warn}`, borderRadius: 10, fontSize: 12, color: C.warn, lineHeight: 1.6 }}>
                  ⚠️ 半分以上使用中。今のペースが続く場合は、容量整理を視野に入れてください。
                </div>
              )}
              {percent < 50 && (
                <div style={{ marginTop: 12, fontSize: 11, color: C.muted, lineHeight: 1.6 }}>
                  💡 現状の使用ペースなら長期間使えます。Supabase ダッシュボードでも確認できます。
                </div>
              )}
            </>
          );
        })()}
      </div>

      {/* 🔄 強制更新（キャッシュクリア） */}
      <div style={{ marginTop: 24, marginBottom: 12, fontSize: 14, fontWeight: 700, color: C.muted, letterSpacing: "0.05em" }}>🔄 アプリ更新</div>
      <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
        <div style={{ fontSize: 12, color: C.muted, marginBottom: 12, lineHeight: 1.6 }}>
          アプリが古いままで表示される場合や、共有メンバーが「読込中」で進まない場合は、強制更新を実行してください。<br />
          <span style={{ fontSize: 11 }}>※ データはSupabaseに保存されているため失われません</span>
        </div>
        <button onClick={async () => {
          if (!window.confirm("キャッシュをクリアして最新版を再読み込みします。\n（先にデータを Supabase に同期してから実行します）\n\n実行しますか？")) return;
          try {
            // 🆕 0. まず最新データを Supabase に保存（未保存データの保護）
            try {
              const cached = loadFromCache();
              if (cached) {
                const syncOk = await saveToSupabase(cached);
                if (!syncOk) {
                  if (!window.confirm("⚠️ Supabase への同期に失敗しました。\n\nこのまま強制更新すると、未保存の変更が失われる可能性があります。\n\n本当に続けますか？")) return;
                } else {
                  console.log("[ForceUpdate] Supabase 同期 OK");
                }
              }
            } catch (syncErr) {
              console.warn("[ForceUpdate] Sync error:", syncErr);
              if (!window.confirm("⚠️ データ同期中にエラーが発生しました。\n\nこのまま続行すると変更が失われる可能性があります。\n本当に続けますか？")) return;
            }

            // 1. localStorage のキャッシュをクリア
            try {
              localStorage.removeItem("hikari_v4_cache");
              localStorage.removeItem("hikari_v3_cache");
              localStorage.removeItem("hikari_v2_cache");
            } catch (e) {}

            // 2. Service Worker のキャッシュ削除
            if ("caches" in window) {
              const names = await caches.keys();
              await Promise.all(names.map(n => caches.delete(n)));
            }

            // 3. Service Worker をアンレジスター（次回の登録で更新される）
            if ("serviceWorker" in navigator) {
              const regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(r => r.unregister()));
            }

            // 4. ハードリロード
            window.location.reload(true);
          } catch (err) {
            alert("更新エラー: " + err.message + "\n手動でブラウザを再読み込みしてください。");
          }
        }} style={{
          width: "100%", background: C.warn + "22", border: `2px solid ${C.warn}`,
          color: C.warn, borderRadius: 10, padding: "14px", cursor: "pointer",
          fontSize: 15, fontFamily: "inherit", fontWeight: 800,
        }}>🔄 強制更新（キャッシュクリア＆最新版取得）</button>
      </div>

      {/* 🆕 ☀️ ライト/ダークモード切替 */}
      <div style={{ marginTop: 24, marginBottom: 12, fontSize: 14, fontWeight: 700, color: C.muted, letterSpacing: "0.05em" }}>🎨 画面の明るさ</div>
      <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
        <div style={{ fontSize: 12, color: C.muted, marginBottom: 10, lineHeight: 1.6 }}>
          外で日差しが強くて画面が見えづらい時は <b style={{ color: C.warn }}>☀️ ライトモード</b> がおすすめ。<br />

        </div>
        <button onClick={() => {
          const currentLight = localStorage.getItem('hikari_light_mode') === 'true';
          const next = !currentLight;
          localStorage.setItem('hikari_light_mode', next ? 'true' : 'false');
          alert(`${next ? "☀️ ライトモード" : "🌙 ダークモード"} に切り替えます。\nアプリをリロードします。`);
          window.location.reload();
        }} style={{
          width: "100%",
          background: isLightMode ? C.purple + "22" : C.warn + "22",
          border: `2px solid ${isLightMode ? C.purple : C.warn}`,
          color: isLightMode ? C.purple : C.warn,
          borderRadius: 10, padding: "14px", cursor: "pointer",
          fontSize: 15, fontFamily: "inherit", fontWeight: 800,
        }}>{isLightMode ? "🌙 ダークモードに切替（夜・室内向け）" : "☀️ ライトモードに切替（屋外向け）"}</button>
      </div>

      {/* 🔔 プッシュ通知設定（PWA） */}
      <div style={{ marginTop: 24, marginBottom: 12, fontSize: 14, fontWeight: 700, color: C.muted, letterSpacing: "0.05em" }}>🔔 プッシュ通知</div>
      <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
        <div style={{ fontSize: 12, color: C.muted, marginBottom: 12, lineHeight: 1.6 }}>
          {notifPermission === "granted" ? "✅ 通知許可済み。リマインダー時刻に通知が届きます。" : notifPermission === "denied" ? "❌ 通知ブロック中。ブラウザ設定から許可してください。" : "⚠️ 通知が未許可です。下のボタンで許可を取ってください。"}
          <br />
          <span style={{ fontSize: 11 }}>
            {isStandalone ? "📱 PWAモード起動中（ホーム画面から起動）" : "🌐 ブラウザモード起動中"}
          </span>
        </div>
        {notifPermission !== "granted" && notifPermission !== "denied" && notifPermission !== "unsupported" && (
          <button onClick={async () => {
            try {
              const result = await Notification.requestPermission();
              if (result === "granted") {
                alert("✅ 通知を許可しました！\nリマインダー付き予定の時刻にお知らせします。");
                // テスト通知
                if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                  navigator.serviceWorker.controller.postMessage({
                    type: 'SHOW_NOTIFICATION',
                    title: '🎉 通知テスト',
                    body: '通知の動作確認です。ひかり不動産から届きました！',
                    tag: 'test',
                  });
                } else {
                  navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification('🎉 通知テスト', { body: '通知の動作確認です。ひかり不動産から届きました！', tag: 'test', icon: './icon-192.png' });
                  }).catch(e => alert('通知エラー: ' + e.message));
                }
              } else {
                alert("通知が許可されませんでした。ブラウザの設定から後でも変更できます。");
              }
            } catch (err) { alert("通知許可エラー: " + err.message); }
          }} style={{ ...btnStyle(), width: "100%", padding: "12px", fontSize: 14 }}>🔔 通知を許可する</button>
        )}
        {notifPermission === "granted" && (
          <button onClick={() => {
            if (navigator.serviceWorker && navigator.serviceWorker.controller) {
              navigator.serviceWorker.controller.postMessage({
                type: 'SHOW_NOTIFICATION',
                title: '🎉 通知テスト',
                body: '通知の動作確認です。ひかり不動産から届きました！',
                tag: 'test',
              });
            } else {
              navigator.serviceWorker.ready.then(reg => {
                reg.showNotification('🎉 通知テスト', { body: '通知の動作確認です。ひかり不動産から届きました！', tag: 'test', icon: './icon-192.png' });
              }).catch(e => alert('通知エラー: ' + e.message));
            }
          }} style={{ ...btnStyle("ghost"), width: "100%", padding: "10px", fontSize: 13 }}>🧪 テスト通知を出す</button>
        )}
        {!isStandalone && (
          <div style={{ marginTop: 12, padding: 12, background: C.accent + "11", border: `1px solid ${C.accent}33`, borderRadius: 8, fontSize: 11, color: C.muted, lineHeight: 1.7 }}>
            <div style={{ color: C.accent, fontWeight: 700, marginBottom: 4 }}>💡 ホーム画面に追加しよう</div>
            <strong style={{ color: C.text }}>iPhone（Safari）：</strong><br />
            ① 共有ボタン（□↑）→ ② 「ホーム画面に追加」→ ③ 「追加」<br />
            <strong style={{ color: C.text }}>Android（Chrome）：</strong><br />
            ① メニュー（⋮）→ ② 「ホーム画面に追加」→ ③ 「インストール」<br /><br />
            ホーム画面のアイコンから起動すれば、ブラウザ閉じてても通知が届きやすくなります。
          </div>
        )}
      </div>

      {/* 🚀 Web Push（アプリ閉じてても届くリアルタイム通知） */}
      <div style={{ marginTop: 24, marginBottom: 12, fontSize: 14, fontWeight: 700, color: C.muted, letterSpacing: "0.05em" }}>🚀 Web Push（アプリ閉じててもOK）</div>
      <WebPushSection currentUser={currentUser} data={data} />

      {/* 📋 操作履歴 */}
      <div style={{ marginTop: 24, marginBottom: 12, fontSize: 14, fontWeight: 700, color: C.muted, letterSpacing: "0.05em" }}>📋 操作履歴</div>
      <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
        <div style={{ fontSize: 12, color: C.muted, marginBottom: 12 }}>
          全 {activityLog.length} 件 / 最新200件を保持
        </div>
        {activityLog.length === 0 ? (
          <div style={{ color: C.muted, fontSize: 13, textAlign: "center", padding: 20 }}>まだ履歴がありません</div>
        ) : (
          <>
            <div style={{ maxHeight: showActivityAll ? "none" : 400, overflowY: "auto" }}>
              {(showActivityAll ? activityLog : activityLog.slice(0, 30)).map(log => {
                const ACTION_COLOR = { add: C.success, update: C.accent, delete: C.danger, promote: C.purple };
                const ACTION_LABEL = { add: "追加", update: "編集", delete: "削除", promote: "昇格" };
                const TARGET_LABEL = { stock: "在庫", jiage: "地上げ", owner: "所有者", sekisan: "積算", yakusho: "役所", goal: "目標" };
                const d = new Date(log.timestamp);
                const dateStr = `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
                return (
                  <div key={log.id} style={{ display: "flex", gap: 10, alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${C.borderDim}`, fontSize: 12 }}>
                    <span style={{ color: C.muted, fontSize: 11, width: 70, flexShrink: 0 }}>{dateStr}</span>
                    <Tag label={log.user} color={MEMBER_COLORS[log.user] || C.muted} />
                    <Tag label={`${TARGET_LABEL[log.target] || log.target}・${ACTION_LABEL[log.action] || log.action}`} color={ACTION_COLOR[log.action] || C.muted} />
                    <span style={{ color: C.text, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{log.description}</span>
                  </div>
                );
              })}
            </div>
            {activityLog.length > 30 && (
              <button onClick={() => setShowActivityAll(v => !v)} style={{ ...btnStyle("ghost"), width: "100%", marginTop: 10, padding: "8px", fontSize: 12 }}>
                {showActivityAll ? "▲ 最新30件のみ表示" : `▼ 全${activityLog.length}件を表示`}
              </button>
            )}
          </>
        )}
        {activityLog.length > 0 && (
          <button onClick={() => {
            if (window.confirm(`操作履歴（${activityLog.length}件）を全て削除しますか？\nこの操作は取り消せません。`)) {
              setData(d => ({ ...d, activityLog: [] }));
            }
          }} style={{ ...btnStyle("danger"), width: "100%", marginTop: 10, padding: "8px", fontSize: 12 }}>履歴を全削除</button>
        )}
      </div>
    </div>
  );
}

function InvestorListPage({ data, setData, onBack, onJumpToStock }) {
  const [search, setSearch] = useState("");
  const [filterProspect, setFilterProspect] = useState([]);
  const [filterResult, setFilterResult] = useState([]);
  const [expandedRows, setExpandedRows] = useState({}); // {key: bool}

  // 全在庫の反響から「投資家」のみ抽出
  const investors = useMemo(() => {
    const list = [];
    (data.stocks || []).forEach(s => {
      (s.viewings || []).forEach((v, vi) => {
        if (v.purpose !== "投資家") return;
        list.push({
          key: `${s.id}_${vi}`,
          stockId: s.id,
          stockName: s.name || "(無題)",
          stockAssignee: s.assignee,
          ...v,
        });
      });
    });
    // 新しい案内が上
    list.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
    return list;
  }, [data.stocks]);

  // フィルター適用
  const filtered = useMemo(() => investors.filter(v => {
    if (search) {
      const q = search.toLowerCase();
      const text = [v.customer, v.investArea, v.investBudget, v.investType, v.stockName, v.note, v.contact, v.email].join(" ").toLowerCase();
      if (!text.includes(q)) return false;
    }
    if (filterProspect.length && !filterProspect.includes(v.prospect || "")) return false;
    if (filterResult.length && !filterResult.includes(v.result || "")) return false;
    return true;
  }), [investors, search, filterProspect, filterResult]);

  // KPI
  const kpi = useMemo(() => {
    const total = investors.length;
    const hot = investors.filter(v => v.prospect === "熱い").length;
    const active = investors.filter(v => !["NG", "ご縁なし"].includes(v.nextAction)).length;
    const closed = investors.filter(v => v.nextAction === "成約").length;
    return { total, hot, active, closed };
  }, [investors]);

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
        <button onClick={onBack} style={{ background: "none", border: "none", color: C.accent, fontSize: 24, cursor: "pointer", padding: 0 }}>←</button>
        <div style={{ fontSize: 20, fontWeight: 800, color: C.text }}>💎 投資家リスト</div>
      </div>

      {/* KPI */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
        {[
          { label: "総投資家数", count: kpi.total, color: "#a855f7", icon: "💎" },
          { label: "🔥熱い", count: kpi.hot, color: C.danger, icon: "🔥" },
          { label: "アクティブ", count: kpi.active, color: C.success, icon: "✅" },
          { label: "成約済", count: kpi.closed, color: C.accent, icon: "🎉" },
        ].map(k => (
          <div key={k.label} style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 10, padding: "10px 6px", textAlign: "center" }}>
            <div style={{ fontSize: 16 }}>{k.icon}</div>
            <div style={{ color: k.color, fontWeight: 800, fontSize: 18, lineHeight: 1 }}>{k.count}</div>
            <div style={{ color: C.muted, fontSize: 9, marginTop: 4 }}>{k.label}</div>
          </div>
        ))}
      </div>

      <SearchBar value={search} onChange={setSearch} placeholder="名前・エリア・予算・物件で検索..." />

      <div style={{ fontSize: 12, color: C.muted, marginBottom: 4 }}>見込度</div>
      <FilterChips options={Object.keys(PROSPECT_INFO)} value={filterProspect} onChange={setFilterProspect} multi />
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 4 }}>結果</div>
      <FilterChips options={Object.keys(RESULT_INFO)} value={filterResult} onChange={setFilterResult} multi />

      {/* Excelダウンロードボタン */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, gap: 10, flexWrap: "wrap" }}>
        <div style={{ color: C.muted, fontSize: 12 }}>{filtered.length}件表示</div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={() => {
            if (!filtered.length) { alert("ダウンロードするデータがありません"); return; }
            // 投資家別サマリー（一人一行・6項目）
            const investorMap = new Map();
            filtered.forEach(v => {
              const name = (v.customer || "").trim();
              const email = (v.email || "").trim().toLowerCase();
              const key = name || email || `_${v.key}`;
              if (!investorMap.has(key)) {
                investorMap.set(key, {
                  name: v.customer || "",
                  emails: new Set(),
                  stockNames: new Set(),
                  assignees: new Set(),
                  investAreas: new Set(),
                  investYields: new Set(),
                });
              }
              const g = investorMap.get(key);
              if (v.email) g.emails.add(v.email);
              if (v.stockName) g.stockNames.add(v.stockName);
              if (v.stockAssignee) g.assignees.add(v.stockAssignee);
              if (v.investArea) g.investAreas.add(v.investArea);
              if (v.investYield) g.investYields.add(v.investYield);
            });
            const rows = [...investorMap.values()].map(g => ({
              "名前": g.name,
              "メールアドレス": [...g.emails].join("、"),
              "反響物件": [...g.stockNames].join("、"),
              "担当者": [...g.assignees].join("、"),
              "希望エリア": [...g.investAreas].join("、"),
              "利回り": [...g.investYields].join("、"),
            }));
            const ymd = new Date().toISOString().split("T")[0];
            downloadCSV(rows, `投資家リスト_${ymd}.csv`);
          }} style={{
            background: C.success + "22", border: `1.5px solid ${C.success}`, color: C.success,
            borderRadius: 8, padding: "8px 14px", cursor: "pointer", fontSize: 12,
            fontFamily: "inherit", fontWeight: 700,
          }}>📥 投資家別CSV</button>
          <button onClick={() => {
            if (!filtered.length) { alert("ダウンロードするデータがありません"); return; }
            const rows = filtered.map(v => ({
              "反響日": v.date || "",
              "反響曜日": dayOfWeekLabel(v.date)?.label || "",
              "案内日": v.visitDate || "",
              "案内曜日": dayOfWeekLabel(v.visitDate)?.label || "",
              "案内時間": v.visitTime || "",
              "物件名": v.stockName || "",
              "担当者": v.stockAssignee || "",
              "顧客名": v.customer || "",
              "電話番号": v.contact || "",
              "メールアドレス": v.email || "",
              "見込度": v.prospect || "",
              "結果": v.result || "",
              "次回アクション": v.nextAction || "",
              "資金種別": v.funding || "",
              "希望エリア": v.investArea || "",
              "希望価格帯": v.investBudget || "",
              "利回り希望": v.investYield || "",
              "物件タイプ希望": v.investType || "",
              "検討予算": v.budget || "",
              "来場人数": v.people || "",
              "経由": v.channel || "",
              "メモ": v.note || "",
            }));
            const ymd = new Date().toISOString().split("T")[0];
            downloadCSV(rows, `投資家リスト_案件別_${ymd}.csv`);
          }} style={{
            background: C.accent + "22", border: `1.5px solid ${C.accent}`, color: C.accent,
            borderRadius: 8, padding: "8px 14px", cursor: "pointer", fontSize: 12,
            fontFamily: "inherit", fontWeight: 700,
          }}>📋 案件別CSV</button>
        </div>
      </div>

      {filtered.length === 0 ? (
        <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 12, padding: 40, textAlign: "center", color: C.muted, fontSize: 13 }}>
          投資家データがまだありません<br />
          <span style={{ fontSize: 11, marginTop: 8, display: "inline-block" }}>
            在庫タブから物件編集 → 反響 → 購入目的「投資家」を選ぶと、ここに自動集約されます
          </span>
        </div>
      ) : (
        <div style={{ display: "grid", gap: 10 }}>
          {filtered.map(v => {
            const isExpanded = !!expandedRows[v.key];
            const prospect = PROSPECT_INFO[v.prospect];
            const result = RESULT_INFO[v.result];
            const dow = dayOfWeekLabel(v.date);
            return (
              <div key={v.key} style={{ background: C.cardBg, border: `1.5px solid #a855f733`, borderRadius: 12, padding: 14 }}>
                {/* サマリー */}
                <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 15, fontWeight: 800, color: C.text }}>{v.customer || "(名前未入力)"}</span>
                      {prospect && (
                        <span style={{ background: prospect.color + "33", color: prospect.color, padding: "2px 8px", borderRadius: 10, fontSize: 11, fontWeight: 700 }}>
                          {prospect.icon}{v.prospect}
                        </span>
                      )}
                      {v.nextAction && (
                        <span style={{ background: "#06b6d433", color: "#06b6d4", padding: "2px 8px", borderRadius: 10, fontSize: 10, fontWeight: 600 }}>
                          🔁{v.nextAction}
                        </span>
                      )}
                    </div>
                    <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, lineHeight: 1.6 }}>
                      📅 反響:{v.date || "—"}{dow && <span style={{ color: dow.color, marginLeft: 2 }}>({dow.label})</span>}
                      {v.visitDate && (() => { const vdow = dayOfWeekLabel(v.visitDate); return (
                        <span style={{ color: "#06b6d4", marginLeft: 8, fontWeight: 700 }}>
                          → 案内:{v.visitDate}{vdow && <span style={{ color: vdow.color, marginLeft: 2 }}>({vdow.label})</span>}{v.visitTime ? " " + v.visitTime : ""}
                        </span>
                      ); })()}
                      <br />🏠 <span onClick={() => onJumpToStock && onJumpToStock(v.stockId)} style={{ color: C.accent, textDecoration: "underline", cursor: "pointer" }}>{v.stockName}</span>
                    </div>
                    {(v.investArea || v.investBudget || v.investYield || v.investType) && (
                      <div style={{ background: "#7c3aed11", borderLeft: `3px solid #a855f7`, padding: "8px 10px", borderRadius: 4, fontSize: 12, lineHeight: 1.7 }}>
                        {v.investArea && <div>🗺️ <strong style={{ color: "#a855f7" }}>希望エリア：</strong>{v.investArea}</div>}
                        {v.investBudget && <div>💴 <strong style={{ color: "#a855f7" }}>希望価格：</strong>{v.investBudget}</div>}
                        {v.investYield && <div>📈 <strong style={{ color: "#a855f7" }}>利回り希望：</strong>{v.investYield}</div>}
                        {v.investType && <div>🏢 <strong style={{ color: "#a855f7" }}>物件タイプ：</strong>{v.investType}</div>}
                      </div>
                    )}
                  </div>
                  <button onClick={() => setExpandedRows(p => ({ ...p, [v.key]: !isExpanded }))}
                    style={{ background: C.accent + "22", border: `1.5px solid ${C.accent}`, color: C.accent, borderRadius: 6, padding: "5px 10px", cursor: "pointer", fontSize: 11, fontFamily: "inherit", fontWeight: 700, flexShrink: 0 }}>
                    {isExpanded ? "▲" : "▼"}
                  </button>
                </div>

                {/* 詳細 */}
                {isExpanded && (
                  <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.borderDim}`, fontSize: 12, lineHeight: 1.7 }}>
                    {(v.contact || v.email) && (
                      <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
                        {v.contact && <a href={`tel:${v.contact}`} style={{ flex: 1, textDecoration: "none", background: C.success + "22", border: `1.5px solid ${C.success}`, color: C.success, borderRadius: 8, padding: "8px 10px", textAlign: "center", fontSize: 12, fontWeight: 700 }}>📞 {v.contact}</a>}
                        {v.email && <a href={`mailto:${v.email}`} style={{ flex: 1, textDecoration: "none", background: C.accent + "22", border: `1.5px solid ${C.accent}`, color: C.accent, borderRadius: 8, padding: "8px 10px", textAlign: "center", fontSize: 12, fontWeight: 700 }}>📧 {v.email}</a>}
                      </div>
                    )}
                    {v.funding && <div>💰 資金種別：{v.funding}</div>}
                    {v.budget && <div>💵 検討予算：{v.budget}</div>}
                    {v.people && <div>👨‍👩‍👧 来場人数：{v.people}</div>}
                    {v.channel && <div>🤝 経由：{v.channel}</div>}
                    {result && <div>{result.icon} 結果：<span style={{ color: result.color, fontWeight: 700 }}>{v.result}</span></div>}
                    {v.note && <div style={{ marginTop: 8, padding: 8, background: C.bg, borderRadius: 6 }}>📝 {v.note}</div>}
                    <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${C.borderDim}`, fontSize: 11, color: C.muted }}>
                      担当者：{v.stockAssignee || "(未設定)"}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function YakushoPage({ data, setData, onBack }) {
  const currentUser = getCurrentUser();
  const adminMember = data.adminMember || "下田";
  const canEdit = (item) => canEditItem(item, currentUser, getAdminMembers(data));
  const [showAdd, setShowAdd] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [search, setSearch] = useState("");
  const ZONE_TYPES = ["第1種低層住居専用地域", "第2種低層住居専用地域", "第1種中高層住居専用地域", "第2種中高層住居専用地域", "第1種住居地域", "第2種住居地域", "準住居地域", "近隣商業地域", "商業地域", "準工業地域", "工業地域", "工業専用地域", "市街化調整区域", "非線引き区域"];
  const emptyForm = { address: "", assignee: currentUser || MEMBERS[0], surveyDate: new Date().toISOString().split("T")[0], zoneType: "", buildingRatio: "", floorRatio: "", rebuild: "可", fireZone: "なし", road1Dir: "", road1Width: "", road1Type: "", road2Dir: "", road2Width: "", water: "公営水道", gas: "都市ガス", sewer: "公営下水", flood: "無", landslide: "無", memo: "" };
  const [form, setForm] = useState(emptyForm);
  const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));

  const filtered = useMemo(() => data.yakusho.filter(y => !search || (y.address || "").includes(search)), [data.yakusho, search]);
  const openEdit = item => {
    if (!canEdit(item)) { alert(`⚠️ 編集権限がありません\n\nこの調査の担当者は「${item.assignee}」さんです。`); return; }
    setForm({ ...emptyForm, ...item }); setEditItem(item); setShowAdd(true);
  };
  const handleSave = () => {
    const item = { ...form, id: editItem?.id || Date.now() };
    // 保険：編集時の権限チェック
    if (editItem && !canEdit(editItem)) { alert("⚠️ 編集権限がありません"); setShowAdd(false); setEditItem(null); return; }
    setData(d => ({ ...d, yakusho: editItem ? d.yakusho.map(y => y.id === editItem.id ? item : y) : [...d.yakusho, item] }));
    setShowAdd(false); setEditItem(null);
  };
  const handleDelete = id => {
    const target = data.yakusho.find(y => y.id === id);
    if (target && !canEdit(target)) { alert("⚠️ 削除権限がありません"); return; }
    if (window.confirm("削除しますか？")) setData(d => {
      const next = { ...d, yakusho: d.yakusho.filter(y => y.id !== id) };
      return appendLogAndNotify(next, "delete", "yakusho", `${target?.address || target?.name || "(無題)"}を削除`, target);
    });
  };

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
        {onBack && <button onClick={onBack} style={{ background: "none", border: "none", color: C.accent, fontSize: 24, cursor: "pointer", padding: 0 }}>←</button>}
        <div style={{ fontSize: 20, fontWeight: 800, color: C.text }}>🏛 役所調査シート</div>
        <div style={{ flex: 1 }} />
        <button style={{ ...btnStyle(), padding: "10px 16px", fontSize: 14 }} onClick={() => { setForm(emptyForm); setEditItem(null); setShowAdd(true); }}>＋ 追加</button>
      </div>
      <SearchBar value={search} onChange={setSearch} placeholder="住所で検索..." />
      {filtered.length === 0 && <div style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 32, textAlign: "center", color: C.muted }}>まだ調査シートがありません</div>}
      {filtered.map(y => (
        <div key={y.id} style={{ background: C.cardBg, border: `1px solid ${C.borderDim}`, borderRadius: 14, padding: 16, marginBottom: 10 }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
            <MemberTag name={y.assignee} />
            <Tag label={y.rebuild === "可" ? "再建築可" : "再建築不可"} color={y.rebuild === "可" ? C.success : C.danger} />
          </div>
          <div style={{ color: C.text, fontWeight: 600, fontSize: 15, marginBottom: 6 }}>{y.address || "住所未設定"}</div>
          <div style={{ display: "flex", gap: 12, fontSize: 13, color: C.muted, flexWrap: "wrap", marginBottom: 10 }}>
            {y.zoneType && <span>{y.zoneType}</span>}
            {y.buildingRatio && <span>建ぺい {y.buildingRatio}%</span>}
            {y.floorRatio && <span>容積 {y.floorRatio}%</span>}
            {y.road1Width && <span>前面道路 {y.road1Dir}{y.road1Width}m</span>}
          </div>
          {canEdit(y) ? (
            <div style={{ display: "flex", gap: 8 }}>
              <button style={{ ...btnStyle("ghost"), flex: 1, padding: "10px", fontSize: 14 }} onClick={() => openEdit(y)}>編集</button>
              <button style={{ ...btnStyle("danger"), padding: "10px 14px", fontSize: 14 }} onClick={() => handleDelete(y.id)}>削除</button>
            </div>
          ) : (
            <div style={{ padding: "10px", textAlign: "center", background: C.bg, border: `1px solid ${C.borderDim}`, borderRadius: 10, color: C.muted, fontSize: 12 }}>
              👁 閲覧のみ（{y.assignee}さん担当）
            </div>
          )}
        </div>
      ))}
      {showAdd && (
        <BottomSheet title="役所調査シート" onClose={() => { setShowAdd(false); setEditItem(null); }}>
          <Field label="担当者"><select style={inp} value={form.assignee} onChange={f("assignee")}>{MEMBERS.map(m => <option key={m}>{m}</option>)}</select></Field>
          <Field label="調査日"><input type="date" style={inp} value={form.surveyDate} onChange={f("surveyDate")} /></Field>
          <Field label="物件住所"><input style={inp} value={form.address} onChange={f("address")} placeholder="埼玉県熊谷市〇〇" /></Field>
          <Field label="再建築">

// 🆕 西暦 → 和暦＋築年数の表示文字列を返す
function buildYearLabel(yr) {
  const n = Number(yr);
  if (!n || isNaN(n)) return "";
  // 西暦らしい範囲なら和暦＋築年数
  if (n >= 1900 && n <= new Date().getFullYear()) {
    let era = "";
    if (n >= 2019) era = `令和${n - 2018}年`;
    else if (n >= 1989) era = `平成${n - 1988}年`;
    else if (n >= 1926) era = `昭和${n - 1925}年`;
    else if (n >= 1912) era = `大正${n - 1911}年`;
    else era = `明治${n - 1867}年`;
    const age = new Date().getFullYear() - n;
    return `${era}・築${age}年`;
  }
  // 旧データ（築〇年として入力されたもの）
  if (n > 0 && n < 200) {
    return `築${n}年`;
  }
  return "";
}

function SekisanForm({ initial, onSave, onClose, onTransfer, canEditThis = true, defaultAssignee = null }) {
  const _currentUser = getCurrentUser();
  const [form, setForm] = useState(initial || { ...SEKISAN_EMPTY, assignee: defaultAssignee || _currentUser || MEMBERS[0] });
  const [tab, setTab] = useState("cost");
  // 担当者セレクト UI を出すか（編集時は最初から / 新規時は変更ボタンで展開）
  const [showAssigneeSelect, setShowAssigneeSelect] = useState(!!initial);
  // 🆕 物件特徴の折りたたみ（デフォルトは閉じている）
  const [featuresOpen, setFeaturesOpen] = useState(false);
  const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));
  const nv = v => parseFloat(v) || 0;

  const expenses = nv(form.brokerFeeIn) + nv(form.registration) + nv(form.acquisitionTax) +
    nv(form.stamp) + nv(form.leftover) + nv(form.reform) + nv(form.demolition) +
    nv(form.brokerFeeOut) + nv(form.other) +
    nv(form.propertyTax) + nv(form.cleaning); // 🆕 固都税・除草伐採
  const totalCost = nv(form.buyPrice) + expenses;
  const profit = nv(form.sellPrice) - totalCost;
  const profitRate = nv(form.sellPrice) > 0 ? profit / nv(form.sellPrice) * 100 : 0;

  const yieldCalc = useMemo(() => {
    const simRent = nv(form.similarRent) * 10000;
    const simArea = nv(form.similarArea);
    const tgtArea = nv(form.targetBuildingArea) || nv(form.buildingArea);
    const yr = nv(form.yieldRate) / 100;
    const invCost = (nv(form.investorRegistration) + nv(form.investorReform)) * 10000;
    if (!simRent || !simArea || !tgtArea || !yr) return null;
    const sqmRent = simRent / simArea;
    const estRent = sqmRent * tgtArea;
    const annual = estRent * 12;
    const invBuy = annual / yr; // 物件本体価格（表面利回り基準）
    const invTotal = invBuy + invCost; // 🆕 投資家視点の総投資額（=物件価格＋諸経費）
    // 🆕 実質利回り = 年間収入 ÷ 総投資額（表面より低くなる）
    const realYieldRate = invTotal > 0 ? (annual / invTotal * 100).toFixed(1) : "0.0";
    const ourSell = invBuy; // 我々の売値 = 物件本体価格
    return {
      sqmRent: Math.round(sqmRent),
      estRent: Math.round(estRent / 10000 * 10) / 10,
      annual: Math.round(annual / 10000),
      invBuy: Math.round(invBuy / 10000),
      invTotal: Math.round(invTotal / 10000), // 🆕 総投資額
      ourSell: Math.round(ourSell / 10000),
      realYieldRate,
      buyMax: Math.round(invBuy / 10000 - nv(form.targetProfitMin)),
      buyMin: Math.round(invBuy / 10000 - nv(form.targetProfitMax)),
    };
